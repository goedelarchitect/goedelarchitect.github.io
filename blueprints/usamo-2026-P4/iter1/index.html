            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>

  rw [hdefault] at h_eq\n      norm_num at h_eq\n  constructor\n  \u00b7 intro hS h1mem\n    rcases (List.mem_iff_get (a := 1) (l := Nat.digits 10 n)).mp h1mem with \u27e8i, hi\u27e9\n    -- i : Fin (Nat.digits 10 n).length, hi : (Nat.digits 10 n).get i = 1\n    have hdigit_at : digit_at n (i.val) \u2208 D := hS (i.val)\n    have hlt : digit_at n (i.val) < 10 := digit_at_lt_10 n (i.val)\n    have hne_one : digit_at n (i.val) \u2260 1 := (mem_D_iff_ne_one_of_lt_10 hlt).mp hdigit_at\n    have hdigit_eq : digit_at n (i.val) = (Nat.digits 10 n).getD (i.val) 0 := by\n      dsimp [digit_at]\n      have h10pos : 2 \u2264 10 := by norm_num\n      rw [Nat.getD_digits n (i.val) h10pos]\n    have hi_val_lt : (i.val) < (Nat.digits 10 n).length := i.2\n    have hgetD_eq_get : (Nat.digits 10 n).getD (i.val) 0 = (Nat.digits 10 n).get i := by\n      calc\n        (Nat.digits 10 n).getD (i.val) 0 = (Nat.digits 10 n)[i.val] :=\n          List.getD_eq_getElem (Nat.digits 10 n) 0 hi_val_lt\n        _ = (Nat.digits 10 n).get i := rfl\n    have hdigit_eq_one : digit_at n (i.val) = 1 := by\n      calc\n        digit_at n (i.val) = (Nat.digits 10 n).getD (i.val) 0 := hdigit_eq\n        _ = (Nat.digits 10 n).get i := hgetD_eq_get\n        _ = 1 := hi\n    exact hne_one hdigit_eq_one\n  \u00b7 intro hNoOne\n    intro i\n    have hlt : digit_at n i < 10 := digit_at_lt_10 n i\n    have hdigit_eq : digit_at n i = (Nat.digits 10 n).getD i 0 := by\n      dsimp [digit_at]\n      have h10pos : 2 \u2264 10 := by norm_num\n      rw [Nat.getD_digits n i h10pos]\n    have hgetD_ne_one : (Nat.digits 10 n).getD i 0 \u2260 1 := getD_ne_one_of_not_mem hNoOne i\n    have hne_one : digit_at n i \u2260 1 := by\n      intro h_eq\n      apply hgetD_ne_one\n      rw [\u2190 hdigit_eq, h_eq]\n    exact (mem_D_iff_ne_one_of_lt_10 hlt).mpr hne_one"

      "lean": "@[blueprint\n  (statement := /-- No $n \\in N$ can be written as $a+b$ with $a,b \\in S$. -/)\n  (proof := /-- Assume for contradiction that $n=a+b$ with $a,b \\in S$. Let $j$ be the index from the definition of $N$.\n    By `carries_zero_to_j`, $C_j=0$. By `carry_one_at_j_plus_one`, $C_{j+1}=1$.\n    By `carries_one_after_j$, $C_i=1$ for all $i$ with $j < i \\le k$. In particular $C_k=1$.\n    But `carry_final_zero` forces $C_k=0$ because $n < 10^k$. Contradiction. -/)]\nlemma no_such_a_b (n : \u2115) (hN : n \u2208 N_set) : \u00ac \u2203 (a b : \u2115), mem_S a \u2227 mem_S b \u2227 a + b = n := by\n  intro h\n  rcases h with \u27e8a, b, haS, hbS, hsum\u27e9\n  -- get the condition on n from mem_N_set_iff'\n  have hn_mem : n \u2208 Finset.Icc 1 (10 ^ k - 1) \u2227 \u2203 (j : \u2115), j < k \u2227 (\u2200 i, i < j \u2192 digit_at n i = 9) \u2227 digit_at n j = 1 \u2227 (\u2200 i, j < i \u2192 i < k \u2192 (digit_at n i = 0 \u2228 digit_at n i = 2)) := by\n    exact (mem_N_set_iff' n).mp hN\n  rcases hn_mem with \u27e8hicc, hex\u27e9\n  rcases hex with \u27e8j, hj_lt, h9, h1, h02\u27e9\n  -- Now we have the hypotheses needed for the carry lemmas.\n  have hcarry_zero_up_to_j : \u2200 i, i \u2264 j \u2192 carry_seq a b i = 0 := by\n    exact carries_zero_to_j a b n hsum haS hbS j hj_lt h9 h1 h02\n  have hcarry_one_at_j_plus_one : carry_seq a b (j+1) = 1 := by\n    apply carry_one_at_j_plus_one a b n hsum haS hbS j hj_lt h9 h1 h02 (hcarry_zero_up_to_j j (le_refl j))\n  -- Then we get carries after j are 1 up to k.\n  have hcarries_one_after_j : \u2200 i, j \u2264 i \u2192 i < k \u2192 carry_seq a b (i+1) = 1 := by\n    exact carries_one_after_j a b n hsum haS hbS j hj_lt h9 h1 h02 hcarry_one_at_j_plus_one\n  -- Now we need to get a contradiction using carry_final_zero.\n  rcases Finset.mem_Icc.mp hicc with \u27e8hle, hle'\u27e9\n  have hn_lt : n < 10 ^ k := by omega\n  have hcarry_final_zero : carry_seq a b k = 0 := carry_final_zero a b n k hsum hn_lt\n  -- From hcarries_one_after_j, we can get carry_seq a b k = 1, because we can take i = k-1 if k-1 >= j.\n  have hcarry_at_k : carry_seq a b k = 1 := by\n    have htemp : carry_seq a b ((k-1)+1) = 1 := hcarries_one_after_j (k-1) (by omega) (by omega)\n    -- simplify (k-1)+1 = k\n    have : (k-1)+1 = k := by omega\n    rw [this] at htemp\n    exact htemp\n  -- Now hcarry_final_zero gives 0, hcarry_at_k gives 1, contradiction.\n  have : (0 : \u2115) = 1 := by\n    calc\n      (0 : \u2115) = carry_seq a b k := by symm; exact hcarry_final_zero\n      _ = 1 := hcarry_at_k\n  omega"

      "lean": "@[blueprint\n  (statement := /-- For a nonempty subset `S` of `range k`, `subset_to_n S hS` belongs to `N_set`. -/)\n  (proof := /-- Uses `digit_at_ofDigits` to verify the digit conditions. -/)]\nlemma subset_to_n_mem_N_set (S : Finset \u2115) (hS : S.Nonempty) (hS_range : S \u2286 Finset.range k) : subset_to_n S hS \u2208 N_set := by\n  rw [mem_N_set_iff']\n  let n := subset_to_n S hS\n  let j := S.min' hS\n  have h_j_eq_min : j = S.min' hS := rfl\n  have h_j_mem_S : j \u2208 S := by\n    simpa [j] using Finset.min'_mem S hS\n  have h_j_lt_k : j < k := by\n    have hmem_range : j \u2208 Finset.range k := hS_range h_j_mem_S\n    exact Finset.mem_range.1 hmem_range\n  have h_len : (list_of_subset S hS).length = k := by\n    dsimp [list_of_subset]\n    rw [List.length_ofFn]\n  have hb_10 : 1 < (10 : \u2115) := by norm_num\n  have h_lt_pow : n < 10 ^ k := by\n    dsimp [n, subset_to_n]\n    have h_all_lt : \u2200 x \u2208 list_of_subset S hS, x < 10 := mem_list_of_subset S hS\n    have := Nat.ofDigits_lt_base_pow_length hb_10 h_all_lt\n    rw [h_len] at this\n    exact this\n  have list_of_subset_get?_eq (i : \u2115) (hi : i < k) : (list_of_subset S hS)[i]? = \n      some (if h : (i : \u2115) < j then 9\n            else if h' : (i : \u2115) = j then 1\n            else if h'' : (i : \u2115) \u2208 S then 2 else 0) := by\n    dsimp [list_of_subset]\n    rw [List.getElem?_ofFn]\n    simp [hi, h_j_eq_min]\n  have h_digit_one : digit_at n j = 1 := by\n    have h_get_j : (list_of_subset S hS)[j]? = some 1 := by\n      rw [list_of_subset_get?_eq j h_j_lt_k]\n      simp\n    have h_digit_j := digit_at_ofDigits (list_of_subset S hS) (mem_list_of_subset S hS) j\n    dsimp [n, subset_to_n]\n    rw [h_digit_j, h_get_j]\n    rfl\n  have h_pos : 1 \u2264 n := by\n    by_contra! hle\n    have hn0 : n = 0 := by omega\n    rw [hn0] at h_digit_one\n    have : digit_at 0 j = 0 := by\n      simp [digit_at]\n    rw [this] at h_digit_one\n    linarith\n  have h_mem_Icc : n \u2208 Finset.Icc 1 (10 ^ k - 1) := by\n    apply Finset.mem_Icc.mpr\n    constructor\n    \u00b7 exact h_pos\n    \u00b7 omega\n  have h_digit_cond : (\u2200 i, i < j \u2192 digit_at n i = 9) \u2227 digit_at n j = 1 \u2227 (\u2200 i, j < i \u2192 i < k \u2192 (digit_at n i = 0 \u2228 digit_at n i = 2)) := by\n    refine \u27e8?_, h_digit_one, ?_\u27e9\n    \u00b7 intro i hi\n      have hi_k : i < k := lt_trans hi h_j_lt_k\n      have h_get_i : (list_of_subset S hS)[i]? = some 9 := by\n        rw [list_of_subset_get?_eq i hi_k]\n        simp [hi]\n      have h_digit_i := digit_at_ofDigits (list_of_subset S hS) (mem_list_of_subset S hS) i\n      dsimp [n, subset_to_n]\n      rw [h_digit_i, h_get_i]\n      rfl\n    \u00b7 intro i hji hi_k\n      have h_get_i_val : (list_of_subset S hS)[i]? = some (if hiS : i \u2208 S then 2 else 0) := by\n        rw [list_of_subset_get?_eq i hi_k]\n        have h_not_lt : \u00ac (i < j) := by omega\n        have h_not_eq : i \u2260 j := by omega\n        simp [h_not_lt, h_not_eq]\n      by_cases hiS : i \u2208 S\n      \u00b7 have h_digit_i : digit_at n i = 2 := by\n          have h_get_i : ((list_of_subset S hS)[i]?).getD 0 = 2 := by\n            rw [h_get_i_val]\n            simp [hiS]\n          have h_digit_i' := digit_at_ofDigits (list_of_subset S hS) (mem_list_of_subset S hS) i\n          dsimp [n, subset_to_n]\n          rw [h_digit_i', h_get_i]\n        exact Or.inr h_digit_i\n      \u00b7 have h_digit_i : digit_at n i = 0 := by\n          have h_get_i : ((list_of_subset S hS)[i]?).getD 0 = 0 := by\n            rw [h_get_i_val]\n            simp [hiS]\n          have h_digit_i' := digit_at_ofDigits (list_of_subset S hS) (mem_list_of_subset S hS) i\n          dsimp [n, subset_to_n]\n          rw [h_digit_i', h_get_i]\n        exact Or.inl h_digit_i\n  exact \u27e8h_mem_Icc, \u27e8j, h_j_lt_k, h_digit_cond\u27e9\u27e9"

      "is_main": true,

      "lean": "@[blueprint\n  (statement := /-- The original theorem: the number of integers $n$ between $1$ and $10^{2026}-1$ such that for every $a \\le n$, at least one of $a$, $n-a$ contains the decimal digit $1$, is at least $2^{2026}-1$. -/)\n  (proof := /-- Let $k=2026$. Define $N$ as above. `card_N_set_ge` gives $\\#N \\ge 2^k-1$, and `N_subset_target` shows $N \\subseteq$ the target set, therefore the target set has at least $2^k-1$ elements. By `Finset.card_le_card` we conclude. -/)]\ntheorem usamo_2026_p4_at_least :\n    (Finset.filter (fun n =>\n        \u2200 a \u2208 Finset.range (n + 1),\n          (1 \u2208 Nat.digits 10 a) \u2228 (1 \u2208 Nat.digits 10 (n - a)))\n      (Finset.Icc 1 (10 ^ 2026 - 1))).card\n    \u2265 2 ^ 2026 - 1 := by\n  have hcard_N : N_set.card \u2265 2 ^ k - 1 := card_N_set_ge\n  have h_sub : N_set \u2286 target_set := N_subset_target\n  have card_le : N_set.card \u2264 target_set.card := Finset.card_le_card h_sub\n  have hcard_target : target_set.card \u2265 2 ^ k - 1 := le_trans hcard_N card_le\n  simpa [target_set, k] using hcard_target"

      "type": "theorem",
      "statement": "For any k\u22650, S_{k+1} = S_k \u222a {2\u00b710^k-1} \u222a {2\u00b710^k + n | n\u2208 S_k}.",
      "is_main": false,
      "col": 1,
      "level": 4,
      "lean": "@[blueprint\n  (statement := /-- For any $k\\ge0$, $S_{k+1} = S_k \\cup \\{2\\cdot10^k-1\\} \\cup \\{2\\cdot10^k + n \\mid n\\in S_k\\}$. -/)\n  (proof := /-- The equality is proved by double inclusion using the characterization lemmas. For the forward inclusion, take $m\\in S_{k+1}$ ($m<10^{k+1}$ solitary). If $m<10^k$ then $m\\in S_k$. Otherwise $m\\in[10^k,10^{k+1}-1]$. By Lemma 3, $m$ must be either $2\\cdot10^k-1$ or of the form $2\\cdot10^k+n$ with $n<10^k$. In the latter case $n$ is solitary by Lemma 2, so $n\\in S_k$ and $m$ lies in the image set. Conversely, $S_k\\subseteq S_{k+1}$ because numbers $<10^k$ are also $<10^{k+1}$; $2\\cdot10^k-1$ is solitary by Lemma 1 and lies in $[10^k,10^{k+1}-1]$; and if $n\\in S_k$ then $2\\cdot10^k+n$ is solitary by Lemma 2 and $<10^{k+1}$, so belongs to $S_{k+1}$. -/)]\nlemma S_succ_eq_union (k : \u2115) : S (k+1) = (S k) \u222a {2 * 10 ^ k - 1} \u222a (Finset.image (fun n : \u2115 => 2 * 10 ^ k + n) (S k)) := by\n  ext m\n  constructor\n  \u00b7 intro hm\n    have hm_solitary : solitary m := by\n      rcases Finset.mem_filter.mp hm with \u27e8hm_range, hm_sol\u27e9\n      exact hm_sol\n    have hm_bound : m < 10 ^ (k+1) := by\n      rcases Finset.mem_filter.mp hm with \u27e8hm_range, hm_sol\u27e9\n      exact Finset.mem_range.mp hm_range\n    by_cases h : m < 10 ^ k\n    \u00b7 have hm_Sk : m \u2208 S k := by\n        apply Finset.mem_filter.mpr\n        constructor\n        \u00b7 apply Finset.mem_range.mpr\n          exact h\n        \u00b7 exact hm_solitary\n      apply Finset.mem_union_left\n      apply Finset.mem_union_left\n      exact hm_Sk\n    \u00b7 have hm_ge : 10 ^ k \u2264 m := by omega\n      have hm_special : m = 2 * 10 ^ k - 1 \u2228 \u2203 n : \u2115, n < 10 ^ k \u2227 m = 2 * 10 ^ k + n := by\n        by_contra! hnot\n        rcases hnot with \u27e8hm_ne, hm_not\u27e9\n        have h_not_solitary : \u00ac solitary m := by\n          apply not_solitary_of_not_special k m hm_ge ?_ \u27e8hm       "lean": "@[blueprint\n  (statement := /-- For any $k\\ge0$, $s_{k+1} = 2\\,s_k + 1$. -/)\n  (proof := /-- From `S_succ_eq_union`, the three sets on the right are pairwise disjoint (their elements lie in disjoint intervals), so the cardinality of the union is the sum of the cardinalities. $|S_k| = s_k$, $|\\{2\\cdot10^k-1\\}| = 1$, and $|\\{2\\cdot10^k+n\\mid n\\in S_k\\}| = |S_k| = s_k$ because the map $n\\mapsto 2\\cdot10^k+n$ is injective. Hence $s_{k+1}= s_k+1+s_k = 2s_k+1$. -/)]\nlemma card_S_succ_eq (k : \u2115) : s (k+1) = 2 * s k + 1 := by\n  unfold s\n  have h_eq : S (k+1) = (S k) \u222a {2 * 10 ^ k - 1} \u222a (Finset.image (fun n : \u2115 => 2 * 10 ^ k + n) (S k)) := S_succ_eq_union k\n  rw [h_eq]\n  have disjoint_S_singleton : Disjoint (S k) ({2 * 10 ^ k - 1} : Finset \u2115) := by\n    rw [Finset.disjoint_iff_inter_eq_empty]\n    ext x\n    constructor\n    \u00b7 intro hx\n      exfalso\n      rcases Finset.mem_inter.1 hx with \u27e8hxS, hxB\u27e9\n      have hx_lt : x < 10 ^ k := by\n        have : x \u2208 range (10 ^ k) := (Finset.mem_filter.mp hxS).1\n        exact Finset.mem_range.1 this\n      have hxB_val : x = 2 * 10 ^ k - 1 := by simpa using hxB\n      have h_one_le : 1 \u2264 10 ^ k := Nat.one_le_pow k 10 (by norm_num)\n      have hle : 10 ^ k \u2264 2 * 10 ^ k - 1 := by\n        have : 10 ^ k + 1 \u2264 2 * 10 ^ k := by\n          calc\n            10 ^ k + 1 \u2264 10 ^ k + 10 ^ k := Nat.add_le_add_left h_one_le _\n            _ = 2 * 10 ^ k := by ring\n        omega\n      have hx_ge : x \u2265 10 ^ k := by\n        rw [hxB_val]\n        exact hle\n      exact not_lt.mpr hx_ge hx_lt\n    \u00b7 intro hx\n      exfalso\n      exact Finset.not_mem_empty x hx\n  have disjoint_union_singleton_image : Disjoint ((S k) \u222a ({2 * 10 ^ k - 1} : Finset \u2115)) (Finset.image (fun n : \u2115 => 2 * 10 ^ k + n) (S k)) := by\n    rw [Finset.disjoint_iff_inter_eq_empty]\n    ext x\n    constructor\n    \u00b7 intro hx\n      exfalso\n      rcases Finset.mem_inter.1 hx with \u27e8hxU, hxC\u27e9\n      rcases Finset.mem_union.1 hxU with (hxS | hxB)\n      \u00b7 -- x \u2208 S k\n        have hx_lt : x < 10 ^ k := by\n          have : x \u2208 range (10 ^ k) := (Finset.mem_filter.mp hxS).1\n          exact Finset.mem_range.1 this\n        rcases Finset.mem_image.1 hxC with \u27e8y, hyS, hy_eq\u27e9\n        have hx_val : x = 2 * 10 ^ k + y := hy_eq.symm\n        have hx_ge : x \u2265 2 * 10 ^ k := by\n          rw [hx_val]\n          exact Nat.le_add_right _ _\n        have h_gt : 10 ^ k < 2 * 10 ^ k := by\n          have hpos : 0 < 10 ^ k := pow_pos (by norm_num) k\n          omega\n        have : x > 10 ^ k := lt_of_lt_of_le h_gt hx_ge\n        omega\n      \u00b7 -- x \u2208 {2*10^k - 1}\n        have hxB_val : x = 2 * 10 ^ k - 1 := by simpa using hxB\n        rcases Finset.mem_image.1 hxC with \u27e8y, hyS, hy_eq\u27e9\n        have hx_val' : x = 2 * 10 ^ k + y := hy_eq.symm\n        have h_lt : 2 * 10 ^ k - 1 < 2 * 10 ^ k := by\n          have hpos : 0 < 2 * 10 ^ k := mul_pos (by norm_num) (pow_pos (by norm_num) k)\n          exact Nat.sub_lt hpos (by norm_num)\n        have h_le : 2 * 10 ^ k \u2264 2 * 10 ^ k + y := Nat.le_add_right _ _\n        have h_lt2 : 2 * 10 ^ k - 1 < 2 * 10 ^ k + y := lt_of_lt_of_le h_lt h_le\n        rw [hxB_val] at hx_val'\n        have : 2 * 10 ^ k - 1 = 2 * 10 ^ k + y := hx_val'\n        exact Nat.ne_of_lt h_lt2 this\n    \u00b7 intro hx\n      exfalso\n      exact Finset.not_mem_empty x hx\n  have h_card_union1 : card ((S k) \u222a ({2 * 10 ^ k - 1} : Finset \u2115)) = card (S k) + 1 := by\n    rw [Finset.card_union_eq_card_add_card.mpr disjoint_S_singleton, Finset.card_singleton]\n  have h_card_union2 : card (((S k) \u222a ({2 * 10 ^ k - 1} : Finset \u2115)) \u222a (Finset.image (fun n : \u2115 => 2 * 10 ^ k + n) (S k))) = \n    card ((S k) \u222a ({2 * 10 ^ k - 1} : Finset \u2115)) + card (Finset.image (fun n : \u2115 => 2 * 10 ^ k + n) (S k)) :=\n    Finset.card_union_eq       "lean": "@[blueprint\n  (statement := /-- For any $k\\ge0$ and $m$ with $10^k\\le m\\le 10^{k+1}-1$, if $m\\neq2\\cdot10^k-1$ and $m$ is not of the form $2\\cdot10^k+n$ for any $0\\le n<10^k$, then $m$ is not solitary. -/)\n  (proof := /-- Under the assumptions, $m$ lies either in $[10^k,2\\cdot10^k-2]$ or $[3\\cdot10^k,10^{k+1}-1]$. Set $a = 10^k-1$ (all $k$ nines, no digit $1$) and $b = m-a = m-10^k+1$. The leading digit $b_k$ (position $k$) is not $1$: in the first interval $b_k=0$, in the second $2\\le b_k\\le9$. Let $I=\\{i<k\\mid b_i=1\\}$ and $S=\\sum_{i\\in I}2\\cdot10^i$. Define $A = a - S$ and $B = b + S$. Then $A$ has digits $8$ or $9$ in positions $i<k$ (no $1$), $B$ has digits $b_i + c_i$ (where $c_i=1$ if $i\\in I$ else $0$) which are $\\neq 1$, and $B$'s digit at $k$ is $b_k\\neq1$, so both $A,B$ lack digit $1$, and $A+B = a+b = m$. Hence $m$ is not solitary. -/)]\nlemma not_solitary_of_not_special (k m : \u2115) (hm_lower : 10 ^ k \u2264 m) (hm_upper : m \u2264 10 ^ (k+1) - 1)\n    (hm_not_special : m \u2260 2 * 10 ^ k - 1 \u2227 \u2200 n : \u2115, n < 10 ^ k \u2192 m \u2260 2 * 10 ^ k + n) : \u00ac solitary m := by\n  sorry_using [solitary]"

            }));

            simulation.alpha(0.5).restart();
        }

        function highlightNodes(nodeIds, { localOnly = false, edges = true } = {}) {
            const targetNodeIds = new Set(nodeIds.filter(id => data.nodes.find(n => n.id === id)));
            if (targetNodeIds.size === 0) return;

            if (edges) {
                link.each(function(l) {
                    if (targetNodeIds.has(l.source.id) || targetNodeIds.has(l.target.id)) {
                        // If localOnly, skip edges to external nodes
                        if (localOnly) {
                            const sourceExternal = l.source.group === "external";
                            const targetExternal = l.target.group === "external";
                            if (sourceExternal || targetExternal) return;
                        }
                        // Use muted highlight for external edges
                        const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                        if (isExternalEdge) {
                            d3.select(this).classed("highlighted-external", true);
                        } else {
                            d3.select(this).classed("highlighted", true);
                        }
                    }
                });
            }

            // Highlight all target nodes (with filled style)
            node.classed("url-highlighted", n => targetNodeIds.has(n.id));
        }

        function applyUrlHighlight() {
            if (urlHighlightNodeIds.length > 0) {
                highlightNodes(urlHighlightNodeIds, {
                    localOnly: urlHighlightLocalOnly,
                    edges: urlHighlightEdges
                });
            }
        }

        function clearHighlight() {
            link.classed("highlighted", false);
            link.classed("highlighted-external", false);
            node.classed("highlighted", false);
            node.classed("url-highlighted", false);
        }

        function restoreFromHash() {
            const hash = window.location.hash.slice(1);
            if (!hash) return;

            const params = new URLSearchParams(hash);

            // Restore spacing
            if (params.has('spacing')) {
                const spacing = +params.get('spacing');
                d3.select("#spacingSlider").property('value', spacing);
                localSpacing = spacing;
                externalRadius = spacing + 300;

                linkForce.distance(d => {
                    const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                    return isLocalEdge ? localSpacing : externalSpacing;
                });

                chargeForce.strength(d => {
                    return d.group === "external" ? -50 : -spacing * 2;
                });

                simulation.force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));

                applyHierarchy();
                simulation.alpha(0.3).restart();
            }

            // Restore external nodes visibility
            if (params.has('external')) {
                const showExternal = params.get('external') === '1';
                d3.select("#showExternal").property('checked', showExternal);

                node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
                link.style("display", l => {
                    if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                        return "none";
                    }
                    return "block";
                });
            }

            // Restore theme
            if (params.has('theme')) {
                const theme = params.get('theme');
                d3.select("#themeSelect").property('value', theme);
                document.body.classList.toggle('dark-mode', theme === 'dark');
                // Need to update colors after mode change
                setTimeout(updateColors, 50);
            }

            // Restore highlight (comma-separated list)
            if (params.has('highlight')) {
                urlHighlightNodeIds = params.get('highlight').split(',').map(s => s.trim()).filter(Boolean);
                urlHighlightLocalOnly = params.get('local') === 'true';
                urlHighlightEdges = params.get('edges') !== 'false';
                applyUrlHighlight();
            }

            // Restore embed mode
            if (params.get('embed') === 'true') {
                isEmbedMode = true;
                // Hide controls, nav overlay, and navigation panel
                d3.select(".controls").style("display", "none");
                d3.select(".nav-overlay").style("display", "none");
                d3.select(".navigation-panel").style("display", "none");
            }

            // Restore zoom
            if (params.has('zoom')) {
                const zoomScale = parseFloat(params.get('zoom'));
                if (!isNaN(zoomScale) && zoomScale >= 0.1 && zoomScale <= 10) {
                    applyZoom(zoomScale);
                }
            }

            // Restore anchor (pins node at top)
            if (params.has('anchor')) {
                anchorNodeId = params.get('anchor');
                applyAnchorTop(anchorNodeId);
            }
        }

        // Restore state from URL on load
        restoreFromHash();

        // Listen for manual URL hash changes
        window.addEventListener('hashchange', function() {
            // Reset state before restoring
            clearHighlight();
            urlHighlightNodeIds = [];
            urlHighlightLocalOnly = false;
            urlHighlightEdges = true;
            // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
