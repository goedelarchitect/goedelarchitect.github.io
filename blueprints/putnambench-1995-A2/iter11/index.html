    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #141414;
            --controls-bg: rgba(255, 255, 255, 0.95);
            --controls-border: #d0d0d0;
            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

      "is_main": false,

      "level": 2,
      "lean": "@[blueprint (statement := /-- For a>0, Tendsto (fun t => a * sqrt(a/(2*sqrt(t-a)))) atTop (\ud835\udcdd 0) -/) (proof := /-- proof -/)]\nlemma bound_tendsto_zero (a : \u211d) (ha : a > 0) : Tendsto (fun t : \u211d => a * sqrt (a / (2 * sqrt (t - a)))) atTop (\ud835\udcdd 0) := by\n  have h_sqrt_zero : Tendsto (fun t : \u211d => sqrt (a / (2 * sqrt (t - a)))) atTop (\ud835\udcdd 0) := by\n    have h_frac_tendsto_zero : Tendsto (fun t : \u211d => a / (2 * sqrt (t - a))) atTop (\ud835\udcdd 0) := by\n      have hsqrt_t_a_tendsto_atTop : Tendsto (fun t : \u211d => sqrt (t - a)) atTop atTop := by\n        have h_t_sub_a_tendsto_atTop : Tendsto (fun t : \u211d => t - a) atTop atTop := by\n          simpa [sub_eq_add_neg] using (tendsto_atTop_add_const_right atTop (-a) tendsto_id)\n        have h_eq : (fun t : \u211d => sqrt (t - a)) = (fun t : \u211d => (t - a) ^ (1/2 : \u211d)) := by\n          ext t; simp [Real.sqrt_eq_rpow]\n        rw [h_eq]\n        have h_exp_pos : (0 : \u211d) < (1/2 : \u211d) := by norm_num\n        exact (tendsto_rpow_atTop h_exp_pos).comp h_t_sub_a_tendsto_atTop\n      have h_inv_tendsto_zero : Tendsto (fun t : \u211d => (sqrt (t - a))\u207b\u00b9) atTop (\ud835\udcdd 0) :=\n        tendsto_inv_atTop_zero.comp hsqrt_t_a_tendsto_atTop\n      have h_mul : Tendsto (fun t : \u211d => (a/2) * ((sqrt (t - a))\u207b\u00b9)) atTop (\ud835\udcdd 0) := by\n        simpa [mul_zero] using h_inv_tendsto_zero.const_mul (a/2)\n      have h_eq' : (fun t : \u211d => a / (2 * sqrt (t - a))) = (fun t : \u211d => (a/2) * ((sqrt (t - a))\u207b\u00b9)) := by\n        ext t; field_simp\n      rw [h_eq']\n      exact h_mul\n    have h_sqrt_cont : Tendsto Real.sqrt (\ud835\udcdd 0) (\ud835\udcdd (Real.sqrt 0)) := Real.continuous_sqrt.tendsto 0\n    have h_sqrt_zero : Real.sqrt 0 = 0 := by norm_num\n    have h_sqrt_cont' : Tendsto Real.sqrt (\ud835\udcdd 0) (\ud835\udcdd 0) := by simpa [h_sqrt_zero] using h_sqrt_cont\n    exact h_sqrt_cont'.comp h_frac_tendsto_zero\n  have h_mul_a : Tendsto (fun t : \u211d => a * sqrt (a / (2 * sqrt (t - a)))) atTop (\ud835\udcdd (a * 0)) :=\n    h_sqrt_zero.const_mul a\n  simpa [mul_zero] using h_mul_a"

      "statement": "If a,b>0 and a \u2260 b, then the improper integral from b to \u221e does not converge to a finite limit.",
      "is_main": false,

      "level": 1,

                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
