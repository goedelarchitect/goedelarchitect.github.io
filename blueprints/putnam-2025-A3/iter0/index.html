    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #141414;
            --controls-bg: rgba(255, 255, 255, 0.95);
            --controls-border: #d0d0d0;
            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

    <script>

        const data = {
  "nodes": [
    {
      "id": "BobGood",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 9.2,
      "proof_length": 0,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "definition",
      "statement": "BobGood play holds if for every k such that 2k+1 < play.length, play[2k+1] = pairing_f (play[2k]).",
      "is_main": false,
      "col": 0,
      "level": 2,
      "lean": "@[blueprint (statement := /-- BobGood play holds if for every k such that 2k+1 < play.length, play[2k+1] = pairing_f (play[2k]). -/)]\ndef BobGood {n : \u2115} (play : List (GameString n)) : Prop :=\n  \u2200 k : \u2115, \u2200 h : 2*k + 1 < play.length,\n    let hk : 2*k < play.length := Nat.lt_of_succ_lt h\n    play.get \u27e82*k+1, h\u27e9 = pairing_f (play.get \u27e82*k, hk\u27e9)"
    },
    {
      "id": "EvenLength",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 9.2,
      "proof_length": 0,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "definition",
      "statement": "EvenLength play means play has even length.",
      "is_main": false,
      "col": 0,
      "level": 2,
      "lean": "@[blueprint (statement := /-- EvenLength play means play has even length. -/)]\ndef EvenLength {n : \u2115} (play : List (GameString n)) : Prop := play.length % 2 = 0"
    },
    {
      "id": "GameString",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 9.2,
      "proof_length": 0,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "definition",
      "statement": "GameString n is the type of strings of length n with digits 0, 1, 2.",
      "is_main": false,
      "col": 0,
      "level": 1,
      "lean": "@[blueprint (statement := /-- GameString n is the type of strings of length n with digits 0, 1, 2. -/)]\ndef GameString (n : \u2115) := Fin n \u2192 Fin 3"
    },
    {
      "id": "IsValidGamePlay",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 9.2,
      "proof_length": 0,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "definition",
      "statement": "IsValidGamePlay play holds iff play is a chain of valid moves starting from initialState n with no repeats.",
      "is_main": false,
      "col": 0,
      "level": 2,
      "lean": "@[blueprint (statement := /-- IsValidGamePlay play holds iff play is a chain of valid moves starting from initialState n with no repeats. -/)]\ndef IsValidGamePlay {n : \u2115} (play : List (GameString n)) : Prop :=\n  play.Chain isValidMove (initialState n) \u2227\n  (initialState n :: play).Nodup"
    },
    {
      "id": "P",
      "group": "file0",

      "file_name": "solution.lean",
      "radius": 9.2,
      "proof_length": 0,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "definition",

      "is_main": false,
      "col": 0,
      "level": 1,
      "lean": "@[blueprint (statement := /-- P play := (BobGood play \u2227 EvenLength play) \u2192 False. -/)]\ndef P {n : \u2115} (play : List (GameString n)) : Prop :=\n  (BobGood play \u2227 EvenLength play) \u2192 False"
    },
    {
      "id": "f_involutive",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 15.49,
      "proof_length": 39,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "theorem",
      "statement": "For any x \u2260 initialState n, pairing_f (pairing_f x) = x.",
      "is_main": false,
      "col": 0,
      "level": 4,
      "lean": "@[blueprint\n  (statement := /-- For any x \u2260 initialState n, pairing_f (pairing_f x) = x. -/)\n  (proof := /-- Since pairing_f only changes the minimum non-zero index, and flips 1\u21942, applying it twice restores the original. The minimum non-zero index of pairing_f x is the same as that of x, because the set of non-zero positions is unchanged. -/)]\nlemma f_involutive {n : \u2115} (x : GameString n) (hx : x \u2260 initialState n) : pairing_f (pairing_f x) = x := by\n  -- helper lemmas\n\n  have pairing_f_eq_of_ne (x : GameString n) (hx : x \u2260 initialState n) (j : Fin n) (hj : j \u2260 minNonzeroIndex x hx) : pairing_f x j = x j := by\n    unfold pairing_f\n    simp [hx, hj]\n\n  have minNonzeroIndex_nonzero (x : GameString n) (hx : x \u2260 initialState n) : x (minNonzeroIndex x hx) \u2260 0 := by\n    have h_nonempty : (Finset.filter (\u03bb i => x i \u2260 0) (Finset.univ : Finset (Fin n))).Nonempty := by\n      have h_exists : \u2203 i : Fin n, x i \u2260 0 := by\n        by_contra hnone\n        apply hx\n        apply funext; intro i\n        by_contra hzero\n        apply hnone\n        exact \u27e8i, hzero\u27e9\n      rcases h_exists with \u27e8i, hi\u27e9\n      exact \u27e8i, Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hi\u27e9\u27e9\n    have hmem : minNonzeroIndex x hx \u2208 Finset.filter (\u03bb i => x i \u2260 0) (Finset.univ : Finset (Fin n)) :=\n      Finset.min'_mem _ h_nonempty\n    exact (Finset.mem_filter.mp hmem).2\n\n  have minNonzeroIndex_le_of_nonzero (x : GameString n) (hx : x \u2260 initialState n) (k : Fin n) (hk : x k \u2260 0) :\n      minNonzeroIndex x hx \u2264 k := by\n    have hmem_k : k \u2208 Finset.filter (\u03bb i => x i \u2260 0) (Finset.univ : Finset (Fin n)) :=\n      Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hk\u27e9\n    exact Finset.min'_le (Finset.filter (\u03bb i => x i \u2260 0) (Finset.univ : Finset (Fin n))) k hmem_k\n\n  have minNonzeroIndex_minimal (x : GameString n) (hx : x \u2260 initialState n) (k : Fin n) \n      (hk : (k : \u2115) < (minNonzeroIndex x hx : \u2115)) : x k = 0 := by\n    by_contra hnonzero\n    have hle : minNonzeroIndex x hx \u2264 k := minNonzeroIndex_le_of_nonzero x hx k hnonzero\n    have hval : (minNonzeroIndex x hx : \u2115) \u2264 (k : \u2115) := hle\n    have : (k : \u2115) < (k : \u2115) := Nat.lt_of_lt_of_le hk hval\n    exact Nat.lt_irrefl _ this\n\n  have pairing_f_ne_initial (x : GameString n) (hx : x \u2260 initialState n) : pairing_f x \u2260 initialState n := by\n    intro h\n    have hi_nonzero_x : x (minNonzeroIndex x hx) \u2260 0 := minNonzeroIndex_nonzero x hx\n    have hzero : pairing_f x (minNonzeroIndex x hx) = 0 := by\n      calc\n        pairing_f x (minNonzeroIndex x hx) = initialState n (minNonzeroIndex x hx) := by rw [h]\n        _ = 0 := rfl\n    have hcalc : pairing_f x (minNonzeroIndex x hx) = if x (minNonzeroIndex x hx) = 1 then (2 : Fin 3) else (1 : Fin 3) := by\n      unfold pairing_f\n      simp [hx]\n    rw [hcalc] at hzero\n    by_cases hxi1 : x (minNonzeroIndex x hx) = 1\n    \u00b7 rw [hxi1] at hzero\n      have : (2 : Fin 3) \u2260 0 := by decide\n      exact this hzero\n    \u00b7 have hxi2 : x (minNonzeroIndex x hx) = 2 := by\n        have h0 : x (minNonzeroIndex x hx) \u2260 0 := hi_nonzero_x\n        have h1 : x (minNonzeroIndex x hx) \u2260 1 := hxi1\n        have : \u2200 (z : Fin 3), z \u2260 0 \u2192 z \u2260 1 \u2192 z = 2 := by decide\n        exact this (x (minNonzeroIndex x hx)) h0 h1\n      rw [hxi2] at hzero\n      have : (1 : Fin 3) \u2260 0 := by decide\n      exact this hzero\n\n  have minNonzeroIndex_pairing_f (x : GameString n) (hx : x \u2260 initialState n) : \n      minNonzeroIndex (pairing_f x) (pairing_f_ne_initial x hx) = minNonzeroIndex x hx := by\n    set i := minNonzeroIndex x hx with hi_def\n    set y := pairing_f x with hy_def\n    have hy_ne_initial : y \u2260 initialState n := pairing_f_ne_initial x hx\n    have hi_nonzero_x : x i \u2260 0 := minNonzero act Fin.ext hval_eq\n\n  have pairing_f_at_min_val (x : GameString n) (hx : x \u2260 initialState n) : \n      pairing_f x (minNonzeroIndex x hx) = if x (minNonzeroIndex x hx) = 1 then (2 : Fin 3) else (1 : Fin 3) := by\n    unfold pairing_f\n    simp [hx]\n\n  set y := pairing_f x with hy_def\n  have hy_ne_initial : y \u2260 initialState n := pairing_f_ne_initial x hx\n  have hmin_eq : minNonzeroIndex y hy_ne_initial = minNonzeroIndex x hx := minNonzeroIndex_pairing_f x hx\n  apply funext; intro j\n  by_cases hj : j = minNonzeroIndex x hx\n  \u00b7 subst hj\n    set i := minNonzeroIndex x hx with hi_def\n    have hi_nonzero_x : x i \u2260 0 := minNonzeroIndex_nonzero x hx\n    have hy_i : y i = if x i = 1 then (2 : Fin 3) else (1 : Fin 3) := by\n      dsimp [y]\n      rw [pairing_f_at_min_val x hx]\n    have htemp := pairing_f_at_min_val y hy_ne_initial\n    rw [hmin_eq] at htemp\n    calc\n      pairing_f y i = if y i = 1 then (2 : Fin 3) else (1 : Fin 3) := htemp\n      _ = if (if x i = 1 then (2 : Fin 3) else (1 : Fin 3)) = 1 then (2 : Fin 3) else (1 : Fin 3) := by rw [hy_i]\n      _ = x i := by\n        by_cases hxi1 : x i = 1\n        \u00b7 simp [hxi1]\n        \u00b7 have hxi2 : x i = 2 := by\n            have hi_nonzero_x' : x i \u2260 0 := hi_nonzero_x\n            have hxi_ne_1 : x i \u2260 1 := hxi1\n            have : \u2200 (z : Fin 3), z \u2260 0 \u2192 z \u2260 1 \u2192 z = 2 := by decide\n            exact this (x i) hi_nonzero_x' hxi_ne_1\n          simp [hxi2]\n  \u00b7 have hj_ne_min : j \u2260 minNonzeroIndex x hx := hj\n    calc\n      pairing_f y j = y j := by\n        rw [hy_def]\n        apply pairing_f_eq_of_ne y hy_ne_initial j ?_\n        rw [hmin_eq]\n        exact hj_ne_min\n      _ = x j := by\n        rw [hy_def, pairing_f_eq_of_ne x hx j hj_ne_min]"

      "statement": "If IsValidGamePlay (play ++ [s]), BobGood play, and EvenLength play, then pairing_f s is not in the list (initialState n :: play ++ [s]).",

      "level": 3,
      "lean": "@[blueprint\n  (statement := /-- If IsValidGamePlay (play ++ [s]), BobGood play, and EvenLength play, then pairing_f s is not in the list (initialState n :: play ++ [s]). -/)\n  (proof := /-- Suppose pairing_f s appears in the list. By case analysis on its position, we derive a contradiction using properties of f and BobGood play. Cases: pairing_f s = initialState n (contradicts f_ne_initialState), pairing_f s = s (contradicts f_ne_x), or pairing_f s = play[i] for some i < play.length. Since play.length is even, i is either even or odd; in both subcases, using BobGood play and f_involutive, we deduce that s appears in play, contradicting nodup. -/)]\nlemma s'_not_in_play {n : \u2115} {play : List (GameString n)} {s : GameString n}\n    (h_valid : IsValidGamePlay (play ++ [s])) (h_bob : BobGood play) (h_even : EvenLength play) (hs : s \u2260 initialState n) :\n    pairing_f s \u2209 (initialState n :: play ++ [s]) := by\n  have h_nodup_all := h_valid.2\n  have h_nodup_ps : (play ++ [s]).Nodup :=\n    ((List.nodup_cons (a := initialState n) (l := play ++ [s])).mp h_nodup_all).2\n  have h_s_not_mem_play : s \u2209 play := by\n    have h_nodup_append := (List.nodup_append (l\u2081 := play) (l\u2082 := [s])).mp h_nodup_ps\n    rcases h_nodup_append with \u27e8hn_play, hn_s, h_all_diff\u27e9\n    intro hsmem\n    have h_contra := h_all_diff s hsmem s (by simp)\n    exact h_contra rfl\n  intro hmem\n  have hmem_cases := (List.mem_cons (a := pairing_f s) (b := initialState n) (l := play ++ [s])).mp hmem\n  rcases hmem_cases with (h_eq_init | hmem_play_s)\n  \u00b7 -- pairing_f s = initialState n\n    exact f_ne_initialState s hs h_eq_init\n  \u00b7 -- pairing_f s \u2208 play ++ [s]\n    have hmem_play_s_cases := List.mem_append.mp hmem_play_s\n    rcases hmem_play_s_cases with (hmem_play | hmem_last)\n    \u00b7 -- pairing_f s \u2208 play\n      rcases List.mem_iff_get.mp hmem_play with \u27e8i, hi\u27e9\n      -- i : Fin (play.length), hi : play.get i = pairing_f s\n      let i_val := i.val\n      have hi_val_lt : i_val < play.length := i.2\n      unfold EvenLength at h_even\n      have hparity := Nat.even_or_odd i_val\n      rcases hparity with (\u27e8k, hk\u27e9 | \u27e8k, hk\u27e9)\n      \u00b7 -- i_val = k + k (i.e., even)\n        have h_2k_lt : 2*k < play.length := by\n          omega\n        have h_next_lt : 2*k + 1 < play.length := by\n          omega\n        have h_get_even : play.get \u27e82*k, h_2k_lt\u27e9 = pairing_f s := by\n          have h_eq_val : (2*k : \u2115) = i.val := by\n            dsimp [i_val]\n            omega\n          have h_eq : (\u27e82*k, h_2k_lt\u27e9 : Fin play.length) = i := Fin.ext h_eq_val\n          simpa [h_eq] using hi\n        have h_bob_eq := h_bob k h_next_lt\n        have h_get_odd_eq_s : play.get \u27e82*k+1, h_next_lt\u27e9 = s := by\n          calc\n            play.get \u27e82*k+1, h_next_lt\u27e9 = pairing_f (play.get \u27e82*k, Nat.lt_of_succ_lt h_next_lt\u27e9) := h_bob_eq\n            _ = pairing_f (play.get \u27e82*k, h_2k_lt\u27e9) := by\n              have h_eq_idx : (\u27e82*k, Nat.lt_of_succ_lt h_next_lt\u27e9 : Fin play.length) = \u27e82*k, h_2k_lt\u27e9 := by\n                apply Fin.ext\n                rfl\n              simpa [h_eq_idx]\n            _ = pairing_f (pairing_f s) := by rw [h_get_even]\n            _ = s := f_involutive s hs\n        have h_s_mem_play : s \u2208 play := by\n          have h_mem := List.get_mem play \u27e82*k+1, h_next_lt\u27e9\n          rw [h_get_odd_eq_s] at h_mem\n          exact h_mem\n        exact h_s_not_mem_play h_s_mem_play\n      \u00b7 -- i_val = k + k + 1 (i.e., odd)\n        have h_2k1_lt : 2*k+1 < play.length := by\n          omega\n        have h_prev_lt : 2*k < play.length := by\n          omega\n        let prev_idx : Fin play.length := \u27e82*k, h_prev_lt\u27e9\n        have h_get_odd : play.get \u27e82*k+1, h_2k1_lt\u27e9 = pairing_f s := by\n          have h_eq_val : (2*k+1 : \u2115) = i.val := by\n            dsimp [i_val]\n            omega\n          have h_eq : (\u27e82*k+1, h_2k1_lt\u27e9 : Fin play.length) = i := Fin.ext h_eq_val\n          simpa [h_eq] using hi\n        have h_bob_eq := h_bob k h_2k1_lt\n        have h_pair_eq : pairing_f s = pairing_f (play.get prev_idx) := by\n          calc\n            pairing_f s = play.get \u27e82*k+1, h_2k1_lt\u27e9 := by symm; exact h_get_odd\n            _ = pairing_f (play.get prev_idx) := h_bob_eq\n        have h_prev_ne_init : play.get prev_idx \u2260 initialState n := by\n          intro h_eq\n          have h_pair_prev_init : pairing_f (play.get prev_idx) = initialState n := by\n            rw [h_eq]\n            unfold pairing_f\n            simp\n          have h_pair_s_ne_init : pairing_f s \u2260 initialState n := f_ne_initialState s hs\n          apply h_pair_s_ne_init\n          calc\n            pairing_f s = pairing_f (play.get prev_idx) := h_pair_eq\n            _ = initialState n := h_pair_prev_init\n        have h_invol_s : pairing_f (pairing_f s) = s := f_involutive s hs\n        have h_invol_prev : pairing_f (pairing_f (play.get prev_idx)) = play.get prev_idx :=\n          f_involutive (play.get prev_idx) h_prev_ne_init\n        have h_pair_eq' : pairing_f (pairing_f s) = pairing_f (pairing_f (play.get prev_idx)) := by\n          rw [h_pair_eq]\n        have h_s_eq_prev : s = play.get prev_idx := by\n          calc\n            s = pairing_f (pairing_f s) := by symm; exact h_invol_s\n            _ = pairing_f (pairing_f (play.get prev_idx)) := h_pair_eq'\n            _ = play.get prev_idx := h_invol_prev\n        have h_s_mem_play : s \u2208 play := by\n          have h_mem : play.get prev_idx \u2208 play := List.get_mem play prev_idx\n          rw [h_s_eq_prev]\n          exact h_mem\n        exact h_s_not_mem_play h_s_mem_play\n    \u00b7 -- pairing_f s \u2208 [s]\n      have h_eq : pairing_f s = s := by\n        simpa using hmem_last\n      exact f_ne_x s hs h_eq"

      "lean": "@[blueprint\n  (statement := /-- For any play, HasWinningStrategy n play \u2192 P play. -/)\n  (proof := /-- By induction on the derivation of HasWinningStrategy n play. The win case: assume HasWinningStrategy n play via win with s and hypotheses. Assume BobGood play and EvenLength play (otherwise P play holds trivially). Set s' = pairing_f s. Show IsValidGamePlay (play ++ [s, s']) using isValidGamePlay_chain_s_fs. Then by induction hypothesis, P (play ++ [s, s']) holds. Since BobGood (play ++ [s, s']) and EvenLength (play ++ [s, s']) are true, this yields False. Hence P play holds. -/)]\nlemma strategizingLemma {n : \u2115} (play : List (GameString n)) : HasWinningStrategy n play \u2192 P play := by\n  have bobGood_append_s_pairing_f {n : \u2115} (play : List (GameString n)) (s : GameString n) (h_bob : BobGood play) (h_even : EvenLength play) (h_valid : IsValidGamePlay (play ++ [s])) : BobGood (play ++ [s, pairing_f s]) := by\n    intro k h\n    intro hk\n    have hlen : (play ++ [s, pairing_f s]).length = play.length + 2 := by simp\n    have hL_even : play.length % 2 = 0 := h_even\n    have h' : 2*k + 1 < play.length + 2 := by\n      simpa [hlen] using h\n    by_cases h_lt : 2*k+1 < play.length\n    \u00b7 have hk_play : 2*k < play.length := Nat.lt_of_succ_lt h_lt\n      have h_play_eq := h_bob k h_lt\n      simpa [h_lt, hk_play] using h_play_eq\n    \u00b7 have h_ge : play.length \u2264 2*k+1 := Nat.le_of_not_lt h_lt\n      have h_eq : 2*k+1 = play.length + 1 := by\n        omega\n      have h_eq' : 2*k = play.length := by\n        omega\n      have h_goal : (play ++ [s, pairing_f s]).get \u27e8play.length + 1, by\n        simp\n      \u27e9 = pairing_f ((play ++ [s, pairing_f s]).get \u27e8play.length, by\n        simp\n      \u27e9) := by\n        simp\n      simpa [h_eq, h_eq'] using h_goal\n  intro h\n  induction h with\n  | win play s h_valid h_next ih =>\n    intro h_bob_even\n    rcases h_bob_even with \u27e8h_bob, h_even\u27e9\n    set s' := pairing_f s with hs'\n    have h_valid_ss' : IsValidGamePlay (play ++ [s, s']) := by\n      have hs_ne : s \u2260 initialState n := s_not_initial h_valid\n      exact isValidGamePlay_chain_s_fs h_valid h_bob h_even hs_ne\n    have hP : P (play ++ [s, s']) := ih s' h_valid_ss'\n    have h_bob_ss' : BobGood (play ++ [s, s']) := bobGood_append_s_pairing_f play s h_bob h_even h_valid\n    have h_even_ss' : EvenLength (play ++ [s, s']) := by\n      unfold EvenLength\n      have hlen : (play ++ [s, s']).length = play.length + 2 := by simp\n      rw [hlen]\n      have hmod : (play.length + 2) % 2 = play.length % 2 := by omega\n      rw [hmod]\n      exact h_even\n    exact hP \u27e8h_bob_ss', h_even_ss'\u27e9"

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
