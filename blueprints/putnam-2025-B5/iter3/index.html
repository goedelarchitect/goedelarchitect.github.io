    <style>

            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;

            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

      "is_main": false,
      "col": 0,
      "level": 3,
      "lean": "@[blueprint\n  (statement := /-- For a prime $p$ and any $t$, the equation $s + \\operatorname{modInv}(p,s) = t$ has at most two solutions $s$ with $1 \\le s \\le p-1$. -/)\n  (proof := /-- If there were three distinct solutions, the quadratic $X^2 - tX + 1$ would have three roots in $\\mathbb{Z}/p\\mathbb{Z}$, impossible. -/)]\nlemma card_preimage_at_most_two (p : \u2115) (hp : p.Prime) (t : \u2115) : (Finset.filter (\u03bb s => s + modInv p s = t) (Finset.Icc 1 (p-1))).card \u2264 2 := by\n  haveI : Fact p.Prime := \u27e8hp\u27e9\n  let A := Finset.filter (\u03bb s => s + modInv p s = t) (Finset.Icc 1 (p-1))\n  let B := Finset.filter (\u03bb (x : ZMod p) => x^2 - (t : ZMod p)*x + 1 = 0) (Finset.univ : Finset (ZMod p))\n  have hcardB : B.card \u2264 2 := card_roots_quadratic_le_two p t\n  have hcardA : A.card \u2264 B.card :=\n    Finset.card_le_card_of_injOn (\u03bb s => (s : ZMod p))\n      (by\n        intro x hx\n        rw [Finset.mem_coe] at hx\n        rcases Finset.mem_filter.mp hx with \u27e8hx_mem, hx_eq\u27e9\n        rcases Finset.mem_Icc.mp hx_mem with \u27e8h_low, h_high\u27e9\n        have hx_pos : x \u2260 0 := Nat.one_le_iff_ne_zero.mp h_low\n        have hx_lt_p : x < p := by\n          have hp_pos : 0 < p := Nat.Prime.pos hp\n          omega\n        have hx_ne_zero : (x : ZMod p) \u2260 0 := ne_zero_of_lt_ZMod p x hx_pos hx_lt_p\n        have h_val : (modInv p x : ZMod p) = ((x : ZMod p)\u207b\u00b9) := by\n          dsimp [modInv]\n          rw [ZMod.natCast_zmod_val]\n        have h_mod : (x : ZMod p) + ((x : ZMod p)\u207b\u00b9) = (t : ZMod p) := by\n          calc\n            (x : ZMod p) + ((x : ZMod p)\u207b\u00b9) = (x : ZMod p) + (modInv p x : ZMod p) := by rw [h_val]\n            _ = ((x + modInv p x : \u2115) : ZMod p) := by norm_cast\n            _ = (t : ZMod p) := by\n              simpa using congrArg (fun n : \u2115 => (n : ZMod p)) hx_eq\n        have h_mul : (x : ZMod p) * ((x : ZMod p) + ((x : ZMod p)\u207b\u00b ee = 1 := Polynomial.natDegree_X\n      rw [hC, hX]\n    have hC : (Polynomial.C (1 : ZMod p)).natDegree = 0 := Polynomial.natDegree_C _\n    have hsub : (Polynomial.X ^ 2 - Polynomial.C (t : ZMod p) * Polynomial.X).natDegree \u2264 2 := by\n      apply le_trans (Polynomial.natDegree_sub_le _ _)\n      apply max_le ?_ ?_\n      \u00b7 rw [hA]\n      \u00b7 calc\n          (Polynomial.C (t : ZMod p) * Polynomial.X).natDegree \u2264 1 := hB\n          _ \u2264 2 := by norm_num\n    apply le_trans (Polynomial.natDegree_add_le _ _)\n    apply max_le hsub\n    rw [hC]\n    exact Nat.zero_le 2\n  have hcard := Polynomial.card_le_degree_of_subset_roots hsubset\n  apply le_trans hcard hnatDegree_poly"

      "lean": "@[blueprint\n  (statement := /-- For a prime $p>3$, $\\mathit{descentCount}\\,p = |\\{ s \\in \\{2,\\dots,p-1\\} \\mid s + \\mathit{modInv}\\,p\\,s > p+2 \\}|$. -/)\n  (proof := /-- By $\\mathit{descent\\_iff}$, the condition for $k$ is equivalent to a condition on $s = \\mathit{modInv}\\,p\\,k + 1$. The map $k \\mapsto \\mathit{modInv}\\,p\\,k + 1$ is a bijection onto $\\{2,\\dots,p-1\\}$, so the cardinalities coincide. -/)]\nlemma descentCount_eq_card (p : \u2115) (hp : p.Prime) (hp_gt : 3 < p) : descentCount p = (Finset.filter (\u03bb s => s + modInv p s > p+2) (Finset.Icc 2 (p-1))).card := by\n  have h_modInv_pm1 : modInv p (p-1) = p-1 := by\n    dsimp [modInv]\n    have h_val_cast : ZMod.val (((p-1 : \u2115) : ZMod p)) = p-1 :=\n      ZMod.val_natCast_of_lt (by omega : (p-1 : \u2115) < p)\n    have h_eq_cast : ((p-1 : \u2115) : ZMod p) = -1 := by\n      calc\n        ((p-1 : \u2115) : ZMod p) = ((p : \u2115) : ZMod p) - ((1 : \u2115) : ZMod p) := by\n          rw [Nat.cast_sub (by omega : 1 \u2264 p)]\n        _ = (p : ZMod p) - 1 := by simp\n        _ = (0 : ZMod p) - 1 := by simp\n        _ = -1 := by simp\n    have h_inv : (((p-1 : \u2115) : ZMod p)\u207b\u00b9 : ZMod p) = ((p-1 : \u2115) : ZMod p) := by\n      calc\n        (((p-1 : \u2115) : ZMod p)\u207b\u00b9 : ZMod p) = ((-1 : ZMod p)\u207b\u00b9 : ZMod p) := by rw [h_eq_cast]\n        _ = (-1 : ZMod p) := by simpa using ZMod.inv_neg_one p\n        _ = ((p-1 : \u2115) : ZMod p) := by rw [h_eq_cast]\n    calc\n      ZMod.val (((p-1 : \u2115) : ZMod p)\u207b\u00b9) = ZMod.val (((p-1 : \u2115) : ZMod p)\u207b\u00b9) := rfl\n      _ = ZMod.val (((p-1 : \u2115) : ZMod p)) := by rw [h_inv]\n      _ = p-1 := h_val_cast\n  let s_set := Finset.filter (\u03bb s => s + modInv p s > p+2) (Finset.Icc 2 (p-1))\n  let k_set := Finset.filter (\u03bb k => modInv p (k+1) < modInv p k) (Finset.Icc 1 (p-2))\n  have h_mem (k : \u2115) (hk : k \u2208 k_set) : modInv p k + 1 \u2208 s_set := by\n    rcases Finset.mem_filter.mp hk with \u27e8hk_mem, hk_cond\u27e9\n    have hk_range : 1 \u2264 k \u2227 k \u2264 p-2 := by\n      simpa [Finset.mem_Icc] using hk_mem\n    have hk1 : 1 \u2264 k := hk_range.1\n    have hk2 : k \u2264 p-2 := hk_range.2\n    have h_modInv_range : 1 \u2264 modInv p k \u2227 modInv p k \u2264 p-1 := modInv_range p hp hk1 (by omega)\n    rcases h_modInv_range with \u27e8hmod1, hmod2\u27e9\n    have h_modInv_not_pm1 : modInv p k \u2260 p-1 := by\n      intro h_eq\n      have hk_eq_pm1 : k = p-1 := by\n        calc\n          k = modInv p (modInv p k) := (modInv_involution p hp hk1 (by omega)).symm\n          _ = modInv p (p-1) := by rw [h_eq]\n          _ = p-1 := h_modInv_pm1\n      have : k \u2264 p-2 := hk2\n      omega\n    have h_modInv_le_pm2 : modInv p k \u2264 p-2 := by\n      have h_le_pm1 : modInv p k \u2264 p-1 := hmod2\n      have h_ne_pm1 : modInv p k \u2260 p-1 := h_modInv_not_pm1\n      omega\n    have h_s_range : 2 \u2264 modInv p k + 1 \u2227 modInv p k + 1 \u2264 p-1 := by\n      constructor <;> omega\n    have h_s_cond : (modInv p k + 1) + modInv p (modInv p k + 1) > p+2 :=\n      (descent_iff p hp hk1 hk2).mp hk_cond\n    have h_s_mem_Icc : modInv p k + 1 \u2208 Finset.Icc 2 (p-1) := by\n      rw [Finset.mem_Icc]\n      exact h_s_range\n    apply Finset.mem_filter.mpr\n    refine \u27e8h_s_mem_Icc, ?_\u27e9\n    simpa [add_comm, add_left_comm, add_assoc] using h_s_cond\n  have h_inj (a b : \u2115) (ha : a \u2208 k_set) (hb : b \u2208 k_set) (h_eq : modInv p a + 1 = modInv p b + 1) : a = b := by\n    rcases Finset.mem_filter.mp ha with \u27e8ha_mem, ha_cond\u27e9\n    rcases Finset.mem_filter.mp hb with \u27e8hb_mem, hb_cond\u27e9\n    have ha_range : 1 \u2264 a \u2227 a \u2264 p-2 := by simpa [Finset.mem_Icc] using ha_mem\n    have hb_range : 1 \u2264 b \u2227 b \u2264 p-2 := by simpa [Finset.mem_Icc] using hb_mem\n    have ha_range' : a \u2264 p-1 := by omega\n    have hb_range' : b \u2264 p-1 := by omega\n    have h_modInv_eq : modInv p a = modInv p b := by omega\n    calc\n      a = modInv p (modInv p a) := (modInv_involution p hp ha_range.1 ha_range').symm\n      _ = modInv p (modInv p b) := by rw [h_modInv_eq]\n      _ = b := modInv_involution p hp hb_range.1 hb_range'\n  have h_surj (s : \u2115) (hs : s \u2208 s_set) : \u2203 (k : \u2115), k \u2208 k_set \u2227 modInv p k + 1 = s := by\n    rcases Finset.mem_filter.mp hs with \u27e8hs_mem, hs_cond\u27e9\n    rcases Finset.mem_Icc.mp hs_mem with \u27e8hs_low, hs_high\u27e9\n    have hs_minus_one_range : 1 \u2264 s-1 \u2227 s-1 \u2264 p-2 := by\n      constructor <;> omega\n    set k := modInv p (s-1) with hk_def\n    have hk_range : 1 \u2264 k \u2227 k \u2264 p-2 := by\n      have hk1 : 1 \u2264 k := by\n        have hmod_range := modInv_range p hp hs_minus_one_range.1 (by omega : s-1 \u2264 p-1)\n        exact hmod_range.1\n      have hk2 : k \u2264 p-2 := by\n        have hmod_range := modInv_range p hp hs_minus_one_range.1 (by omega : s-1 \u2264 p-1)\n        have hmod_upper : k \u2264 p-1 := hmod_range.2\n        by_contra! hk_gt\n        have hk_eq_pm1 : k = p-1 := by omega\n        have h_s_minus_one_eq_pm1 : s-1 = p-1 := by\n          calc\n            s-1 = modInv p k := by\n              calc\n                s-1 = modInv p (modInv p (s-1)) := (modInv_involution p hp hs_minus_one_range.1 (by omega)).symm\n                _ = modInv p k := rfl\n            _ = modInv p (p-1) := by rw [hk_eq_pm1]\n            _ = p-1 := h_modInv_pm1\n        have : s = p := by omega\n        omega\n      exact \u27e8hk1, hk2\u27e9\n    have hk_mem_Icc : k \u2208 Finset.Icc 1 (p-2) := by\n      rw [Finset.mem_Icc]\n      exact hk_range\n    have h_modInv_k : modInv p k = s-1 := by\n      calc\n        modInv p k = modInv p (modInv p (s-1)) := rfl\n        _ = s-1 := modInv_involution p hp hs_minus_one_range.1 (by omega)\n    have h_modInv_k_plus_one : modInv p (k+1) < modInv p k := by\n      apply (descent_iff p hp hk_range.1 hk_range.2).mpr\n      calc\n        (modInv p k + 1) + modInv p (modInv p k + 1) =\n            (s-1 + 1) + modInv p ((s-1) + 1) := by rw [h_modInv_k]\n        _ = s + modInv p s := by\n          have h1 : s-1+1 = s := by omega\n          have h2 : (s-1)+1 = s := by omega\n          calc\n            (s-1+1) + modInv p ((s-1)+1) = s + modInv p ((s-1)+1) := by rw [h1]\n            _ = s + modInv p s := by rw [h2]\n        _ > p+2 := hs_cond\n    have hk_mem_filter : k \u2208 k_set := by\n      apply Finset.mem_filter.mpr\n      exact \u27e8hk_mem_Icc, h_modInv_k_plus_one\u27e9\n    have h_modInv_k_plus_one_eq_s : modInv p k + 1 = s := by\n      calc\n        modInv p k + 1 = (s-1) + 1 := by rw [h_modInv_k]\n        _ = s := by omega\n    exact \u27e8k, hk_mem_filter, h_modInv_k_plus_one_eq_s\u27e9\n  have h_card_eq : k_set.card = s_set.card := by\n    -- Use bijection\n    let f : k_set \u2192 s_set := \u03bb x =>\n      let k := x.1\n      have hk : k \u2208 k_set := x.2\n      have hmem : modInv p k + 1 \u2208 s_set := h_mem k hk\n      \u27e8modInv p k + 1, hmem\u27e9\n    have h_injective : Function.Injective f := by\n      intro x y h\n      apply Subtype.ext\n      have h_val : (f x).1 = (f y).1 := congr_arg Subtype.val h\n      dsimp [f] at h_val\n      -- h_val : modInv p x.1 + 1 = modInv p y.1 + 1\n      exact h_inj x.1 y.1 x.2 y.2 h_val\n    have h_surjective : Function.Surjective f := by\n      intro y\n      rcases y with \u27e8s, hs\u27e9\n      rcases h_surj s hs with \u27e8k, hk, h_eq\u27e9\n      refine \u27e8\u27e8k, hk\u27e9, ?_\u27e9\n      ext; exact h_eq\n    exact Finset.card_eq_of_equiv (Equiv.ofBijective f \u27e8h_injective, h_surjective\u27e9)\n  calc\n    descentCount p = k_set.card := rfl\n    _ = s_set.card := h_card_eq\n    _ = (Finset.filter (\u03bb s => s + modInv p s > p+2) (Finset.Icc 2 (p-1))).card := rfl"

      "statement": "For a prime p, 1 \u2264 k \u2264 p-2, mathit{modInv} p (k+1) < mathit{modInv} p k iff (mathit{modInv} p k + 1) + mathit{modInv} p (mathit{modInv} p k + 1) > p+2.",

      "level": 2,
      "lean": "@[blueprint\n  (statement := /-- For a prime $p$, $1 \\leq k \\leq p-2$, $\\mathit{modInv}\\,p\\,(k+1) < \\mathit{modInv}\\,p\\,k$ iff $(\\mathit{modInv}\\,p\\,k + 1) + \\mathit{modInv}\\,p\\,(\\mathit{modInv}\\,p\\,k + 1) > p+2$. -/)\n  (proof := /-- By $\\mathit{modInv\\_recurrence}$, $\\mathit{modInv}\\,p\\,(k+1) = f\\,p\\,(\\mathit{modInv}\\,p\\,k)$. Then the inequality simplifies using $\\mathit{sum\\_val\\_eq\\_p\\_add\\_one}$ and $\\mathit{helper\\_ineq}$. -/)]\nlemma descent_iff (p : \u2115) (hp : p.Prime) (hk : 1 \u2264 k) (hk' : k \u2264 p-2) : (modInv p (k+1) < modInv p k) \u2194 (modInv p k + 1) + modInv p (modInv p k + 1) > p+2 := by\n  have hmodInv_pm1_eq_pm1 : modInv p (p-1) = p-1 := by\n    have hp_prime : p.Prime := hp\n    have hp_pos : 2 \u2264 p := hp_prime.two_le\n    have h1le_p : 1 \u2264 p := by omega\n    have hpos : p-1 \u2260 0 := by omega\n    have h_lt_p : (p-1 : \u2115) < p := by omega\n    calc\n      modInv p (p-1) = ZMod.val (((p-1 : \u2115) : ZMod p)\u207b\u00b9) := rfl\n      _ = ZMod.val ((-1 : ZMod p)\u207b\u00b9) := by\n        have h_eq : ((p-1 : \u2115) : ZMod p) = (-1 : ZMod p) := by\n          calc\n            ((p-1 : \u2115) : ZMod p) = (p : ZMod p) - (1 : ZMod p) := by\n              rw [Nat.cast_sub h1le_p, Nat.cast_one]\n            _ = (0 : ZMod p) - (1 : ZMod p) := by\n              simp [ZMod.natCast_self p]\n            _ = -(1 : ZMod p) := by ring\n            _ = (-1 : ZMod p) := by ring\n        rw [h_eq]\n      _ = ZMod.val (-1 : ZMod p) := by rw [ZMod.inv_neg_one p]\n      _ = p-1 := by\n        have hsucc : (p-1).succ = p := by omega\n        calc\n          ZMod.val ((-1 : ZMod p) : ZMod p) = ZMod.val ((-1 : ZMod ((p-1).succ)) : ZMod ((p-1).succ)) := by\n            rw [hsucc]\n          _ = p-1 := ZMod.val_neg_one (p-1)\n  have ha_range : 1 \u2264 modInv p k \u2227 modInv p k \u2264 p-1 := modInv_range p hp hk (by\n    -- need k \u2264 p-1, which holds because k \u2264 p-2\n    omega)\n  rcases ha_range with \u27e8ha_low, ha_high\u27e9\n  have ha_pos : modInv p k \u2260 0 := by omega\n  have ha_lt_pm1 : modInv p k < p-1 := by\n    by_contra! hge\n    have ha_eq_pm1 : modInv p k = p-1 := by omega\n    have hk_eq_pm1 : k = p-1 := by\n      calc\n        k = modInv p (modInv p k) := (modInv_involution p hp hk (by\n          -- need k \u2264 p-1, which holds\n          omega)).symm\n        _ = modInv p (p-1) := by rw [ha_eq_pm1]\n        _ = p-1 := hmodInv_pm1_eq_pm1\n    have : k \u2264 p-2 := hk'\n    omega\n  have ha_succ_lt_p : (modInv p k) + 1 < p := by\n    have : modInv p k < p-1 := ha_lt_pm1\n    omega\n  haveI : Fact p.Prime := \u27e8hp\u27e9\n  have hsum : f p (modInv p k) + modInv p ((modInv p k) + 1) = p+1 :=\n    sum_val_eq_p_add_one p (modInv p k) ha_pos ha_succ_lt_p\n  have h_equiv : (f p (modInv p k) < modInv p k) \u2194 ((modInv p k) + 1 + modInv p ((modInv p k) + 1) > p+2) :=\n    helper_ineq p (modInv p k) (modInv p ((modInv p k) + 1)) hsum\n  have h_modInv_recurrence : modInv p (k+1) = f p (modInv p k) :=\n    modInv_recurrence p hp hk hk'\n  rw [h_modInv_recurrence]\n  -- Now the left side is `f p (modInv p k) < modInv p k`\n  -- The right side is `(modInv p k + 1) + modInv p (modInv p k + 1) > p+2`\n  -- But h_equiv gives `(f p (modInv p k) < modInv p k) \u2194 ((modInv p k) + 1 + modInv p ((modInv p k) + 1) > p+2)`\n  -- So we can rewrite.\n  -- Note: `(modInv p k + 1) + modInv p (modInv p k + 1)` is the same as `((modInv p k) + 1) + modInv p ((modInv p k) + 1)`.\n  -- So we can use `h_equiv`.\n  -- Let's rewrite the right side to match.\n  have h_right_eq : (modInv p k + 1) + modInv p (modInv p k + 1) = (modInv p k + 1) + modInv p ((modInv p k) + 1) := rfl\n  -- Actually they are syntactically the same: `modInv p (modInv p k + 1)` vs `modInv p ((modInv p k) + 1)`.\n  -- The parentheses are the same because `+` is left-assoc? Actually `modInv p (modInv p k + 1)` is parsed as `modInv p ((modInv p k) + 1)`. So it's fine.\n  -- So we can       "lean": "@[blueprint\n  (statement := /-- For a prime $p$, the modular inverse map is an involution on $\\{1,\\dots,p-1\\}$. -/)\n  (proof := /-- Since $\\mathbb{Z}/p\\mathbb{Z}$ is a field, the inverse of the inverse of $k$ is $k$. Hence $\\mathit{modInv}\\,p\\,(\\mathit{modInv}\\,p\\,k) = k$. -/)]\nlemma modInv_involution (p : \u2115) (hp : p.Prime) (hk : 1 \u2264 k) (hk' : k \u2264 p-1) : modInv p (modInv p k) = k := by\n  have hp_pos : 0 < p := hp.pos\n  haveI : NeZero p := NeZero.of_pos hp_pos\n  haveI : Fact p.Prime := \u27e8hp\u27e9\n  have hkpos : k \u2260 0 := by\n    linarith\n  have hkltp : k < p := by\n    have hpm1_lt_p : p - 1 < p := by\n      omega\n    omega\n  have hk_modp_ne_zero : (k : ZMod p) \u2260 0 := by\n    intro hzero\n    apply hkpos\n    have hval := congrArg ZMod.val hzero\n    simp [ZMod.val_natCast, Nat.mod_eq_of_lt hkltp] at hval\n    exact hval\n  calc\n    modInv p (modInv p k) = ZMod.val (((modInv p k : ZMod p)\u207b\u00b9)) := rfl\n    _ = ZMod.val (((ZMod.val ((k : ZMod p)\u207b\u00b9) : ZMod p))\u207b\u00b9) := rfl\n    _ = ZMod.val ((((k : ZMod p)\u207b\u00b9 : ZMod p))\u207b\u00b9) := by\n      rw [ZMod.natCast_zmod_val]\n    _ = ZMod.val (((k : ZMod p)\u207b\u00b9)\u207b\u00b9) := rfl\n    _ = ZMod.val ((k : ZMod p)) := by\n      simpa using congrArg ZMod.val (inv_inv (a := (k : ZMod p)))\n    _ = k := by\n      rw [ZMod.val_natCast, Nat.mod_eq_of_lt hkltp]"

            if (!d) return;

                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
