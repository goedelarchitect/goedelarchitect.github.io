        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;

        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);

            font-size: 12px;
            cursor: pointer;

        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }

      "lean": "@[blueprint\n  (statement := /-- Three distinct points on a circle are affinely independent (i.e., not collinear). -/)\n  (proof := /-- A line intersects a circle in at most two points. Since three distinct points on the same circle cannot be collinear, they are affinely independent. -/)]\nlemma affineIndependent_three_points_on_circle (X A B G : EuclideanSpace \u211d (Fin 2))\n    (hA : A \u2208 Metric.sphere X (dist X G)) (hB : B \u2208 Metric.sphere X (dist X G))\n    (hA_ne_G : A \u2260 G) (hB_ne_G : B \u2260 G) (hA_ne_B : A \u2260 B) :\n    AffineIndependent \u211d ![G, A, B] := by\n  rw [affineIndependent_iff_not_collinear_set]\n  intro hcoll\n  have hGmem : G \u2208 ({G, A, B} : Set (EuclideanSpace \u211d (Fin 2))) := by simp\n  have hcoll_iff := (collinear_iff_of_mem hGmem).mp hcoll\n  rcases hcoll_iff with \u27e8v, hv\u27e9\n  have hA_ex : \u2203 r : \u211d, A = r \u2022 v +\u1d65 G := hv A (by simp)\n  have hB_ex : \u2203 r : \u211d, B = r \u2022 v +\u1d65 G := hv B (by simp)\n  rcases hA_ex with \u27e8rA, hA_eq\u27e9\n  rcases hB_ex with \u27e8rB, hB_eq\u27e9\n  have hA_ne_G' : rA \u2260 0 := by\n    intro hzero\n    apply hA_ne_G\n    calc\n      A = rA \u2022 v +\u1d65 G := hA_eq\n      _ = (0 : \u211d) \u2022 v +\u1d65 G := by rw [hzero]\n      _ = G := by simp\n  have hB_ne_G' : rB \u2260 0 := by\n    intro hzero\n    apply hB_ne_G\n    calc\n      B = rB \u2022 v +\u1d65 G := hB_eq\n      _ = (0 : \u211d) \u2022 v +\u1d65 G := by rw [hzero]\n      _ = G := by simp\n  have hd : A - G = rA \u2022 v := by\n    calc\n      A - G = (rA \u2022 v +\u1d65 G) - G := by rw [hA_eq]\n      _ = rA \u2022 v := by simp\n  have hB_minus_G : B - G = rB \u2022 v := by\n    calc\n      B - G = (rB \u2022 v +\u1d65 G) - G := by rw [hB_eq]\n      _ = rB \u2022 v := by simp\n  have hlam : \u2203 (lam : \u211d), B - G = lam \u2022 (A - G) := by\n    use (rB / rA)\n    calc\n      B - G = rB \u2022 v := hB_minus_G\n      _ = (rB / rA) \u2022 (rA \u2022 v) := by\n        calc\n          rB \u2022 v = ((rB / rA) * rA) \u2022 v := by field_simp [hA_ne_G']\n          _ = (rB / rA) \u2022 (rA \u2022 v) := by rw [smul_smul]\n      _ = (rB / rA) \u2022 (A - G) := by rw [hd]\n  rcases hlam with \u27e8lam, hlam_eq\u27e9\n  have hA_dist : dist X A = dist X G := by\n    rw [dist_comm]\n    exact (Metric.mem_sphere.mp hA)\n  have hB_dist : dist X B = dist X G := by\n    rw [dist_comm]\n    exact (Metric.mem_sphere.mp hB)\n  have hA_norm : \u2016X - A\u2016 = \u2016X - G\u2016 := by\n    rw [dist_eq_norm, dist_eq_norm] at hA_dist; exact hA_dist\n  have hB_norm : \u2016X - B\u2016 = \u2016X - G\u2016 := by\n    rw [dist_eq_norm, dist_eq_norm] at hB_dist; exact hB_dist\n  have norm_sq_eq_two_inner (Y : EuclideanSpace \u211d (Fin 2)) (hY_norm : \u2016X - Y\u2016 = \u2016X - G\u2016) : \u2016Y - G\u2016^2 = 2 * inner \u211d (X - G) (Y - G) := by\n    have htemp : \u2016(X - G) - (Y - G)\u2016^2 = \u2016X - G\u2016^2 := by\n      calc\n        \u2016(X - G) - (Y - G)\u2016^2 = \u2016X - Y\u2016^2 := by simp\n        _ = \u2016X - G\u2016^2 := by rw [hY_norm]\n    have hnorm_sub_sq : \u2016(X - G) - (Y - G)\u2016^2 = \u2016X - G\u2016^2 - 2 * inner \u211d (X - G) (Y - G) + \u2016Y - G\u2016^2 := by\n      rw [norm_sub_sq_real]\n    nlinarith\n  have hA_sq_eq : \u2016A - G\u2016^2 = 2 * inner \u211d (X - G) (A - G) :=\n    norm_sq_eq_two_inner A hA_norm\n  have hB_sq_eq : \u2016B - G\u2016^2 = 2 * inner \u211d (X - G) (B - G) :=\n    norm_sq_eq_two_inner B hB_norm\n  have hB_sq : \u2016B - G\u2016^2 = lam^2 * \u2016A - G\u2016^2 := by\n    calc\n      \u2016B - G\u2016^2 = \u2016lam \u2022 (A - G)\u2016^2 := by rw [hlam_eq]\n      _ = (\u2016lam\u2016 * \u2016A - G\u2016)^2 := by rw [norm_smul]\n      _ = (|lam| * \u2016A - G\u2016)^2 := by simp\n      _ = lam^2 * \u2016A - G\u2016^2 := by\n        calc\n          (|lam| * \u2016A - G\u2016)^2 = (|lam|^2) * (\u2016A - G\u2016^2) := by ring\n          _ = lam^2 * \u2016A - G\u2016^2 := by simp [sq_abs lam]\n  have hB_inner_eq : inner \u211d (X - G) (B - G) = lam * inner \u211d (X - G) (A - G) := by\n    rw [hlam_eq, inner_smul_right]\n  have hB_sq_eq2 : lam^2 * \u2016A - G\u2016^2 = 2 * lam * inner \u211d (X - G) (A - G) := by\n    calc\n      lam^2 * \u2016A - G\u2016^2 = \u2016B - G\u2016^2 := by symm; exact hB_sq\n      _ = 2 * inner \u211d (X - G) (B - G) := hB_sq_eq\n      _ = 2 * (lam * inner \u211d (X - G) (A - G)) := by rw [hB_inner_eq]\n      _ = 2 * lam * inner \u211d (X - G) (A - G) := by ring\n  have h_inner_eq : inner \u211d (X - G) (A - G) = (1/2) * \u2016A - G\u2016^2 := by\n    linarith\n  have h_eq : lam^2 * \u2016A - G\u2016^2 = lam * \u2016A - G\u2016^2 := by\n    calc\n      lam^2 * \u2016A - G\u2016^2 = 2 * lam * inner \u211d (X - G) (A - G) := hB_sq_eq2\n      _ = 2 * lam * ((1/2) * \u2016A - G\u2016^2) := by rw [h_inner_eq]\n      _ = lam * \u2016A - G\u2016^2 := by ring\n  have hAd_sq_ne_zero : \u2016A - G\u2016^2 \u2260 0 := by\n    intro hzero\n    apply hA_ne_G\n    apply sub_eq_zero.mp\n    apply norm_eq_zero.mp\n    exact pow_eq_zero hzero\n  have h_factor : lam^2 - lam = 0 := by\n    have htemp : (lam^2 - lam) * \u2016A - G\u2016^2 = 0 := by\n      nlinarith\n    rcases eq_zero_or_eq_zero_of_mul_eq_zero htemp with (h | h)\n    \u00b7 exact h\n    \u00b7 exfalso; exact hAd_sq_ne_zero h\n  have h_lam_cases : lam = 0 \u2228 lam = 1 := by\n    have : lam*(lam-1) = 0 := by nlinarith\n    rcases eq_zero_or_eq_zero_of_mul_eq_zero this with (h | h)\n    \u00b7 left; exact h\n    \u00b7 right; exact sub_eq_zero.mp h\n  rcases h_lam_cases with (hlam0 | hlam1)\n  \u00b7 -- lam = 0\n    apply hB_ne_G\n    calc\n      B = G + (B - G) := by simp\n      _ = G + (0 : EuclideanSpace \u211d (Fin 2)) := by rw [hlam_eq, hlam0, zero_smul]\n      _ = G := by simp\n  \u00b7 -- lam = 1\n    apply hA_ne_B\n    calc\n      A = G + (A - G) := by simp\n      _ = G + (B - G) := by rw [hlam_eq, hlam1, one_smul]\n      _ = B := by simp"

      "lean": "@[blueprint\n  (statement := /-- Suppose `X` is a point on the perpendicular bisector of `RG`. If there exist two distinct points `A`, `B` on the circle centered at `X` with radius `dist X G`, both different from `G` and both having the same color as `G`, then `color X` must equal `color G`. -/)\n  (proof := /-- By `perp_bisector_equidistant`, `dist X R = dist X G`. By `affineIndependent_three_points_on_circle`, the points `G, A, B` are affinely independent, hence form a 2-simplex `s`. The circumcenter of `s` is the center of the circle passing through `G, A, B`, which is `X` because `A` and `B` lie on the circle centered at `X` with radius `dist X G`. Hence `s.circumcenter = X`. By the hypothesis `h`, since all vertices have color `color G`, the circumcenter also has color `color G`. Therefore `color X = color G`. -/)]\nlemma at_most_one_other_color_point (color : EuclideanSpace \u211d (Fin 2) \u2192 Bool)\n    (h : \u2200 (s : Simplex \u211d (EuclideanSpace \u211d (Fin 2)) 2), (\u2200 i j : Fin 3, color (s.points i) = color (s.points j)) \u2192 color s.circumcenter = color (s.points 0))\n    (R G X A B : EuclideanSpace \u211d (Fin 2))\n    (hXperp : X \u2208 perp_bisector R G)\n    (hA : A \u2208 Metric.sphere X (dist X G)) (hB : B \u2208 Metric.sphere X (dist X G))\n    (hA_ne_G : A \u2260 G) (hB_ne_G : B \u2260 G) (hA_ne_B : A \u2260 B)\n    (hA_color : color A = color G) (hB_color : color B = color G) : color X = color G := by\n  have hRG : dist X R = dist X G := perp_bisector_equidistant R G X hXperp\n  have hA_dist : dist X A = dist X G := by\n    rw [dist_comm]\n    rwa [Metric.mem_sphere] at hA\n  have hB_dist : dist X B = dist X G := by\n    rw [dist_comm]\n    rwa [Metric.mem_sphere] at hB\n  have h_indep : AffineIndependent \u211d ![G, A, B] :=\n    affineIndependent_three_points_on_circle X A B G hA hB hA_ne_G hB_ne_G hA_ne_B\n  let points : Fin 3 \u2192 EuclideanSpace \u211d (Fin 2) := ![G, A, B]\n  have h_indep' : AffineIndependent \u211d points := h_indep\n  let s : Simplex \u211d (EuclideanSpace \u211d (Fin 2)) 2 := Simplex.mk points h_indep'\n  have h_finrank : Module.finrank \u211d (EuclideanSpace \u211d (Fin 2)) = 2 := by\n    simpa using finrank_euclideanSpace_fin (\ud835\udd5c := \u211d) (n := 2)\n  have h_span : affineSpan \u211d (Set.range s.points) = \u22a4 :=\n    Affine.Simplex.span_eq_top s h_finrank\n  have hX_mem_span : X \u2208 affineSpan \u211d (Set.range s.points) := by\n    rw [h_span]\n    exact AffineSubspace.mem_top \u211d (EuclideanSpace \u211d (Fin 2)) X\n  have hr : \u2203 r, \u2200 i : Fin 3, dist (s.points i) X = r := by\n    refine \u27e8dist X G, ?_\u27e9\n    intro i\n    have : s.points i = points i := rfl\n    rw [this]\n    dsimp [points]\n    fin_cases i <;> simp [dist_comm, hA_dist, hB_dist]\n  have h_proj_eq_circumcenter : \u2191(s.orthogonalProjectionSpan X) = s.circumcenter :=\n    Affine.Simplex.orthogonalProjection_eq_circumcenter_of_exists_dist_eq s hr\n  have h_proj_eq_X : \u2191(s.orthogonalProjectionSpan X) = X := by\n    have hX_mem_top : X \u2208 (\u22a4 : AffineSubspace \u211d (EuclideanSpace \u211d (Fin 2))) := AffineSubspace.mem_top \u211d (EuclideanSpace \u211d (Fin 2)) X\n    have htop := (EuclideanGeometry.orthogonalProjection_eq_self_iff (s := \u22a4) (p := X)).mpr hX_mem_top\n    calc\n      \u2191(s.orthogonalProjectionSpan X) = \u2191(EuclideanGeometry.orthogonalProjection (affineSpan \u211d (Set.range s.points)) X) := rfl\n      _ = \u2191(EuclideanGeometry.orthogonalProjection (\u22a4 : AffineSubspace \u211d (EuclideanSpace \u211d (Fin 2))) X) := by\n        simp [h_span]\n      _ = X := htop\n  have hX_eq_circumcenter : X = s.circumcenter := by\n    calc\n      X = \u2191(s.orthogonalProjectionSpan X) := by symm; exact h_proj_eq_X\n      _ = s.circumcenter := h_proj_eq_circumcenter\n  have hall_same_color : \u2200 i j : Fin 3, color (s.points i) = color (s.points j) := by\n    intro i j\n    have hpts : \u2200 k : Fin 3, color (points k) = color G := by\n      intro k\n      fin_cases k <;> simp [points, hA_color, hB_color]\n    calc\n      color (s.points i) = color (points i) := rfl\n      _ = color G := hpts i\n      _ = color (points j) := (hpts j).symm\n      _ = color (s.points j) := rfl\n  have hcolor_circumcenter : color s.circumcenter = color (s.points 0) := h s hall_same_color\n  calc\n    color X = color s.circumcenter := by rw [hX_eq_circumcenter]\n    _ = color (s.points 0) := hcolor_circumcenter\n    _ = color G := by simp [s, points]"

u27e9\n  have hZ2_exists : \u2203 Z : EuclideanSpace \u211d (Fin 2), Z \u2208 Metric.sphere X2 (dist X2 G) \u2227 Z \u2208 Metric.sphere G ((dist R G)/2) \u2227 color Z = color R :=\n    exists_point_of_color_R_on_sphere_case1 color h R G X2 hR_ne_G hX2perp hX2color\n  rcases hZ2_exists with \u27e8Z2, hZ2, hZ2', hZ2_color\u27e9\n  have hZ3_exists : \u2203 Z : EuclideanSpace \u211d (Fin 2), Z \u2208 Metric.sphere X3 (dist X3 G) \u2227 Z \u2208 Metric.sphere G ((dist R G)/2) \u2227 color Z = color R :=\n    exists_point_of_color_R_on_sphere_case1 color h R G X3 hR_ne_G hX3perp hX3color\n  rcases hZ3_exists with \u27e8Z3, hZ3, hZ3', hZ3_color\u27e9\n  have hZ_distinct : Z1 \u2260 Z2 \u2227 Z1 \u2260 Z3 \u2227 Z2 \u2260 Z3 :=\n    distinct_Z R G hR_ne_G_pointwise X1 X2 X3 hX1_ne_X2 hX1_ne_X3 hX2_ne_X3 hX1perp hX2perp hX3perp Z1 Z2 Z3 hZ1 hZ1' hZ2 hZ2' hZ3 hZ3'\n  rcases hZ_distinct with \u27e8hZ12, hZ13, hZ23\u27e9\n  have h_cosp : EuclideanGeometry.Cospherical ({Z1, Z2, Z3} : Set (EuclideanSpace \u211d (Fin 2))) := by\n    rw [EuclideanGeometry.cospherical_def]\n    refine \u27e8G, (dist R G)/2, ?_\u27e9\n    intro p hp\n    simp at hp\n    rcases hp with (rfl|rfl|rfl)\n    \u00b7 exact hZ1'\n    \u00b7 exact hZ2'\n    \u00b7 exact hZ3'\n  have h_affine : AffineIndependent \u211d ![Z1, Z2, Z3] :=\n    EuclideanGeometry.Cospherical.affineIndependent_of_ne h_cosp hZ12 hZ13 hZ23\n  let s : Simplex \u211d (EuclideanSpace \u211d (Fin 2)) 2 := Simplex.mk ![Z1, Z2, Z3] h_affine\n  have h_circumcenter_eq_G : s.circumcenter = G := by\n    have h_span_top : affineSpan \u211d (Set.range s.points) = \u22a4 := by\n      have hi : AffineIndependent \u211d ![Z1, Z2, Z3] := h_affine\n      have h_card : Fintype.card (Fin 3) = Module.finrank \u211d (EuclideanSpace \u211d (Fin 2)) + 1 := by\n        simp\n      exact ((hi.affineSpan_eq_top_iff_card_eq_finrank_add_one).2 h_card)\n    have h_span : G \u2208 affineSpan \u211d (Set.range s.points) := by\n      rw [h_span_top]\n      exact AffineSubspace.mem_top (P := EuclideanSpace \u211d (Fin 2)) \u211d (EuclideanSpace \u211d (Fin 2)) G\n    have h_range_subset : Set.range s.points \u2286 Metric.sphere G ((dist R G)/2) := by\n      intro p hp\n      rcases hp with \u27e8i, rfl\u27e9\n      dsimp [s]\n      fin_cases i <;> assumption\n    have h_cs_cond : (EuclideanGeometry.Sphere.mk G ((dist R G)/2)).center \u2208 affineSpan \u211d (Set.range s.points) \u2227\n      Set.range s.points \u2286 Metric.sphere ((EuclideanGeometry.Sphere.mk G ((dist R G)/2)).center) ((EuclideanGeometry.Sphere.mk G ((dist R G)/2)).radius) := by\n      constructor\n      \u00b7 simpa using h_span\n      \u00b7 simpa using h_range_subset\n    have h_unique := (Affine.Simplex.circumsphere_unique_dist_eq s).2\n    have h_eq_sphere : (EuclideanGeometry.Sphere.mk G ((dist R G)/2)) = s.circumsphere :=\n      h_unique (EuclideanGeometry.Sphere.mk G ((dist R G)/2)) h_cs_cond\n    have h_center_eq : (EuclideanGeometry.Sphere.mk G ((dist R G)/2)).center = s.circumsphere.center := by\n      rw [h_eq_sphere]\n    have h_circsphere_center_eq_circumcenter : s.circumsphere.center = s.circumcenter := by\n      simpa using Affine.Simplex.circumsphere_center s\n    calc\n      s.circumcenter = s.circumsphere.center := by symm; exact h_circsphere_center_eq_circumcenter\n      _ = (EuclideanGeometry.Sphere.mk G ((dist R G)/2)).center := by symm; exact h_center_eq\n      _ = G := rfl\n  have h_vertices_color : \u2200 i j : Fin 3, color (s.points i) = color (s.points j) := by\n    intro i j\n    fin_cases i <;> fin_cases j <;> simp [s, hZ1_color, hZ2_color, hZ3_color]\n  have h_circumcenter_color : color s.circumcenter = color (s.points 0) := h s h_vertices_color\n  rw [h_circumcenter_eq_G] at h_circumcenter_color\n  have h_first_point_color : color (s.points 0) = color R := by\n    simp [s, hZ1_color]\n  rw [h_first_point_color] at h_circumcenter_color\n  exact hR_ne_G h_circumcenter_color.symm"

      "lean": "@[blueprint\n  (statement := /-- Under the assumption that there exist three distinct points on the perpendicular bisector of `RG` all of color `color G`, we derive a contradiction. -/)\n  (proof := /-- Symmetric to case 1, swapping the roles of `R` and `G`. -/)]\nlemma contradiction_case2 (color : EuclideanSpace \u211d (Fin 2) \u2192 Bool)\n    (h : \u2200 (s : Simplex \u211d (EuclideanSpace \u211d (Fin 2)) 2), (\u2200 i j : Fin 3, color (s.points i) = color (s.points j)) \u2192 color s.circumcenter = color (s.points 0))\n    (R G : EuclideanSpace \u211d (Fin 2)) (hR_ne_G : color R \u2260 color G)\n    (X1 X2 X3 : EuclideanSpace \u211d (Fin 2)) (hX1_ne_X2 : X1 \u2260 X2) (hX1_ne_X3 : X1 \u2260 X3) (hX2_ne_X3 : X2 \u2260 X3)\n    (hX1perp : X1 \u2208 perp_bisector R G) (hX2perp : X2 \u2208 perp_bisector R G) (hX3perp : X3 \u2208 perp_bisector R G)\n    (hX1color : color X1 = color G) (hX2color : color X2 = color G) (hX3color : color X3 = color G) : False := by\n  -- First, deduce R \u2260 G\n  have hR_ne_G' : R \u2260 G := by\n    intro h_eq\n    apply hR_ne_G\n    rw [h_eq]\n  have hR_ne_G_swap : G \u2260 R := by\n    intro h_eq\n    apply hR_ne_G'\n    exact h_eq.symm\n  -- For each X_i, get Z_i using exists_point_of_color_G_on_sphere_case2\n  obtain \u27e8Z1, hZ1_sphere_X1, hZ1_sphere_R, hZ1_color\u27e9 := exists_point_of_color_G_on_sphere_case2 color h R G X1 hR_ne_G hX1perp hX1color\n  obtain \u27e8Z2, hZ2_sphere_X2, hZ2_sphere_R, hZ2_color\u27e9 := exists_point_of_color_G_on_sphere_case2 color h R G X2 hR_ne_G hX2perp hX2color\n  obtain \u27e8Z3, hZ3_sphere_X3, hZ3_sphere_R, hZ3_color\u27e9 := exists_point_of_color_G_on_sphere_case2 color h R G X3 hR_ne_G hX3perp hX3color\n  -- Show that Z1, Z2, Z3 are distinct.\n  -- Use distinct_Z with R and G swapped.\n  have hX1perp_swap : X1 \u2208 perp_bisector G R := by\n    have h_eq : dist X1 R = dist X1 G := hX1perp\n    rw [perp_bisector]\n    dsimp\n    rw [eq_comm]\n    exact h_eq\n  have hX2perp_swap : X2 \u2208 perp_bisector G R := by\n    have h_eq : dist X2 R = dist X2 G := hX2perp\n    rw [perp_bisector]\n    dsimp\n    rw [eq_comm]\n    exact h_eq\n  have hX3perp_swap : X3 \u2208 perp_bisector G R := by\n    have h_eq : dist X3 R = dist X3 G := hX3perp\n    rw [perp_bisector]\n    dsimp\n    rw [eq_comm]\n    exact h_eq\n  have hZ_distinct : Z1 \u2260 Z2 \u2227 Z1 \u2260 Z3 \u2227 Z2 \u2260 Z3 := by\n    refine distinct_Z G R hR_ne_G_swap X1 X2 X3 hX1_ne_X2 hX1_ne_X3 hX2_ne_X3 hX1perp_swap hX2perp_swap hX3perp_swap Z1 Z2 Z3 ?_ ?_ ?_ ?_ ?_ ?_\n    \u00b7 exact hZ1_sphere_X1\n    \u00b7 simpa [dist_comm] using hZ1_sphere_R\n    \u00b7 exact hZ2_sphere_X2\n    \u00b7 simpa [dist_comm] using hZ2_sphere_R\n    \u00b7 exact hZ3_sphere_X3\n    \u00b7 simpa [dist_comm] using hZ3_sphere_R\n  rcases hZ_distinct with \u27e8hZ1_ne_Z2, hZ1_ne_Z3, hZ2_ne_Z3\u27e9\n  -- Now Z1, Z2, Z3 are three distinct points on the sphere centered at R with radius dist R G/2\n  -- They are affinely independent.\n  have hdist_R_Z1 : dist R Z1 = dist R G / 2 := by\n    have h := Metric.mem_sphere.mp hZ1_sphere_R\n    -- h : dist Z1 R = dist R G / 2\n    -- we need dist R Z1 = dist R G / 2\n    -- using dist_comm\n    rw [dist_comm] at h\n    exact h\n  have h_independent : AffineIndependent \u211d ![Z1, Z2, Z3] := by\n    -- apply affineIndependent_three_points_on_circle with X = R, A = Z2, B = Z3, G = Z1\n    have hZ2_sphere_R_Z1 : Z2 \u2208 Metric.sphere R (dist R Z1) := by\n      -- from hZ2_sphere_R and hdist_R_Z1\n      simpa [hdist_R_Z1] using hZ2_sphere_R\n    have hZ3_sphere_R_Z1 : Z3 \u2208 Metric.sphere R (dist R Z1) := by\n      simpa [hdist_R_Z1] using hZ3_sphere_R\n    have hZ2_ne_Z1 : Z2 \u2260 Z1 := Ne.symm hZ1_ne_Z2\n    have hZ3_ne_Z1 : Z3 \u2260 Z1 := Ne.symm hZ1_ne_Z3\n    exact affineIndependent_three_points_on_circle R Z2 Z3 Z1 hZ2_sphere_R_Z1 hZ3_sphere_R_Z1 hZ2_ne_Z1 hZ3_ne_Z1 hZ2_ne_Z3\n  have h_card : Fintype.card (Fin 3) = Module.finrank \u211d (EuclideanSpace k, ?_, ?_\u27e9\n    \u00b7 -- color(P i) = color(P j) because both in A (color true)\n      have hi_color : color (P i) = true := by\n        simpa [A, s] using hi\n      have hj_color : color (P j) = true := by\n        simpa [A, s] using hj\n      rw [hi_color, hj_color]\n    \u00b7 -- color(P j) = color(P k) similarly\n      have hj_color : color (P j) = true := by\n        simpa [A, s] using hj\n      have hk_color : color (P k) = true := by\n        simpa [A, s] using hk\n      rw [hj_color, hk_color]\n  \u00b7 -- card B \u2265 3, similar with false\n    have h_two_lt : 2 < Finset.card B := by omega\n    rcases (Finset.two_lt_card.mp h_two_lt) with \u27e8i, hi, j, hj, k, hk, hij, hik, hjk\u27e9\n    refine \u27e8i, j, k, hij, hjk, hik, ?_, ?_\u27e9\n    \u00b7 -- color(P i) = color(P j) because both in B (color false)\n      have hi_color : color (P i) = false := by\n        simpa [B, s] using hi\n      have hj_color : color (P j) = false := by\n        simpa [B, s] using hj\n      rw [hi_color, hj_color]\n    \u00b7 -- color(P j) = color(P k) similarly\n      have hj_color : color (P j) = false := by\n        simpa [B, s] using hj\n      have hk_color : color (P k) = false := by\n        simpa [B, s] using hk\n      rw [hj_color, hk_color]"

   exact hx_minus_R_inner\n      have hG_mem : (G - R) \u2208 (\u211d \u2219 v)\u15ee := by\n        rw [Submodule.mem_orthogonal_singleton_iff_inner_left]\n        exact hG_minus_R_inner\n      -- finrank argument to get linear dependence\n      have h_fact : Fact (Module.finrank \u211d (EuclideanSpace \u211d (Fin 2)) = 1 + 1) := by\n        have h : Module.finrank \u211d (EuclideanSpace \u211d (Fin 2)) = 2 := by simp\n        exact \u27e8by linarith\u27e9\n      haveI := h_fact\n      have h_finrank_orth : Module.finrank \u211d ((\u211d \u2219 v)\u15ee) = 1 :=\n        Submodule.finrank_orthogonal_span_singleton (v := v) (hv := h_v_ne_zero)\n      haveI : Module.Free \u211d ((\u211d \u2219 v)\u15ee) := by infer_instance\n      have h_exists : \u2203 (u : (\u211d \u2219 v)\u15ee) (hu : u \u2260 0), \u2200 (w : (\u211d \u2219 v)\u15ee), \u2203 (c : \u211d), c \u2022 u = w := by\n        have htemp := (finrank_eq_one_iff' (K := \u211d) (V := (\u211d \u2219 v)\u15ee)).mp h_finrank_orth\n        rcases htemp with \u27e8u, hu, h_all\u27e9\n        exact \u27e8u, hu, h_all\u27e9\n      rcases h_exists with \u27e8u, hu, h_all\u27e9\n      have hx_smul : \u2203 (c : \u211d), c \u2022 u = \u27e8x - R, hx_mem\u27e9 := h_all \u27e8x - R, hx_mem\u27e9\n      have hG_smul : \u2203 (c : \u211d), c \u2022 u = \u27e8G - R, hG_mem\u27e9 := h_all \u27e8G - R, hG_mem\u27e9\n      rcases hx_smul with \u27e8c1, hc1\u27e9\n      rcases hG_smul with \u27e8c2, hc2\u27e9\n      have hc1_val : c1 \u2022 (u : EuclideanSpace \u211d (Fin 2)) = x - R := by\n        apply congr_arg Subtype.val hc1\n      have hc2_val : c2 \u2022 (u : EuclideanSpace \u211d (Fin 2)) = G - R := by\n        apply congr_arg Subtype.val hc2\n      have hc2_ne_zero : c2 \u2260 0 := by\n        intro hzero\n        apply hR_ne_G\n        have hzero_vec : G - R = 0 := by\n          calc\n            G - R = c2 \u2022 (u : EuclideanSpace \u211d (Fin 2)) := by symm; exact hc2_val\n            _ = 0 := by simp [hzero]\n             // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
