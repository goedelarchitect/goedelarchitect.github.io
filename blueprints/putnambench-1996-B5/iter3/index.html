        :root {
            --bg-color: #ffffff;
            --text-color: #141414;
            --controls-bg: rgba(255, 255, 255, 0.95);
            --controls-border: #d0d0d0;
            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

      "lean": "@[blueprint (statement := /-- The alternating string has nonnegative prefixes. -/)\n  (proof := /-- By direct computation of prefix sums. -/)]\nlemma alt_string_prefixes_nonneg (n : \u2115) : prefixes_nonneg (alt_string n) := by\n  let alt_seq (k : \u2115) : \u2124\u02e3 := if k % 2 = 0 then 1 else -1\n  have alt_seq_partial_sum (k : \u2115) : Finset.sum (Finset.range (k+1)) (\u03bb j => (alt_seq j : \u2124)) = if k % 2 = 0 then (1 : \u2124) else (0 : \u2124) := by\n    induction' k with m IH\n    \u00b7 simp [alt_seq]\n    \u00b7 rw [Finset.sum_range_succ, IH]\n      have hpar : (m+1) % 2 = (if m % 2 = 0 then 1 else 0) := by\n        by_cases hm : m % 2 = 0\n        \u00b7 rw [if_pos hm]\n          exact (Nat.succ_mod_two_eq_one_iff.mpr hm)\n        \u00b7 have hm1 : m % 2 = 1 := by\n            have hmod := Nat.mod_two_eq_zero_or_one m\n            rcases hmod with h0 | h1\n            \u00b7 exact (hm h0).elim\n            \u00b7 exact h1\n          rw [if_neg hm]\n          exact (Nat.succ_mod_two_eq_zero_iff.mpr hm1)\n      have alt_val : (alt_seq (m+1) : \u2124) = (if (m+1) % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n        simp [alt_seq]\n        split <;> simp\n      rw [alt_val]\n      rw [hpar]\n      by_cases hm : m % 2 = 0\n      \u00b7 rw [if_pos hm]\n        have hm1 : (m+1) % 2 = 1 := by\n          simpa [hpar, hm] using rfl\n        simp [hm, hpar]\n      \u00b7 rw [if_neg hm]\n        have hm1 : m % 2 = 1 := by\n          have hmod := Nat.mod_two_eq_zero_or_one m\n          rcases hmod with h0 | h1\n          \u00b7 exact (hm h0).elim\n          \u00b7 exact h1\n        have hm1' : (m+1) % 2 = 0 := by\n          simpa [hpar, hm1] using rfl\n        simp [hm, hm1, hm1']\n  have sum_filter_Icc_eq_range_sum (b : Fin n) : Finset.sum (((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b))) (\u03bb i => (alt_string n i : \u2124)) = Finset.sum (Finset.range (b.val+1)) (\u03bb j => (alt_seq j : \u2124)) := by\n    let s :=       "lean": "@[blueprint (statement := /-- If a string is nonnegative and bounded, it must be the alternating string. -/)\n  (proof := /-- By induction on the length, using the walk interpretation. -/)]\nlemma alt_string_unique (n : \u2115) (S : Fin n \u2192 \u2124\u02e3) (hnonneg : prefixes_nonneg S) (hbound : prefixes_abs_le_one S) : S = alt_string n := by\n  ext i\n  by_cases hn0 : n = 0\n  \u00b7 subst hn0; exact Fin.elim0 i\n  \u00b7 have hnpos : 0 < n := Nat.pos_of_ne_zero hn0\n    -- define f as \u2115 \u2192 \u2124\n    let f : \u2115 \u2192 \u2124 := \u03bb k => if h : k < n then (S (\u27e8k, h\u27e9 : Fin n) : \u2124) else 0\n    have hf_val (i : Fin n) : f i.val = (S i : \u2124) := by\n      simp [f, i.is_lt]\n    have hf_nonneg (k : \u2115) (hk : k < n) : f k = 1 \u2228 f k = -1 := by\n      have huniv : (Finset.univ : Finset \u2124\u02e3) = {1, -1} := by decide\n      have hm : S (\u27e8k, hk\u27e9 : Fin n) \u2208 (Finset.univ : Finset \u2124\u02e3) := Finset.mem_univ _\n      rw [huniv] at hm\n      simp at hm\n      rcases hm with (h | h)\n      \u00b7 left; simp [f, hk, h]\n      \u00b7 right; simp [f, hk, h]\n    -- lemma sum_alt_range\n    have sum_alt_range (k : \u2115) : Finset.sum (Finset.range k) (\u03bb j => (if j % 2 = 0 then (1 : \u2124) else (-1 : \u2124))) = (if k % 2 = 0 then (0 : \u2124) else 1) := by\n      induction' k with k ih\n      \u00b7 simp\n      \u00b7 rw [Finset.sum_range_succ, ih]\n        by_cases hk : k % 2 = 0\n        \u00b7 -- k even\n          have hk' : (k+1) % 2 = 1 := by\n            omega\n          simp [hk, hk']\n        \u00b7 -- k odd\n          have hk' : (k+1) % 2 = 0 := by\n            omega\n          simp [hk, hk']\n    -- We'll need to use `hf_nonneg` and `sum_alt_range` later.\n    -- Now we need to relate `prefix_sum` to `Finset.range` sum.\n    -- Let's define a lemma `prefix_sum_eq_range` using `Finset.image`.\n    have prefix_sum_eq_range (k : \u2115) (hk : k < n) : (\u2211 x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))), (S x : \u2124)) = Finset.sum (Finset.range (k+1)) f := by\n      -- prove via Finset.image\n      have h_image : Finset.image (\u03bb (x : Fin n) => x.val) ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))) = Finset.range (k+1) := by\n        ext j\n        constructor\n        \u00b7 intro hj\n          rcases Finset.mem_image.mp hj with \u27e8x, hx, rfl\u27e9\n          have hxle : x \u2264 (\u27e8k, hk\u27e9 : Fin n) := (Finset.mem_filter.mp hx).2\n          have hxval : x.val \u2264 k := hxle\n          apply Finset.mem_range.mpr\n          omega\n        \u00b7 intro hj\n          have hj_range : j < k+1 := Finset.mem_range.mp hj\n          have hj_lt_n : j < n := by omega\n          let x : Fin n := \u27e8j, hj_lt_n\u27e9\n          have hxle : x \u2264 (\u27e8k, hk\u27e9 : Fin n) := by\n            -- x.val = j \u2264 k\n            exact (Fin.mk_le_mk.mpr (show j \u2264 k from by omega))\n          have hmem : x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))) := by\n            apply Finset.mem_filter.mpr; exact \u27e8Finset.mem_univ _, hxle\u27e9\n          apply Finset.mem_image.mpr\n          exact \u27e8x, hmem, rfl\u27e9\n      calc\n        (\u2211 x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))), (S x : \u2124)) = \n          (\u2211 x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))), f (x.val)) := by\n          refine Finset.sum_congr rfl (\u03bb x hx => ?_)\n          simp [f, x.is_lt]\n        _ = Finset.sum (Finset.image (\u03bb (x : Fin n) => x.val) ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n)))) f := by\n          rw [Finset.sum_image]\n          intro x hx y hy h\n          exact Fin.val_inj.mp h\n        _ = Finset.sum (Finset.range (k+1)) f := by rw [h_image]\n    -- Now we can get `hnonneg` and `hbound` translated.\n    have hP_nonneg (k : \u2115) (hk : k < n) : Finset.sum (Finset.range (k+1)) f \u2265 0 := by\n      have h := hnonneg (\u27e8k, hk\u27e9 : Fin n)\n      have h_eq := prefix_sum_eq_range k hk\n      linarith\n    have hP_bound (k : \u2115) (hk : k < n) : |Finset.sum (Finset.range (k+1)) f| \u2264 1 := by\n      have h := hbound (\u27e8k, hk\u27e9 : Fin n)\n      have h_eq := prefix_sum_eq_range k hk\n      -- h: |...| \u2264 1, h_eq gives equality of sums\n      -- need to rewrite\n      -- `h` is `|...| \u2264 1` where ... is the original sum. `h_eq` says original sum = range sum.\n      -- So we can `simpa [h_eq]` using h\n      simpa [h_eq] using h\n    -- Now the main induction on k.\n    have h_main (k : \u2115) (hk : k < n) : f k = (if k % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n      revert hk\n      refine Nat.strong_induction_on k ?_\n      intro m ih hk\n      by_cases hm0 : m = 0\n      \u00b7 subst hm0\n        -- m=0 case\n        have h0_nonneg := hP_nonneg 0 (by omega)\n        have h0_bound := hP_bound 0 (by omega)\n        -- compute sum for range 1 (0+1)\n        have hsum0 : Finset.sum (Finset.range 1) f = f 0 := by simp\n        -- So we have f 0 \u2265 0 and |f 0| \u2264 1.\n        rw [hsum0] at h0_nonneg h0_bound\n        have hval : f 0 = 1 \u2228 f 0 = -1 := hf_nonneg 0 (by omega)\n        rcases hval with (h1 | hneg1)\n        \u00b7 exact h1\n        \u00b7 -- f 0 = -1, but we have f 0 \u2265 0, contradiction\n          linarith\n      \u00b7 -- m > 0\n        have hm_pos : 0 < m := Nat.pos_of_ne_zero hm0\n        let m' := m-1\n        have hm'_lt_m : m' < m := by omega\n        have hm'_lt_n : m' < n := by omega\n        -- induction hypothesis for m'\n        have h_ih_m' : f m' = (if m' % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := ih m' hm'_lt_m (by omega)\n        -- compute prefix sum up to m-1\n        have hP_prev : Finset.sum (Finset.range m) f = (if m % 2 = 0 then (0 : \u2124) else 1) := by\n          -- using sum_alt_range and induction hypothesis for all j < m\n          have h_all_lt : \u2200 (j : \u2115), j < m \u2192 f j = (if j % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n            intro j hj\n            exact ih j hj (by omega)\n          calc\n            Finset.sum (Finset.range m) f = Finset.sum (Finset.range m) (\u03bb j => (if j % 2 = 0 then (1 : \u2124) else (-1 : \u2124))) := by\n              refine Finset.sum_congr rfl (\u03bb j hj => ?_)\n              rw [h_all_lt j (Finset.mem_range.mp hj)]\n            _ = (if m % 2 = 0 then (0 : \u2124) else 1) := sum_alt_range m\n        -- compute prefix sum up to m\n        have hP_curr : Finset.sum (Finset.range (m+1)) f = (Finset.sum (Finset.range m) f) + f m := by\n          simp [Finset.sum_range_succ]\n        have hP_curr_nonneg : Finset.sum (Finset.range (m+1)) f \u2265 0 := hP_nonneg m hk\n        have hP_curr_bound : |Finset.sum (Finset.range (m+1)) f| \u2264 1 := hP_bound m hk\n        -- Now analyze parity\n        by_cases hm_even : m % 2 = 0\n        \u00b7 -- m even\n          have h_prev_val : Finset.sum (Finset.range m) f = 0 := by\n            rw [hP_prev, hm_even]; rfl\n          rw [h_prev_val] at hP_curr\n          -- hP_curr: sum ... = f m\n          have hsum_eq : Finset.sum (Finset.range (m+1)) f = f m := by\n            -- from hP_curr rewrite\n            simp [hP_curr, h_prev_val]\n          -- So f m = that sum.\n          have hsum_nonneg : f m \u2265 0 := by\n            -- from hP_curr_nonneg and hsum_eq\n            rw [hsum_eq] at hP_curr_nonneg; exact hP_curr_nonneg\n          have hsum_bound : |f m| \u2264 1 := by\n            rw [hsum_eq] at hP_curr_bound; exact hP_curr_bound\n          have hval : f m = 1 \u2228 f m = -1 := hf_nonneg m hk\n          rcases hval with (h1 | hneg1)\n          \u00b7 -- f m = 1, which matches (if m%2=0 then 1 else -1) = 1\n            simp [hm_even, h1]\n          \u00b7 -- f m = -1, but we have f m \u2265 0, contradiction\n            linarith\n        \u00b7 -- m odd\n          have hm_odd : m % 2 = 1 := by\n            have := Nat.mod_two_eq_zero_or_one m\n            rcases this with (h | h)\n            \u00b7 exact absurd h hm_even\n            \u00b7 exact h\n          have h_prev_val : Finset.sum (Finset.range m) f = 1 := by\n            rw [hP_prev, hm_odd]\n            rfl\n          rw [h_prev_val] at hP_curr\n          -- hP_curr: sum ... = 1 + f m\n          have hsum_eq : Finset.sum (Finset.range (m+1)) f = 1 + f m := by\n            -- from hP_curr\n            -- hP_curr is an equation: sum ... = (sum range m) + f m = 1 + f m\n            linarith\n          have hsum_nonneg : 1 + f m \u2265 0 := by\n            rw [\u2190 hsum_eq]; exact hP_curr_nonneg\n          have hsum_bound : |1 + f m| \u2264 1 := by\n            rw [\u2190 hsum_eq]; exact hP_curr_bound\n          have hval : f m = 1 \u2228 f m = -1 := hf_nonneg m hk\n          rcases hval with (h1 | hneg1)\n          \u00b7 -- f m = 1, then 1+1=2, which violates |2|\u22641\n            rw [h1] at hsum_bound\n            -- |2| \u2264 1 is false\n            have : |(2 : \u2124)| = 2 := by norm_num\n            -- Actually compute\n            norm_num at hsum_bound\n          \u00b7 -- f m = -1, then 1+(-1)=0, which is okay.\n            rw [hneg1] at *\n            -- we need to show f m = -1 = (if m%2=0 then 1 else -1) = -1\n            simp [hm_odd]\n    -- Finally, we need to show `S i = alt_string n i`.\n    -- Using `h_main` for `k = i.val`.\n    have h_i_val_lt_n : i.val < n := i.is_lt\n    have h_f_i : f i.val = (if i.val % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := h_main i.val h_i_val_lt_n\n    -- Also, `f i.val = (S i : \u2124)` by `hf_val`.\n    have h_f_i' : f i.val = (S i : \u2124) := hf_val i\n    have h_alt_i : (alt_string n i : \u2124) = (if i.val % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n      simp [alt_string]\n       "statement": "If a balanced string is not bounded, it must be nonnegative or nonpositive.",
      "is_main": false,

      "level": 5,
      "lean": "@[blueprint (statement := /-- If a balanced string is not bounded, it must be nonnegative or nonpositive. -/)\n  (proof := /-- Walk argument: the prefix sum of a balanced string stays within [-2,2]; if it ever goes outside [-1,1], the string must be either always \u22650 or always \u22640. -/)]\nlemma balanced_cond_of_not_prefixes_abs_le_one_implies_nonneg_or_nonpos {n : \u2115} (S : Fin n \u2192 \u2124\u02e3) (hbal : balanced_cond S) (hnotbound : \u00ac prefixes_abs_le_one S) :\n    prefixes_nonneg S \u2228 prefixes_nonpos S := by\n  by_cases hn : n = 0\n  \u00b7 subst hn\n    left\n    intro b\n    exfalso\n    exact Fin.elim0 b\n  -- now n > 0, so (0 : Fin n) is defined\n  have hzero_lt_n : 0 < n := by omega\n  haveI : NeZero n := NeZero.of_pos hzero_lt_n\n  -- define P\n  let P (b : Fin n) : \u2124 := \u2211 i \u2208 Finset.Icc (0 : Fin n) b, (S i : \u2124)\n  have hPbal : \u2200 b, |P b| \u2264 2 := by\n    intro b\n    have h := hbal (0 : Fin n) b (Fin.zero_le b)\n    simpa [P] using h\n  have h_exists : \u2203 b : Fin n, |P b| > 1 := by\n    unfold prefixes_abs_le_one at hnotbound\n    push_neg at hnotbound\n    rcases hnotbound with \u27e8b, h\u27e9\n    refine \u27e8b, ?_\u27e9\n    -- h : 1 < |...|\n    -- we need to rewrite to |P b| > 1\n    have h_eq : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) = P b := by\n      have h_eq_set : ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)) = Finset.Icc (0 : Fin n) b := by\n        ext i\n        constructor\n        \u00b7 intro hi\n          rcases Finset.mem_filter.mp hi with \u27e8hi_univ, hi_le\u27e9\n          exact Finset.mem_Icc.mpr \u27e8Fin.zero_le i, hi_le\u27e9\n        \u00b7 intro hi\n          rcases Finset.mem_Icc.mp hi with \u27e8h0i, hi_b\u27e9\n          apply Finset.mem_filter.mpr\n          exact \u27e8Finset.mem_univ _, hi_b\u27e9\n      simp [h_eq_set, P]\n    simpa [h_eq] using h\n  rcases h_exists with \u27e       "level": 7,
      "lean": "@[blueprint (statement := /-- If S has prefixes bounded by 1, then for any a \u2264 b, the sum over Icc a b has absolute value \u2264 2. -/)\n  (proof := /-- Use the relation between prefix sums and interval sums. -/)]\nlemma balanced_cond_of_prefixes_abs_le_one {n : \u2115} (S : Fin n \u2192 \u2124\u02e3) (h : prefixes_abs_le_one S) : balanced_cond S := by\n  intro a b hle\n  let P (x : Fin n) : \u2124 := \u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 x)), (S i : \u2124)\n  have hP_bound : \u2200 x : Fin n, |P x| \u2264 1 := h\n  by_cases ha0 : a.val = 0\n  \u00b7 -- a is the minimum element\n    have ha_min : \u2200 x : Fin n, a \u2264 x := by\n      intro x\n      rw [Fin.le_iff_val_le_val]\n      have ha_val : (a : \u2115) = 0 := ha0\n      have hx_val : 0 \u2264 (x : \u2115) := Nat.zero_le _\n      omega\n    have hIcc_eq : Finset.Icc a b = ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)) := by\n      ext i\n      constructor\n      \u00b7 intro hi\n        rcases Finset.mem_Icc.1 hi with \u27e8h1, h2\u27e9\n        exact Finset.mem_filter.mpr \u27e8Finset.mem_univ _, h2\u27e9\n      \u00b7 intro hi\n        rcases Finset.mem_filter.1 hi with \u27e8hi_univ, hi_le\u27e9\n        exact Finset.mem_Icc.mpr \u27e8ha_min i, hi_le\u27e9\n    have hsum_eq : \u2211 i \u2208 Finset.Icc a b, (S i : \u2124) = P b := by\n      calc\n        \u2211 i \u2208 Finset.Icc a b, (S i : \u2124) = \u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124) := by\n          rw [hIcc_eq]\n        _ = P b := rfl\n    rw [hsum_eq]\n    have htemp : |P b| \u2264 2 := le_trans (hP_bound b) (by norm_num)\n    exact htemp\n  \u00b7 -- a.val > 0\n    have ha_val_pos : a.val > 0 := Nat.pos_of_ne_zero ha0\n    let a' : Fin n := \u27e8a.val - 1, by\n      have hlt : a.val < n := a.is_lt\n      omega\u27e9\n    have ha'_lt_a : a' < a := by\n      rw [Fin.lt_iff_val_lt_val]\n      have ha_val_ne_zero : a.val \u2260 0 := ha0\n      have h_pred_lt : (a.val).pred < a.val := Nat.pred_lt ha_val_ne_zero\n      have ha'_val_eq : (a' : \u2115) = (a.val).pred := by\n        calc\n          (a' : \u2115) = a.val - 1 := rfl\n          _ = (a.val).pred := by rw [\u2190 Nat.pred_eq_sub_one]\n      rw [ha'_val_eq]\n      simpa\n    have hIcc_eq_sdiff : Finset.Icc a b = ((Finset.univ.filter (\u03bb i => i \u2264 b)) \\ (Finset.univ.filter (\u03bb i => i \u2264 a'))) := by\n      ext i\n      constructor\n      \u00b7 intro hi\n        rcases Finset.mem_Icc.1 hi with \u27e8h_i_a, h_i_b\u27e9\n        apply Finset.mem_sdiff.mpr\n        constructor\n        \u00b7 exact Finset.mem_filter.mpr \u27e8Finset.mem_univ _, h_i_b\u27e9\n        \u00b7 intro hiR\n          rcases Finset.mem_filter.1 hiR with \u27e8_, hiR'\u27e9\n          -- hiR' : i \u2264 a'\n          have h_i_lt_a : i < a := lt_of_le_of_lt hiR' ha'_lt_a\n          -- h_i_a says a \u2264 i, contradiction\n          have : \u00ac a \u2264 i := not_le.mpr h_i_lt_a\n          exact this h_i_a\n      \u00b7 intro hi\n        rcases Finset.mem_sdiff.1 hi with \u27e8hiL, hiR\u27e9\n        rcases Finset.mem_filter.1 hiL with \u27e8_, hiL'\u27e9\n        -- hiL' : i \u2264 b\n        by_cases h_i_lt_a : i < a\n        \u00b7 -- then i \u2264 a', which contradicts hiR\n          have hi_le_a' : i \u2264 a' := by\n            rw [Fin.le_iff_val_le_val]\n            rw [Fin.lt_iff_val_lt_val] at h_i_lt_a\n            have ha'_val : (a' : \u2115) = a.val - 1 := rfl\n            omega\n          exfalso\n          apply hiR\n          exact Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hi_le_a'\u27e9\n        \u00b7 -- then a \u2264 i\n          have h_i_a : a \u2264 i := le_of_not_gt h_i_lt_a\n          exact Finset.mem_Icc.mpr \u27e8h_i_a, hiL'\u27e9\n    have hsub : ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 a')) \u2286 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)) := by\n      intro i hi\n      rcases Finset.mem_filter.1 hi with \u27e8hi_univ, hi_le_a'\u27e9\n      apply Finset.mem_filter.mpr\n      refine \u27e8Finset.mem_univ _, ?_\u27e9\n      have hi_le_a : i \u2264 a := le_trans hi_le_a' (le_of_lt ha'_lt_a)\n      have hi_le_b : i \u2264 b := le_trans hi_le_a hle\n      exact hi_le_b\n    have htemp_sum_sdiff := Finset.sum_sdiff (s\u2081 := (Finset.univ.filter (\u03bb i => i \u2264 a'))) (s\u2082 := (Finset.univ.filter (\u03bb i => i \u2264 b))) (f := \u03bb i => (S i : \u2124)) hsub\n    -- htemp_sum_sdiff: (\u2211 i \u2208 L \\ R, ...) + (\u2211 i \u2208 R, ...) = (\u2211 i \u2208 L, ...)\n    have hsum_sdiff_eq : \u2211 i \u2208 ((Finset.univ.filter (\u03bb i => i \u2264 b)) \\ (Finset.univ.filter (\u03bb i => i \u2264 a'))), (S i : \u2124) = P b - P a' := by\n      -- from htemp_sum_sdiff, we can solve for the left sum\n      linarith\n    have hsum_eq : \u2211 i \u2208 Finset.Icc a b, (S i : \u2124) = P b - P a' := by\n      rw [hIcc_eq_sdiff, hsum_sdiff_eq]\n    rw [hsum_eq]\n    have hPb := hP_bound b\n    have hPa' := hP_bound a'\n    have h_ineq : |P b - P a'| \u2264 |P b| + |P a'| := abs_sub (P b) (P a')\n    linarith"

      "lean": "@[blueprint (statement := /-- Bijection between V and X via negation. -/)\n  (proof := /-- Negating a string swaps V and X. -/)]\nlemma card_V_eq_card_X (n : \u2115) : by\n  classical\n  exact ((Finset.univ : Finset (Fin n \u2192 \u2124\u02e3)).filter (\u03bb S => balanced_cond S \u2227 prefixes_nonpos S \u2227 \u00ac prefixes_abs_le_one S)).card =\n    ((Finset.univ : Finset (Fin n \u2192 \u2124\u02e3)).filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S \u2227 \u00ac prefixes_abs_le_one S)).card := by\n  classical\n  let s : Finset (Fin n \u2192 \u2124\u02e3) := (Finset.univ : Finset (Fin n \u2192 \u2124\u02e3)).filter (\u03bb S => balanced_cond S \u2227 prefixes_nonpos S \u2227 \u00ac prefixes_abs_le_one S)\n  let t : Finset (Fin n \u2192 \u2124\u02e3) := (Finset.univ : Finset (Fin n \u2192 \u2124\u02e3)).filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S \u2227 \u00ac prefixes_abs_le_one S)\n  have h_negate_negate (S : Fin n \u2192 \u2124\u02e3) : negate (negate S) = S := by\n    ext i; simp [negate]\n  have h_s_to_t (x : s) : (negate x.val) \u2208 t := by\n    rcases Finset.mem_filter.mp x.property with \u27e8hx_univ, \u27e8hx_bal, hx_npos, hx_notbdd\u27e9\u27e9\n    refine Finset.mem_filter.mpr \u27e8Finset.mem_univ _, ?_\u27e9\n    have h_bal : balanced_cond (negate x.val) := by\n      rw [balanced_cond_negate]\n      exact hx_bal\n    have h_nonneg : prefixes_nonneg (negate x.val) := by\n      rw [prefixes_nonneg_negate_iff_prefixes_nonpos]\n      exact hx_npos\n    have h_notbdd' : \u00ac prefixes_abs_le_one (negate x.val) := by\n      rw [prefixes_abs_le_one_negate]\n      exact hx_notbdd\n    exact And.intro h_bal (And.intro h_nonneg h_notbdd')\n  have h_t_to_s (y : t) : (negate y.val) \u2208 s := by\n    rcases Finset.mem_filter.mp y.property with \u27e8hy_univ, \u27e8hy_bal, hy_nonneg, hy_notbdd\u27e9\u27e9\n    refine Finset.mem_filter.mpr \u27e8Finset.mem_univ _, ?_\u27e9\n    have h_bal' : balanced_cond (negate y.val       "lean": "@[blueprint\n  (statement := /-- The cardinality of the set of balanced strings (using the given balanced predicate) equals a n. -/)\n  (proof := /-- By `hbalanced` and `h\u0394`, `balanced S` is equivalent to `balanced_cond S`. Therefore the set {S | balanced S} equals {S | balanced_cond S}. Hence their cardinalities are equal. -/)]\nlemma card_main_eq_a (n : \u2115) (\u0394 : (Fin n \u2192 \u2124\u02e3) \u2192 Fin n \u2192 Fin n \u2192 \u2124) (balanced : (Fin n \u2192 \u2124\u02e3) \u2192 Prop)\n  (h\u0394 : \u2200 S, \u2200 a b, a \u2264 b \u2192 \u0394 S a b = \u2211 i \u2208 Finset.Icc a b, (S i : \u2124))\n  (hbalanced : \u2200 S, balanced S \u2194 \u2200 a b, a \u2264 b \u2192 |\u0394 S a b| \u2264 2) :\n  {S : Fin n \u2192 \u2124\u02e3 | balanced S}.ncard = a n := by\n  have h_iff : \u2200 S, balanced S \u2194 balanced_cond S := by\n    intro S\n    constructor\n    \u00b7 intro h\n      intro a b hle\n      have h' := (hbalanced S).mp h a b hle\n      rw [h\u0394 S a b hle] at h'\n      exact h'\n    \u00b7 intro h\n      apply (hbalanced S).mpr\n      intro a b hle\n      rw [h\u0394 S a b hle]\n      exact h a b hle\n  have hset : {S | balanced S} = {S | balanced_cond S} := by\n    ext S\n    constructor\n    \u00b7 exact (h_iff S).mp\n    \u00b7 exact (h_iff S).mpr\n  rw [hset]\n  unfold a\n  have hfinite : ({S : Fin n \u2192 \u2124\u02e3 | balanced_cond S} : Set (Fin n \u2192 \u2124\u02e3)).Finite := Set.toFinite _\n  haveI : Fintype ({S : Fin n \u2192 \u2124\u02e3 | balanced_cond S} : Set (Fin n \u2192 \u2124\u02e3)) := hfinite.fintype\n  rw [Set.ncard_eq_toFinset_card (s := {S | balanced_cond S}) (hs := hfinite)]\n  rw [Set.Finite.toFinset_eq_toFinset hfinite]\n  classical\n    rw [Set.toFinset_setOf]"

      "id": "partition_formula",

      "statement": "a n + 2 = 2*A n + C n.",
      "is_main": false,
      "col": 0,
      "level": 4,
      "lean": "@[blueprint\n  (statement := /-- a n + 2 = 2*A n + C n. -/)\n  (proof := /-- By combinatorial decomposition using Z_card_one. -/)]\nlemma partition_formula (n : \u2115) : a n + 2 = 2 * A n + C n := by\n  classical\n  -- define sets\n  let U : Finset (Fin n \u2192 \u2124\u02e3) := Finset.univ\n  let B : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (balanced_cond (n := n))\n  let A_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S)\n  let C_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_abs_le_one S)\n  let Z_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S \u2227 prefixes_abs_le_one S)\n  let X_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S \u2227 \u00ac prefixes_abs_le_one S)\n  let V_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonpos S \u2227 \u00ac prefixes_abs_le_one S)\n  let W_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonpos S \u2227 prefixes_abs_le_one S)\n  -- cardinality equalities from lemmas\n  have hZ_card : Z_set.card = 1 := by\n    simpa [Z_set] using Z_card_one n\n  have hV_eq_X : V_set.card = X_set.card := by\n    simpa [V_set, X_set] using card_V_eq_card_X n\n  have hW_eq_Z : W_set.card = Z_set.card := by\n    simpa [W_set, Z_set] using card_W_eq_card_Z n\n  -- relation between a, A, C and these sets\n  have ha : a n = B.card := by\n    unfold a\n    simp [B, U]\n  have hA : A n = A_set.card := by\n    unfold A\n    simp [A_set, U]\n  have hC : C n = C_set.card := by\n    unfold C\n    simp [C_set, U]\n  -- A_set is the disjoint union of Z_set and X_set\n  have h_disjoint_ZX : Z_set \u2229 X_set = \u2205 := by\n    apply Finset.eq_empty_iff_forall_not_mem.mpr\n    intro S hS\n    rcases Finset.mem_inter.mp hS with \u27e8hZ, hX\u27e9\n    have hZ_mem := Finset.mem_filter.mp hZ\n    have hX_mem := Finset.mem_filter.mp hX\n    have hbound : prefixes_abs_le_one S := hZ_mem.2.2.2\n    have h_not_bound : \u00ac prefixes_abs_le_one S := hX_mem.2.2.2\n    exact h_not_bound hbound\n  have hA_partition : A_set.card = Z_set.card + X_set.card := by\n    have h_union : A_set = Z_set \u222a X_set := by\n      ext S; constructor\n      \u00b7 intro hS\n        have hS_mem := Finset.mem_filter.mp hS\n        have hbal : balanced_cond S := hS_mem.2.1\n        have hnonneg : prefixes_nonneg S := hS_mem.2.2\n        by_cases hbounded : prefixes_abs_le_one S\n        \u00b7 apply Finset.mem_union_left\n          simpa [Z_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg, hbounded\u27e9\n        \u00b7 apply Finset.mem_union_right\n          simpa [X_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg, hbounded\u27e9\n      \u00b7 intro hS\n        rcases Finset.mem_union.mp hS with (hZ | hX)\n        \u00b7 have hZ_mem := Finset.mem_filter.mp hZ\n          have hbal : balanced_cond S := hZ_mem.2.1\n          have hnonneg : prefixes_nonneg S := hZ_mem.2.2.1\n          simpa [A_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg\u27e9\n        \u00b7 have hX_mem := Finset.mem_filter.mp hX\n          have hbal : balanced_cond S := hX_mem.2.1\n          have hnonneg : prefixes_nonneg S := hX_mem.2.2.1\n          simpa [A_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg\u27e9\n    rw [h_union]\n    have h_disjoint : Disjoint Z_set X_set :=\n      Finset.disjoint_iff_inter_eq_empty.mpr h_disjoint_ZX\n    rw [Finset.card_union_eq_card_add_card.mpr h_disjoint]\n  -- C_set is subset of B\n  have hC_sub_B : C_set \u2286 B := by\n    intro S hS\n    have hS_mem := Finset.mem_filter.mp hS\n    have hbal : balanced_cond S := hS_mem.2.1\n    simpa [B, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal\u27e9\n  -- B \\ C_set = X_set \u222a V_set\n  have h_disjoint_XV : X_set \u2229 V_set = \u2205 := by\n    apply Finset.eq_empty_iff_forall_not_mem.mpr\n    intro S hS\n    rcases Finset.mem_inter.mp hS with \u27e8hX, hV\u27e9\n    have hX_mem := Finset.mem_filter.mp hX\n    have hV_mem := Finset.mem_filter.mp hV\n    have h_nonneg : prefixes_nonneg S := hX_mem.2.2.1\n    have h_nonpos : prefixes_nonpos S := hV_mem.2.2.1\n    have h_bounded : prefixes_abs_le_one S := by\n      intro b\n      have h_nonneg_b : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) \u2265 0 := h_nonneg b\n      have h_nonpos_b : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) \u2264 0 := h_nonpos b\n      have h_eq : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) = 0 := by\n        linarith\n      rw [h_eq]\n      simp\n    have h_not_bounded : \u00ac prefixes_abs_le_one S := hX_mem.2.2.2\n    exact h_not_bounded h_bounded\n  have h_sdiff_eq_union : B \\ C_set = X_set \u222a V_set := by\n    apply Finset.Subset.antisymm\n    \u00b7 intro S hS\n      rcases Finset.mem_sdiff.mp hS with \u27e8hSB, hSC\u27e9\n      have hSB_mem := Finset.mem_filter.mp hSB\n      have hbal : balanced_cond S := hSB_mem.2\n      have h_not_bound : \u00ac prefixes_abs_le_one S := by\n        intro hbound\n        apply hSC\n        simpa [C_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hbound\u27e9\n      rcases balanced_cond_of_not_prefixes_abs_le_one_implies_nonneg_or_nonpos S hbal h_not_bound with (hnonneg | hnonpos)\n      \u00b7 apply Finset.mem_union_left\n        simpa [X_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg, h_not_bound\u27e9\n      \u00b7 apply Finset.mem_union_right\n        simpa [V_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonpos, h_not_bound\u27e9\n    \u00b7 intro S hS\n      rcases Finset.mem_union.mp hS with (hX | hV)\n      \u00b7 have hX_mem := Finset.mem_filter.mp hX\n        have hbal : balanced_cond S := hX_mem.2.1\n        have hnonneg : prefixes_nonneg S := hX_mem.2.2.1\n        have h_not_bound : \u00ac prefixes_abs_le_one S := hX_mem.2.2.2\n        have hSB : S \u2208 B := by\n          simpa [B, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal\u27e9\n        have hSC : S \u2209 C_set := by\n          intro hC\n          apply h_not_bound\n          have hC_mem := Finset.mem_filter.mp hC\n          exact hC_mem.2.2\n        exact Finset.mem_sdiff.mpr \u27e8hSB, hSC\u27e9\n      \u00b7 have hV_mem := Finset.mem_filter.mp hV\n        have hbal : balanced_cond S := hV_mem.2.1\n        have hnonpos : prefixes_nonpos S := hV_mem.2.2.1\n        have h_not_bound : \u00ac prefixes_abs_le_one S := hV_mem.2.2.2\n        have hSB : S \u2208 B := by\n          simpa [B, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal\u27e9\n        have hSC : S \u2209 C_set := by\n          intro hC\n          apply h_not_bound\n          have hC_mem := Finset.mem_filter.mp hC\n          exact hC_mem.2.2\n        exact Finset.mem_sdiff.mpr \u27e8hSB, hSC\u27e9\n  have h_card_sdiff : (B \\ C_set).card = X_set.card + V_set.card := by\n    rw [h_sdiff_eq_union]\n    have h_disjoint : Disjoint X_set V_set :=\n      Finset.disjoint_iff_inter_eq_empty.mpr h_disjoint_XV\n    rw [Finset.card_union_eq_card_add_card.mpr h_disjoint]\n  have h_card_B : B.card = C_set.card + (X_set.card + V_set.card) := by\n    have h_temp := (Finset.card_sdiff_add_card_eq_card hC_sub_B).symm\n    rw [h_temp, h_card_sdiff]\n    ring\n  have h_card_B_simp : B.card = C_set.card + 2 * X_set.card := by\n    rw [h_card_B, hV_eq_X]\n    ring\n  calc\n    a n + 2 = B.card + 2 := by rw [ha]\n    _ = (C_set.card + 2 * X_set.card) + 2 := by rw [h_card_B_simp]\n    _ = C_set.card + 2 * X_set.card + 2 := by ring\n    _ = C_set.card + 2 * (Z_set.card + X_set.card) := by\n      rw [hZ_card]\n      ring\n    _ = C_set.card + 2 * A_set.card := by rw [hA_partition]\n    _ = 2 * A_set.card + C_set.card := by ring\n    _ = 2 * A n + C n := by rw [hA, hC]"

                        }
                        // Use muted highlight for external edges
                        const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                        if (isExternalEdge) {
                            d3.select(this).classed("highlighted-external", true);
                        } else {
                            d3.select(this).classed("highlighted", true);
                        }
                    }
                });
            }

            // Highlight all target nodes (with filled style)
            node.classed("url-highlighted", n => targetNodeIds.has(n.id));
        }

        function applyUrlHighlight() {
            if (urlHighlightNodeIds.length > 0) {
                highlightNodes(urlHighlightNodeIds, {
                    localOnly: urlHighlightLocalOnly,
                    edges: urlHighlightEdges
                });
            }
        }

        function clearHighlight() {
            link.classed("highlighted", false);
            link.classed("highlighted-external", false);
            node.classed("highlighted", false);
            node.classed("url-highlighted", false);
        }

        function restoreFromHash() {
            const hash = window.location.hash.slice(1);
            if (!hash) return;

            const params = new URLSearchParams(hash);

            // Restore spacing
            if (params.has('spacing')) {
                const spacing = +params.get('spacing');
                d3.select("#spacingSlider").property('value', spacing);
                localSpacing = spacing;
                externalRadius = spacing + 300;

                linkForce.distance(d => {
                    const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                    return isLocalEdge ? localSpacing : externalSpacing;
                });

                chargeForce.strength(d => {
                    return d.group === "external" ? -50 : -spacing * 2;
                });

                simulation.force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));

                applyHierarchy();
                simulation.alpha(0.3).restart();
            }

            // Restore external nodes visibility
            if (params.has('external')) {
                const showExternal = params.get('external') === '1';
                d3.select("#showExternal").property('checked', showExternal);

                node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
                link.style("display", l => {
                    if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                        return "none";
                    }
                    return "block";
                });
            }

            // Restore theme
            if (params.has('theme')) {
                const theme = params.get('theme');
                d3.select("#themeSelect").property('value', theme);
                document.body.classList.toggle('dark-mode', theme === 'dark');
                // Need to update colors after mode change
                setTimeout(updateColors, 50);
            }

            // Restore highlight (comma-separated list)
            if (params.has('highlight')) {
                urlHighlightNodeIds = params.get('highlight').split(',').map(s => s.trim()).filter(Boolean);
                urlHighlightLocalOnly = params.get('local') === 'true';
                urlHighlightEdges = params.get('edges') !== 'false';
                applyUrlHighlight();
            }

            // Restore embed mode
            if (params.get('embed') === 'true') {
                isEmbedMode = true;
                // Hide controls, nav overlay, and navigation panel
                d3.select(".controls").style("display", "none");
                d3.select(".nav-overlay").style("display", "none");
                d3.select(".navigation-panel").style("display", "none");
            }

            // Restore zoom
            if (params.has('zoom')) {
                const zoomScale = parseFloat(params.get('zoom'));
                if (!isNaN(zoomScale) && zoomScale >= 0.1 && zoomScale <= 10) {
                    applyZoom(zoomScale);
                }
            }

            // Restore anchor (pins node at top)
            if (params.has('anchor')) {
                anchorNodeId = params.get('anchor');
                applyAnchorTop(anchorNodeId);
            }
        }

        // Restore state from URL on load
        restoreFromHash();

        // Listen for manual URL hash changes
        window.addEventListener('hashchange', function() {
            // Reset state before restoring
            clearHighlight();
            urlHighlightNodeIds = [];
            urlHighlightLocalOnly = false;
            urlHighlightEdges = true;
            // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
