      "lean": "@[blueprint (statement := /-- Recurrence C (n+2) = 2*C n. -/)\n  (proof := /-- By the bijection established by drop2 and prepend. -/)]\nlemma C_recurrence (n : \u2115) : C (n+2) = 2 * C n := by\n  classical\n    let A : Finset (Fin (n+2) \u2192 \u2124\u02e3) :=\n      (Finset.univ : Finset (Fin (n+2) \u2192 \u2124\u02e3)).filter (\u03bb S => balanced_cond S \u2227 prefixes_abs_le_one S)\n    let B : Finset (Fin n \u2192 \u2124\u02e3) :=\n      (Finset.univ : Finset (Fin n \u2192 \u2124\u02e3)).filter (\u03bb T => balanced_cond T \u2227 prefixes_abs_le_one T)\n    have hA : C (n+2) = A.card := by\n      unfold C A\n      simp\n    have hB : C n = B.card := by\n      unfold C B\n      simp\n    have huniv_eq : (Finset.univ : Finset \u2124\u02e3) = ({1, -1} : Finset \u2124\u02e3) := by\n      decide\n    have mem_A_of_mem_product (p : \u2124\u02e3 \u00d7 (Fin n \u2192 \u2124\u02e3)) (hp : p \u2208 Finset.product ({1, -1} : Finset \u2124\u02e3) B) : prepend p.1 (-p.1) p.2 \u2208 A := by\n      rcases Finset.mem_product.mp hp with \u27e8hx, hT\u27e9\n      let x := p.1\n      let T := p.2\n      have hTmem : T \u2208 B := hT\n      rcases Finset.mem_filter.mp hTmem with \u27e8hT_univ, hTcond\u27e9\n      rcases hTcond with \u27e8hTbal, hTpref\u27e9\n      have hx_cases : x = 1 \u2228 x = -1 := by\n        simpa [Finset.mem_insert, Finset.mem_singleton] using hx\n      have h_opp : (-x) = 1 \u2228 (-x) = -1 := by\n        rcases hx_cases with hx1 | hx_neg\n        \u00b7 right; simp [hx1]\n        \u00b7 left; simp [hx_neg]\n      have hSbal : balanced_cond (prepend x (-x) T) := balanced_cond_prepend x (-x) T hTbal hTpref\n      have hSpref : prefixes_abs_le_one (prepend x (-x) T) := prefixes_abs_le_one_prepend x (-x) T hTpref (by\n        rcases hx_cases with hx1 | hx_neg\n        \u00b7 left; exact hx1\n        \u00b7 right; exact hx_neg)\n        (by\n          rcases h_opp with h | h\n          \u00b7 left; exact h\n          \u00b7 right; exact h)\n        (by rfl)\n      apply Finset.mem_filter.mpr\n      refine \u27e8Finset.mem_univ _, \u27e8hSbal, hSpref\u27e9\u27e9\n    let P : Finset (\u2124\u02e3 \u00d7 (Fin n \u2192 \u2124\u02e3)) := Finset.product ({1, -1} : Finset \u2124\u02e3) B\n    have hcard_pair : A.card = P.card := by\n      apply Finset.card_eq_of_equiv\n      refine {\n        toFun := \u03bb s => \u27e8(s.1 0, drop_first_two s.1), ?_\u27e9\n        invFun := \u03bb p => \u27e8prepend (p.1.1) (-(p.1.1)) (p.1.2), ?_\u27e9\n        left_inv := ?_\n        right_inv := ?_\n      }\n      \u00b7 -- `(s.1 0, drop_first_two s.1) \u2208 P`\n        rcases Finset.mem_filter.mp s.2 with \u27e8hs_univ, hscond\u27e9\n        rcases hscond with \u27e8hbal, hpref\u27e9\n        have hx : s.1 0 \u2208 ({1, -1} : Finset \u2124\u02e3) := by\n          rw [\u2190 huniv_eq]; exact Finset.mem_univ _\n        have hT : drop_first_two s.1 \u2208 B := by\n          apply Finset.mem_filter.mpr\n          refine \u27e8Finset.mem_univ _, ?_\u27e9\n          exact \u27e8balanced_cond_drop_first_two s.1 hbal, prefixes_abs_le_one_drop_first_two s.1 hpref\u27e9\n        exact Finset.mem_product.mpr \u27e8hx, hT\u27e9\n      \u00b7 -- `prepend (p.1.1) (-(p.1.1)) (p.1.2) \u2208 A`\n        exact mem_A_of_mem_product p.1 p.2\n      \u00b7 -- left_inv: for s : A, `g (f s) = s`\n        intro s\n        ext1\n        -- goal: `prepend ((s.1 0, drop_first_two s.1).1) (-((s.1 0, drop_first_two s.1).1)) ((s.1 0, drop_first_two s.1).2) = s.1`\n        simp\n        -- Now we need to show `prepend (s.1 0) (-(s.1 0)) (drop_first_two s.1) = s.1`\n        have h_first_two : s.1 1 = -(s.1 0) := by\n          rcases Finset.mem_filter.mp s.2 with \u27e8_, \u27e8_, hpref\u27e9\u27e9\n          exact first_two_opp s.1 hpref\n        calc\n          prepend (s.1 0) (-(s.1 0)) (drop_first_two s.1) = prepend (s.1 0) (s.1 1) (drop_first_two s.1) := by\n            rw [h_first_two]\n          _ = s.1 := prepend_id s.1\n      \u00b7 -- right_inv: f       "lean": "@[blueprint (statement := /-- The alternating string has prefixes bounded by 1. -/)\n  (proof := /-- By direct computation of prefix sums. -/)]\nlemma alt_string_prefixes_abs_le_one (n : \u2115) : prefixes_abs_le_one (alt_string n) := by\n  intro b\n  have alt_string_eq_neg_one_pow (i : Fin n) : (alt_string n i : \u2124) = (-1 : \u2124) ^ (i.val : \u2115) := by\n    dsimp [alt_string]\n    split_ifs with h\n    \u00b7 -- h: i.val % 2 = 0\n      have h_even : Even i.val := by\n        rw [Nat.even_iff]\n        exact h\n      rw [h_even.neg_one_pow]\n      simp\n    \u00b7 -- h: \u00ac i.val % 2 = 0\n      have h_odd : Odd i.val := by\n        rw [Nat.odd_iff]\n        exact (Nat.mod_two_eq_zero_or_one i.val).resolve_left h\n      rw [h_odd.neg_one_pow]\n      simp\n  let g : Fin (b.val+1) \u2192 Fin n := \u03bb i => \u27e8i.val, by\n    have hi : i.val < b.val+1 := i.is_lt\n    have hb : b.val < n := b.is_lt\n    have : i.val < n := lt_of_lt_of_le hi (by omega)\n    exact this\u27e9\n  have hg_inj : Function.Injective g := by\n    intro x y h\n    apply Fin.ext\n    have hval : (g x).val = (g y).val := congr_arg Fin.val h\n    simp [g] at hval\n    exact hval\n  have hg_image : Finset.image g (Finset.univ : Finset (Fin (b.val+1))) = (Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b) := by\n    ext x\n    constructor\n    \u00b7 intro hx\n      rcases Finset.mem_image.1 hx with \u27e8i, hi, rfl\u27e9\n      have hi' : i.val < b.val+1 := i.is_lt\n      have hxval : (g i).val = i.val := rfl\n      have hxle : (g i) \u2264 b :=\n        (Fin.le_def (a := g i) (b := b)).mpr (by\n          rw [hxval]\n          omega)\n      refine Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hxle\u27e9\n    \u00b7 intro hx\n      rcases Finset.mem_filter.1 hx with \u27e8hx_univ, hxle\u27e9\n      have hx_val_le : x.val \u2264 b.val := hxle\n      have hx_val_lt_succ : x.val < b.val+1 := Nat.lt_succ_of_le hx_val_le\n      let i : Fin (b.val+1) := \u27e8x.val,       "lean": "@[blueprint (statement := /-- The alternating string has nonnegative prefixes. -/)\n  (proof := /-- By direct computation of prefix sums. -/)]\nlemma alt_string_prefixes_nonneg (n : \u2115) : prefixes_nonneg (alt_string n) := by\n  let alt_seq (k : \u2115) : \u2124\u02e3 := if k % 2 = 0 then 1 else -1\n  have alt_seq_partial_sum (k : \u2115) : Finset.sum (Finset.range (k+1)) (\u03bb j => (alt_seq j : \u2124)) = if k % 2 = 0 then (1 : \u2124) else (0 : \u2124) := by\n    induction' k with m IH\n    \u00b7 simp [alt_seq]\n    \u00b7 rw [Finset.sum_range_succ, IH]\n      have hpar : (m+1) % 2 = (if m % 2 = 0 then 1 else 0) := by\n        by_cases hm : m % 2 = 0\n        \u00b7 rw [if_pos hm]\n          exact (Nat.succ_mod_two_eq_one_iff.mpr hm)\n        \u00b7 have hm1 : m % 2 = 1 := by\n            have hmod := Nat.mod_two_eq_zero_or_one m\n            rcases hmod with h0 | h1\n            \u00b7 exact (hm h0).elim\n            \u00b7 exact h1\n          rw [if_neg hm]\n          exact (Nat.succ_mod_two_eq_zero_iff.mpr hm1)\n      have alt_val : (alt_seq (m+1) : \u2124) = (if (m+1) % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n        simp [alt_seq]\n        split <;> simp\n      rw [alt_val]\n      rw [hpar]\n      by_cases hm : m % 2 = 0\n      \u00b7 rw [if_pos hm]\n        have hm1 : (m+1) % 2 = 1 := by\n          simpa [hpar, hm] using rfl\n        simp [hm, hpar]\n      \u00b7 rw [if_neg hm]\n        have hm1 : m % 2 = 1 := by\n          have hmod := Nat.mod_two_eq_zero_or_one m\n          rcases hmod with h0 | h1\n          \u00b7 exact (hm h0).elim\n          \u00b7 exact h1\n        have hm1' : (m+1) % 2 = 0 := by\n          simpa [hpar, hm1] using rfl\n        simp [hm, hm1, hm1']\n  have sum_filter_Icc_eq_range_sum (b : Fin n) : Finset.sum (((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b))) (\u03bb i => (alt_string n i : \u2124)) = Finset.sum (Finset.range (b.val+1)) (\u03bb j => (alt_seq j : \u2124)) := by\n    let s :=       "lean": "@[blueprint (statement := /-- If a string is nonnegative and bounded, it must be the alternating string. -/)\n  (proof := /-- By induction on the length, using the walk interpretation. -/)]\nlemma alt_string_unique (n : \u2115) (S : Fin n \u2192 \u2124\u02e3) (hnonneg : prefixes_nonneg S) (hbound : prefixes_abs_le_one S) : S = alt_string n := by\n  ext i\n  by_cases hn0 : n = 0\n  \u00b7 subst hn0; exact Fin.elim0 i\n  \u00b7 have hnpos : 0 < n := Nat.pos_of_ne_zero hn0\n    -- define f as \u2115 \u2192 \u2124\n    let f : \u2115 \u2192 \u2124 := \u03bb k => if h : k < n then (S (\u27e8k, h\u27e9 : Fin n) : \u2124) else 0\n    have hf_val (i : Fin n) : f i.val = (S i : \u2124) := by\n      simp [f, i.is_lt]\n    have hf_nonneg (k : \u2115) (hk : k < n) : f k = 1 \u2228 f k = -1 := by\n      have huniv : (Finset.univ : Finset \u2124\u02e3) = {1, -1} := by decide\n      have hm : S (\u27e8k, hk\u27e9 : Fin n) \u2208 (Finset.univ : Finset \u2124\u02e3) := Finset.mem_univ _\n      rw [huniv] at hm\n      simp at hm\n      rcases hm with (h | h)\n      \u00b7 left; simp [f, hk, h]\n      \u00b7 right; simp [f, hk, h]\n    -- lemma sum_alt_range\n    have sum_alt_range (k : \u2115) : Finset.sum (Finset.range k) (\u03bb j => (if j % 2 = 0 then (1 : \u2124) else (-1 : \u2124))) = (if k % 2 = 0 then (0 : \u2124) else 1) := by\n      induction' k with k ih\n      \u00b7 simp\n      \u00b7 rw [Finset.sum_range_succ, ih]\n        by_cases hk : k % 2 = 0\n        \u00b7 -- k even\n          have hk' : (k+1) % 2 = 1 := by\n            omega\n          simp [hk, hk']\n        \u00b7 -- k odd\n          have hk' : (k+1) % 2 = 0 := by\n            omega\n          simp [hk, hk']\n    -- We'll need to use `hf_nonneg` and `sum_alt_range` later.\n    -- Now we need to relate `prefix_sum` to `Finset.range` sum.\n    -- Let's define a lemma `prefix_sum_eq_range` using `Finset.image`.\n    have prefix_sum_eq_range (k : \u2115) (hk : k < n) : (\u2211 x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))), (S x : \u2124)) = Finset.sum (Finset.range (k+1)) f := by\n      -- prove via Finset.image\n      have h_image : Finset.image (\u03bb (x : Fin n) => x.val) ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))) = Finset.range (k+1) := by\n        ext j\n        constructor\n        \u00b7 intro hj\n          rcases Finset.mem_image.mp hj with \u27e8x, hx, rfl\u27e9\n          have hxle : x \u2264 (\u27e8k, hk\u27e9 : Fin n) := (Finset.mem_filter.mp hx).2\n          have hxval : x.val \u2264 k := hxle\n          apply Finset.mem_range.mpr\n          omega\n        \u00b7 intro hj\n          have hj_range : j < k+1 := Finset.mem_range.mp hj\n          have hj_lt_n : j < n := by omega\n          let x : Fin n := \u27e8j, hj_lt_n\u27e9\n          have hxle : x \u2264 (\u27e8k, hk\u27e9 : Fin n) := by\n            -- x.val = j \u2264 k\n            exact (Fin.mk_le_mk.mpr (show j \u2264 k from by omega))\n          have hmem : x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))) := by\n            apply Finset.mem_filter.mpr; exact \u27e8Finset.mem_univ _, hxle\u27e9\n          apply Finset.mem_image.mpr\n          exact \u27e8x, hmem, rfl\u27e9\n      calc\n        (\u2211 x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))), (S x : \u2124)) = \n          (\u2211 x \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n))), f (x.val)) := by\n          refine Finset.sum_congr rfl (\u03bb x hx => ?_)\n          simp [f, x.is_lt]\n        _ = Finset.sum (Finset.image (\u03bb (x : Fin n) => x.val) ((Finset.univ : Finset (Fin n)).filter (\u03bb x => x \u2264 (\u27e8k, hk\u27e9 : Fin n)))) f := by\n          rw [Finset.sum_image]\n          intro x hx y hy h\n          exact Fin.val_inj.mp h\n        _ = Finset.sum (Finset.range (k+1)) f := by rw [h_image]\n    -- Now we can get `hnonneg` and `hbound` translated.\n    have hP_nonneg (k : \u2115) (hk : k < n) : Finset.sum (Finset.range (k+1)) f \u2265 0 := by\n      have h := hnonneg (\u27e8k, hk\u27e9 : Fin n)\n      have h_eq := prefix_sum_eq_range k hk\n      linarith\n    have hP_bound (k : \u2115) (hk : k < n) : |Finset.sum (Finset.range (k+1)) f| \u2264 1 := by\n      have h := hbound (\u27e8k, hk\u27e9 : Fin n)\n      have h_eq := prefix_sum_eq_range k hk\n      -- h: |...| \u2264 1, h_eq gives equality of sums\n      -- need to rewrite\n      -- `h` is `|...| \u2264 1` where ... is the original sum. `h_eq` says original sum = range sum.\n      -- So we can `simpa [h_eq]` using h\n      simpa [h_eq] using h\n    -- Now the main induction on k.\n    have h_main (k : \u2115) (hk : k < n) : f k = (if k % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n      revert hk\n      refine Nat.strong_induction_on k ?_\n      intro m ih hk\n      by_cases hm0 : m = 0\n      \u00b7 subst hm0\n        -- m=0 case\n        have h0_nonneg := hP_nonneg 0 (by omega)\n        have h0_bound := hP_bound 0 (by omega)\n        -- compute sum for range 1 (0+1)\n        have hsum0 : Finset.sum (Finset.range 1) f = f 0 := by simp\n        -- So we have f 0 \u2265 0 and |f 0| \u2264 1.\n        rw [hsum0] at h0_nonneg h0_bound\n        have hval : f 0 = 1 \u2228 f 0 = -1 := hf_nonneg 0 (by omega)\n        rcases hval with (h1 | hneg1)\n        \u00b7 exact h1\n        \u00b7 -- f 0 = -1, but we have f 0 \u2265 0, contradiction\n          linarith\n      \u00b7 -- m > 0\n        have hm_pos : 0 < m := Nat.pos_of_ne_zero hm0\n        let m' := m-1\n        have hm'_lt_m : m' < m := by omega\n        have hm'_lt_n : m' < n := by omega\n        -- induction hypothesis for m'\n        have h_ih_m' : f m' = (if m' % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := ih m' hm'_lt_m (by omega)\n        -- compute prefix sum up to m-1\n        have hP_prev : Finset.sum (Finset.range m) f = (if m % 2 = 0 then (0 : \u2124) else 1) := by\n          -- using sum_alt_range and induction hypothesis for all j < m\n          have h_all_lt : \u2200 (j : \u2115), j < m \u2192 f j = (if j % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n            intro j hj\n            exact ih j hj (by omega)\n          calc\n            Finset.sum (Finset.range m) f = Finset.sum (Finset.range m) (\u03bb j => (if j % 2 = 0 then (1 : \u2124) else (-1 : \u2124))) := by\n              refine Finset.sum_congr rfl (\u03bb j hj => ?_)\n              rw [h_all_lt j (Finset.mem_range.mp hj)]\n            _ = (if m % 2 = 0 then (0 : \u2124) else 1) := sum_alt_range m\n        -- compute prefix sum up to m\n        have hP_curr : Finset.sum (Finset.range (m+1)) f = (Finset.sum (Finset.range m) f) + f m := by\n          simp [Finset.sum_range_succ]\n        have hP_curr_nonneg : Finset.sum (Finset.range (m+1)) f \u2265 0 := hP_nonneg m hk\n        have hP_curr_bound : |Finset.sum (Finset.range (m+1)) f| \u2264 1 := hP_bound m hk\n        -- Now analyze parity\n        by_cases hm_even : m % 2 = 0\n        \u00b7 -- m even\n          have h_prev_val : Finset.sum (Finset.range m) f = 0 := by\n            rw [hP_prev, hm_even]; rfl\n          rw [h_prev_val] at hP_curr\n          -- hP_curr: sum ... = f m\n          have hsum_eq : Finset.sum (Finset.range (m+1)) f = f m := by\n            -- from hP_curr rewrite\n            simp [hP_curr, h_prev_val]\n          -- So f m = that sum.\n          have hsum_nonneg : f m \u2265 0 := by\n            -- from hP_curr_nonneg and hsum_eq\n            rw [hsum_eq] at hP_curr_nonneg; exact hP_curr_nonneg\n          have hsum_bound : |f m| \u2264 1 := by\n            rw [hsum_eq] at hP_curr_bound; exact hP_curr_bound\n          have hval : f m = 1 \u2228 f m = -1 := hf_nonneg m hk\n          rcases hval with (h1 | hneg1)\n          \u00b7 -- f m = 1, which matches (if m%2=0 then 1 else -1) = 1\n            simp [hm_even, h1]\n          \u00b7 -- f m = -1, but we have f m \u2265 0, contradiction\n            linarith\n        \u00b7 -- m odd\n          have hm_odd : m % 2 = 1 := by\n            have := Nat.mod_two_eq_zero_or_one m\n            rcases this with (h | h)\n            \u00b7 exact absurd h hm_even\n            \u00b7 exact h\n          have h_prev_val : Finset.sum (Finset.range m) f = 1 := by\n            rw [hP_prev, hm_odd]\n            rfl\n          rw [h_prev_val] at hP_curr\n          -- hP_curr: sum ... = 1 + f m\n          have hsum_eq : Finset.sum (Finset.range (m+1)) f = 1 + f m := by\n            -- from hP_curr\n            -- hP_curr is an equation: sum ... = (sum range m) + f m = 1 + f m\n            linarith\n          have hsum_nonneg : 1 + f m \u2265 0 := by\n            rw [\u2190 hsum_eq]; exact hP_curr_nonneg\n          have hsum_bound : |1 + f m| \u2264 1 := by\n            rw [\u2190 hsum_eq]; exact hP_curr_bound\n          have hval : f m = 1 \u2228 f m = -1 := hf_nonneg m hk\n          rcases hval with (h1 | hneg1)\n          \u00b7 -- f m = 1, then 1+1=2, which violates |2|\u22641\n            rw [h1] at hsum_bound\n            -- |2| \u2264 1 is false\n            have : |(2 : \u2124)| = 2 := by norm_num\n            -- Actually compute\n            norm_num at hsum_bound\n          \u00b7 -- f m = -1, then 1+(-1)=0, which is okay.\n            rw [hneg1] at *\n            -- we need to show f m = -1 = (if m%2=0 then 1 else -1) = -1\n            simp [hm_odd]\n    -- Finally, we need to show `S i = alt_string n i`.\n    -- Using `h_main` for `k = i.val`.\n    have h_i_val_lt_n : i.val < n := i.is_lt\n    have h_f_i : f i.val = (if i.val % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := h_main i.val h_i_val_lt_n\n    -- Also, `f i.val = (S i : \u2124)` by `hf_val`.\n    have h_f_i' : f i.val = (S i : \u2124) := hf_val i\n    have h_alt_i : (alt_string n i : \u2124) = (if i.val % 2 = 0 then (1 : \u2124) else (-1 : \u2124)) := by\n      simp [alt_string]\n       "level": 5,
      "lean": "@[blueprint (statement := /-- drop_first_two preserves balancedness. -/)\n  (proof := /-- Using shift of intervals. -/)]\nlemma balanced_cond_drop_first_two {n : \u2115} (S : Fin (n+2) \u2192 \u2124\u02e3) (hbal : balanced_cond S) : balanced_cond (drop_first_two S) := by\n  have finsetImage_succ_succ_Icc {n : \u2115} (a b : Fin n) : \n    (Finset.Icc a b).image (\u03bb (i : Fin n) => Fin.succ (Fin.succ i)) = \n    Finset.Icc (Fin.succ (Fin.succ a)) (Fin.succ (Fin.succ b)) := by\n    calc\n      (Finset.Icc a b).image (\u03bb i : Fin n => Fin.succ (Fin.succ i))\n          = (Finset.Icc a b).image (Fin.succ \u2218 Fin.succ) := by\n        ext i; simp\n      _ = ((Finset.Icc a b).image Fin.succ).image Fin.succ := by\n        rw [Finset.image_image]\n      _ = (Finset.Icc (Fin.succ a) (Fin.succ b)).image Fin.succ := by\n        rw [Fin.finsetImage_succ_Icc a b]\n      _ = Finset.Icc (Fin.succ (Fin.succ a)) (Fin.succ (Fin.succ b)) := by\n        rw [Fin.finsetImage_succ_Icc (Fin.succ a) (Fin.succ b)]\n  intro a b hle\n  have hle' : Fin.succ (Fin.succ a) \u2264 Fin.succ (Fin.succ b) := by\n    apply Fin.mk_le_mk.mpr\n    have ha : (a : \u2115) \u2264 (b : \u2115) := hle\n    omega\n  have hsum : (\u2211 i \u2208 Finset.Icc a b, ((drop_first_two S) i : \u2124)) = (\u2211 i \u2208 Finset.Icc (Fin.succ (Fin.succ a)) (Fin.succ (Fin.succ b)), (S i : \u2124)) := by\n    calc\n      (\u2211 i \u2208 Finset.Icc a b, ((drop_first_two S) i : \u2124))\n          = (\u2211 i \u2208 Finset.Icc a b, (S (Fin.succ (Fin.succ i)) : \u2124)) := by\n            simp [drop_first_two]\n      _ = (\u2211 j \u2208 (Finset.Icc a b).image (\u03bb i : Fin n => Fin.succ (Fin.succ i)), (S j : \u2124)) := by\n            rw [Finset.sum_image]\n            intro x hx y hy h\n            apply Fin.succ_injective\n            apply Fin.succ_injective\n            exact h\n      _ = (\u2211 j \u2208 Finset.Icc (Fin.succ (Fin.succ a)) (Fin.succ (Fin.succ b)), (S j : \u2124)) := by\n            rw [finsetImage_succ_succ_Icc a b]\n  have hbal' := hbal (Fin.succ (Fin.succ a)) (Fin.succ (Fin.succ b)) hle'\n  calc\n    |(\u2211 i \u2208 Finset.Icc a b, ((drop_first_two S) i : \u2124))| = |(\u2211 i \u2208 Finset.Icc (Fin.succ (Fin.succ a)) (Fin.succ (Fin.succ b)), (S i : \u2124))| := by\n      rw [hsum]\n    _ \u2264 2 := hbal'"

      "type": "lemma",
      "statement": "If a balanced string is not bounded, it must be nonnegative or nonpositive.",
      "is_main": false,
      "col": 0,
      "level": 5,
      "lean": "@[blueprint (statement := /-- If a balanced string is not bounded, it must be nonnegative or nonpositive. -/)\n  (proof := /-- Walk argument: the prefix sum of a balanced string stays within [-2,2]; if it ever goes outside [-1,1], the string must be either always \u22650 or always \u22640. -/)]\nlemma balanced_cond_of_not_prefixes_abs_le_one_implies_nonneg_or_nonpos {n : \u2115} (S : Fin n \u2192 \u2124\u02e3) (hbal : balanced_cond S) (hnotbound : \u00ac prefixes_abs_le_one S) :\n    prefixes_nonneg S \u2228 prefixes_nonpos S := by\n  by_cases hn : n = 0\n  \u00b7 subst hn\n    left\n    intro b\n    exfalso\n    exact Fin.elim0 b\n  -- now n > 0, so (0 : Fin n) is defined\n  have hzero_lt_n : 0 < n := by omega\n  haveI : NeZero n := NeZero.of_pos hzero_lt_n\n  -- define P\n  let P (b : Fin n) : \u2124 := \u2211 i \u2208 Finset.Icc (0 : Fin n) b, (S i : \u2124)\n  have hPbal : \u2200 b, |P b| \u2264 2 := by\n    intro b\n    have h := hbal (0 : Fin n) b (Fin.zero_le b)\n    simpa [P] using h\n  have h_exists : \u2203 b : Fin n, |P b| > 1 := by\n    unfold prefixes_abs_le_one at hnotbound\n    push_neg at hnotbound\n    rcases hnotbound with \u27e8b, h\u27e9\n    refine \u27e8b, ?_\u27e9\n    -- h : 1 < |...|\n    -- we need to rewrite to |P b| > 1\n    have h_eq : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) = P b := by\n      have h_eq_set : ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)) = Finset.Icc (0 : Fin n) b := by\n        ext i\n        constructor\n        \u00b7 intro hi\n          rcases Finset.mem_filter.mp hi with \u27e8hi_univ, hi_le\u27e9\n          exact Finset.mem_Icc.mpr \u27e8Fin.zero_le i, hi_le\u27e9\n        \u00b7 intro hi\n          rcases Finset.mem_Icc.mp hi with \u27e8h0i, hi_b\u27e9\n          apply Finset.mem_filter.mpr\n          exact \u27e8Finset.mem_univ _, hi_b\u27e9\n      simp [h_eq_set, P]\n    simpa [h_eq] using h\n  rcases h_exists with \u27e8b0, hb0\u27e9\n  have hb0_bound : |P b0| \u2264 2 := hPbal b0\n  have hb0_eq_two : P b0 = 2 \u2228 P b0 = -2 := by\n    have h_abs_eq_two : |P b0| = 2 := by\n      have hgt1 : 1 < |P b0| := hb0\n      have hle2 : |P b0| \u2264 2 := hb0_bound\n      omega\n    have hpos2 : (0 : \u2124) \u2264 2 := by norm_num\n    rcases (abs_eq hpos2).mp h_abs_eq_two with (h | h)\n    \u00b7 left; exact h\n    \u00b7 right; exact h\n  rcases hb0_eq_two with (hpos | hneg)\n  \u00b7 -- case P b0 = 2, show prefixes_nonneg S\n    have hP_nonneg_all : \u2200 b : Fin n, P b \u2265 0 := by\n      intro b\n      by_contra! hlt\n      -- hlt : P b < 0\n      have horder := Fin.le_total b b0\n      rcases horder with (hle | hle)\n      \u00b7 -- b \u2264 b0\n        have hb_ne_b0 : b \u2260 b0 := by\n          intro heq\n          have h_eq_P : P b = P b0 := by rw [heq]\n          linarith\n        have hb_lt_b0 : b < b0 := lt_of_le_of_ne hle hb_ne_b0\n        -- define b_succ\n        have h_succ_lt_n : b.val + 1 < n := by\n          have hval_lt : b.val < b0.val := (Fin.lt_iff_val_lt_val.mp hb_lt_b0)\n          omega\n        let b_succ : Fin n := \u27e8b.val + 1, h_succ_lt_n\u27e9\n        have hb_succ_le_b0 : b_succ \u2264 b0 := by\n          apply Fin.le_iff_val_le_val.mpr\n          simp [b_succ]\n          have hval_lt : b.val < b0.val := (Fin.lt_iff_val_lt_val.mp hb_lt_b0)\n          omega\n        have h_bal_succ : |(\u2211 i \u2208 Finset.Icc b_succ b0, (S i : \u2124))| \u2264 2 :=\n          hbal b_succ b0 hb_succ_le_b0\n        have h_disjoint : Disjoint (Finset.Icc (0 : Fin n) b) (Finset.Icc b_succ b0) := by\n          apply Finset.disjoint_left.mpr\n          intro i hi1 hi2\n          rcases Finset.mem_Icc.mp hi1 with \u27e8h0i, hi_b\u27e9\n          rcases Finset.mem_Icc.mp hi2 with \u27e8h_succ_i, hi_b0\u27e9\n          have hi_val_le_b : i.val \u2264 b.val := (Fin.le_iff_val_le_val.mp hi_b)\n          have h_succ_val_le_i : b_succ.val \u2264 i.val := (Fin.le_iff_val_le_val.mp h_succ_i)\n          have h_succ_val_eq : b_succ.val = b.val + 1 := by\n            simp [b_succ]\n          omega\n        have h_union : Finset.Icc (0 : Fin n) b0 = (Finset.Icc (0 : Fin n) b) \u222a (Finset.Icc b_succ b0) := by\n          ext i\n          constructor\n          \u00b7 intro hi\n            rcases Finset.mem_Icc.mp hi with \u27e8h0i, hi_b0\u27e9\n            by_cases hi_b : i \u2264 b\n            \u00b7 apply Finset.mem_union_left\n              exact Finset.mem_Icc.mpr \u27e8h0i, hi_b\u27e9\n            \u00b7 apply Finset.mem_union_right\n              have : b < i := lt_of_not_ge hi_b\n              have h_succ_i : b_succ \u2264 i := by\n                apply Fin.le_iff_val_le_val.mpr\n                have hval_lt : b.val < i.val := (Fin.lt_iff_val_lt_val.mp this)\n                simp [b_succ]\n                omega\n              exact Finset.mem_Icc.mpr \u27e8h_succ_i, hi_b0\u27e9\n          \u00b7 intro hi\n            rcases Finset.mem_union.mp hi with (h | h)\n            \u00b7 rcases Finset.mem_Icc.mp h with \u27e8h0i, hi_b\u27e9\n              have : i \u2264 b0 := le_trans hi_b hle\n              exact Finset.mem_Icc.mpr \u27e8h0i, this\u27e9\n            \u00b7 rcases Finset.mem_Icc.mp h with \u27e8h_succ_i, hi_b0\u27e9\n              exact Finset.mem_Icc.mpr \u27e8Fin.zero_le i, hi_b0\u27e9\n        have h_sum_union : (\u2211 i \u2208 Finset.Icc (0 : Fin n) b0, (S i : \u2124)) =\n          (\u2211 i \u2208 Finset.Icc (0 : Fin n) b, (S i : \u2124)) + (\u2211 i \u2208 Finset.Icc b_succ b0, (S i : \u2124)) := by\n          calc\n            (\u2211 i \u2208 Finset.Icc (0 : Fin n) b0, (S i : \u2124)) = (\u2211 i \u2208 ((Finset.Icc (0 : Fin n) b) \u222a (Finset.Icc b_succ b0)), (S i : \u2124)) := by rw [h_union]\n            _ = (\u2211 i \u2208 (Finset.Icc (0 : Fin n) b), (S i : \u2124)) + (\u2211 i \u2208 (Finset.Icc b_succ b0), (S i : \u2124)) := by\n              apply Finset.sum_union h_disjoint\n        have h_sum_diff : (\u2211 i \u2208 Finset.Icc b_succ b0, (S i : \u2124)) = P b0 - P b := by\n          unfold P\n          linarith\n        have h_diff_gt_two : P b0 - P b > 2 := by\n          have : P b < 0 := hlt\n          linarith\n        have h_abs_diff_gt_two : |P b0 - P b| > 2 := by\n          have hpos_diff : 0 < P b0 - P b := by linarith\n          rw [abs_of_pos hpos_diff]\n          exact h_diff_gt_two\n        have h_abs_diff_le_two : |P b0 - P b| \u2264 2 := by\n          simpa [h_sum_diff] using h_bal_succ\n        linarith\n      \u00b7 -- b0 \u2264 b\n        have hb0_ne_b : b0 \u2260 b := by\n          intro heq\n          have h_eq_P : P b0 = P b := by rw [heq]\n          linarith\n        have hb0_lt_b : b0 < b := lt_of_le_of_ne hle hb0_ne_b\n        -- define b0_succ\n        have h_succ_lt_n : b0.val + 1 < n := by\n          have hval_lt : b0.val < b.val := (Fin.lt_iff_val_lt_val.mp hb0_lt_b)\n          omega\n        let b0_succ : Fin n := \u27e8b0.val + 1, h_succ_lt_n\u27e9\n        have hb0_succ_le_b : b0_succ \u2264 b := by\n          apply Fin.le_iff_val_le_val.mpr\n          simp [b0_succ]\n          have hval_lt : b0.val < b.val := (Fin.lt_iff_val_lt_val.mp hb0_lt_b)\n          omega\n        have h_bal_succ : |(\u2211 i \u2208 Finset.Icc b0_succ b, (S i : \u2124))| \u2264 2 :=\n          hbal b0_succ b hb0_succ_le_b\n        have h_disjoint : Disjoint (Finset.Icc (0 : Fin n) b0) (Finset.Icc b0_succ b) := by\n          apply Finset.disjoint_left.mpr\n          intro i hi1 hi2\n          rcases Finset.mem_Icc.mp hi1 with \u27e8h0i, hi_b0\u27e9\n          rcases Finset.mem_Icc.mp hi2 with \u27e8h_succ_i, hi_b\u27e9\n          have hi_val_le_b0 : i.val \u2264 b0.val := (Fin.le_iff_val_le_val.mp hi_b0)\n          have h_succ_val_le_i : b0_succ.val \u2264 i.val := (Fin.le_iff_val_le_val.mp h_succ_i)\n          have h_succ_val_eq : b0_succ.val = b0.val + 1 := by\n            simp [b0_succ]\n          omega\n        have h_union : Finset.Icc (0 : Fin n) b = (Finset.I       "lean": "@[blueprint\n  (statement := /-- The cardinality of the set of balanced strings (using the given balanced predicate) equals a n. -/)\n  (proof := /-- By `hbalanced` and `h\u0394`, `balanced S` is equivalent to `balanced_cond S`. Therefore the set {S | balanced S} equals {S | balanced_cond S}. Hence their cardinalities are equal. -/)]\nlemma card_main_eq_a (n : \u2115) (\u0394 : (Fin n \u2192 \u2124\u02e3) \u2192 Fin n \u2192 Fin n \u2192 \u2124) (balanced : (Fin n \u2192 \u2124\u02e3) \u2192 Prop)\n  (h\u0394 : \u2200 S, \u2200 a b, a \u2264 b \u2192 \u0394 S a b = \u2211 i \u2208 Finset.Icc a b, (S i : \u2124))\n  (hbalanced : \u2200 S, balanced S \u2194 \u2200 a b, a \u2264 b \u2192 |\u0394 S a b| \u2264 2) :\n  {S : Fin n \u2192 \u2124\u02e3 | balanced S}.ncard = a n := by\n  have h_iff : \u2200 S, balanced S \u2194 balanced_cond S := by\n    intro S\n    constructor\n    \u00b7 intro h\n      intro a b hle\n      have h' := (hbalanced S).mp h a b hle\n      rw [h\u0394 S a b hle] at h'\n      exact h'\n    \u00b7 intro h\n      apply (hbalanced S).mpr\n      intro a b hle\n      rw [h\u0394 S a b hle]\n      exact h a b hle\n  have hset : {S | balanced S} = {S | balanced_cond S} := by\n    ext S\n    constructor\n    \u00b7 exact (h_iff S).mp\n    \u00b7 exact (h_iff S).mpr\n  rw [hset]\n  unfold a\n  have hfinite : ({S : Fin n \u2192 \u2124\u02e3 | balanced_cond S} : Set (Fin n \u2192 \u2124\u02e3)).Finite := Set.toFinite _\n  haveI : Fintype ({S : Fin n \u2192 \u2124\u02e3 | balanced_cond S} : Set (Fin n \u2192 \u2124\u02e3)) := hfinite.fintype\n  rw [Set.ncard_eq_toFinset_card (s := {S | balanced_cond S}) (hs := hfinite)]\n  rw [Set.Finite.toFinset_eq_toFinset hfinite]\n  classical\n    rw [Set.toFinset_setOf]"

      "lean": "@[blueprint (statement := /-- The image of the filter set under emb equals the filter set in the larger type. -/)\n  (proof := /-- By comparing elements and using the definition of emb. -/)]\nlemma filter_emb_eq {n : \u2115} (b : Fin n) :\n    (Finset.map (emb_embedding : Fin n \u21aa Fin (n+2)) ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b))) =\n    ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 emb b)) := by\n  ext x\n  constructor\n  \u00b7 intro h\n    rcases Finset.mem_map.mp h with \u27e8i, hi, rfl\u27e9\n    have hi' : i \u2208 (Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b) := hi\n    rcases Finset.mem_filter.mp hi' with \u27e8hi_univ, hi_le\u27e9\n    have : emb_embedding i \u2264 emb b := by\n      simp [emb_embedding, emb, Fin.le_def, hi_le]\n    simp [Finset.mem_filter, Finset.mem_univ, this]\n  \u00b7 intro h\n    rcases Finset.mem_filter.mp h with \u27e8h_univ, h_le\u27e9\n    have h_val : x.val \u2264 b.val := by\n      simpa [emb, Fin.le_def] using h_le\n    have h_lt_n : x.val < n := by\n      have : b.val < n := b.2\n      omega\n    let i : Fin n := \u27e8x.val, h_lt_n\u27e9\n    have hi_val : i.val = x.val := rfl\n    have h_emb_i_eq_x : emb i = x := by\n      apply Fin.ext\n      simp [emb, i]\n    have hi_le_b : i \u2264 b := by\n      simp [Fin.le_def, hi_val, h_val]\n    have hi_mem_filter : i \u2208 (Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b) := by\n      simp [Finset.mem_filter, Finset.mem_univ, hi_le_b]\n    apply Finset.mem_map.mpr\n    exact \u27e8i, hi_mem_filter, h_emb_i_eq_x\u27e9"

      "lean": "@[blueprint (statement := /-- First two characters of a string with prefix bound 1 are opposite. -/)\n  (proof := /-- Because the sum of the first two characters must be 0. -/)]\nlemma first_two_opp {n : \u2115} (S : Fin (n+2) \u2192 \u2124\u02e3) (h : prefixes_abs_le_one S) : S 1 = -S 0 := by\n  have filter_le_zero_singleton : ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 (0 : Fin (n+2)))) = {(0 : Fin (n+2))} := by\n    ext i; simp\n  have filter_le_one_pair : ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 (1 : Fin (n+2)))) = {(0 : Fin (n+2)), (1 : Fin (n+2))} := by\n    have le_one_iff (i : Fin (n+2)) : i \u2264 (1 : Fin (n+2)) \u2194 i = 0 \u2228 i = 1 := by\n      constructor\n      \u00b7 intro hi\n        have hval : (i : \u2115) \u2264 1 := by simpa [Fin.le_def] using hi\n        have hval_lt : (i : \u2115) < n+2 := i.2\n        by_cases hi0 : (i : \u2115) = 0\n        \u00b7 left; exact Fin.ext hi0\n        \u00b7 have hi1 : (i : \u2115) = 1 := by omega\n          right; exact Fin.ext hi1\n      \u00b7 intro hi\n        rcases hi with (rfl|rfl) <;> simp\n    ext i; simp [le_one_iff]\n  have hS0_val : (S 0 : \u2124) = 1 \u2228 (S 0 : \u2124) = -1 := by\n    have h := Int.units_eq_one_or (S 0)\n    rcases h with (h|h)\n    \u00b7 left; exact congrArg (fun u : \u2124\u02e3 => (u : \u2124)) h\n    \u00b7 right; exact congrArg (fun u : \u2124\u02e3 => (u : \u2124)) h\n  have hS1_val : (S 1 : \u2124) = 1 \u2228 (S 1 : \u2124) = -1 := by\n    have h := Int.units_eq_one_or (S 1)\n    rcases h with (h|h)\n    \u00b7 left; exact congrArg (fun u : \u2124\u02e3 => (u : \u2124)) h\n    \u00b7 right; exact congrArg (fun u : \u2124\u02e3 => (u : \u2124)) h\n  have h0abs : |(S 0 : \u2124)| \u2264 1 := by\n    have h0 := h (0 : Fin (n+2))\n    have sum0 : (\u2211 i \u2208 ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 (0 : Fin (n+2)))), (S i : \u2124)) = (S 0 : \u2124) := by\n      rw [filter_le_zero_singleton]; simp\n    rw [sum0] at h0\n    exact h0\n  have h1abs : |(S 0 : \u2124) + (S 1 : \u2124)| \u2264 1 := by\n    have h1 := h (1 : Fin (n+2))\n    have sum1 : (\u2211 i \u2208 ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 (1 : Fin (n+2)))), (S i : \u2124)) = (S 0 : \u2124) + (S 1 : \u2124) := by\n      rw [filter_le_one_pair]; simp\n    rw [sum1] at h1\n    exact h1\n  have hsum_low : -1 \u2264 (S 0 : \u2124) + (S 1 : \u2124) := (abs_le.mp h1abs).1\n  have hsum_high : (S 0 : \u2124) + (S 1 : \u2124) \u2264 1 := (abs_le.mp h1abs).2\n  have hsum : (S 0 : \u2124) + (S 1 : \u2124) = 0 := by\n    rcases hS0_val with (h0|h0) <;> rcases hS1_val with (h1|h1) <;>\n      rw [h0, h1] at hsum_low hsum_high <;> omega\n  apply Units.ext\n  have : (S 1 : \u2124) = -(S 0 : \u2124) := by\n    linarith\n  simpa using this"

      "is_main": false,

      "level": 7,
      "lean": "@[blueprint (statement := /-- The image of Icc a b under emb is Icc (emb a) (emb b). -/)\n  (proof := /-- By using the order-preserving property of emb. -/)]\nlemma map_emb_Icc_eq {n : \u2115} (a b : Fin n) : Finset.map (emb_embedding : Fin n \u21aa Fin (n+2)) (Finset.Icc a b) = Finset.Icc (emb a) (emb b) := by\n  apply Finset.ext\n  intro x\n  constructor\n  \u00b7 intro hx\n    rcases Finset.mem_map.mp hx with \u27e8y, hy, rfl\u27e9\n    have h := Finset.mem_Icc.mp hy\n    rcases h with \u27e8ha, hb\u27e9\n    have hxa : emb a \u2264 emb y := by\n      simpa [emb] using ha\n    have hyb : emb y \u2264 emb b := by\n      simpa [emb] using hb\n    exact Finset.mem_Icc.mpr \u27e8hxa, hyb\u27e9\n  \u00b7 intro hx\n    rcases Finset.mem_Icc.mp hx with \u27e8hxa, hyb\u27e9\n    have hx_val_lt_n : x.val < n := by\n      have ha_val_lt_n : (emb a).val < n := by\n        have ha_val_lt_n' : a.val < n := a.2\n        simpa [emb] using ha_val_lt_n'\n      have hb_val_lt_n : (emb b).val < n := by\n        have hb_val_lt_n' : b.val < n := b.2\n        simpa [emb] using hb_val_lt_n'\n      have hxa_val : (emb a).val \u2264 x.val := Fin.le_def.mp hxa\n      have hyb_val : x.val \u2264 (emb b).val := Fin.le_def.mp hyb\n      omega\n    let y : Fin n := \u27e8x.val, hx_val_lt_n\u27e9\n    have hemb_y_eq_x : emb y = x := by\n      apply Fin.ext\n      simp [emb, y]\n    have ha_y : a \u2264 y := by\n      have hxa_val : (emb a).val \u2264 x.val := Fin.le_def.mp hxa\n      simpa [emb, y] using hxa_val\n    have hy_b : y \u2264 b := by\n      have hyb_val : x.val \u2264 (emb b).val := Fin.le_def.mp hyb\n      simpa [emb, y] using hyb_val\n    have hmem : y \u2208 Finset.Icc a b := Finset.mem_Icc.mpr \u27e8ha_y, hy_b\u27e9\n    apply Finset.mem_map.mpr\n    exact \u27e8y, hmem, hemb_y_eq_x\u27e9"

      "id": "partition_formula",

      "statement": "a n + 2 = 2*A n + C n.",
      "is_main": false,
      "col": 0,
      "level": 4,
      "lean": "@[blueprint\n  (statement := /-- a n + 2 = 2*A n + C n. -/)\n  (proof := /-- By combinatorial decomposition using Z_card_one. -/)]\nlemma partition_formula (n : \u2115) : a n + 2 = 2 * A n + C n := by\n  classical\n  -- define sets\n  let U : Finset (Fin n \u2192 \u2124\u02e3) := Finset.univ\n  let B : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (balanced_cond (n := n))\n  let A_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S)\n  let C_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_abs_le_one S)\n  let Z_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S \u2227 prefixes_abs_le_one S)\n  let X_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonneg S \u2227 \u00ac prefixes_abs_le_one S)\n  let V_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonpos S \u2227 \u00ac prefixes_abs_le_one S)\n  let W_set : Finset (Fin n \u2192 \u2124\u02e3) := U.filter (\u03bb S => balanced_cond S \u2227 prefixes_nonpos S \u2227 prefixes_abs_le_one S)\n  -- cardinality equalities from lemmas\n  have hZ_card : Z_set.card = 1 := by\n    simpa [Z_set] using Z_card_one n\n  have hV_eq_X : V_set.card = X_set.card := by\n    simpa [V_set, X_set] using card_V_eq_card_X n\n  have hW_eq_Z : W_set.card = Z_set.card := by\n    simpa [W_set, Z_set] using card_W_eq_card_Z n\n  -- relation between a, A, C and these sets\n  have ha : a n = B.card := by\n    unfold a\n    simp [B, U]\n  have hA : A n = A_set.card := by\n    unfold A\n    simp [A_set, U]\n  have hC : C n = C_set.card := by\n    unfold C\n    simp [C_set, U]\n  -- A_set is the disjoint union of Z_set and X_set\n  have h_disjoint_ZX : Z_set \u2229 X_set = \u2205 := by\n    apply Finset.eq_empty_iff_forall_not_mem.mpr\n    intro S hS\n    rcases Finset.mem_inter.mp hS with \u27e8hZ, hX\u27e9\n    have hZ_mem := Finset.mem_filter.mp hZ\n    have hX_mem := Finset.mem_filter.mp hX\n    have hbound : prefixes_abs_le_one S := hZ_mem.2.2.2\n    have h_not_bound : \u00ac prefixes_abs_le_one S := hX_mem.2.2.2\n    exact h_not_bound hbound\n  have hA_partition : A_set.card = Z_set.card + X_set.card := by\n    have h_union : A_set = Z_set \u222a X_set := by\n      ext S; constructor\n      \u00b7 intro hS\n        have hS_mem := Finset.mem_filter.mp hS\n        have hbal : balanced_cond S := hS_mem.2.1\n        have hnonneg : prefixes_nonneg S := hS_mem.2.2\n        by_cases hbounded : prefixes_abs_le_one S\n        \u00b7 apply Finset.mem_union_left\n          simpa [Z_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg, hbounded\u27e9\n        \u00b7 apply Finset.mem_union_right\n          simpa [X_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg, hbounded\u27e9\n      \u00b7 intro hS\n        rcases Finset.mem_union.mp hS with (hZ | hX)\n        \u00b7 have hZ_mem := Finset.mem_filter.mp hZ\n          have hbal : balanced_cond S := hZ_mem.2.1\n          have hnonneg : prefixes_nonneg S := hZ_mem.2.2.1\n          simpa [A_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg\u27e9\n        \u00b7 have hX_mem := Finset.mem_filter.mp hX\n          have hbal : balanced_cond S := hX_mem.2.1\n          have hnonneg : prefixes_nonneg S := hX_mem.2.2.1\n          simpa [A_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg\u27e9\n    rw [h_union]\n    have h_disjoint : Disjoint Z_set X_set :=\n      Finset.disjoint_iff_inter_eq_empty.mpr h_disjoint_ZX\n    rw [Finset.card_union_eq_card_add_card.mpr h_disjoint]\n  -- C_set is subset of B\n  have hC_sub_B : C_set \u2286 B := by\n    intro S hS\n    have hS_mem := Finset.mem_filter.mp hS\n    have hbal : balanced_cond S := hS_mem.2.1\n    simpa [B, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal\u27e9\n  -- B \\ C_set = X_set \u222a V_set\n  have h_disjoint_XV : X_set \u2229 V_set = \u2205 := by\n    apply Finset.eq_empty_iff_forall_not_mem.mpr\n    intro S hS\n    rcases Finset.mem_inter.mp hS with \u27e8hX, hV\u27e9\n    have hX_mem := Finset.mem_filter.mp hX\n    have hV_mem := Finset.mem_filter.mp hV\n    have h_nonneg : prefixes_nonneg S := hX_mem.2.2.1\n    have h_nonpos : prefixes_nonpos S := hV_mem.2.2.1\n    have h_bounded : prefixes_abs_le_one S := by\n      intro b\n      have h_nonneg_b : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) \u2265 0 := h_nonneg b\n      have h_nonpos_b : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) \u2264 0 := h_nonpos b\n      have h_eq : (\u2211 i \u2208 ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)), (S i : \u2124)) = 0 := by\n        linarith\n      rw [h_eq]\n      simp\n    have h_not_bounded : \u00ac prefixes_abs_le_one S := hX_mem.2.2.2\n    exact h_not_bounded h_bounded\n  have h_sdiff_eq_union : B \\ C_set = X_set \u222a V_set := by\n    apply Finset.Subset.antisymm\n    \u00b7 intro S hS\n      rcases Finset.mem_sdiff.mp hS with \u27e8hSB, hSC\u27e9\n      have hSB_mem := Finset.mem_filter.mp hSB\n      have hbal : balanced_cond S := hSB_mem.2\n      have h_not_bound : \u00ac prefixes_abs_le_one S := by\n        intro hbound\n        apply hSC\n        simpa [C_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hbound\u27e9\n      rcases balanced_cond_of_not_prefixes_abs_le_one_implies_nonneg_or_nonpos S hbal h_not_bound with (hnonneg | hnonpos)\n      \u00b7 apply Finset.mem_union_left\n        simpa [X_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonneg, h_not_bound\u27e9\n      \u00b7 apply Finset.mem_union_right\n        simpa [V_set, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal, hnonpos, h_not_bound\u27e9\n    \u00b7 intro S hS\n      rcases Finset.mem_union.mp hS with (hX | hV)\n      \u00b7 have hX_mem := Finset.mem_filter.mp hX\n        have hbal : balanced_cond S := hX_mem.2.1\n        have hnonneg : prefixes_nonneg S := hX_mem.2.2.1\n        have h_not_bound : \u00ac prefixes_abs_le_one S := hX_mem.2.2.2\n        have hSB : S \u2208 B := by\n          simpa [B, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal\u27e9\n        have hSC : S \u2209 C_set := by\n          intro hC\n          apply h_not_bound\n          have hC_mem := Finset.mem_filter.mp hC\n          exact hC_mem.2.2\n        exact Finset.mem_sdiff.mpr \u27e8hSB, hSC\u27e9\n      \u00b7 have hV_mem := Finset.mem_filter.mp hV\n        have hbal : balanced_cond S := hV_mem.2.1\n        have hnonpos : prefixes_nonpos S := hV_mem.2.2.1\n        have h_not_bound : \u00ac prefixes_abs_le_one S := hV_mem.2.2.2\n        have hSB : S \u2208 B := by\n          simpa [B, U] using Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hbal\u27e9\n        have hSC : S \u2209 C_set := by\n          intro hC\n          apply h_not_bound\n          have hC_mem := Finset.mem_filter.mp hC\n          exact hC_mem.2.2\n        exact Finset.mem_sdiff.mpr \u27e8hSB, hSC\u27e9\n  have h_card_sdiff : (B \\ C_set).card = X_set.card + V_set.card := by\n    rw [h_sdiff_eq_union]\n    have h_disjoint : Disjoint X_set V_set :=\n      Finset.disjoint_iff_inter_eq_empty.mpr h_disjoint_XV\n    rw [Finset.card_union_eq_card_add_card.mpr h_disjoint]\n  have h_card_B : B.card = C_set.card + (X_set.card + V_set.card) := by\n    have h_temp := (Finset.card_sdiff_add_card_eq_card hC_sub_B).symm\n    rw [h_temp, h_card_sdiff]\n    ring\n  have h_card_B_simp : B.card = C_set.card + 2 * X_set.card := by\n    rw [h_card_B, hV_eq_X]\n    ring\n  calc\n    a n + 2 = B.card + 2 := by rw [ha]\n    _ = (C_set.card + 2 * X_set.card) + 2 := by rw [h_card_B_simp]\n    _ = C_set.card + 2 * X_set.card + 2 := by ring\n    _ = C_set.card + 2 * (Z_set.card + X_set.card) := by\n      rw [hZ_card]\n      ring\n    _ = C_set.card + 2 * A_set.card := by rw [hA_partition]\n    _ = 2 * A_set.card + C_set.card := by ring\n    _ = 2 * A n + C n := by rw [hA, hC]\n\n-- ------------------------------------------------------------\n-- Helper lemmas for ext\u2081 and ext\u2082\n-- ------------------------------------------------------------"
    },

      "lean": "@[blueprint (statement := /-- drop_first_two preserves prefix bound 1. -/)\n  (proof := /-- Using shift of intervals. -/)]\nlemma prefixes_abs_le_one_drop_first_two {n : \u2115} (S : Fin (n+2) \u2192 \u2124\u02e3) (h : prefixes_abs_le_one S) : prefixes_abs_le_one (drop_first_two S) := by\n  -- define the embedding \u03c6\n  let \u03c6_emb {n : \u2115} : Fin n \u21aa Fin (n+2) :=\n    \u27e8\u03bb i => Fin.succ (Fin.succ i), \u03bb x y h => by\n      apply Fin.ext\n      have hval := congr_arg Fin.val h\n      simp at hval\n      omega\u27e9\n  -- disjointness lemma\n  have h_disjoint {n : \u2115} (b : Fin n) : Disjoint ({0, 1} : Finset (Fin (n+2))) (Finset.map (\u03c6_emb (n := n)) ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b))) := by\n    apply Finset.disjoint_left.mpr\n    intro i hi1 hi2\n    rcases Finset.mem_insert.mp hi1 with (h0 | h1)\n    \u00b7 subst h0\n      rcases Finset.mem_map.mp hi2 with \u27e8j, hj, h\u27e9\n      have h_val : (\u03c6_emb j).val = j.val + 2 := rfl\n      have h_zero : (\u03c6_emb j).val = 0 := congrArg Fin.val h\n      omega\n    \u00b7 have hi1_eq : i = (1 : Fin (n+2)) := Finset.mem_singleton.mp h1\n      subst hi1_eq\n      rcases Finset.mem_map.mp hi2 with \u27e8j, hj, h\u27e9\n      have h_val : (\u03c6_emb j).val = j.val + 2 := rfl\n      have h_one : (\u03c6_emb j).val = 1 := congrArg Fin.val h\n      omega\n  -- set equality lemma\n  have h_union {n : \u2115} (b : Fin n) : ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 Fin.succ (Fin.succ b))) = \n    ({0, 1} : Finset (Fin (n+2))) \u222a Finset.map (\u03c6_emb (n := n)) ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b)) := by\n    ext i\n    constructor\n    \u00b7 intro hi\n      have hi_mem : i \u2208 Finset.univ := Finset.mem_univ _\n      have hi_le : i \u2264 Fin.succ (Fin.succ b) := (Finset.mem_filter.mp hi).2\n      by_cases h0 : i.val = 0\n      \u00b7 apply Finset.mem_union_left\n        apply Finset.mem_insert.mpr\n        left\n        exact Fin.ext h0\n      \u00b7 by_cases h1 : i.val = 1\n        \u00b7 apply Finset.mem_union_left\n          apply Finset.mem_insert.mpr\n          right\n          apply Finset.mem_singleton.mpr\n          exact Fin.ext h1\n        \u00b7 have h2 : 2 \u2264 i.val := by\n            omega\n          have hi_val_lt_n : i.val - 2 < n := by\n            have hi_val_lt_n2 : i.val < n+2 := i.2\n            omega\n          let j : Fin n := \u27e8i.val - 2, hi_val_lt_n\u27e9\n          have hj_val_le : j.val \u2264 b.val := by\n            dsimp [j]\n            have hi_val_le : i.val \u2264 b.val + 2 := hi_le\n            omega\n          have hj_le_b : j \u2264 b := (Fin.le_iff_val_le_val.mpr hj_val_le)\n          have h_eq : i = \u03c6_emb j := by\n            apply Fin.ext\n            dsimp [\u03c6_emb, Fin.succ, j]\n            omega\n          apply Finset.mem_union_right\n          apply Finset.mem_map.mpr\n          refine \u27e8j, ?_, ?_\u27e9\n          \u00b7 apply Finset.mem_filter.mpr\n            exact \u27e8Finset.mem_univ _, hj_le_b\u27e9\n          \u00b7 exact h_eq.symm\n    \u00b7 intro hi\n      rcases Finset.mem_union.mp hi with (hi' | hi'')\n      \u00b7 rcases Finset.mem_insert.mp hi' with (h0 | h1)\n        \u00b7 subst h0\n          apply Finset.mem_filter.mpr\n          refine \u27e8Finset.mem_univ _, ?_\u27e9\n          exact Fin.zero_le _\n        \u00b7 have hi1_eq : i = (1 : Fin (n+2)) := Finset.mem_singleton.mp h1\n          subst hi1_eq\n          apply Finset.mem_filter.mpr\n          refine \u27e8Finset.mem_univ _, ?_\u27e9\n          have h_val_le : (1 : Fin (n+2)).val \u2264 (Fin.succ (Fin.succ b)).val := by\n            simp\n          exact (Fin.le_iff_val_le_val.mpr h_val_le)\n      \u00b7 rcases Finset.mem_map.mp hi'' with \u27e8j, hj, rfl\u27e9\n        apply Finset.mem_filter.mpr\n        refine \u27e8Finset.mem_univ _, ?_\u27e9\n        have hj_le_b : j \u2264 b := (Finset.mem_filter.mp hj).2\n        have h_val_le : (\u03c6_emb j).val \u2264 (Fin.succ (Fin.succ b)).val := by\n          dsimp [\u03c6_emb]\n          have h_val : (Fin.succ (Fin.succ j)).val = j.val + 2 := rfl\n          have h_b'_val : (Fin.succ (Fin.succ b)).val = b.val + 2 := rfl\n          omega\n        exact (Fin.le_iff_val_le_val.mpr h_val_le)\n  -- now the main proof\n  intro b\n  -- define A and B for convenience\n  let A : Finset (Fin (n+2)) := ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 Fin.succ (Fin.succ b)))\n  let B : Finset (Fin n) := ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b))\n  have h0 : (S 0 : \u2124) + (S 1 : \u2124) = 0 := by\n    have h_opp := first_two_opp S h\n    calc\n      (S 0 : \u2124) + (S 1 : \u2124) = (S 0 : \u2124) + (-(S 0 : \u2124)) := by\n        simp [h_opp]\n      _ = 0 := by ring\n  have h_sum_01 : (\u2211 i \u2208 ({0, 1} : Finset (Fin (n+2))), (S i : \u2124)) = 0 := by\n    simp [Finset.sum_insert, Finset.sum_singleton, h0]\n  have h_sum_map : (\u2211 i \u2208 Finset.map (\u03c6_emb (n := n)) B, (S i : \u2124)) = (\u2211 i \u2208 B, (drop_first_two S i : \u2124)) := by\n    simp [Finset.sum_map, drop_first_two, \u03c6_emb]\n  have h_sum_union : (\u2211 i \u2208 (({0, 1} : Finset (Fin (n+2))) \u222a Finset.map (\u03c6_emb (n := n)) B), (S i : \u2124)) =\n    (\u2211 i \u2208 ({0, 1} : Finset (Fin (n+2))), (S i : \u2124)) + (\u2211 i \u2208 Finset.map (\u03c6_emb (n := n)) B, (S i : \u2124)) := by\n    apply Finset.sum_union (h_disjoint b)\n  have h_sum_eq : (\u2211 i \u2208 B, (drop_first_two S i : \u2124)) = (\u2211 i \u2208 A, (S i : \u2124)) := by\n    calc\n      (\u2211 i \u2208 B, (drop_first_two S i : \u2124)) = (\u2211 i \u2208 Finset.map (\u03c6_emb (n := n)) B, (S i : \u2124)) := by\n        symm; exact h_sum_map\n      _ = (\u2211 i \u2208 (({0, 1} : Finset (Fin (n+2))) \u222a Finset.map (\u03c6_emb (n := n)) B), (S i : \u2124)) - \n          (\u2211 i \u2208 ({0, 1} : Finset (Fin (n+2))), (S i : \u       "lean": "@[blueprint (statement := /-- prepend x y (drop_first_two S) = S if x = S 0, y = S 1. -/)\n  (proof := /-- By evaluating at each i. -/)]\nlemma prepend_id {n : \u2115} (S : Fin (n+2) \u2192 \u2124\u02e3) : prepend (S 0) (S 1) (drop_first_two S) = S := by\n  ext i\n  dsimp [prepend, drop_first_two]\n  by_cases h0 : i = (0 : Fin (n+2))\n  \u00b7 subst h0; rfl\n  \u00b7 by_cases h1 : i = (1 : Fin (n+2))\n    \u00b7 subst h1; rfl\n    \u00b7 have h_val0 : i.val \u2260 0 := by\n        intro h; apply h0; apply Fin.ext; exact h\n      have h_val1 : i.val \u2260 1 := by\n        intro h; apply h1; apply Fin.ext; exact h\n      have h_val_ge2 : 2 \u2264 i.val := by\n        have : i.val \u2260 0 := h_val0\n        have : i.val \u2260 1 := h_val1\n        omega\n      have hi' : i.val - 2 < n := by\n        have hi : i.val < n+2 := i.2\n        omega\n      have h_eq : Fin.succ (Fin.succ (\u27e8i.val - 2, hi'\u27e9 : Fin n)) = i := by\n        apply Fin.ext\n        simp [Fin.val_succ]\n        omega\n      simp [h_val0, h_val1]\n      simpa using congrArg (fun x : \u2124\u02e3 => (x : \u2124)) (congrArg S h_eq)"

n      \u00b7 simp at hi'\n        subst hi'\n        have h0 : (0 : Fin (n+2)) \u2264 last1 (n := n) := by exact Fin.zero_le _\n        have hlast : last1 (n := n) \u2264 last1 (n := n) := le_refl _\n        exact Finset.mem_Icc.mpr \u27e8h0, hlast\u27e9\n  have disjoint_image_emb_univ_singleton_last1 (n : \u2115) : Disjoint (Finset.image emb_embedding (Finset.univ : Finset (Fin n))) {last1 (n := n)} := by\n    rw [Finset.disjoint_singleton_right]\n    intro h\n    rcases Finset.mem_image.1 h with \u27e8j, _, hj\u27e9\n    have hval : (emb_embedding j).val = (last1 (n := n)).val := by\n      simpa [hj]\n    simp [emb_embedding, emb, last1] at hval\n    have hj_val_lt_n : (j : \u2115) < n := j.2\n    omega\n  calc\n    (\u2211 i \u2208 Finset.Icc (0 : Fin (n+2)) last1, (S i : \u2124))\n        = (\u2211 i \u2208 (Finset.image emb_embedding (Finset.univ : Finset (Fin n))) \u222a {last1}, (S i : \u2124)) := by\n          rw [Icc_zero_last1_eq_image_emb_union_singleton n]\n    _ = (\u2211 i \u2208 Finset.image emb_embedding (Finset.univ : Finset (Fin n)), (S i : \u2124)) + (\u2211 i \u2208 {last1}, (S i : \u2124)) := by\n      rw [Finset.sum_union (disjoint_image_emb_univ_singleton_last1 n)]\n    _ = (\u2211 i \u2208 (Finset.univ : Finset (Fin n)), (S (emb_embedding i) : \u2124)) + (S last1 : \u2124) := by\n      have hsum_image : (\u2211 i \u2208 Finset.image emb_embedding (Finset.univ : Finset (Fin n)), (S i : \u2124)) = (\u2211 i \u2208 (Finset.univ : Finset (Fin n)), (S (emb_embedding i) : \u2124)) := by\n        apply Finset.sum_image\n        simpa using Set.injOn_of_injective emb_embedding.injective (s := Set.univ)\n      simp [hsum_image, Finset.sum_singleton]\n    _ = total_sum (truncate S) + (S last1 : \u2124) := by\n      simp [total_sum, truncate, emb_embedding, emb]"

      "lean": "@[blueprint (statement := /-- For b with b.val = n, the prefix sum of ext\u2081 T up to b equals total_sum T + first suffix value. -/)\n  (proof := /-- Partition the filter set into image of emb and {b}. -/)]\nlemma sum_filter_eq_n {n : \u2115} (T : Fin n \u2192 \u2124\u02e3) (b : Fin (n+2)) (h_eq_n : b.val = n) : \n    (\u2211 i \u2208 ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 b)), ((ext\u2081 T) i : \u2124)) = \n    total_sum T + (suffix_pair\u2081 (total_sum T)).1 := by\n  let s := total_sum T\n  let S := ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 b))\n  let S1 := Finset.map (emb_embedding : Fin n \u21aa Fin (n+2)) (Finset.univ : Finset (Fin n))\n  let S2 : Finset (Fin (n+2)) := {b}\n  have hS_eq : S = S1 \u222a S2 := by\n    apply Finset.Subset.antisymm\n    \u00b7 intro i hi\n      rw [Finset.mem_filter] at hi\n      rcases hi with \u27e8hi_univ, hi_le\u27e9\n      have hi_val_le_n : i.val \u2264 n := by\n        have h_val_le := Fin.le_iff_val_le_val.mp hi_le\n        rw [h_eq_n] at h_val_le\n        exact h_val_le\n      by_cases hi_val_lt_n : i.val < n\n      \u00b7 apply Finset.mem_union_left\n        let j : Fin n := \u27e8i.val, hi_val_lt_n\u27e9\n        have h_emb_j_eq_i : emb_embedding j = i := by\n          ext; simp [emb_embedding, emb, j]\n        apply Finset.mem_map.mpr\n        refine \u27e8j, Finset.mem_univ _, ?_\u27e9\n        exact h_emb_j_eq_i\n      \u00b7 have hi_val_eq_n : i.val = n := by omega\n        have hi_eq_b : i = b := by\n          apply Fin.ext\n          calc\n            i.val = n := hi_val_eq_n\n            _ = b.val := by symm; exact h_eq_n\n        apply Finset.mem_union_right\n        apply Finset.mem_singleton.mpr\n        exact hi_eq_b\n    \u00b7 intro i hi\n      rcases Finset.mem_union.mp hi with (hi1 | hi2)\n      \u00b7 rcases Finset.mem_map.mp hi1 with \u27e8j, hj, h_eq\u27e9\n        have hi_val_lt_n : i.val < n := by\n          have h_val_eq : i.val = j.val := by\n            simpa [emb_embedding, emb] using (congr_arg Fin.val h_eq).symm\n          rw [h_val_eq]\n          exact j.2\n        have hi_le_b : i \u2264 b := by\n          apply (Fin.le_iff_val_le_val.mpr ?_)\n          rw [h_eq_n]\n          omega\n        apply Finset.mem_filter.mpr\n        constructor\n        \u00b7 exact Finset.mem_univ _\n        \u00b7 exact hi_le_b\n      \u00b7 rw [Finset.mem_singleton.mp hi2]\n        apply Finset.mem_filter.mpr\n        constructor\n        \u00b7 exact Finset.mem_univ _\n        \u00b7 exact le_rfl\n  have h_disjoint : Disjoint S1 S2 := by\n    rw [Finset.disjoint_iff_inter_eq_empty]\n    apply Finset.eq_empty_iff_forall_not_mem.mpr\n    intro i hi\n    rcases Finset.mem_inter.mp hi with \u27e8hi1, hi2\u27e9\n    rw [Finset.mem_singleton.mp hi2] at hi1\n    rcases Finset.mem_map.mp hi1 with \u27e8j, hj, h_eq\u27e9\n    have h_j_val_lt_n : j.val < n := j.2\n    have h_b_val_eq_n : b.val = n := h_eq_n\n    have h_emb_val_eq : (emb_embedding j).val = j.val := rfl\n    have : b.val = (emb_embedding j).val := by simpa [h_eq] using rfl\n    rw [h_emb_val_eq] at this\n    rw [h_b_val_eq_n] at this\n    omega\n  have h_sum_S2 : \u2211 i \u2208 S2, ((ext\u2081 T) i : \u2124) = (suffix_pair\u2081 (total_sum T)).1 := by\n    simp [S2, ext\u2081, h_eq_n]\n  have h_sum_S1 : \u2211 i \u2208 S1, ((ext\u2081 T) i : \u2124) = total_sum T := by\n    calc\n      \u2211 i \u2208 S1, ((ext\u2081 T) i : \u2124) = \u2211 j \u2208 (Finset.univ : Finset (Fin n)), ((ext\u2081 T) (emb_embedding j) : \u2124) := by\n        rw [Finset.sum_map]\n      _ = \u2211 j : Fin n, ((ext\u2081 T) (emb j) : \u2124) := by\n        simp [emb_embedding]\n      _ = \u2211 j : Fin n, (T j : \u2124) := by\n        refine Finset.sum_congr rfl (\u03bb j hj => ?_)\n        simp [ext\u2081, emb_embedding, emb]\n      _ = total_sum T := rfl\n  calc\n    \u2211 i \u2208 S, ((ext\u2081 T) i : \u2124) = \u2211 i \u2208 (S1 \u222a S2), ((ext\u2081 T) i : \u2124)       "lean": "@[blueprint (statement := /-- For b with b.val = n, the prefix sum of ext\u2082 T up to b equals total_sum T + first suffix value. -/)\n  (proof := /-- Partition analogous to ext\u2081 case. -/)]\nlemma sum_filter_eq_n_ext\u2082 {n : \u2115} (T : Fin n \u2192 \u2124\u02e3) (b : Fin (n+2)) (h_eq_n : b.val = n) : \n    (\u2211 i \u2208 ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 b)), ((ext\u2082 T) i : \u2124)) = \n    total_sum T + (suffix_pair\u2082 (total_sum T)).1 := by\n  let s\u2081 : Finset (Fin (n+2)) := (Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i.val < n)\n  let s\u2082 : Finset (Fin (n+2)) := (Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 b)\n  have h_map_eq_s\u2081 : Finset.map (emb_embedding : Fin n \u21aa Fin (n+2)) (Finset.univ : Finset (Fin n)) = s\u2081 := by\n    ext i\n    constructor\n    \u00b7 intro hi\n      rcases Finset.mem_map.mp hi with \u27e8j, hj, rfl\u27e9\n      have hji : j.val < n := j.2\n      refine Finset.mem_filter.mpr \u27e8Finset.mem_univ _, ?_\u27e9\n      simpa [emb, emb_embedding] using hji\n    \u00b7 intro hi\n      have hi_mem : i \u2208 Finset.univ := Finset.mem_univ _\n      have hi_val_lt_n : i.val < n := (Finset.mem_filter.mp hi).2\n      let j : Fin n := \u27e8i.val, hi_val_lt_n\u27e9\n      have h_eq : emb j = i := by\n        apply Fin.ext; simp [emb, j]\n      apply Finset.mem_map.mpr\n      exact \u27e8j, Finset.mem_univ _, h_eq\u27e9\n  have h_sum_s\u2081 : (\u2211 i \u2208 s\u2081, ((ext\u2082 T) i : \u2124)) = total_sum T := by\n    calc\n      (\u2211 i \u2208 s\u2081, ((ext\u2082 T) i : \u2124)) = (\u2211 i \u2208 Finset.map (emb_embedding : Fin n \u21aa Fin (n+2)) (Finset.univ : Finset (Fin n)), ((ext\u2082 T) i : \u2124)) := by\n        rw [h_map_eq_s\u2081]\n      _ = (\u2211 i : Fin n, ((ext\u2082 T) (emb i) : \u2124)) := by\n        simp [Finset.sum_map, emb_embedding]\n      _ = (\u2211 i : Fin n, (T i : \u2124)) := by\n        refine Finset.sum_congr rfl (\u03bb i hi => ?_)\n        simp [ext\u2082, emb, total_sum]\n      _ = total_sum T := rfl\n  have h_sub : s\u2081 \u2286 s\u2082 := by\n    intro i hi\n    have hi_val_lt_n : i.val < n := (Finset.mem_filter.mp hi).2\n    have hi_le_b : i \u2264 b := by\n      rw [Fin.le_def]\n      omega\n    exact Finset.mem_filter.mpr \u27e8Finset.mem_univ _, hi_le_b\u27e9\n  have h_sdiff : s\u2082 \\ s\u2081 = {b} := by\n    apply Finset.eq_singleton_iff_unique_mem.mpr\n    constructor\n    \u00b7 have hb_mem_s\u2082 : b \u2208 s\u2082 := by\n        apply Finset.mem_filter.mpr\n        exact \u27e8Finset.mem_univ _, le_refl _\u27e9\n      have hb_not_mem_s\u2081 : b \u2209 s\u2081 := by\n        intro hb_mem_s\u2081\n        have hb_val_lt_n : b.val < n := (Finset.mem_filter.mp hb_mem_s\u2081).2\n        rw [h_eq_n] at hb_val_lt_n\n        omega\n      exact Finset.mem_sdiff.mpr \u27e8hb_mem_s\u2082, hb_not_mem_s\u2081\u27e9\n    \u00b7 intro i hi\n      rcases Finset.mem_sdiff.mp hi with \u27e8hi_s\u2082, hi_not_s\u2081\u27e9\n      have hi_val_le_n : i.val \u2264 n := by\n        have hi_le_b : i \u2264 b := (Finset.mem_filter.mp hi_s\u2082).2\n        rw [Fin.le_def] at hi_le_b\n        simpa [h_eq_n] using hi_le_b\n      have hi_val_ge_n : n \u2264 i.val := by\n        by_contra! hlt\n        have hi_val_lt_n : i.val < n := hlt\n        have hi_mem_s\u2081 : i \u2208 s\u2081 := by\n          apply Finset.mem_filter.mpr\n          exact \u27e8Finset.mem_univ _, hi_val_lt_n\u27e9\n        exact hi_not_s\u2081 hi_mem_s\u2081\n      have hi_val_eq_n : i.val = n := by omega\n      have hi_eq_b : i = b := by\n        apply Fin.ext\n        simpa [hi_val_eq_n, h_eq_n]\n      exact hi_eq_b\n  have h_sum_sdiff : (\u2211 x \u2208 s\u2082 \\ s\u2081, ((ext\u2082 T) x : \u2124)) = ((ext\u2082 T) b : \u2124) := by\n    rw [h_sdiff, Finset.sum_singleton]\n  have h_total_sum_s\u2082 : (\u2211 x \u2208 s\u2082, ((ext\u2082 T) x : \u2124)) = (\u2211 x \u2208 s\u2081, ((ext\       "lean": "@[blueprint (statement := /-- If T is balanced and nonnegative, its total sum is 0, 1, or 2. -/)\n  (proof := /-- Using hbal and hnonneg on the last element. -/)]\nlemma total_sum_range {n : \u2115} (T : Fin n \u2192 \u2124\u02e3) (hbal : balanced_cond T) (hnonneg : prefixes_nonneg T) : total_sum T \u2208 ({0,1,2} : Set \u2124) := by\n  by_cases hn : n = 0\n  \u00b7 subst hn; simp [total_sum]\n  \u00b7 have hnpos : n \u2265 1 := by omega\n    let zero_fin : Fin n := \u27e80, by omega\u27e9\n    let max_fin : Fin n := \u27e8n-1, by omega\u27e9\n    have h_all_le_max (i : Fin n) : i \u2264 max_fin := by\n      rw [Fin.le_def]\n      have hval : i.val < n := i.2\n      have : max_fin.val = n-1 := rfl\n      omega\n    have h_zero_le_max : zero_fin \u2264 max_fin := by\n      rw [Fin.le_def]\n      have hz : zero_fin.val = 0 := rfl\n      have hm : max_fin.val = n-1 := rfl\n      rw [hz, hm]\n      exact Nat.zero_le (n-1)\n    have hsum_nonneg : total_sum T \u2265 0 := by\n      have h_last_nonneg := hnonneg max_fin\n      have h_filter_eq_univ : ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 max_fin)) = Finset.univ := by\n        ext i; simp [Finset.mem_filter, Finset.mem_univ, h_all_le_max i]\n      simpa [total_sum, h_filter_eq_univ] using h_last_nonneg\n    have h_abs_sum_le_two : |total_sum T| \u2264 2 := by\n      have h_bal_total := hbal zero_fin max_fin h_zero_le_max\n      have h_Icc_eq_univ : Finset.Icc zero_fin max_fin = Finset.univ := by\n        ext i; constructor <;> intro hi\n        \u00b7 exact Finset.mem_univ _\n        \u00b7 rw [Finset.mem_Icc]\n          have hz : zero_fin \u2264 i := by\n            rw [Fin.le_def]\n            have : zero_fin.val = 0 := rfl\n            have hi_val : 0 \u2264 i.val := Nat.zero_le _\n            omega\n          have hm : i \u2264 max_fin := h_all_le_max i\n          exact \u27e8hz, hm\u27e9\n      simpa [total_sum, h_Icc_eq_univ] using h_bal_total\n    by_cases h0 : total_sum T = 0\n    \u00b7 simp [h0]\n    by_cases h1 : total_sum T = 1\n    \u00b7 simp [h1]\n    by_cases h2 : total_sum T = 2\n    \u00b7 simp [h2]\n    have h_ge3 : total_sum T \u2265 3 := by\n      have : total_sum T \u2260 0 := h0\n      have : total_sum T \u2260 1 := h1\n      have : total_sum T \u2260 2 := h2\n      have h_nonneg : 0 \u2264 total_sum T := hsum_nonneg\n      omega\n    have h_abs_ge3 : |total_sum T| \u2265 3 := by\n      have : total_sum T \u2265 0 := hsum_nonneg\n      have habs_eq : |total_sum T| = total_sum T := abs_of_nonneg this\n      rw [habs_eq]\n      exact h_ge3\n    omega"

      "lean": "@[blueprint (statement := /-- Truncating preserves balancedness. -/)\n  (proof := /-- Using map_emb_Icc_eq to transfer interval sums. -/)]\nlemma truncate_balanced {n : \u2115} (S : Fin (n+2) \u2192 \u2124\u02e3) (hbal : balanced_cond S) : balanced_cond (truncate S) := by\n  intro a b hle\n  have hle_emb : emb a \u2264 emb b := by\n    rw [Fin.le_def]\n    have : a.val \u2264 b.val := hle\n    simpa [emb] using this\n  have hsum := hbal (emb a) (emb b) hle_emb\n  have hsum_eq : (\u2211 i \u2208 Finset.Icc a b, ((truncate S) i : \u2124)) = (\u2211 i \u2208 Finset.Icc (emb a) (emb b), (S i : \u2124)) := by\n    calc\n      (\u2211 i \u2208 Finset.Icc a b, ((truncate S) i : \u2124)) = (\u2211 i \u2208 Finset.Icc a b, (S (emb i) : \u2124)) := by\n        simp [truncate]\n      _ = (\u2211 i \u2208 Finset.Icc a b, (S (emb_embedding i) : \u2124)) := by simp [emb_embedding]\n      _ = (\u2211 i \u2208 Finset.map emb_embedding (Finset.Icc a b), (S i : \u2124)) := by\n        simpa [emb_embedding] using (Finset.sum_map (Finset.Icc a b) emb_embedding (\u03bb x : Fin (n+2) => (S x : \u2124))).symm\n      _ = (\u2211 i \u2208 Finset.Icc (emb a) (emb b), (S i : \u2124)) := by rw [map_emb_Icc_eq a b]\n  rw [hsum_eq]\n  exact hsum"

      "lean": "@[blueprint (statement := /-- truncate (ext\u2082 T) = T. -/)\n  (proof := /-- By definition of truncate and ext\u2082. -/)]\nlemma truncate_ext\u2082 {n : \u2115} (T : Fin n \u2192 \u2124\u02e3) : truncate (ext\u2082 T) = T := by\n  ext i\n  simp [truncate, ext\u2082, emb]"

      "lean": "@[blueprint (statement := /-- Truncating preserves nonnegative prefixes. -/)\n  (proof := /-- Using filter_emb_eq to transfer sums. -/)]\nlemma truncate_prefixes_nonneg {n : \u2115} (S : Fin (n+2) \u2192 \u2124\u02e3) (hS : prefixes_nonneg S) : prefixes_nonneg (truncate S) := by\n  intro b\n  dsimp [prefixes_nonneg, truncate]\n  let s := ((Finset.univ : Finset (Fin n)).filter (\u03bb i => i \u2264 b))\n  have hsum_eq : (\u2211 i \u2208 s, (S (emb i) : \u2124)) = (\u2211 j \u2208 s.map emb_embedding, (S j : \u2124)) := by\n    simpa [emb_embedding] using (Finset.sum_map (s := s) (e := emb_embedding) (f := \u03bb j : Fin (n+2) => (S j : \u2124))).symm\n  calc\n    (\u2211 i \u2208 s, (S (emb i) : \u2124)) = (\u2211 j \u2208 s.map emb_embedding, (S j : \u2124)) := hsum_eq\n    _ = (\u2211 j \u2208 ((Finset.univ : Finset (Fin (n+2))).filter (\u03bb i => i \u2264 emb b)), (S j : \u2124)) := by\n      rw [filter_emb_eq b]\n    _ \u2265 0 := hS (emb b)"

      "statement": "Partition of Finset.univ (Fin (n+2)) into the image of emb and the two last positions.",
      "is_main": false,
      "col": 0,
      "level": 8,
      "lean": "@[blueprint (statement := /-- Partition of Finset.univ (Fin (n+2)) into the image of emb and the two last positions. -/)\n  (proof := /-- By case analysis on i.val. -/)]\nlemma univ_partition {n : \u2115} : (Finset.univ : Finset (Fin (n+2))) = \n    Finset.map (emb_embedding : Fin n \u21aa Fin (n+2)) (Finset.univ : Finset (Fin n)) \u222a \n    {(\u27e8n, by omega\u27e9 : Fin (n+2)), (\u27e8n+1, by omega\u27e9 : Fin (n+2))} := by\n  ext x\n  constructor\n  \u00b7 intro hx\n    -- hx : x \u2208 univ, trivial\n    -- need to show x \u2208 (map ...) \u222a {..., ...}\n    by_cases h : x.val < n\n    \u00b7 -- then x is in the image\n      let i : Fin n := \u27e8x.val, h\u27e9\n      have hx_eq_emb_i : x = emb i := by\n        apply Fin.ext\n        simp [emb, i]\n      have mem_map : x \u2208 Finset.map emb_embedding (Finset.univ : Finset (Fin n)) := by\n        apply Finset.mem_map.mpr\n        exact \u27e8i, Finset.mem_univ _, hx_eq_emb_i\u27e9\n      exact Finset.mem_union_left _ mem_map\n    \u00b7 -- x.val \u2265 n\n      have hx_val_lt : x.val < n+2 := x.2\n      have hx_val_ge_n : n \u2264 x.val := by omega\n      have hx_val_le_n_plus_one : x.val \u2264 n+1 := by omega\n      have hx_val_eq_n_or_np1 : x.val = n \u2228 x.val = n+1 := by omega\n      rcases hx_val_eq_n_or_np1 with (h_eq_n | h_eq_np1)\n      \u00b7 have hx_eq_last1 : x = (\u27e8n, by omega\u27e9 : Fin (n+2)) := by\n          apply Fin.ext\n          simp [h_eq_n]\n        have mem_set : x \u2208 ({(\u27e8n, by omega\u27e9 : Fin (n+2)), (\u27e8n+1, by omega\u27e9 : Fin (n+2))} : Finset (Fin (n+2))) := by\n          apply Finset.mem_insert.mpr\n          left\n          exact hx_eq_last1\n        exact Finset.mem_union_right _ mem_set\n      \u00b7 have hx_eq_last2 : x = (\u27e8n+1, by omega\u27e9 : Fin (n+2)) := by\n          apply Fin.ext\n          simp [h_eq_np1]\n        have mem_set : x \u2208 ({(\u27e8n, by omega\u27e9 : Fin (n+2)), (\u27e8n+1, by omega\u27e9 : Fin (n+2))} : Finset (Fin (n+2))) := by\n          apply Finset.mem_insert.mpr\n          right\n          apply Finset.mem_singleton.mpr\n          exact hx_eq_last2\n        exact Finset.mem_union_right _ mem_set\n  \u00b7 intro hx\n    -- hx : x \u2208 (map ...) \u222a {..., ...}\n    rcases Finset.mem_union.mp hx with (hx_map | hx_set)\n    \u00b7 -- x \u2208 map ...\n      rcases Finset.mem_map.mp hx_map with \u27e8i, hi, rfl\u27e9\n      exact Finset.mem_univ _\n    \u00b7 -- x \u2208 {..., ...}\n      -- hx_set : x \u2208 insert a (singleton b)\n      rcases Finset.mem_insert.mp hx_set with (hx_eq | hx_sing)\n      \u00b7 subst hx_eq\n        exact Finset.mem_univ _\n      \u00b7 rcases Finset.mem_singleton.mp hx_sing with rfl\n        exact Finset.mem_univ _"
    },

      "level": 8,
      "lean": "@[blueprint (statement := /-- Disjointness of the two parts in univ_partition. -/)\n  (proof := /-- By value comparison. -/)]\nlemma univ_partition_disjoint {n : \u2115} : Disjoint (Finset.map (emb_embedding : Fin n \u21aa Fin (n+2)) (Finset.univ : Finset (Fin n)))\n    {(\u27e8n, by omega\u27e9 : Fin (n+2)), (\u27e8n+1, by omega\u27e9 : Fin (n+2))} := by\n  apply Finset.disjoint_left.mpr\n  intro x hx\n  have hx_val_lt_n : x.val < n := by\n    rcases Finset.mem_map.mp hx with \u27e8a, _, ha\u27e9\n    have : emb a = x := ha\n    have ha_val_lt_n : a.val < n := a.2\n    calc\n      x.val = (emb a).val := by symm; exact congr_arg Fin.val ha\n      _ = a.val := rfl\n      _ < n := ha_val_lt_n\n  intro hx2\n  rcases Finset.mem_insert.mp hx2 with (hx2' | hx2')\n  \u00b7 -- hx2' : x = \u27e8n, ...\u27e9\n    have hx_val_eq_n : x.val = n := by simpa using congr_arg Fin.val hx2'\n    have : x.val < x.val := by\n      calc\n        x.val < n := hx_val_lt_n\n        _ = x.val := by symm; exact hx_val_eq_n\n    exact lt_irrefl _ this\n  \u00b7 -- hx2' : x \u2208 {\u27e8n+1, ...\u27e9}\n    have hx_val_eq_np1 : x.val = n+1 := by\n      simpa [Finset.mem_singleton.mp hx2'] using rfl\n    have : x.val < x.val := by\n      calc\n        x.val < n := hx_val_lt_n\n        _ < n+1 := by omega\n        _ = x.val := by symm; exact hx_val_eq_np1\n    exact lt_irrefl _ this"
    }

                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
