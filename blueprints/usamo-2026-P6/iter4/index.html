    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #141414;
            --controls-bg: rgba(255, 255, 255, 0.95);
            --controls-border: #d0d0d0;
            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

        const data = {
  "nodes": [
    {
      "id": "both_odd_solution",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 16.65,
      "proof_length": 52,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "theorem",
      "statement": "If a and b are positive odd integers and \u03c6(ab+1) divides a^2+b^2+1, then a is a Fibonacci number.",
      "is_main": false,
      "col": 0,
      "level": 1,
      "lean": "@[blueprint\n  (statement := /-- If a and b are positive odd integers and \u03c6(ab+1) divides a^2+b^2+1, then a is a Fibonacci number. -/)\n  (proof := /-- Since a,b are odd, ab+1 is even and >2 unless a=b=1. If ab+1 > 2, then by Mathlib's `Nat.totient_even`, \u03c6(ab+1) is even. But a^2+b^2+1 is odd, so an even number cannot divide an odd number, contradiction. Hence ab+1 \u2264 2, so ab+1 = 2, a=b=1. Then a = 1 = `Nat.fib 1`. -/)]\nlemma both_odd_solution (a b : \u2115) (ha : 0 < a) (hb : 0 < b) (ha_odd : a % 2 = 1) (hb_odd : b % 2 = 1)\n    (h : Nat.totient (a * b + 1) \u2223 a ^ 2 + b ^ 2 + 1) : \u2203 k : \u2115, Nat.fib k = a := by\n  have h_sum_odd : Odd (a ^ 2 + b ^ 2 + 1) := by\n    rw [Nat.odd_iff]\n    have ha_mod2 : a \u2261 1 [MOD 2] := by\n      simpa [Nat.ModEq] using ha_odd\n    have hb_mod2 : b \u2261 1 [MOD 2] := by\n      simpa [Nat.ModEq] using hb_odd\n    have ha_sq_mod2 : a^2 \u2261 1^2 [MOD 2] :=\n      ha_mod2.pow 2\n    have hb_sq_mod2 : b^2 \u2261 1^2 [MOD 2] :=\n      hb_mod2.pow 2\n    have h_sq_sum_mod2 : a^2 + b^2 \u2261 1^2 + 1^2 [MOD 2] :=\n      ha_sq_mod2.add hb_sq_mod2\n    have h_one_sq : 1^2 = 1 := by norm_num\n    have h_one_sq_add : 1^2 + 1^2 = 2 := by norm_num\n    have h_two_mod2 : 2 \u2261 0 [MOD 2] := by decide\n    have h_sum_mod2 : a^2 + b^2 \u2261 0 [MOD 2] := by\n      calc\n        a^2 + b^2 \u2261 1^2 + 1^2 [MOD 2] := h_sq_sum_mod2\n        _ = 2 := by norm_num\n        _ \u2261 0 [MOD 2] := by decide\n    have h_total_mod2 : a^2 + b^2 + 1 \u2261 0 + 1 [MOD 2] :=\n      h_sum_mod2.add (by rfl : (1 : \u2115) \u2261 1 [MOD 2])\n    have h_zero_add_one : (0 : \u2115) + 1 = 1 := by norm_num\n    simpa [Nat.ModEq, h_zero_add_one] using h_total_mod2\n  have h_phi_odd : Odd (Nat.totient (a * b + 1)) :=\n    Odd.of_dvd_nat h_sum_odd h\n  rcases (Nat.odd_totient_iff.mp h_phi_odd) with (h1 | h2)\n  \u00b7 -- case a*b+1 = 1\n    have h_mul_pos : 0 < a*b := mul_pos ha hb\n    have : 2 \u2264 a*b + 1 := by omega\n    omega\n  \u00b7 -- case a*b+1 = 2\n    have h_mul : a*b = 1 := by omega\n    have ha1 : a = 1 := Nat.eq_one_of_mul_eq_one_right h_mul\n    use 1\n    rw [ha1]\n    norm_num"

    {
      "id": "different_parity_solution",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 16.23,
      "proof_length": 47,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "theorem",
      "statement": "If a,b are positive integers with different parity and \u03c6(ab+1) \u2223 a^2+b^2+1, then a is a Fibonacci number.",
      "is_main": false,
      "col": 0,
      "level": 1,
      "lean": "@[blueprint\n  (statement := /-- If a,b are positive integers with different parity and \u03c6(ab+1) \u2223 a^2+b^2+1, then a is a Fibonacci number. -/)\n  (proof := /-- Since a,b have different parity, n = ab+1 is odd and a^2+b^2+1 \u2261 2 mod 4, so 4 \u2224 \u03c6(n). By `totient_not_multiple_of_four_implies_prime_power`, n = p^m for some prime p \u2261 3 mod 4. Then ab = p^m - 1. If m=1, `prime_case_solution` applies; if m\u22652, `prime_power_solution` applies. -/)]\nlemma different_parity_solution (a b : \u2115) (ha : 0 < a) (hb : 0 < b) (h_parity : a % 2 \u2260 b % 2)\n    (h : Nat.totient (a * b + 1) \u2223 a ^ 2 + b ^ 2 + 1) : \u2203 k : \u2115, Nat.fib k = a := by\n  have ha_mod2_0_or_1 : a % 2 = 0 \u2228 a % 2 = 1 := Nat.mod_two_eq_zero_or_one a\n  have hb_mod2_0_or_1 : b % 2 = 0 \u2228 b % 2 = 1 := Nat.mod_two_eq_zero_or_one b\n  have h_sq_mod4_even (x : \u2115) (hx : x % 2 = 0) : x^2 % 4 = 0 := by\n    have hx2 : 2 \u2223 x := Nat.dvd_of_mod_eq_zero hx\n    rcases hx2 with \u27e8k, hx2\u27e9\n    rw [hx2]\n    have h4 : 4 \u2223 (2*k)^2 := by\n      use k^2\n      ring\n    exact Nat.mod_eq_zero_of_dvd h4\n  have h_sq_mod4_odd (x : \u2115) (hx : x % 2 = 1) : x^2 % 4 = 1 := by\n    have hodd : Odd x := by\n      rcases Nat.even_or_odd x with (h | h)\n      \u00b7 rw [Nat.even_iff] at h\n        rw [h] at hx\n        omega\n      \u00b7 exact h\n    rcases hodd with \u27e8k, hodd\u27e9\n    rw [hodd]\n    have h4 : 4 \u2223 4*k^2 + 4*k := by\n      use k^2 + k\n      ring\n    have hmod : (4*k^2 + 4*k) % 4 = 0 := Nat.mod_eq_zero_of_dvd h4\n    calc\n      ((2*k + 1)^2) % 4 = (4*k^2 + 4*k + 1) % 4 := by ring\n      _ = ((4*k^2 + 4*k) % 4 + 1 % 4) % 4 := by simp [Nat.add_mod]\n      _ = (0 + 1) % 4 := by simp [hmod]\n      _ = 1 % 4 := by simp\n      _ = 1 := by norm_num\n  have h_mod4 : (a^2 + b^2 + 1) % 4 = 2 := by\n    rcases ha_mod2_0_or_1 with (ha0 | ha1)\n    \u00b7 rcases hb_mod2_0_or_1 with (hb0 | hb1)\n      \u00b7 exfalso; exact h_parity (ha0.trans hb0.symm)\n      \u00b7 have ha_sq_mod4 : a^2 % 4 = 0 := h_sq_mod4_even a ha0\n        have hb_sq_mod4 : b^2 % 4 = 1 := h_sq_mod4_odd b hb1\n        calc\n          (a^2 + b^2 + 1) % 4 = ((a^2 % 4) + (b^2 % 4) + 1 % 4) % 4 := by simp [Nat.add_mod]\n          _ = (0 + 1 + 1) % 4 := by simp [ha_sq_mod4, hb_sq_mod4]\n          _ = 2 % 4 := by norm_num\n          _ = 2 := by norm_num\n    \u00b7 rcases hb_mod2_0_or_1 with (hb0 | hb1)\n      \u00b7 have ha_sq_mod4 : a^2 % 4 = 1 := h_sq_mod4_odd a ha1\n        have hb_sq_mod4 : b^2 % 4 = 0 := h_sq_mod4_even b hb0\n        calc\n          (a^2 + b^2 + 1) % 4 = ((a^2 % 4) + (b^2 % 4) + 1 % 4) % 4 := by simp [Nat.add_mod]\n          _ = (1 + 0 + 1) % 4 := by simp [ha_sq_mod4, hb_sq_mod4]\n          _ = 2 % 4 := by norm_num\n          _ = 2 := by norm_num\n      \u00b7 exfalso; exact h_parity (ha1.trans hb1.symm)\n  have h_not_4 : \u00ac 4 \u2223 Nat.totient (a * b + 1) := by\n    intro h4\n    have h4' : 4 \u2223 a^2 + b^2 + 1 := Nat.dvd_trans h4 h\n    have h_mod4_zero : (a^2 + b^2 + 1) % 4 = 0 := Nat.mod_eq_zero_of_dvd h4'\n    rw [h_mod4] at h_mod4_zero\n    norm_num at h_mod4_zero\n  have hn_odd : (a * b + 1) % 2 = 1 := by\n    have hprod_mod2 : (a * b) % 2 = 0 := by\n      calc\n        (a * b) % 2 = ((a % 2) * (b % 2)) % 2 := by simp [Nat.mul_mod]\n        _ = 0 := by\n          have htemp : a % 2 * b % 2 = 0 := by\n            rcases ha_mod2_0_or_1 with (ha0 | ha1)\n            \u00b7 simp [ha0]\n            \u00b7 rcases hb_mod2_0_or_1 with (hb0 | hb1)\n              \u00b7 simp [ha1, hb0]\n              \u00b7 exfalso; exact h_parity (ha1.trans hb1.symm)\n          simp [htemp]\n    calc\n      (a * b + 1) % 2 = ((a * b) % 2 + 1 % 2) % 2 := by simp [Nat.add_mod]\n      _ = (0 + 1) % 2 := by simp [hprod_mod2]\n      _ = 1 % 2 := by simp\n      _ = 1 := by norm_num\n  have h_prime_power : \u2203 (p : \u2115) (m : \u2115), Nat.Prime p \u2227 p % 4 = 3 \u2227 (a * b + 1) = p ^ m :=\n    totient_not_mult ith \u27e8e, r, h_not_dvd, hn_eq\u27e9\n    -- hn_eq : n = p ^ e * r,  h_not_dvd : \u00ac p \u2223 r\n    have hp_odd : Odd p := hn_odd'.of_dvd_nat hp_dvd\n    have h_cop : Nat.Coprime (p ^ e) r := by\n      have h_cop_p_r : Nat.Coprime p r := (hp_prime.coprime_iff_not_dvd).mpr h_not_dvd\n      exact h_cop_p_r.pow_left e\n    have h_tot : Nat.totient n = Nat.totient (p ^ e) * Nat.totient r := by\n      rw [hn_eq, Nat.totient_mul h_cop]\n    have h4_not_dvd_tot : \u00ac 4 \u2223 Nat.totient (p ^ e) * Nat.totient r := by\n      rw [\u2190 h_tot]\n      exact h\n    have he_pos : e \u2260 0 := by\n      intro he0\n      have hn_eq_r : n = r := by\n        rw [hn_eq, he0, pow_zero, one_mul]\n      have : p \u2223 r := by\n        rw [\u2190 hn_eq_r]\n        exact hp_dvd\n      exact h_not_dvd this\n    by_cases hr1 : r = 1\n    \u00b7 -- then n = p^e\n      have hn_eq' : n = p ^ e := by\n        rw [hn_eq, hr1, mul_one]\n      by_cases hp_mod4 : p % 4 = 3\n      \u00b7 refine \u27e8p, e, hp_prime, hp_mod4, hn_eq'\u27e9\n      \u00b7 have hp_mod4_one : p % 4 = 1 := by\n          have hp_mod2_one : p % 2 = 1 := Nat.odd_iff.mp hp_odd\n          rcases (Nat.odd_mod_four_iff.mp hp_mod2_one) with (h1 | h3)\n          \u00b7 exact h1\n          \u00b7 exfalso; exact hp_mod4 h3\n        have h4_dvd_tot_pow : 4 \u2223 Nat.totient (p ^ e) :=\n          four_dvd_totient_prime_pow_of_mod_four_eq_one p e hp_prime he_pos hp_mod4_one\n        have h4_dvd_tot : 4 \u2223 Nat.totient n := by\n          rw [h_tot, hr1, Nat.totient_one, mul_one]\n          exact h4_dvd_tot_pow\n        exfalso; exact h h4_dvd_tot\n    \u00b7 -- r \u2260 1, we will get a contradiction via evenness\n      have hr_odd : Odd r := by\n        have h_odd_prod : Odd (p ^ e * r) := by\n          rw [\u2190 hn_eq]\n          exact hn_odd'\n        exact h_odd_prod.of_mul_right\n      have hr_mod2 : r % 2 = 1 := Nat.odd_iff.mp hr_odd\n      have hr_pos : 0 < r := by\n        by_contra hle\n        push_neg at hle\n       "lean": "@[blueprint\n  (statement := /-- For positive integers a,b, if \u03c6(ab+1) divides a^2+b^2+1, then a is a Fibonacci number. -/)\n  (proof := /-- Case analysis on parity of a and b. If both odd, apply `both_odd_solution`. If different parities, apply `different_parity_solution`. -/)]\ntheorem usamo_2026_p6_a (a b : \u2115) (ha : 0 < a) (hb : 0 < b)\n    (h : Nat.totient (a * b + 1) \u2223 a ^ 2 + b ^ 2 + 1) :\n    \u2203 k : \u2115, Nat.fib k = a := by\n  by_cases hpar : a % 2 = b % 2\n  \u00b7 by_cases ha_odd : a % 2 = 1\n    \u00b7 have hb_odd : b % 2 = 1 := by\n        rw [hpar] at ha_odd\n        exact ha_odd\n      exact both_odd_solution a b ha hb ha_odd hb_odd h\n    \u00b7 have ha_even : a % 2 = 0 := by\n        have := Nat.mod_two_eq_zero_or_one a\n        rcases this with (h0 | h1)\n        \u00b7 exact h0\n        \u00b7 exfalso; exact ha_odd h1\n      have hb_even : b % 2 = 0 := by\n        rw [hpar] at ha_even\n        exact ha_even\n      have h2_dvd_a : 2 \u2223 a := Nat.dvd_of_mod_eq_zero ha_even\n      have h2_dvd_b : 2 \u2223 b := Nat.dvd_of_mod_eq_zero hb_even\n      have ha_even' : Even a := by\n        rw [even_iff_two_dvd]\n        exact h2_dvd_a\n      have hb_even' : Even b := by\n        rw [even_iff_two_dvd]\n        exact h2_dvd_b\n      have ha2 : 2 \u2264 a := Nat.le_of_dvd ha h2_dvd_a\n      have hb2 : 2 \u2264 b := Nat.le_of_dvd hb h2_dvd_b\n      have h_gt_two : 2 < a * b + 1 := by\n        nlinarith\n      have h_even_tot : Even (Nat.totient (a * b + 1)) :=\n        Nat.totient_even h_gt_two\n      have ha_sq_even : Even (a ^ 2) :=\n        ha_even'.pow_of_ne_zero (by norm_num : (2 : \u2115) \u2260 0)\n      have hb_sq_even : Even (b ^ 2) :=\n        hb_even'.pow_of_ne_zero (by norm_num : (2 : \u2115) \u2260 0)\n      have h_even_sum_sq : Even (a ^ 2 + b ^ 2) := by\n        rw [Nat.even_add]\n        constructor\n        \u00b7 intro\n          exact hb_sq_even\n        \u00b7 intro\n          exact ha_sq_even\n      h        _ = (a' ^ 2 + b' ^ 2 + 1) - a' ^ 2 := by rw [h_eq']\n            _ = b' ^ 2 + 1 := by omega\n        have h_pos_mul : 0 < a' * (k' * b' - a') := by\n          rw [h_mul_eq]\n          exact Nat.succ_pos _\n        have h_sub_pos : 0 < k' * b' - a' :=\n          ((Nat.mul_pos_iff_of_pos_left ha').mp h_pos_mul)\n        set a'' := k' * b' - a' with ha''_def\n        have ha''_pos : 0 < a'' := h_sub_pos\n        have h_mul_eq2 : a' * a'' = b' ^ 2 + 1 := by\n          dsimp [a'']; exact h_mul_eq\n        have ha''_lt_a' : a'' < a' := by\n          have h_lt_sq : b' ^ 2 + 1 < a' ^ 2 := by\n            have h_sq_lt' : b' ^ 2 + 1 < (b' + 1)^2 := by nlinarith\n            have h_sq_ge : (b' + 1)^2 \u2264 a' ^ 2 := by\n              have h_succ_le : b' + 1 \u2264 a' := Nat.succ_le_of_lt h_lt\n              exact Nat.pow_le_pow_left h_succ_le 2\n            exact lt_of_lt_of_le h_sq_lt' h_sq_ge\n          have h_mul_lt : a' * a'' < a' * a' := by\n            calc\n              a' * a'' = b' ^ 2 + 1 := h_mul_eq2\n              _ < a' ^ 2 := h_lt_sq\n              _ = a' * a' := by ring\n          exact Nat.lt_of_mul_lt_mul_left h_mul_lt\n        have h_sum_eq : a' + a'' = k' * b' := by\n          dsimp [a'']\n          omega\n        have h_eq_new : a'' ^ 2 + b' ^ 2 + 1 = k' * a'' * b' := by\n          calc\n            a'' ^ 2 + b' ^ 2 + 1 = a'' ^ 2 + (b' ^ 2 + 1) := by ring\n            _ = a'' ^ 2 + (a' * a'') := by rw [h_mul_eq2]\n            _ = a'' * (a'' + a') := by ring\n            _ = a'' * (k' * b') := by\n              rw [add_comm a'' a', h_sum_eq]\n            _ = k' * a'' * b' := by ring\n        have h_sum_lt : a'' + b' < s := by\n          rw [\u2190 h_sum]\n          omega\n        have hPm : P (a'' + b') := ih (a'' + b') h_sum_lt\n        have hk'_eq_3 : k' = 3 := hPm a'' b' k' rfl ha''_pos hb' hk' h_eq_new\n        exact hk'_eq_3\n      \u00b7 have h_lt' : a' < b' := by\n          omega\n        have h_mul_eq' : b' * (k' * a' - b') = a' ^ 2 + 1 := b  := by rw [hc]\n        _ = c*(c + a) := by ring\n        _ = c*(a + c) := by rw [add_comm]\n        _ = c*(b*k) := by rw [h_sum_eq]\n        _ = (c*b)*k := by ring\n    have h_div2 : (c*b) \u2223 (c^2 + b^2 + 1) := by\n      rw [h_eq2]\n      exact \u27e8k, by ring\u27e9\n    exact \u27e8c, hc_pos, hc_lt_a, h_div2, h_eq2\u27e9\n  have hdiv_copy : a*b \u2223 a^2+b^2+1 := hdiv\n  rcases hdiv with \u27e8k, hk\u27e9\n  -- hk: a^2+b^2+1 = (a*b)*k\n  -- define P(n) := \u2200 a b, a+b = n \u2192 0 < a \u2192 0 < b \u2192 (a*b \u2223 a^2+b^2+1) \u2192 a^2+b^2+1 = 3*(a*b)\n  set P : \u2115 \u2192 Prop := \u03bb n => \u2200 (a' b' : \u2115), a' + b' = n \u2192 0 < a' \u2192 0 < b' \u2192 (a'*b' \u2223 a'^2+b'^2+1) \u2192 a'^2+b'^2+1 = 3*(a'*b') with hP\n  have hP0 : \u2200 n, (\u2200 m < n, P m) \u2192 P n := by\n    intro n hn_ind\n    intro a' b' h_sum ha' hb' hdiv'\n    rcases hdiv' with \u27e8k', hk'\u27e9\n    -- we need to show a'^2 + b'^2 + 1 = 3*(a'*b')\n    -- by cases on a' = b', a' > b', b' > a'\n    by_cases h_eq' : a' = b'\n    \u00b7 subst h_eq'\n      -- a' = b'\n      have hdiv'' : a'*a' \u2223 2*a'^2 + 1 := by\n        have : 2*a'^2 + 1 = a'^2 + a'^2 + 1 := by ring\n        rw [this, hk']\n        exact \u27e8k', by ring\u27e9\n      have ha'_sq_dvd_2a'_sq : a'*a' \u2223 2*a'^2 := by\n        use 2\n        ring\n      have ha'_sq_dvd_one : a'*a' \u2223 1 := by\n        exact ((Nat.dvd_add_iff_right ha'_sq_dvd_2a'_sq).mpr hdiv'')\n      have ha'_sq_eq_one : a'*a' = 1 := Nat.eq_one_of_dvd_one ha'_sq_dvd_one\n      have ha'_eq_one : a' = 1 := Nat.eq_one_of_mul_eq_one_right ha'_sq_eq_one\n      subst ha'_eq_one\n      norm_num\n    \u00b7 by_cases h_gt' : a' > b'\n      \u00b7 -- a' > b'\n        rcases vieta_jump a' b' k' ha' hb' hk' h_gt' with \u27e8c, hc_pos, hc_lt_a', h_div2, h_eq2\u27e9\n        have h_sum_lt : c + b' < n := by\n          omega\n        have hc_pos' : 0 < c := hc_pos\n        have h_div2' : c * b' \u2223 c^2 + b'^2 + 1 := h_div2\n        have ih_cb := hn_ind (c + b') h_sum_lt c b' (by omega) hc_pos' hb' h_div2'\n        -- ih_cb : c^2 + b'^2 + 1 = 3*(c*b')\n        have h_cb_pos : 0 < c*b' := mul_pos hc_pos' hb'\n        have hk'_eq3 : k' = 3 := by\n          apply (Nat.mul_left_cancel h_cb_pos)\n          calc\n            (c*b')*k' = c^2 + b'^2 + 1 := by symm; exact h_eq2\n            _ = 3*(c*b') := ih_cb\n            _ = (c*b')*3 := by ring\n        rw [hk', hk'_eq3]\n        ring\n      \u00b7 -- b' > a'\n        have h_gt'' : b' > a' := by omega\n        have hk'' : b'^2 + a'^2 + 1 = (b'*a')*k' := by\n          calc\n            b'^2 + a'^2 + 1 = a'^2 + b'^2 + 1 := by ring\n            _ = (a'*b')*k' := hk'\n            _ = (b'*a')*k' := by ring\n        rcases vieta_jump b' a' k' hb' ha' hk'' h_gt'' with \u27e8c, hc_pos, hc_lt_b', h_div2, h_eq2\u27e9\n        have h_sum_lt : c + a' < n := by\n          omega\n        have hc_pos' : 0 < c := hc_pos\n        have ha'_pos' : 0 < a' := ha'\n        have h_div2' : c * a' \u2223 c^2 + a'^2 + 1 := h_div2\n        have ih_ca := hn_ind (c + a') h_sum_lt c a' (by omega) hc_pos' ha'_pos' h_div2'\n        -- ih_ca : c^2 + a'^2 + 1 = 3*(c*a')\n        have h_ca_pos : 0 < c*a' := mul_pos hc_pos' ha'\n        have hk'_eq3 : k' = 3 := by\n          apply (Nat.mul_left_cancel h_ca_pos)\n          calc\n            (c*a')*k' = c^2 + a'^2 + 1 := by symm; exact h_eq2\n            _ = 3*(c*a') := ih_ca\n            _ = (c*a')*3 := by ring\n        rw [hk', hk'_eq3]\n        ring\n  have h_total : P (a+b) := Nat.strong_induction_on (a+b) hP0\n  exact h_total a b rfl ha hb hdiv_copy"

        // Color helpers for legacy data without explicit colors
        const defaultColors = ["#3b82f6", "#60a5fa", "#fb923c", "#a78bfa", "#f472b6", "#fbbf24", "#34d399"];

            // Extract file index from group like "file0", "file1"

        const zoom = d3.zoom()
            .scaleExtent([0.1, 10])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Set initial zoom to fit the graph better
        let currentZoomScale = 0.45;

        function applyZoom(scale) {
            currentZoomScale = scale;
            const transform = d3.zoomIdentity
                .translate(width / 2 * (1 - scale), height / 2 * (1 - scale))
                .scale(scale);
            svg.call(zoom.transform, transform);
        }

        applyZoom(currentZoomScale);

        // Create force simulation with radial layout
        // Push external nodes to outer ring, keep local nodes in center
        let localSpacing = 175;  // Spacing for local nodes (adjustable)
        const externalSpacing = 50;  // Fixed spacing for external nodes
        let externalRadius = localSpacing + 300;  // Radius for external node ring (scales with spacing)

        const linkForce = d3.forceLink(data.edges)
            .id(d => d.id)
            .distance(d => {
                // Only apply spacing to local-to-local edges
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

        const chargeForce = d3.forceManyBody().strength(d => {
            // Stronger charge for file nodes, weaker for external
            return d.group === "external" ? -50 : -localSpacing * 2;
        });

        // Custom force to contain local nodes inside the external perimeter
        function forceContain(radius, centerX, centerY, strength) {
            let nodes;
            function force(alpha) {
                for (const d of nodes) {
                    if (d.group === "external") continue;
                    const dx = d.x - centerX;
                    const dy = d.y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxRadius = radius - 50; // Keep local nodes inside with margin
                    if (dist > maxRadius) {
                        const k = (dist - maxRadius) / dist * strength * alpha;
                        d.vx -= dx * k;
                        d.vy -= dy * k;
                    }
                }
            }
            force.initialize = function(_) { nodes = _; };
            force.radius = function(_) { return arguments.length ? (radius = _, force) : radius; };
            return force;
        }

        const fileCount = (data.files || []).length || 1;

        // Set up layout forces based on number of files
        let simulation;
        let containForce = forceContain(externalRadius, width / 2, height / 2, 0.5);

        if (fileCount === 1) {
            // Single file: use centered radial layout (original behavior)
            simulation = d3.forceSimulation(data.nodes)
                .force("link", linkForce)
                .force("charge", chargeForce)
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(d => d.radius + 5))
                .force("contain", containForce)
                .force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));
        } else {
            // Multiple files: use clustering layout with separate positions
            const filePositions = [];
            for (let i = 0; i < fileCount; i++) {
                const angle = (i * 2 * Math.PI / fileCount) - Math.PI / 2; // Start at top
                const radius = 150; // Distance from center
                filePositions.push({
                    x: width / 2 + radius * Math.cos(angle),
                    y: height / 2 + radius * Math.sin(angle)
                });
            }

            const forceX = d3.forceX(d => {
                if (d.group === "external") return width / 2;
                return filePositions[d.file_index].x;
            }).strength(d => d.group === "external" ? 0 : 0.1);

            const forceY = d3.forceY(d => {
                if (d.group === "external") return height / 2;
                return filePositions[d.file_index].y;
            }).strength(d => d.group === "external" ? 0 : 0.1);

            simulation = d3.forceSimulation(data.nodes)
                .force("link", linkForce)
                .force("charge", chargeForce)
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(d => d.radius + 5))
                .force("contain", containForce)
                .force("x", forceX)
                .force("y", forceY)
                .force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : null,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0));
        }

        // --- Radial layout: each main theorem sits at the centre of its own concentric
        // rings; a node's ring = its depth from that theorem. P1 has two theorems
        // (left/right), so we lay out two ring systems side by side. ---
        const localNodes = data.nodes.filter(n => n.group !== "external");
        const numClusters = Math.max(1, ...localNodes.filter(n => n.col >= 0).map(n => n.col + 1));
        const clusterMax = {};                       // deepest ring per cluster
        localNodes.forEach(n => { if (n.col >= 0) clusterMax[n.col] = Math.max(clusterMax[n.col] || 0, n.level || 0); });
        const maxRings = Math.max(0, ...Object.values(clusterMax));

        // Even starting angle per (cluster, ring) so the rings open already filled.
        const ringGroups = {};
        localNodes.forEach(d => { const k = d.col + "|" + d.level; (ringGroups[k] = ringGroups[k] || []).push(d); });
        Object.values(ringGroups).forEach(arr => arr.forEach((d, i) => { d._ang = 2 * Math.PI * (i + 0.5) / arr.length; }));

        const ringSpacing = () => localSpacing * 0.6;
        function clusterCentersX() {                 // pack ring systems left-to-right without overlap
            const RING = ringSpacing();
            const xs = [];
            let x = 0;
            for (let i = 0; i < numClusters; i++) {
                if (i > 0) x += ((clusterMax[i - 1] || 0) + (clusterMax[i] || 0) + 2) * RING;
                xs.push(x);
            }
            const mid = (xs[0] + xs[numClusters - 1]) / 2;
            return xs.map(v => v - mid + width / 2);
        }
        function clusterTarget(d, centers, RING) {
            if (d.col < 0) return { cx: width / 2, cy: height / 2 + (maxRings + 2) * RING, r: 0 };  // orphan, below
            return { cx: centers[d.col], cy: height / 2, r: (d.level || 0) * RING };
        }

        function applyHierarchy() {                  // (re)install the radial forces at current spacing
            const RING = ringSpacing();
            const centers = clusterCentersX();
            simulation.force("center", null);        // centres are absolute; skip global recentre
            simulation.force("contain", null);       // perimeter clamp would crush the outer rings
            simulation.force("rings", function (alpha) {
                for (const d of localNodes) {
                    const t = clusterTarget(d, centers, RING);
                    const dx = d.x - t.cx, dy = d.y - t.cy;
                    const dist = Math.hypot(dx, dy) || 1e-6;
                    const k = (t.r - dist) / dist * 0.8 * alpha;
                    d.vx += dx * k; d.vy += dy * k;
                }
            });
            simulation.force("radial", d3.forceRadial(   // keep any external nodes on their outer ring
                d => d.group === "external" ? externalRadius : 0, width / 2, height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0));
        }

        // Seed positions on the rings so the first frame is already arranged.
        (function seedRings() {
            const RING = ringSpacing();
            const centers = clusterCentersX();
            localNodes.forEach(d => {
                const t = clusterTarget(d, centers, RING);
                d.x = t.cx + t.r * Math.cos(d._ang);
                d.y = t.cy + t.r * Math.sin(d._ang);
            });
        })();

        applyHierarchy();

        // Pre-heat the simulation so it starts partially settled (smoother but still animated)
        simulation.stop();
        for (let i = 0; i < 100; i++) {
            simulation.tick();
        }

        // Create links - render external (grey) edges first, then file edges (for proper layering)
        const externalEdges = data.edges.filter(d => d.type === "external_type" || d.type === "external_value");
        const fileEdges = data.edges.filter(d => d.type === "local_type" || d.type === "local_value");

        const linkGroup = g.append("g");

        // External links first (behind)
        const externalLinks = linkGroup.append("g")
            .selectAll("line")
            .data(externalEdges)
            .join("line")
            .attr("class", "link")
            .attr("stroke", d => getEdgeColor(d))
            .attr("stroke-opacity", 0.4)
            .attr("stroke-width", 0.5);

        // File links second (on top)
        const fileLinks = linkGroup.append("g")
            .selectAll("line")
            .data(fileEdges)
            .join("line")
            .attr("class", "link")
            .attr("stroke", d => getEdgeColor(d))
            .attr("stroke-opacity", 0.8)
            .attr("stroke-width", 1.2)
            .attr("marker-end", "url(#arrow-file)");

        // Combine for easier manipulation
        const link = linkGroup.selectAll("line");

        // Create nodes
        const node = g.append("g")
            .selectAll("circle")
            .data(data.nodes)
            .join("circle")
            .attr("class", "node")
            .attr("r", d => d.radius)
            .attr("fill", d => getNodeColor(d))
            .style("cursor", "pointer")
            .call(drag(simulation));

        // Tooltip
        const tooltip = d3.select("#tooltip");

        node.on("mouseover", function(event, d) {
            const head = d.type ? `${d.type} ${d.id}` : d.id;
            const stmt = d.statement ? `<div style="margin-top:5px; font-weight:400">${d.statement}</div>` : "";
            tooltip.style("display", "block")
                .html(`<strong>${head}</strong>${stmt}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 10) + "px");

            // Start with URL highlight if present
            clearHighlight();
            applyUrlHighlight();

            // Add hover highlight on top
            const connectedNodes = new Set();
            connectedNodes.add(d.id);

            link.each(function(l) {
                if (l.source.id === d.id || l.target.id === d.id) {
                    connectedNodes.add(l.source.id);
                    connectedNodes.add(l.target.id);
                    // Use muted highlight for external edges
                    const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                    if (isExternalEdge) {
                        d3.select(this).classed("highlighted-external", true);
                    } else {
                        d3.select(this).classed("highlighted", true);
                    }
                }
            });

            node.classed("highlighted", n => connectedNodes.has(n.id));
        })
        .on("mouseout", function() {
            tooltip.style("display", "none");
            clearHighlight();
            applyUrlHighlight();
        });

        // Update positions on simulation tick
        const isFileEdge = d => d.type === "local_type" || d.type === "local_value";
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                // Stop file edges short of the target node so the arrowhead shows.
                .attr("x2", d => {
                    if (!isFileEdge(d)) return d.target.x;
                    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    const dist = Math.hypot(dx, dy) || 1;
                    return d.target.x - dx / dist * (d.target.radius + 6);
                })
                .attr("y2", d => {
                    if (!isFileEdge(d)) return d.target.y;
                    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    const dist = Math.hypot(dx, dy) || 1;
                    return d.target.y - dy / dist * (d.target.radius + 6);
                });

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
        });

        // Restart simulation with moderate alpha for visible but smooth settling
        simulation.alpha(0.3).restart();

        // URL hash management
        function updateHash() {
            const params = new URLSearchParams();
            params.set('spacing', d3.select("#spacingSlider").property('value'));
            params.set('external', d3.select("#showExternal").property('checked') ? '1' : '0');
            params.set('theme', d3.select("#themeSelect").property('value'));
            // Preserve highlight params (comma-separated)
            if (urlHighlightNodeIds.length > 0) {
                params.set('highlight', urlHighlightNodeIds.join(','));
                if (urlHighlightLocalOnly) {
                    params.set('local', 'true');
                }
                if (!urlHighlightEdges) {
                    params.set('edges', 'false');
                }
            }
            // Preserve embed param
            if (isEmbedMode) {
                params.set('embed', 'true');
            }
            // Preserve anchor
            if (anchorNodeId) {
                params.set('anchor', anchorNodeId);
            }
            // Preserve zoom
            if (currentZoomScale !== 0.45) {
                params.set('zoom', currentZoomScale.toFixed(2));
            }
            window.location.hash = params.toString();
        }

        // Track persistent URL-based highlight (can be multiple nodes)
        let urlHighlightNodeIds = [];
        let urlHighlightLocalOnly = false;
        let urlHighlightEdges = true;
        let isEmbedMode = false;
        let anchorNodeId = null;

        function applyAnchorTop(anchorId) {
            const anchorNode = data.nodes.find(n => n.id === anchorId);
            if (!anchorNode) {
                console.warn('Anchor node not found:', anchorId);
                return;
            }

            // Fix anchor at top center
            anchorNode.fx = width / 2;
            anchorNode.fy = 80;

            // Stronger repulsion from anchor node to push others away
            simulation.force("charge", d3.forceManyBody().strength(d => {
                if (d.id === anchorId) return -2000;
                if (d.group === "external") return -50;
                return -localSpacing * 2;
            }));

            simulation.alpha(0.5).restart();
        }

        function highlightNodes(nodeIds, { localOnly = false, edges = true } = {}) {
            const targetNodeIds = new Set(nodeIds.filter(id => data.nodes.find(n => n.id === id)));
            if (targetNodeIds.size === 0) return;

            if (edges) {
                link.each(function(l) {
                    if (targetNodeIds.has(l.source.id) || targetNodeIds.has(l.target.id)) {
                        // If localOnly, skip edges to external nodes
                        if (localOnly) {
                            const sourceExternal = l.source.group === "external";
                            const targetExternal = l.target.group === "external";
                            if (sourceExternal || targetExternal) return;
                        }
                        // Use muted highlight for external edges
                        const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                        if (isExternalEdge) {
                            d3.select(this).classed("highlighted-external", true);
                        } else {
                            d3.select(this).classed("highlighted", true);
                        }
                    }
                });
            }

            // Highlight all target nodes (with filled style)
            node.classed("url-highlighted", n => targetNodeIds.has(n.id));
        }

        function applyUrlHighlight() {
            if (urlHighlightNodeIds.length > 0) {
                highlightNodes(urlHighlightNodeIds, {
                    localOnly: urlHighlightLocalOnly,
                    edges: urlHighlightEdges
                });
            }
        }

        function clearHighlight() {
            link.classed("highlighted", false);
            link.classed("highlighted-external", false);
            node.classed("highlighted", false);
            node.classed("url-highlighted", false);
        }

        function restoreFromHash() {
            const hash = window.location.hash.slice(1);
            if (!hash) return;

            const params = new URLSearchParams(hash);

            // Restore spacing
            if (params.has('spacing')) {
                const spacing = +params.get('spacing');
                d3.select("#spacingSlider").property('value', spacing);
                localSpacing = spacing;
                externalRadius = spacing + 300;

                linkForce.distance(d => {
                    const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                    return isLocalEdge ? localSpacing : externalSpacing;
                });

                chargeForce.strength(d => {
                    return d.group === "external" ? -50 : -spacing * 2;
                });

                simulation.force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));

                applyHierarchy();
                simulation.alpha(0.3).restart();
            }

            // Restore external nodes visibility
            if (params.has('external')) {
                const showExternal = params.get('external') === '1';
                d3.select("#showExternal").property('checked', showExternal);

                node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
                link.style("display", l => {
                    if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                        return "none";
                    }
                    return "block";
                });
            }

            // Restore theme
            if (params.has('theme')) {
                const theme = params.get('theme');
                d3.select("#themeSelect").property('value', theme);
                document.body.classList.toggle('dark-mode', theme === 'dark');
                // Need to update colors after mode change
                setTimeout(updateColors, 50);
            }

            // Restore highlight (comma-separated list)
            if (params.has('highlight')) {
                urlHighlightNodeIds = params.get('highlight').split(',').map(s => s.trim()).filter(Boolean);
                urlHighlightLocalOnly = params.get('local') === 'true';
                urlHighlightEdges = params.get('edges') !== 'false';
                applyUrlHighlight();
            }

            // Restore embed mode
            if (params.get('embed') === 'true') {
                isEmbedMode = true;
                // Hide controls, nav overlay, and navigation panel
                d3.select(".controls").style("display", "none");
                d3.select(".nav-overlay").style("display", "none");
                d3.select(".navigation-panel").style("display", "none");
            }

            // Restore zoom
            if (params.has('zoom')) {
                const zoomScale = parseFloat(params.get('zoom'));
                if (!isNaN(zoomScale) && zoomScale >= 0.1 && zoomScale <= 10) {
                    applyZoom(zoomScale);
                }
            }

            // Restore anchor (pins node at top)
            if (params.has('anchor')) {
                anchorNodeId = params.get('anchor');
                applyAnchorTop(anchorNodeId);
            }
        }

        // Restore state from URL on load
        restoreFromHash();

        // Listen for manual URL hash changes
        window.addEventListener('hashchange', function() {
            // Reset state before restoring
            clearHighlight();
            urlHighlightNodeIds = [];
            urlHighlightLocalOnly = false;
            urlHighlightEdges = true;
            // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
