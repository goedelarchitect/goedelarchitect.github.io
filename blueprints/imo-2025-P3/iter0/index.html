    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #141414;
            --controls-bg: rgba(255, 255, 255, 0.95);
            --controls-border: #d0d0d0;
            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

      "level": 1,
      "lean": "@[blueprint\n  (statement := /-- If $f(q) = q$ for all primes $q > 2$, then $f(n) = n$ for any positive integer $n$. -/)\n  (proof := /-- For any prime $q > 2$, $hf(q,n)$ gives $q \\mid n^q - f(n)^q$. By FLT, $n^q \\equiv n \\pmod q$ and $f(n)^q \\equiv f(n) \\pmod q$, so $q \\mid n - f(n)$. Since this holds for infinitely many primes $q$, we must have $n - f(n) = 0$, thus $f(n) = n$. -/)]\nlemma case1_f_eq_n (f : \u2124 \u2192 \u2124) (hpos : \u2200 k : \u2124, k > 0 \u2192 f k > 0) (hf : \u2200 a b : \u2124, a > 0 \u2192 b > 0 \u2192 f a \u2223 b ^ a.toNat - (f b) ^ (f a).toNat) (h_case : \u2200 q : \u2115, q > 2 \u2192 Nat.Prime q \u2192 (f (q : \u2124)) = (q : \u2124)) (n : \u2124) (hn : n > 0) : f n = n := by\n  have h_div (q : \u2115) (hqprime : Nat.Prime q) (hqgt2 : q > 2) : (q : \u2124) \u2223 (n - f n) := by\n    have ha_pos : (q : \u2124) > 0 := by\n      have hq_pos : q > 0 := by omega\n      exact_mod_cast hq_pos\n    have hb_pos : n > 0 := hn\n    have hfaa : f (q : \u2124) = (q : \u2124) := h_case q hqgt2 hqprime\n    have h_div_orig : f (q : \u2124) \u2223 (n : \u2124) ^ ((q : \u2124).toNat) - (f n : \u2124) ^ ((f (q : \u2124)).toNat) := hf (q : \u2124) n ha_pos hb_pos\n    rw [hfaa] at h_div_orig\n    have h_toNat_q : ((q : \u2124).toNat) = q := by simp\n    rw [h_toNat_q] at h_div_orig\n    -- Now h_div_orig: (q : \u2124) \u2223 (n : \u2124) ^ q - (f n : \u2124) ^ q\n    have h_n_mod : (n : \u2124) ^ (q : \u2115) \u2261 (n : \u2124) [ZMOD (q : \u2124)] := flt_pow_mod (n : \u2124) q hqprime\n    have h_fn_mod : (f n : \u2124) ^ (q : \u2115) \u2261 (f n : \u2124) [ZMOD (q : \u2124)] := flt_pow_mod (f n : \u2124) q hqprime\n    have h_mod_sub : (n : \u2124) ^ (q : \u2115) - (f n : \u2124) ^ (q : \u2115) \u2261 (n : \u2124) - (f n : \u2124) [ZMOD (q : \u2124)] := by\n      exact h_n_mod.sub h_fn_mod\n    have h_mod_sub_dvd' : (q : \u2124) \u2223 ((n : \u2124) - (f n : \u2124)) - ((n : \u2124) ^ (q : \u2115) - (f n : \u2124) ^ (q : \u2115)       "statement": "Under the hypothesis f(q) = 1 for all primes q > 2, we have f(n) \u2264 4n.",

      "lean": "@[blueprint\n  (statement := /-- Under the hypothesis $f(q) = 1$ for all primes $q > 2$, we have $f(n) \\le 4n$. -/)\n  (proof := /-- If $f(n) = 1$, the inequality is trivial. Otherwise $f(n) = 2^k$ with $k \\ge 1$ by `f_pow_two`, and $n$ is even by `f_even`. Choose $q = 3$; then $2^k \\mid 3^n - 1$. By `padicValNat_two_three_pow_sub_one`, $k \\le v_2(3^n - 1) = v_2(n) + 2$. Hence $2^k \\le 2^{v_2(n)+2} = 4 \\cdot 2^{v_2(n)} \\le 4n$ by `pow_padicValNat_two_le`. -/)]\nlemma case2_bound (f : \u2124 \u2192 \u2124) (hpos : \u2200 k : \u2124, k > 0 \u2192 f k > 0) (hf : \u2200 a b : \u2124, a > 0 \u2192 b > 0 \u2192 f a \u2223 b ^ a.toNat - (f b) ^ (f a).toNat) (h_case : \u2200 q : \u2115, q > 2 \u2192 Nat.Prime q \u2192 (f (q : \u2124)) = 1) (n : \u2124) (hn : n > 0) : f n \u2264 4 * n := by\n  by_cases h_one : f n = 1\n  \u00b7 -- case f n = 1\n    have hpos_4n : 0 < 4 * n := by\n      have hpos_n : 0 < n := hn\n      nlinarith\n    have h1_le_4n : (1 : \u2124) \u2264 4 * n := by\n      nlinarith\n    simpa [h_one] using h1_le_4n\n  \u00b7 -- f n \u2260 1\n    have hpos_fn : f n > 0 := hpos n hn\n    have hfn_gt1 : f n > 1 := by\n      by_contra! hle\n      -- hle: f n \u2264 1, but >0, so f n = 1\n      have : f n = 1 := by omega\n      exact h_one this\n    -- f n is a power of 2\n    rcases f_pow_two f hpos hf h_case n hn with \u27e8k, hk\u27e9\n    -- n is even\n    have h_even : (2 : \u2124) \u2223 n := f_even f hpos hf h_case n hn hfn_gt1\n    have h_three_prime : Nat.Prime 3 := Nat.prime_three\n    have h_three_gt2 : (3 : \u2115) > 2 := by norm_num\n    have h_f3 : f (3 : \u2124) = 1 := h_case 3 h_three_gt2 h_three_prime\n    -- divisibility: f n \u2223 3^{n.toNat} - 1\n    have h_div : f n \u2223 (3 : \u2124) ^ (n.toNat) - 1 := by\n      have htemp := hf n 3 hn (by norm_num : (3 : \u2124) > 0)\n      -- htemp: f n \u2223 (3 ^ n.toNat - (f 3) ^ (f n).toNat)\n      -- simplify (f 3)^... = 1\n      have htemp' : (f (3 : \u2124)) ^ ((f n).toNat) = 1       "lean": "@[blueprint\n  (statement := /-- Either $f(q) = q$ for all primes $q > 2$, or $f(q) = 1$ for all primes $q > 2$. -/)\n  (proof := /-- Suppose there exists a prime $p > 2$ with $f(p) = 1$. For any prime $q > 2$, $hf(q,p)$ gives $f(q) \\mid p^q - 1$. If $f(q) = q$, then $q \\mid p^q - 1 \\equiv p - 1 \\pmod q$ by FLT, so $q \\mid p-1$, which holds for only finitely many $q$. Thus either $f(q) = q$ for all $q$, or $f(q) = 1$ for all sufficiently large $q$. In the latter case, suppose there exists a prime $r > 2$ with $f(r) = r$. Choose a large prime $q$ (different from $r$) with $f(q) = 1$. Then $hf(r,q)$ gives $r \\mid q^r - 1 \\equiv q - 1 \\pmod r$ by FLT, so $r \\mid q-1$, i.e., $q \\equiv 1 \\pmod r$. This would hold for all sufficiently large primes $q$, contradicting Dirichlet's theorem (there are infinitely many primes not congruent to $1$ mod $r$). Thus $f(r) = 1$ for all $r$. -/)]\nlemma case_analysis (f : \u2124 \u2192 \u2124) (hpos : \u2200 k : \u2124, k > 0 \u2192 f k > 0) (hf : \u2200 a b : \u2124, a > 0 \u2192 b > 0 \u2192 f a \u2223 b ^ a.toNat - (f b) ^ (f a).toNat) : (\u2200 q : \u2115, q > 2 \u2192 Nat.Prime q \u2192 (f (q : \u2124)) = (q : \u2124)) \u2228 (\u2200 q : \u2115, q > 2 \u2192 Nat.Prime q \u2192 (f (q : \u2124)) = 1) := by\n  by_cases h : \u2203 (p : \u2115), p > 2 \u2227 Nat.Prime p \u2227 (f (p : \u2124)) = 1\n  \u00b7 rcases h with \u27e8p0, hp0_gt2, hp0_prime, hp0_f\u27e9\n    -- We will show the second disjunct: \u2200 q > 2 prime, f(q) = 1.\n    -- Assume for contradiction that there exists a prime q > 2 with f(q) = q.\n    by_cases hS : \u2203 (r : \u2115), r > 2 \u2227 Nat.Prime r \u2227 (f (r : \u2124)) = (r : \u2124)\n    \u00b7 rcases hS with \u27e8r, hr_gt2, hr_prime, hr_f\u27e9\n      -- r is a prime >2 with f(r)=r.\n      -- We will derive a contradiction.\n      -- First, note that r | p0 - 1.\n      have h_r_div_p0_sub_one : (r : \u2124) \u2223 (p0 : \u2124) - 1 := by\n        have hpos_r : (r : \u2124) > 0       "lean": "@[blueprint\n  (statement := /-- Let $p$ be a prime $>2$ and $f(p) = p^w$ with $w \\ge 2$. Then for any prime $q \\neq p$ with $f(q) > 1$, we have $q \\mid p^w - p$. -/)\n  (proof := /-- From $hf(q,p)$, $f(q) \\mid p^q - p^{w f(q)}$. By FLT, $p^q \\equiv p \\pmod q$ and $p^{w f(q)} \\equiv p^w \\pmod q$ (since $(p^w)^{q^{w_q}} \\equiv p^w \\pmod q$). Hence $q \\mid p - p^w$. -/)]\nlemma f_of_prime_divides_p_minus_pow (f : \u2124 \u2192 \u2124) (hpos : \u2200 k : \u2124, k > 0 \u2192 f k > 0) (hf : \u2200 a b : \u2124, a > 0 \u2192 b > 0 \u2192 f a \u2223 b ^ a.toNat - (f b) ^ (f a).toNat) (p q : \u2115) (hp : Nat.Prime p) (hq : Nat.Prime q) (hp_gt2 : p > 2) (hq_ne_p : q \u2260 p) (hfp_gt1 : (f (p : \u2124)) > 1) (hfq_gt1 : (f (q : \u2124)) > 1) (w : \u2115) (hw_ge2 : w \u2265 2) (hfp_eq : (f (p : \u2124)) = (p : \u2124) ^ (w : \u2115)) : (q : \u2124) \u2223 (p : \u2124) ^ w - (p : \u2124) := by\n  by_cases hq2 : q = 2\n  \u00b7 subst hq2\n    have hp_odd : (p : \u2124) % 2 = 1 := by\n      have hmod : p % 2 = 1 := (Nat.Prime.mod_two_eq_one_iff_ne_two hp).mpr (by omega)\n      omega\n    have h_odd_lemma : \u2200 (p : \u2124), p % 2 = 1 \u2192 \u2200 (w : \u2115), (2 : \u2124) \u2223 p ^ w - p := by\n      intro p hp_odd w\n      have h2_dvd : (2 : \u2124) \u2223 (1 : \u2124) - p := by omega\n      have hmod : p \u2261 (1 : \u2124) [ZMOD 2] := by\n        rw [Int.modEq_iff_dvd]\n        exact h2_dvd\n      have hmod_pow : p ^ w \u2261 (1 : \u2124) ^ w [ZMOD 2] := hmod.pow w\n      have hmod_pow_one : p ^ w \u2261 1 [ZMOD 2] := by simpa [one_pow] using hmod_pow\n      have hmod_sub : p ^ w - p \u2261 0 [ZMOD 2] := by\n        calc\n          p ^ w - p \u2261 1 - 1 [ZMOD 2] := by\n            exact hmod_pow_one.sub hmod\n          _ = 0 := by ring\n      exact (Int.modEq_zero_iff_dvd.mp hmod_sub)\n    exact h_odd_lemma (p : \u2124) hp_odd w\n  \u00b7 have hq_gt2 : q > 2 := by\n      have hq_gt1 : 1 < q := Nat.Prime.one_lt hq\n      have hq_ne_two : q \u2 [show (p : \u2124) ^ w - (p : \u2124) = -((p : \u2124) - (p : \u2124) ^ w) by ring]\n      exact dvd_neg.mpr h_dvd_RHS\n    exact h_goal"

        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
