        :root {

            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>

      "id": "S_contains_3",

      "proof_length": 10,

      "statement": "3 \u2208 S.",
      "is_main": false,

      "level": 1,
      "lean": "@[blueprint\n  (statement := /-- $3 \\in S$. -/)\n  (proof := /-- Using the orthogonal sequence and the commutation condition for reflections. -/)]\nlemma S_contains_3 : (3 : \u2115) \u2208 S := by\n  have dot_comm (v w : Fin 3 \u2192 \u211d) : dot v w = dot w v := by\n    simp [dot, mul_comm]\n  rcases exists_orthogonal_sequence with \u27e8v, hunit, horth, hnonorth\u27e9\n  let A : Fin 2025 \u2192 Matrix (Fin 3) (Fin 3) \u211d := \u03bb i => reflection (v i)\n  have hA : \u2200 i j : Fin 2025, i \u2264 j \u2192 (A i * A j = A j * A i \u2194 j.val - i.val \u2208 ({0, 1, 2024} : Set \u2115)) := by\n    intro i j hij\n    constructor\n    \u00b7 intro hcomm\n      have h := reflection_commute_iff (v i) (v j) (hunit i) (hunit j) |>.mp hcomm\n      rcases h with (hdot | hcoll)\n      \u00b7 -- hdot : dot (v i) (v j) = 0\n        by_contra! hnot\n        have : dot (v i) (v j) = 0 := hdot\n        have := hnonorth i j hnot\n        rw [hdot] at this\n        exact this rfl\n      \u00b7 -- hcoll : \u2203 c, v i = c \u2022 v j\n        by_contra! hnot\n        have := noncollinear_aux v hunit horth hnonorth i j hnot\n        exact this hcoll\n    \u00b7 intro hdiff\n      have hcases : j.val - i.val = 0 \u2228 j.val - i.val = 1 \u2228 j.val - i.val = 2024 := by\n        simpa [Set.mem_insert_iff, Set.mem_singleton_iff] using hdiff\n      rcases hcases with (h | h | h)\n      \u00b7 -- case 0: i = j\n        have heq : i = j := by\n          apply Fin.ext\n          omega\n        subst heq\n        rfl\n      \u00b7 -- case 1: j.val - i.val = 1\n        have hi_lt_2024 : i.val < 2024 := by\n          have hj_lt : j.val < 2025 := Fin.is_lt j\n          have hj_val : j.val = i.val + 1 := by omega\n          omega\n        have hnext_val : (next i).val = i.val + 1 := by\n          dsimp [next]\n          simp [hi_lt_2024]\n        have hj_val : j.val = i.val + 1 := by\n          omega\n        have hnext : j = next i := Fin.ext (by\n          calc\n            j.val = i.val + 1 := hj_val\n            _ = (next i).val := by symm; exact hnext_val\n          )\n        have hdot : dot (v i) (v j) = 0 := by\n          simpa [hnext] using horth i\n        have hcomm := reflection_commute_iff (v i) (v j) (hunit i) (hunit j) |>.mpr (Or.inl hdot)\n        exact hcomm\n      \u00b7 -- case 2024: j.val - i.val = 2024\n        have hi_le_j : i.val \u2264 j.val := hij\n        have hi_val0 : i.val = 0 := by\n          omega\n        have hj_val2024 : j.val = 2024 := by\n          omega\n        have hnext_j_eq_i : next j = i := by\n          apply Fin.ext\n          simp [next, hj_val2024, hi_val0]\n        have hdot : dot (v i) (v j) = 0 := by\n          have horthj := horth j\n          -- horthj : dot (v j) (v (next j)) = 0\n          simpa [hnext_j_eq_i, dot_comm] using horthj\n        have hcomm := reflection_commute_iff (v i) (v j) (hunit i) (hunit j) |>.mpr (Or.inl hdot)\n        exact hcomm\n  exact \u27e8A, hA\u27e9"

      "statement": "For any k \u2208 S, we have 3 \u2264 k.",
      "is_main": false,
      "col": 0,
      "level": 1,
      "lean": "@[blueprint\n  (statement := /-- For any $k \\in S$, we have $3 \\le k$. -/)\n  (proof := /-- If $k < 3$, then `not_S_of_lt_3` would give $k \\notin S$, contradicting the hypothesis. Hence $3 \\le k$. -/)]\nlemma S_lower_bound (k : \u2115) (hk : k \u2208 S) : 3 \u2264 k := by\n  by_contra! h\n  -- h: k < 3\n  have h_not_S : k \u2209 S := not_S_of_lt_3 k h\n  exact h_not_S hk"
    },
    {
      "id": "centralizer_comm_of_non_scalar_2x2",
      "group": "file0",
      "file_index": 0,

      "type": "theorem",
      "statement": "Let B be a 2 \u00d7 2 real matrix that is not a scalar multiple of the identity. Then any two matrices A and C that both commute with B also commute with each other.",
      "is_main": false,
      "col": 0,
      "level": 4,
      "lean": "@[blueprint\n  (statement := /-- Let $B$ be a $2 \\times 2$ real matrix that is not a scalar multiple of the identity. Then any two matrices $A$ and $C$ that both commute with $B$ also commute with each other. -/)\n  (proof := /-- Immediate from `commute_of_both_commute`. -/)]\nlemma centralizer_comm_of_non_scalar_2x2 (B : Matrix (Fin 2) (Fin 2) \u211d) (h : \u00ac\u2203 (c : \u211d), B = c \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d)) : \u2200 (A C : Matrix (Fin 2) (Fin 2) \u211d), A * B = B * A \u2192 C * B = B * C \u2192 A * C = C * A := by\n  intro A C hA hC\n  exact commute_of_both_commute B h A C hA hC"

    {
      "id": "centralizer_span",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 14.12,
      "proof_length": 26,
      "color": "#4ade80",
      "status": "proved",

      "type": "theorem",
      "statement": "If a 2\u00d72 real matrix B is not a scalar multiple of the identity, then any matrix A that commutes with B is a linear combination of I and B.",
      "is_main": false,
      "col": 0,

      "lean": "@[blueprint\n  (statement := /-- If a 2\u00d72 real matrix B is not a scalar multiple of the identity, then any matrix A that commutes with B is a linear combination of I and B. -/)\n  (proof := /-- Using the linearly independent pair (v, B\u00b7v) to express A\u00b7v as \u03b1 v + \u03b2 (B\u00b7v) and then deducing A = \u03b1 I + \u03b2 B. -/)]\nlemma centralizer_span (B : Matrix (Fin 2) (Fin 2) \u211d) (h : \u00ac\u2203 (c : \u211d), B = c \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d)) (A : Matrix (Fin 2) (Fin 2) \u211d) (hA : A * B = B * A) : \u2203 (\u03b1 \u03b2 : \u211d), A = \u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B := by\n  obtain \u27e8v, hv\u27e9 := exists_independent_vector B h\n  have hdim : Module.finrank \u211d (Fin 2 \u2192 \u211d) = 2 := by\n    simpa using finrank_fun \u211d\n  have h_span_range : Submodule.span \u211d (Set.range ![v, B.mulVec v]) = \u22a4 :=\n    hv.span_eq_top_of_card_eq_finrank (by\n      simp [hdim])\n  have h_range_pair : Set.range (![v, B.mulVec v] : Fin 2 \u2192 (Fin 2 \u2192 \u211d)) = {v, B.mulVec v} := by\n    ext x; simp [or_comm]\n  have h_span_set : Submodule.span \u211d ({v, B.mulVec v} : Set (Fin 2 \u2192 \u211d)) = \u22a4 := by\n    simpa [h_range_pair] using h_span_range\n  have h_mem : A.mulVec v \u2208 Submodule.span \u211d ({v, B.mulVec v} : Set (Fin 2 \u2192 \u211d)) := by\n    rw [h_span_set]\n    exact Submodule.mem_top\n  rcases (Submodule.mem_span_pair.mp h_mem) with \u27e8\u03b1, \u03b2, h_eq\u27e9\n  -- h_eq: \u03b1 \u2022 v + \u03b2 \u2022 (B.mulVec v) = A.mulVec v\n  set C := A - (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) with hC\n  have h_comm_sum : (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) * B = B * (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) := by\n    calc\n      (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) * B = \u03b1 \u2022 1 * B + \u03b2 \u2022 B * B := by rw [add_mul]\n      _ = \u03b1 \u2022 (1 * B) + \u03b2 \u2022 (B * B) := by simp [smul_mul_assoc, mul_smul_comm]\n      _ = \u03b1 \u2022 (B * 1) + \u03b2 \u2022 (B * B) := by simp\n      _ = B * (\u03b1 \u2022 1) + B * (\u03b2 \u2022 B) := by simp [mul_smul_comm, smul_mul_assoc]\n      _ = B * (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) := by rw [mul_add]\n  have hC_comm : C * B = B * C := by\n    calc\n      C * B = (A - (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B)) * B := rfl\n      _ = A * B - (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) * B := by rw [sub_mul]\n      _ = B * A - B * (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) := by rw [hA, h_comm_sum]\n      _ = B * (A - (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B)) := by rw [mul_sub]\n      _ = B * C := rfl\n  have hCv : C.mulVec v = 0 := by\n    calc\n      C.mulVec v = (A - (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B)).mulVec v := rfl\n      _ = A.mulVec v - ((\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B)).mulVec v := by\n        rw [Matrix.sub_mulVec]\n      _ = A.mulVec v - ((\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d)).mulVec v + (\u03b2 \u2022 B).mulVec v) := by\n        rw [Matrix.add_mulVec]\n      _ = (A.mulVec v - (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d)).mulVec v) - (\u03b2 \u2022 B).mulVec v := by\n        rw [sub_add_eq_sub_sub]\n      _ = A.mulVec v - (\u03b1 \u2022 ((1 : Matrix (Fin 2) (Fin 2) \u211d).mulVec v)) - (\u03b2 \u2022 (B.mulVec v)) := by\n        simp [Matrix.smul_mulVec]\n      _ = A.mulVec v - (\u03b1 \u2022 v) - (\u03b2 \u2022 (B.mulVec v)) := by simp\n      _ = A.mulVec v - (\u03b1 \u2022 v + \u03b2 \u2022 (B.mulVec v)) := by ring\n      _ = 0 := by\n        rw [\u2190 h_eq, sub_self]\n  have hCBv : C.mulVec (B.mulVec v) = 0 := by\n    calc\n      C.mulVec (B.mulVec v) = (C * B).mulVec v := by\n        rw [Matrix.mulVec_mulVec]\n      _ = (B * C).mulVec v := by rw [hC_comm]\n      _ = B.mulVec (C.mulVec v) := by rw [Matrix.mulVec_mulVec]\n      _ = B.mulVec 0 := by rw [hCv]\n      _ = 0 := by simp\n  have hC_all : \u2200 w : (Fin 2 \u2192 \u211d), C.mulVec w = 0 := by\n    intro w\n    have h_mem_span : w \u2208 Submodule.span \u211d ({v, B.mulVec v} : Set (Fin 2 \u2192 \u211d)) := by\n      rw [h_span_set]\n      exact Submodule.mem_top\n    rcases (Submodule.mem_span_pair.mp h_mem_span) with \u27e8a, b, h_w\u27e9\n    -- h_w: a \u2022 v + b \u2022 (B.mulVec v) = w\n    calc\n      C.mulVec w = C.mulVec (a \u2022 v + b \u2022 (B.mulVec v)) := by rw [h_w]\n      _ = a \u2022 C.mulVec v + b \u2022 C.mulVec (B.mulVec v) := by\n        simp [Matrix.mulVec_add, Matrix.mulVec_smul]\n      _ = a \u2022 0 + b \u2022 0 := by simp [hCv, hCBv]\n      _ = 0 := by simp\n  have hC_zero : C = 0 := by\n    ext i j\n    have h' := hC_all (fun k => if k = j then 1 else 0)\n    have h'i := congr_fun h' i\n    have htemp : (C.mulVec (fun k => if k = j then 1 else 0)) i = 0 := by\n      simpa using h'i\n    have hsum : (\u2211 k : Fin 2, C i k * (if k = j then (1 : \u211d) else 0)) = 0 := by\n      exact htemp\n    have hCij : C i j = 0 := by\n      simpa using hsum\n    exact hCij\n  have hA_eq : A = \u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B := by\n    apply sub_eq_zero.mp\n    calc\n      A - (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) = C := rfl\n      _ = 0 := hC_zero\n  exact \u27e8\u03b1, \u03b2, hA_eq\u27e9"

      "lean": "@[blueprint\n  (statement := /-- If a 2\u00d72 real matrix B is not a scalar multiple of the identity, and A, C both commute with B, then A and C commute. -/)\n  (proof := /-- Write A = \u03b1I + \u03b2B and C = \u03b1'I + \u03b2'B using centralizer_span, then expand the product. -/)]\nlemma commute_of_both_commute (B : Matrix (Fin 2) (Fin 2) \u211d) (h : \u00ac\u2203 (c : \u211d), B = c \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d)) (A C : Matrix (Fin 2) (Fin 2) \u211d) (hA : A * B = B * A) (hC : C * B = B * C) : A * C = C * A := by\n  rcases centralizer_span B h A hA with \u27e8\u03b1, \u03b2, hA_eq\u27e9\n  rcases centralizer_span B h C hC with \u27e8\u03b3, \u03b4, hC_eq\u27e9\n  have expand_linear_comb (\u03b1 \u03b2 \u03b3 \u03b4 : \u211d) (B : Matrix (Fin 2) (Fin 2) \u211d) : (\u03b1 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b2 \u2022 B) * (\u03b3 \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + \u03b4 \u2022 B) = (\u03b1*\u03b3) \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + ((\u03b1*\u03b4)+(\u03b2*\u03b3)) \u2022 B + (\u03b2*\u03b4) \u2022 (B * B) := by\n    calc\n      (\u03b1 \u2022 1 + \u03b2 \u2022 B) * (\u03b3 \u2022 1 + \u03b4 \u2022 B) = ((\u03b1 \u2022 1) * (\u03b3 \u2022 1) + (\u03b2 \u2022 B) * (\u03b3 \u2022 1)) + ((\u03b1 \u2022 1) * (\u03b4 \u2022 B) + (\u03b2 \u2022 B) * (\u03b4 \u2022 B)) := by\n        rw [mul_add, add_mul, add_mul]\n      _ = (\u03b1*\u03b3) \u2022 (1 * 1) + (\u03b2*\u03b3) \u2022 (B * 1) + (\u03b1*\u03b4) \u2022 (1 * B) + (\u03b2*\u03b4) \u2022 (B * B) := by\n        simp [Matrix.smul_mul, Matrix.mul_smul, smul_smul, mul_comm, add_comm, add_left_comm, add_assoc]\n      _ = (\u03b1*\u03b3) \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + (\u03b2*\u03b3) \u2022 B + (\u03b1*\u03b4) \u2022 B + (\u03b2*\u03b4) \u2022 (B * B) := by\n        simp\n      _ = (\u03b1*\u03b3) \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d) + ((\u03b1*\u03b4)+(\u03b2*\u03b3)) \u2022 B + (\u03b2*\u03b4) \u2022 (B * B) := by\n        simp [add_smu       "lean": "@[blueprint\n  (statement := /-- If a 2\u00d72 real matrix B is not a scalar multiple of the identity, then there exists a vector v such that v and B\u00b7v are linearly independent over \u211d. -/)\n  (proof := /-- Case analysis on the standard basis vectors e1, e2. -/)]\nlemma exists_independent_vector (B : Matrix (Fin 2) (Fin 2) \u211d) (h : \u00ac\u2203 (c : \u211d), B = c \u2022 (1 : Matrix (Fin 2) (Fin 2) \u211d)) : \u2203 v : (Fin 2 \u2192 \u211d), LinearIndependent \u211d ![v, B.mulVec v] := by\n  by_contra h2\n  -- h2 : \u00ac \u2203 v, LinearIndependent \u211d ![v, B.mulVec v]\n  have h_forall_not_ind : \u2200 v : Fin 2 \u2192 \u211d, \u00ac LinearIndependent \u211d ![v, B.mulVec v] := by\n    intro v\n    intro h_ind\n    apply h2\n    exact \u27e8v, h_ind\u27e9\n  have exists_smul_eq : \u2200 v : Fin 2 \u2192 \u211d, \u2203 (r : \u211d), B.mulVec v = r \u2022 v := by\n    intro v\n    have h_not_ind : \u00ac LinearIndependent \u211d ![v, B.mulVec v] := h_forall_not_ind v\n    by_cases hv : v = 0\n    \u00b7 subst hv; refine \u27e80, ?_\u27e9; simp\n    \u00b7 have h_dep' : \u00ac (\u2200 (s t : \u211d), s \u2022 v + t \u2022 (B.mulVec v) = 0 \u2192 s = 0 \u2227 t = 0) := by\n        rwa [LinearIndependent.pair_iff] at h_not_ind\n      have h_exists : \u2203 (s t : \u211d), s \u2022 v + t \u2022 (B.mulVec v) = 0 \u2227 (s = 0 \u2192 t \u2260 0) := by\n        push_neg at h_dep'\n        exact h_dep'\n      rcases h_exists with \u27e8s, t, h_eq, h_cond\u27e9\n      have ht0 : t \u2260 0 := by\n        by_contra ht0\n        have hs0 : s = 0 := by\n          have : s \u2022 v = 0 := by\n            simpa [ht0] using h_eq\n          rcases eq_zero_or_eq_zero_of_smul_eq_zero this with (hs | hv')\n          \u00b7 exact hs\n          \u00b7 exact (hv hv').elim\n        exact (h_cond hs0) ht0\n      have h_eq' : t \u2022 (B.mulVec v) = (-s) \u2022 v := by\n        calc\n          t \u2022 (B.mulVec v) = (s \u2022 v + t \u2022 (B.mulVec v)) - s \u                 .force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));
        } else {
            // Multiple files: use clustering layout with separate positions
            const filePositions = [];
            for (let i = 0; i < fileCount; i++) {
                const angle = (i * 2 * Math.PI / fileCount) - Math.PI / 2; // Start at top
                const radius = 150; // Distance from center
                filePositions.push({
                    x: width / 2 + radius * Math.cos(angle),
                    y: height / 2 + radius * Math.sin(angle)
                });
            }

            const forceX = d3.forceX(d => {
                if (d.group === "external") return width / 2;
                return filePositions[d.file_index].x;
            }).strength(d => d.group === "external" ? 0 : 0.1);

            const forceY = d3.forceY(d => {
                if (d.group === "external") return height / 2;
                return filePositions[d.file_index].y;
            }).strength(d => d.group === "external" ? 0 : 0.1);

            simulation = d3.forceSimulation(data.nodes)
                .force("link", linkForce)
                .force("charge", chargeForce)
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(d => d.radius + 5))
                .force("contain", containForce)
                .force("x", forceX)
                .force("y", forceY)
                .force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : null,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0));
        }

        // --- Radial layout: each main theorem sits at the centre of its own concentric
        // rings; a node's ring = its depth from that theorem. P1 has two theorems
        // (left/right), so we lay out two ring systems side by side. ---
        const localNodes = data.nodes.filter(n => n.group !== "external");
        const numClusters = Math.max(1, ...localNodes.filter(n => n.col >= 0).map(n => n.col + 1));
        const clusterMax = {};                       // deepest ring per cluster
        localNodes.forEach(n => { if (n.col >= 0) clusterMax[n.col] = Math.max(clusterMax[n.col] || 0, n.level || 0); });
        const maxRings = Math.max(0, ...Object.values(clusterMax));

        // Even starting angle per (cluster, ring) so the rings open already filled.
        const ringGroups = {};
        localNodes.forEach(d => { const k = d.col + "|" + d.level; (ringGroups[k] = ringGroups[k] || []).push(d); });
        Object.values(ringGroups).forEach(arr => arr.forEach((d, i) => { d._ang = 2 * Math.PI * (i + 0.5) / arr.length; }));

        const ringSpacing = () => localSpacing * 0.6;
        function clusterCentersX() {                 // pack ring systems left-to-right without overlap
            const RING = ringSpacing();
            const xs = [];
            let x = 0;
            for (let i = 0; i < numClusters; i++) {
                if (i > 0) x += ((clusterMax[i - 1] || 0) + (clusterMax[i] || 0) + 2) * RING;
                xs.push(x);
            }
            const mid = (xs[0] + xs[numClusters - 1]) / 2;
            return xs.map(v => v - mid + width / 2);
        }
        function clusterTarget(d, centers, RING) {
            if (d.col < 0) return { cx: width / 2, cy: height / 2 + (maxRings + 2) * RING, r: 0 };  // orphan, below
            return { cx: centers[d.col], cy: height / 2, r: (d.level || 0) * RING };
        }

        function applyHierarchy() {                  // (re)install the radial forces at current spacing
            const RING = ringSpacing();
            const centers = clusterCentersX();
            simulation.force("center", null);        // centres are absolute; skip global recentre
            simulation.force("contain", null);       // perimeter clamp would crush the outer rings
            simulation.force("rings", function (alpha) {
                for (const d of localNodes) {
                    const t = clusterTarget(d, centers, RING);
                    const dx = d.x - t.cx, dy = d.y - t.cy;
                    const dist = Math.hypot(dx, dy) || 1e-6;
                    const k = (t.r - dist) / dist * 0.8 * alpha;
                    d.vx += dx * k; d.vy += dy * k;
                }
            });
            simulation.force("radial", d3.forceRadial(   // keep any external nodes on their outer ring
                d => d.group === "external" ? externalRadius : 0, width / 2, height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0));
        }

        // Seed positions on the rings so the first frame is already arranged.
        (function seedRings() {
            const RING = ringSpacing();
            const centers = clusterCentersX();
            localNodes.forEach(d => {
                const t = clusterTarget(d, centers, RING);
                d.x = t.cx + t.r * Math.cos(d._ang);
                d.y = t.cy + t.r * Math.sin(d._ang);
            });
        })();

        applyHierarchy();

        // Pre-heat the simulation so it starts partially settled (smoother but still animated)
        simulation.stop();
        for (let i = 0; i < 100; i++) {
            simulation.tick();
        }

        // Create links - render external (grey) edges first, then file edges (for proper layering)
        const externalEdges = data.edges.filter(d => d.type === "external_type" || d.type === "external_value");
        const fileEdges = data.edges.filter(d => d.type === "local_type" || d.type === "local_value");

        const linkGroup = g.append("g");

        // External links first (behind)
        const externalLinks = linkGroup.append("g")
            .selectAll("line")
            .data(externalEdges)
            .join("line")
            .attr("class", "link")
            .attr("stroke", d => getEdgeColor(d))
            .attr("stroke-opacity", 0.4)
            .attr("stroke-width", 0.5);

        // File links second (on top)
        const fileLinks = linkGroup.append("g")
            .selectAll("line")
            .data(fileEdges)
            .join("line")
            .attr("class", "link")
            .attr("stroke", d => getEdgeColor(d))
            .attr("stroke-opacity", 0.8)
            .attr("stroke-width", 1.2)
            .attr("marker-end", "url(#arrow-file)");

        // Combine for easier manipulation
        const link = linkGroup.selectAll("line");

        // Create nodes
        const node = g.append("g")
            .selectAll("circle")
            .data(data.nodes)
            .join("circle")
            .attr("class", "node")
            .attr("r", d => d.radius)
            .attr("fill", d => getNodeColor(d))
            .style("cursor", "pointer")
            .call(drag(simulation));

        // Tooltip
        const tooltip = d3.select("#tooltip");

        node.on("mouseover", function(event, d) {
            const head = d.type ? `${d.type} ${d.id}` : d.id;
            const stmt = d.statement ? `<div style="margin-top:5px; font-weight:400">${d.statement}</div>` : "";
            tooltip.style("display", "block")
                .html(`<strong>${head}</strong>${stmt}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 10) + "px");

            // Start with URL highlight if present
            clearHighlight();
            applyUrlHighlight();

            // Add hover highlight on top
            const connectedNodes = new Set();
            connectedNodes.add(d.id);

            link.each(function(l) {
                if (l.source.id === d.id || l.target.id === d.id) {
                    connectedNodes.add(l.source.id);
                    connectedNodes.add(l.target.id);
                    // Use muted highlight for external edges
                    const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                    if (isExternalEdge) {
                        d3.select(this).classed("highlighted-external", true);
                    } else {
                        d3.select(this).classed("highlighted", true);
                    }
                }
            });

            node.classed("highlighted", n => connectedNodes.has(n.id));
        })
        .on("mouseout", function() {
            tooltip.style("display", "none");
            clearHighlight();
            applyUrlHighlight();
        });

        // Update positions on simulation tick
        const isFileEdge = d => d.type === "local_type" || d.type === "local_value";
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                // Stop file edges short of the target node so the arrowhead shows.
                .attr("x2", d => {
                    if (!isFileEdge(d)) return d.target.x;
                    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    const dist = Math.hypot(dx, dy) || 1;
                    return d.target.x - dx / dist * (d.target.radius + 6);
                })
                .attr("y2", d => {
                    if (!isFileEdge(d)) return d.target.y;
                    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    const dist = Math.hypot(dx, dy) || 1;
                    return d.target.y - dy / dist * (d.target.radius + 6);
                });

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
        });

        // Restart simulation with moderate alpha for visible but smooth settling
        simulation.alpha(0.3).restart();

        // URL hash management
        function updateHash() {
            const params = new URLSearchParams();
            params.set('spacing', d3.select("#spacingSlider").property('value'));
            params.set('external', d3.select("#showExternal").property('checked') ? '1' : '0');
            params.set('theme', d3.select("#themeSelect").property('value'));
            // Preserve highlight params (comma-separated)
            if (urlHighlightNodeIds.length > 0) {
                params.set('highlight', urlHighlightNodeIds.join(','));
                if (urlHighlightLocalOnly) {
                    params.set('local', 'true');
                }
                if (!urlHighlightEdges) {
                    params.set('edges', 'false');
                }
            }
            // Preserve embed param
            if (isEmbedMode) {
                params.set('embed', 'true');
            }
            // Preserve anchor
            if (anchorNodeId) {
                params.set('anchor', anchorNodeId);
            }
            // Preserve zoom
            if (currentZoomScale !== 0.45) {
                params.set('zoom', currentZoomScale.toFixed(2));
            }
            window.location.hash = params.toString();
        }

        // Track persistent URL-based highlight (can be multiple nodes)
        let urlHighlightNodeIds = [];
        let urlHighlightLocalOnly = false;
        let urlHighlightEdges = true;
        let isEmbedMode = false;
        let anchorNodeId = null;

        function applyAnchorTop(anchorId) {
            const anchorNode = data.nodes.find(n => n.id === anchorId);
            if (!anchorNode) {
                console.warn('Anchor node not found:', anchorId);
                return;
            }

            // Fix anchor at top center
            anchorNode.fx = width / 2;
            anchorNode.fy = 80;

            // Stronger repulsion from anchor node to push others away
            simulation.force("charge", d3.forceManyBody().strength(d => {
                if (d.id === anchorId) return -2000;
                if (d.group === "external") return -50;
                return -localSpacing * 2;
            }));

            simulation.alpha(0.5).restart();
        }

        function highlightNodes(nodeIds, { localOnly = false, edges = true } = {}) {
            const targetNodeIds = new Set(nodeIds.filter(id => data.nodes.find(n => n.id === id)));
            if (targetNodeIds.size === 0) return;

            if (edges) {
                link.each(function(l) {
                    if (targetNodeIds.has(l.source.id) || targetNodeIds.has(l.target.id)) {
                        // If localOnly, skip edges to external nodes
                        if (localOnly) {
                            const sourceExternal = l.source.group === "external";
                            const targetExternal = l.target.group === "external";
                            if (sourceExternal || targetExternal) return;
                        }
                        // Use muted highlight for external edges
                        const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                        if (isExternalEdge) {
                            d3.select(this).classed("highlighted-external", true);
                        } else {
                            d3.select(this).classed("highlighted", true);
                        }
                    }
                });
            }

            // Highlight all target nodes (with filled style)
            node.classed("url-highlighted", n => targetNodeIds.has(n.id));
        }

        function applyUrlHighlight() {
            if (urlHighlightNodeIds.length > 0) {
                highlightNodes(urlHighlightNodeIds, {
                    localOnly: urlHighlightLocalOnly,
                    edges: urlHighlightEdges
                });
            }
        }

        function clearHighlight() {
            link.classed("highlighted", false);
            link.classed("highlighted-external", false);
            node.classed("highlighted", false);
            node.classed("url-highlighted", false);
        }

        function restoreFromHash() {
            const hash = window.location.hash.slice(1);
            if (!hash) return;

            const params = new URLSearchParams(hash);

            // Restore spacing
            if (params.has('spacing')) {
                const spacing = +params.get('spacing');
                d3.select("#spacingSlider").property('value', spacing);
                localSpacing = spacing;
                externalRadius = spacing + 300;

                linkForce.distance(d => {
                    const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                    return isLocalEdge ? localSpacing : externalSpacing;
                });

                chargeForce.strength(d => {
                    return d.group === "external" ? -50 : -spacing * 2;
                });

                simulation.force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));

                applyHierarchy();
                simulation.alpha(0.3).restart();
            }

            // Restore external nodes visibility
            if (params.has('external')) {
                const showExternal = params.get('external') === '1';
                d3.select("#showExternal").property('checked', showExternal);

                node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
                link.style("display", l => {
                    if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                        return "none";
                    }
                    return "block";
                });
            }

            // Restore theme
            if (params.has('theme')) {
                const theme = params.get('theme');
                d3.select("#themeSelect").property('value', theme);
                document.body.classList.toggle('dark-mode', theme === 'dark');
                // Need to update colors after mode change
                setTimeout(updateColors, 50);
            }

            // Restore highlight (comma-separated list)
            if (params.has('highlight')) {
                urlHighlightNodeIds = params.get('highlight').split(',').map(s => s.trim()).filter(Boolean);
                urlHighlightLocalOnly = params.get('local') === 'true';
                urlHighlightEdges = params.get('edges') !== 'false';
                applyUrlHighlight();
            }

            // Restore embed mode
            if (params.get('embed') === 'true') {
                isEmbedMode = true;
                // Hide controls, nav overlay, and navigation panel
                d3.select(".controls").style("display", "none");
                d3.select(".nav-overlay").style("display", "none");
                d3.select(".navigation-panel").style("display", "none");
            }

            // Restore zoom
            if (params.has('zoom')) {
                const zoomScale = parseFloat(params.get('zoom'));
                if (!isNaN(zoomScale) && zoomScale >= 0.1 && zoomScale <= 10) {
                    applyZoom(zoomScale);
                }
            }

            // Restore anchor (pins node at top)
            if (params.has('anchor')) {
                anchorNodeId = params.get('anchor');
                applyAnchorTop(anchorNodeId);
            }
        }

        // Restore state from URL on load
        restoreFromHash();

        // Listen for manual URL hash changes
        window.addEventListener('hashchange', function() {
            // Reset state before restoring
            clearHighlight();
            urlHighlightNodeIds = [];
            urlHighlightLocalOnly = false;
            urlHighlightEdges = true;
            // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
