    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #141414;
            --controls-bg: rgba(255, 255, 255, 0.95);
            --controls-border: #d0d0d0;
            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

      "lean": "@[blueprint\n  (statement := /-- For all $k$, $d_k \\cdot D_{k+1} = 2 \\cdot D_k$ in \u2124. -/)\n  (proof := /-- From `reduction_relation` and `reduction_relation_n`, subtract the two equations in \u2124. -/)]\nlemma D_recurrence (m n : \u2115 \u2192 \u2115) (hm : \u2200 k : \u2115, 0 < m k) (hn : \u2200 k : \u2115, 0 < n k) (h_coprime : \u2200 k : \u2115, 0 < k \u2192 Nat.Coprime (m k) (n k)) (h_recurrence : \u2200 k : \u2115, (m (k+1) : \u211a) / (n (k+1) : \u211a) = (2*(m k : \u211a)+1) / (2*(n k : \u211a)+1)) (k : \u2115) : (d m n k : \u2124) * D m n (k+1) = 2 * D m n k := by\n  have hmkpos : 0 < m k := hm k\n  have hnkpos : 0 < n k := hn k\n  have h1 : (2*(m k : \u2124) + 1) = (d m n k : \u2124) * (m (k+1) : \u2124) := by\n    exact_mod_cast reduction_relation m n hm hn h_coprime h_recurrence k\n  have h2 : (2*(n k : \u2124) + 1) = (d m n k : \u2124) * (n (k+1) : \u2124) := by\n    exact_mod_cast reduction_relation_n m n hm hn h_coprime h_recurrence k\n  calc\n    (d m n k : \u2124) * D m n (k+1) = (d m n k : \u2124) * ((m (k+1) : \u2124) - (n (k+1) : \u2124)) := rfl\n    _ = ((d m n k : \u2124) * (m (k+1) : \u2124)) - ((d m n k : \u2124) * (n (k+1) : \u2124)) := by ring\n    _ = (2*(m k : \u2124) + 1) - (2*(n k : \u2124) + 1) := by\n      simp [h1, h2]\n    _ = 2*((m k : \u2124) - (n k : \u2124)) := by ring\n    _ = 2 * D m n k := rfl"

      "lean": "@[blueprint\n  (statement := /-- The set $\\{k \\mid d_k > 1\\}$ is finite. -/)\n  (proof := /-- Suppose the set were infinite. Then there are infinitely many $k$ with $d_k > 1$. Choose enough of them so that the product of the corresponding $d_i$ exceeds $|D_0|$ (possible because each $d_i > 1$ contributes at least $3$). But by `product_divides`, the product of any initial segment of $d_i$ divides $|D_0|$, hence cannot exceed $|D_0|$. Contradiction. Therefore the set is finite. -/)]\nlemma only_finitely_many_d_gt_one (m n : \u2115 \u2192 \u2115) (hm : \u2200 k : \u2115, 0 < m k) (hn : \u2200 k : \u2115, 0 < n k) (h_distinct : m 0 \u2260 n 0) (h_coprime : \u2200 k : \u2115, 0 < k \u2192 Nat.Coprime (m k) (n k)) (h_recurrence : \u2200 k : \u2115, (m (k+1) : \u211a) / (n (k+1) : \u211a) = (2*(m k : \u211a)+1) / (2*(n k : \u211a)+1)) : {k : \u2115 | d m n k > 1}.Finite := by\n  let N := Int.natAbs (D m n 0)\n  have hNpos : 0 < N := by\n    have hD0_ne_zero : D m n 0 \u2260 0 := by\n      intro hzero\n      apply h_distinct\n      have hm_eq_n : (m 0 : \u2124) = (n 0 : \u2124) := sub_eq_zero.mp hzero\n      exact_mod_cast hm_eq_n\n    exact Int.natAbs_pos.mpr hD0_ne_zero\n  let P : \u2115 \u2192 \u2115 := \u03bb k => Finset.prod (Finset.range k) (fun i => d m n i)\n  have hd_pos (i : \u2115) : 0 < d m n i := by\n    have hpos1 : 0 < 2*m i + 1 := by\n      have hm_pos : 0 < m i := hm i\n      nlinarith\n    have hpos2 : 0 < 2*n i + 1 := by\n      have hn_pos : 0 < n i := hn i\n      nlinarith\n    exact Nat.gcd_pos_of_pos_left (2*n i + 1) hpos1\n  have hPpos (k : \u2115) : 0 < P k := by\n    refine Finset.prod_pos (fun i hi => ?_)\n    exact hd_pos i\n  have hPdiv (k : \u2115) : P k \u2223 N := by\n    have := product_divides m n hm hn h_distinct h_coprime h_recurrence k\n    simpa [N, P] using this\n  have hP_le_N (k : \u2115) : P k \u2264 N := by\n    have hpos : 0 < P k := hPpos k\n    have hdiv : P k \u2223 N := hPdiv k\n    exact Nat.le_of_dvd hNpos h no (y+1) x hy_plus_one_le_x\n      have hPx_lt_Px_succ : P x < P (x+1) := hP_strict x hx'\n      have hPy_lt_Px_succ : P (y+1) < P (x+1) := lt_of_le_of_lt hPy_le_Px hPx_lt_Px_succ\n      rw [hxy'] at hPy_lt_Px_succ\n      exact lt_irrefl _ hPy_lt_Px_succ\n  have h_image_subset : f '' {k | d m n k > 1} \u2286 (Finset.range (N+1) : Set \u2115) := by\n    intro x hx\n    rcases hx with \u27e8k, hk, rfl\u27e9\n    have hPleN : P (k+1) \u2264 N := hP_le_N (k+1)\n    have h_lt : P (k+1) < N+1 := by omega\n    exact Finset.mem_coe.mpr (Finset.mem_range.mpr h_lt)\n  have hm : Set.MapsTo f {k | d m n k > 1} (Finset.range (N+1) : Set \u2115) := by\n    exact (Set.mapsTo_iff_image_subset.mpr h_image_subset)\n  have hfin : Set.Finite (Finset.range (N+1) : Set \u2115) := by\n    exact Finset.finite_toSet _\n  have hS_finite : Set.Finite {k | d m n k > 1} :=\n    Set.Finite.of_injOn hm hinj hfin\n  exact hS_finite"

      "lean": "@[blueprint\n  (statement := /-- For all $k$, $\\prod_{i=0}^{k-1} d_i$ divides $|D_0|$ in \u2115. -/)\n  (proof := /-- By induction using `D_recurrence`, we get $(\\prod_{i<k} d_i) \\cdot D_k = 2^k \\cdot D_0$ in \u2124. Hence the product divides $2^k \\cdot D_0$. Since each $d_i$ is odd (`d_odd`), the product is coprime to $2$, so it must divide $D_0$ in \u2124. Taking absolute values yields the result. -/)]\nlemma product_divides (m n : \u2115 \u2192 \u2115) (hm : \u2200 k : \u2115, 0 < m k) (hn : \u2200 k : \u2115, 0 < n k) (h_distinct : m 0 \u2260 n 0) (h_coprime : \u2200 k : \u2115, 0 < k \u2192 Nat.Coprime (m k) (n k)) (h_recurrence : \u2200 k : \u2115, (m (k+1) : \u211a) / (n (k+1) : \u211a) = (2*(m k : \u211a)+1) / (2*(n k : \u211a)+1)) (k : \u2115) : (Finset.prod (Finset.range k) (fun i => d m n i)) \u2223 Int.natAbs (D m n 0) := by\n  have product_odd' : ((Finset.prod (Finset.range k) (fun i => d m n i)) % 2 = 1) := by\n    refine Finset.induction_on (Finset.range k) ?_ ?_\n    \u00b7 simp\n    \u00b7 intro i s his ih\n      rw [Finset.prod_insert his, Nat.odd_mul_odd (d_odd m n i) ih]\n  have product_times_D_eq' : ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124) * D m n k) = ((2 : \u2124)^k) * D m n 0 := by\n    revert product_odd'\n    induction' k with k ih\n    \u00b7 intro h\n      simp [D]\n    \u00b7 intro h\n      rw [Finset.prod_range_succ]\n      push_cast\n      have h_rec := D_recurrence m n hm hn h_coprime h_recurrence k\n      have hk_odd : ((Finset.prod (Finset.range k) (fun i => d m n i)) % 2 = 1) := by\n        refine Finset.induction_on (Finset.range k) ?_ ?_\n        \u00b7 simp\n        \u00b7 intro i s his ih'\n          rw [Finset.prod_insert his, Nat.odd_mul_odd (d_odd m n i) ih']\n      calc\n        ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124) * (d m n k : \u2124)) * D m n (k+1) = ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124) * ((d m n k : \u2124) * D m n (k+1))) := by ring\n        _ = ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124) * (2 * D m n k)) := by rw [h_rec]\n        _ = 2 * ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124) * D m n k) := by ring\n        _ = 2 * (((2 : \u2124)^k) * D m n 0) := by rw [ih hk_odd]\n        _ = ((2 : \u2124)^(k+1)) * D m n 0 := by ring\n  have hP_odd : ((Finset.prod (Finset.range k) (fun i => d m n i)) % 2 = 1) := product_odd'\n  have hP_coprime_nat : Nat.Coprime (Finset.prod (Finset.range k) (fun i => d m n i)) 2 := by\n    rw [Nat.coprime_two_right]\n    rw [Nat.odd_iff]\n    exact hP_odd\n  have hP_coprime_int : IsCoprime ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124)) (2 : \u2124) := by\n    simpa [Nat.cast_prod] using (Nat.isCoprime_iff_coprime.mpr hP_coprime_nat)\n  have hP_coprime_2k : IsCoprime ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124)) ((2 : \u2124)^k) :=\n    hP_coprime_int.pow_right (n := k)\n  have h_eq := product_times_D_eq'\n  have h_dvd : ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124) \u2223 ((2 : \u2124)^k) * D m n 0) := by\n    rw [\u2190 h_eq]\n    exact dvd_mul_right ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124)) (D m n k)\n  have h_dvd_D0 : ((Finset.prod (Finset.range k) (fun i => d m n i) : \u2124) \u2223 D m n 0) :=\n    hP_coprime_2k.dvd_of_dvd_mul_left h_dvd\n  rw [\u2190 Int.ofNat_dvd_left]\n  simpa [Nat.cast_prod] using h_dvd_D0"

      "lean": "@[blueprint\n  (statement := /-- For all $k$, $2m_k+1 = d_k \\cdot m_{k+1}$. -/)\n  (proof := /-- Let $d = d_k$. Then $d$ divides both $2m_k+1$ and $2n_k+1$. Write $2m_k+1 = d a$, $2n_k+1 = d b$ with $\\gcd(a,b)=1$. From `recurrence_integer` we have $m_{k+1} b = n_{k+1} a$. Since $\\gcd(a,b)=1$, we get $a \\mid m_{k+1}$ and $b \\mid n_{k+1}$. Using `h_coprime` for $k+1>0$, we get $m_{k+1}$ and $n_{k+1}$ are coprime, so the common factor $t$ must be $1$, hence $a = m_{k+1}$, $b = n_{k+1}$. Therefore $2m_k+1 = d \\cdot m_{k+1}$. -/)]\nlemma reduction_relation (m n : \u2115 \u2192 \u2115) (hm : \u2200 k : \u2115, 0 < m k) (hn : \u2200 k : \u2115, 0 < n k) (h_coprime : \u2200 k : \u2115, 0 < k \u2192 Nat.Coprime (m k) (n k)) (h_recurrence : \u2200 k : \u2115, (m (k+1) : \u211a) / (n (k+1) : \u211a) = (2*(m k : \u211a)+1) / (2*(n k : \u211a)+1)) (k : \u2115) : 2*m k + 1 = d m n k * m (k+1) := by\n  have h_recurrence_integer := recurrence_integer m n hm hn h_recurrence k\n  set a := 2*m k + 1 with ha\n  set b := 2*n k + 1 with hb\n  have ha_pos : 0 < a := by\n    have hmk : 0 < m k := hm k\n    linarith\n  have hb_pos : 0 < b := by\n    have hnk : 0 < n k := hn k\n    linarith\n  set g := d m n k with hg\n  have hg_dvd_a : g \u2223 a := by\n    unfold g\n    exact Nat.gcd_dvd_left a b\n  have hg_dvd_b : g \u2223 b := by\n    unfold g\n    exact Nat.gcd_dvd_right a b\n  have hg_pos : 0 < g := by\n    unfold g\n    exact Nat.gcd_pos_of_pos_left b ha_pos\n  have h_coprime_ab_div : Nat.Coprime (a / g) (b / g) := by\n    rw [Nat.coprime_iff_gcd_eq_one]\n    exact Nat.gcd_div_gcd_div_gcd_of_pos_left ha_pos\n  have h_next_coprime : Nat.Coprime (m (k+1)) (n (k+1)) := h_coprime (k+1) (Nat.succ_pos k)\n  have ha_eq' : a = g * (a / g) := (Nat.mul_div_cancel' hg_dvd_a).symm\n  have hb_eq' : b = g * (b / g) := (Nat.mul_div_cancel' hg_dvd_b).symm\n  have h_eq2 : m (k+1) * (b / g) = n (k+1) * (a / g) := by\n    apply Nat.mul_right_cancel hg_pos\n    calc\n      (m (k+1) * (b / g)) * g = m (k+1) * ((b / g) * g) := by ring\n      _ = m (k+1) * b := by rw [Nat.div_mul_cancel hg_dvd_b]\n      _ = n (k+1) * a := h_recurrence_integer\n      _ = n (k+1) * ((a / g) * g) := by rw [Nat.div_mul_cancel hg_dvd_a]\n      _ = (n (k+1) * (a / g)) * g := by ring\n  set a' := a / g with ha'\n  set b' := b / g with hb'\n  have h_a'_dvd_m : a' \u2223 m (k+1) := by\n    have htemp : a' * n (k+1) = b' * m (k+1) := by\n      calc\n        a' * n (k+1) = (a / g) * n (k+1) := rfl\n        _ = n (k+1) * (a / g) := by ring\n        _ = m (k+1) * (b / g) := by rw [h_eq2]\n        _ = b' * m (k+1) := by ring\n    have htemp' : a' \u2223 b' * m (k+1) := by\n      rw [\u2190 htemp]\n      exact dvd_mul_right a' (n (k+1))\n    exact h_coprime_ab_div.dvd_of_dvd_mul_left htemp'\n  have h_m_dvd_a' : m (k+1) \u2223 a' := by\n    have htemp : b' * m (k+1) = a' * n (k+1) := by\n      calc\n        b' * m (k+1) = (b / g) * m (k+1) := rfl\n        _ = m (k+1) * (b / g) := by ring\n        _ = n (k+1) * (a / g) := by rw [h_eq2]\n        _ = a' * n (k+1) := by ring\n    have htemp' : m (k+1) \u2223 a' * n (k+1) := by\n      have htemp'' : m (k+1) \u2223 b' * m (k+1) := by\n        refine \u27e8b', ?_\u27e9\n        ring\n      rw [htemp] at htemp''\n      exact htemp''\n    exact h_next_coprime.dvd_of_dvd_mul_left (by simpa [mul_comm] using htemp')\n  have h_a'_eq_m : a' = m (k+1) := Nat.dvd_antisymm h_a'_dvd_m h_m_dvd_a'\n  calc\n    2*m k + 1 = a := rfl\n    _ = g * a' := ha_eq'\n    _ = g * m (k+1) := by rw [h_a'_eq_m]\n    _ = d m n k * m (k+1) := by rw [hg]"

            // Restore external nodes visibility
            if (params.has('external')) {
                const showExternal = params.get('external') === '1';
                d3.select("#showExternal").property('checked', showExternal);

                node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
                link.style("display", l => {
                    if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                        return "none";
                    }
                    return "block";
                });
            }

            // Restore theme
            if (params.has('theme')) {
                const theme = params.get('theme');
                d3.select("#themeSelect").property('value', theme);
                document.body.classList.toggle('dark-mode', theme === 'dark');
                // Need to update colors after mode change
                setTimeout(updateColors, 50);
            }

            // Restore highlight (comma-separated list)
            if (params.has('highlight')) {
                urlHighlightNodeIds = params.get('highlight').split(',').map(s => s.trim()).filter(Boolean);
                urlHighlightLocalOnly = params.get('local') === 'true';
                urlHighlightEdges = params.get('edges') !== 'false';
                applyUrlHighlight();
            }

            // Restore embed mode
            if (params.get('embed') === 'true') {
                isEmbedMode = true;
                // Hide controls, nav overlay, and navigation panel
                d3.select(".controls").style("display", "none");
                d3.select(".nav-overlay").style("display", "none");
                d3.select(".navigation-panel").style("display", "none");
            }

            // Restore zoom
            if (params.has('zoom')) {
                const zoomScale = parseFloat(params.get('zoom'));
                if (!isNaN(zoomScale) && zoomScale >= 0.1 && zoomScale <= 10) {
                    applyZoom(zoomScale);
                }
            }

            // Restore anchor (pins node at top)
            if (params.has('anchor')) {
                anchorNodeId = params.get('anchor');
                applyAnchorTop(anchorNodeId);
            }
        }

        // Restore state from URL on load
        restoreFromHash();

        // Listen for manual URL hash changes
        window.addEventListener('hashchange', function() {
            // Reset state before restoring
            clearHighlight();
            urlHighlightNodeIds = [];
            urlHighlightLocalOnly = false;
            urlHighlightEdges = true;
            // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
