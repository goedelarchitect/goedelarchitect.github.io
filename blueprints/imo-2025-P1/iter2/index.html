    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #141414;
            --controls-bg: rgba(255, 255, 255, 0.95);
            --controls-border: #d0d0d0;
            --tooltip-bg: rgba(50, 50, 50, 0.95);
            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;
            --main-edge-color: #4ade80;
            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

      "statement": "The set T_n = {(x,y) \u2208 \u2115^2 | x \u2265 1, y \u2265 1, x+y \u2264 n+1}.",
      "is_main": false,

      "lean": "@[blueprint (statement := /-- The set $T_n = \\{(x,y) \\in \\mathbb{N}^2 \\mid x \\ge 1, y \\ge 1, x+y \\le n+1\\}$. -/)]\ndef T_set (n : \u2115) : Finset (\u2115 \u00d7 \u2115) :=\n  (Finset.Icc 1 n).product (Finset.Icc 1 n) |>.filter (\u03bb \u27e8x,y\u27e9 => x + y \u2264 n + 1)"

      "lean": "@[blueprint\n  (statement := /-- $T_1 = \\{(1,1)\\}$. -/)\n  (proof := /-- By computation. -/)]\nlemma T_set_one_eq : T_set 1 = {(1,1)} := by\n  decide"
    },
    {
      "id": "at_most_three_sunny_lines",
      "group": "file0",
      "file_index": 0,
      "file_name": "solution.lean",
      "radius": 11.39,
      "proof_length": 8,
      "color": "#4ade80",
      "status": "proved",
      "link": null,
      "type": "theorem",
      "statement": "At most three sunny lines can cover exactly (k+1)/2 points in T_k.",
      "is_main": false,
      "col": 0,
      "level": 1,
      "lean": "@[blueprint\n  (statement := /-- At most three sunny lines can cover exactly $(k+1)/2$ points in $T_k$. -/)\n  (proof := /-- By classification, there are at most three possibilities. -/)]\nlemma at_most_three_sunny_lines (k : \u2115) (hkodd : Odd k) (lines' : Finset (\u211d \u00d7 \u211d)) (hall_sunny : \u2200 l \u2208 lines', l.1 \u2260 0 \u2227 l.1 \u2260 -1) (hcover : \u2200 p \u2208 T_set k, (\u2203 l \u2208 lines', l.1 * p.1 + l.2 = p.2)) (hcard' : (lines'.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card = k) : \n  lines'.card \u2264 3 := by\n  have hall_sunny' : (lines'.filter (fun l => l.1 \u2260 0 \u2227 l.1 \u2260 -1)) = lines' := by\n    apply Finset.filter_true_of_mem\n    intro l hl\n    exact hall_sunny l hl\n  have hcard_lines' : lines'.card = k := by\n    calc\n      lines'.card = (lines'.filter (fun l => l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card := by\n        simp [hall_sunny']\n      _ = k := hcard'\n  let I : Finset \u2115 := Finset.Icc 1 k\n  have hIcard : I.card = k := by\n    simp [I]\n  have hk_pos : 1 \u2264 k := by\n    by_contra! h\n    have : k = 0 := by omega\n    have : \u00ac Odd k := by\n      rw [this]\n      simp\n    exact this hkodd\n  have hcover_bottom (i : \u2115) (hi : i \u2208 I) : \u2203 l \u2208 lines', l.1 * (i : \u211d) + l.2 = (1 : \u211d) := by\n    have hp : (i, 1) \u2208 T_set k := by\n      have hi1 : 1 \u2264 i := (Finset.mem_Icc.mp hi).left\n      have hi2 : i \u2264 k := (Finset.mem_Icc.mp hi).right\n      refine Finset.mem_filter.mpr \u27e8?_, ?_\u27e9\n      \u00b7 apply Finset.mem_product.mpr\n        exact \u27e8Finset.mem_Icc.mpr \u27e8hi1, hi2\u27e9, Finset.mem_Icc.mpr \u27e8by omega, by omega\u27e9\u27e9\n      \u00b7 omega\n    rcases hcover (i, 1) hp with \u27e8l, hl, h\u27e9\n    refine \u27e8l, hl, ?_\u27e9\n    simpa using h\n  let f (i : \u2115) (hi : i \u2208 I) : \u211d \u00d7 \u211d := Classical.choose (hcover_bottom i hi)\n  have hf_spec (i : \u2115) (hi : i \u2208 I) : f       "lean": "@[blueprint\n  (statement := /-- Cardinality of $T_k$ is $k(k+1)/2$. -/)\n  (proof := /-- By counting. -/)]\nlemma card_T_set (k : \u2115) : (T_set k).card = k*(k+1)/2 := by\n  have filter_Icc_eq_Icc (x k : \u2115) (hx : 1 \u2264 x) (hx' : x \u2264 k) : Finset.filter (\u03bb y : \u2115 => x + y \u2264 k+1) (Icc 1 k) = Icc 1 (k+1-x) := by\n    ext y\n    constructor\n    \u00b7 intro hy\n      rcases Finset.mem_filter.mp hy with \u27e8hy_mem, hy_cond\u27e9\n      rcases Finset.mem_Icc.mp hy_mem with \u27e8hy1, hy2\u27e9\n      apply Finset.mem_Icc.mpr\n      have hy1' : 1 \u2264 y := hy1\n      have hy2' : y \u2264 k+1-x := by\n        omega\n      exact \u27e8hy1', hy2'\u27e9\n    \u00b7 intro hy\n      rcases Finset.mem_Icc.mp hy with \u27e8hy1, hy2\u27e9\n      apply Finset.mem_filter.mpr\n      constructor\n      \u00b7 apply Finset.mem_Icc.mpr\n        have hy2_k : y \u2264 k := by\n          omega\n        exact \u27e8hy1, hy2_k\u27e9\n      \u00b7 omega\n  have card_filter_add (x k : \u2115) (hx : x \u2208 Icc 1 k) : Finset.card (Finset.filter (\u03bb y : \u2115 => x + y \u2264 k+1) (Icc 1 k)) = k+1-x := by\n    rcases Finset.mem_Icc.mp hx with \u27e8hx1, hx2\u27e9\n    rw [filter_Icc_eq_Icc x k hx1 hx2, Nat.card_Icc]\n    omega\n  have sum_symm (k : \u2115) : Finset.sum (Icc 1 k) (\u03bb x => k+1-x) = Finset.sum (Icc 1 k) (\u03bb x => x) := by\n    apply Finset.sum_bij (\u03bb a ha => k+1-a)\n    \u00b7 intro a ha\n      rcases Finset.mem_Icc.mp ha with \u27e8ha1, ha2\u27e9\n      apply Finset.mem_Icc.mpr\n      have h1 : 1 \u2264 k+1-a := by omega\n      have h2 : k+1-a \u2264 k := by omega\n      exact \u27e8h1, h2\u27e9\n    \u00b7 intro a\u2081 ha\u2081 a\u2082 ha\u2082 h\n      rcases Finset.mem_Icc.mp ha\u2081 with \u27e8ha\u20811, ha\u20812\u27e9\n      rcases Finset.mem_Icc.mp ha\u2082 with \u27e8ha\u20821, ha\u20822\u27e9\n      omega\n    \u00b7 intro b hb\n      rcases Finset.mem_Icc.mp hb with \u27e8hb1, hb2\u27e9\n      use k+1-b\n       "lean": "@[blueprint\n  (statement := /-- A sunny line contains at most one point of the hypotenuse. -/)\n  (proof := /-- Since hypotenuse points have distinct x-coordinates. -/)]\nlemma line_unique_hypotenuse (k : \u2115) (l : \u211d \u00d7 \u211d) (h1 : l.1 \u2260 0) (h2 : l.1 \u2260 -1) : ((hypotenuse k).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 1 := by\n  rw [Finset.card_le_one_iff]\n  intro x y hx hy\n  have hx_mem_hyp : x \u2208 hypotenuse k := (Finset.mem_filter.mp hx).left\n  have hy_mem_hyp : y \u2208 hypotenuse k := (Finset.mem_filter.mp hy).left\n  have hx_eq_line : l.1 * x.1 + l.2 = x.2 := (Finset.mem_filter.mp hx).right\n  have hy_eq_line : l.1 * y.1 + l.2 = y.2 := (Finset.mem_filter.mp hy).right\n  -- get sum condition from hypotenuse\n  have hx_sum : x.1 + x.2 = k + 1 := by\n    have hx_mem_hyp' : x \u2208 (T_set k).filter (\u03bb p => p.1 + p.2 = k + 1) := hx_mem_hyp\n    exact (Finset.mem_filter.mp hx_mem_hyp').right\n  have hy_sum : y.1 + y.2 = k + 1 := by\n    have hy_mem_hyp' : y \u2208 (T_set k).filter (\u03bb p => p.1 + p.2 = k + 1) := hy_mem_hyp\n    exact (Finset.mem_filter.mp hy_mem_hyp').right\n  -- cast to \u211d\n  have hx_sumR : (x.1 : \u211d) + (x.2 : \u211d) = (k : \u211d) + 1 := by exact_mod_cast hx_sum\n  have hy_sumR : (y.1 : \u211d) + (y.2 : \u211d) = (k : \u211d) + 1 := by exact_mod_cast hy_sum\n  have h2ne : l.1 + 1 \u2260 0 := by\n    intro h\n    apply h2\n    linarith\n  have h_eq1 : (l.1 + 1) * (x.1 : \u211d) + l.2 = (k : \u211d) + 1 := by\n    calc\n      (l.1 + 1) * (x.1 : \u211d) + l.2 = (l.1 * (x.1 : \u211d) + l.2) + (x.1 : \u211d) := by ring\n      _ = (x.2 : \u211d) + (x.1 : \u211d) := by rw [hx_eq_line]\n      _ = (x.1 : \u211d) + (x.2 : \u211d) := add_comm _ _\n      _ = (k : \u211d) + 1 := hx_sumR\n  have h_eq2 : (l.1 + 1) * (y.1 : \u211d) + l.2 = (k : \u211d) + 1 := by\n    calc\n      (l.1 + 1) * (y.1 : \u211d) + l.2 = (l.1 * (y.1 : \u211d) + l.2) + (y.1 : \u211d) := by ring\n      _ = (y.2 : \u211d) + (y.1 : \u211d) := by rw [hy_eq_line]\n      _ = (y.1 : \u211d) + (y.2 : \u211d) := add_comm _ _\n      _ = (k : \u211d) + 1 := hy_sumR\n  have h_factor : (l.1 + 1) * ((x.1 : \u211d) - (y.1 : \u211d)) = 0 := by\n    calc\n      (l.1 + 1) * ((x.1 : \u211d) - (y.1 : \u211d)) = ((l.1 + 1) * (x.1 : \u211d) + l.2) - ((l.1 + 1) * (y.1 : \u211d) + l.2) := by ring\n      _ = ((k : \u211d) + 1) - ((k : \u211d) + 1) := by rw [h_eq1, h_eq2]\n      _ = 0 := by ring\n  have hx1_eq_y1R : (x.1 : \u211d) = (y.1 : \u211d) := by\n    rcases eq_zero_or_eq_zero_of_mul_eq_zero h_factor with (h | h)\n    \u00b7 exfalso; exact h2ne h\n    \u00b7 exact sub_eq_zero.mp h\n  have hx1_eq_y1 : x.1 = y.1 := by exact_mod_cast hx1_eq_y1R\n  have hx2_eq_y2 : x.2 = y.2 := by\n    have hx2_eq_y2R : (x.2 : \u211d) = (y.2 : \u211d) := by\n      calc\n        (x.2 : \u211d) = l.1 * (x.1 : \u211d) + l.2 := hx_eq_line.symm\n        _ = l.1 * (y.1 : \u211d) + l.2 := by rw [hx1_eq_y1R]\n        _ = (y.2 : \u211d) := hy_eq_line\n    exact_mod_cast hx2_eq_y2R\n  ext <;> assumption"

      "lean": "@[blueprint\n  (statement := /-- If $S$ is a set of $k$ boundary points, each line contains at most one point of $S$, every point of $S$ is covered by some line, and there are $k$ lines, then each line contains exactly one point of $S$ and the correspondence is a bijection. -/)\n  (proof := /-- By pigeonhole principle. -/)]\nlemma pigeonhole_boundary (k : \u2115) (S : Finset (\u2115 \u00d7 \u2115)) (hScard : S.card = k) (lines' : Finset (\u211d \u00d7 \u211d)) (hlines_sunny : \u2200 l \u2208 lines', l.1 \u2260 0 \u2227 l.1 \u2260 -1) (hlines_card : lines'.card = k) (hcover : \u2200 p \u2208 S, \u2203 l \u2208 lines', l.1 * p.1 + l.2 = p.2) (huniqueness : \u2200 l \u2208 lines', ((S).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 1) : \n  (\u2200 l \u2208 lines', ((S).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card = 1) \u2227\n  (\u2200 p \u2208 S, \u2203! l \u2208 lines', l.1 * p.1 + l.2 = p.2) := by\n  have h_exists (p : \u2115 \u00d7 \u2115) (hp : p \u2208 S) : \u2203 l \u2208 lines', l.1 * p.1 + l.2 = p.2 := hcover p hp\n  let f : \u2115 \u00d7 \u2115 \u2192 \u211d \u00d7 \u211d := \u03bb p =>\n    if hp : p \u2208 S then\n      Classical.choose (h_exists p hp)\n    else\n      (0,0)\n  have hf_mem (p : \u2115 \u00d7 \u2115) (hp : p \u2208 S) : f p \u2208 lines' := by\n    dsimp [f]\n    simp [hp]\n    exact (Classical.choose_spec (h_exists p hp)).1\n  have hf_eq (p : \u2115 \u00d7 \u2115) (hp : p \u2208 S) : (f p).1 * p.1 + (f p).2 = p.2 := by\n    dsimp [f]\n    simp [hp]\n    exact (Classical.choose_spec (h_exists p hp)).2\n  have hinjOn : \u2200 x \u2208 S, \u2200 y \u2208 S, f x = f y \u2192 x = y := by\n    intro x hx y hy h\n    by_contra hne\n    have hx_line : (f x).1 * x.1 + (f x).2 = x.2 := hf_eq x hx\n    have hy_line : (f x).1 * y.1 + (f x).2 = y.2 := by\n      calc\n        (f x).1 * y.1 + (f x).2 = (f y).1 * y.1 + (f y).2 := by simpa [h]\n        _ = y.2 := hf_eq y hy\n    have hx_mem_filter : x \u2208 (S).filter (\u03bb p => (f x).1 * p.1 + (f x).2 = p.2) :=\n      Finset.mem_filter.mpr \u27e8hx, hx_line\u27e9\n    have hy_mem_filter : y \u2208 (S).filter (\u03bb p => (f x).1 * p.1 + (f x).2 = p.2) :=\n      Finset.mem_filter.mpr \u27e8hy, hy_line\u27e9\n    have hcard_le_one : ((S).filter (\u03bb p => (f x).1 * p.1 + (f x).2 = p.2)).card \u2264 1 :=\n      huniqueness (f x) (hf_mem x hx)\n    have hcard_ge_two : 2 \u2264 ((S).filter (\u03bb p => (f x).1 * p.1 + (f x).2 = p.2)).card := by\n      apply Finset.one_lt_card.mpr\n      refine \u27e8x, hx_mem_filter, y, hy_mem_filter, hne\u27e9\n    linarith\n  have hcard_image : (Finset.image f S).card = S.card :=\n    Finset.card_image_of_injOn hinjOn\n  have h_sub : Finset.image f S \u2286 lines' := by\n    intro l hl\n    rcases Finset.mem_image.mp hl with \u27e8p, hp, rfl\u27e9\n    exact hf_mem p hp\n  have h_image_eq : Finset.image f S = lines' :=\n    Finset.eq_of_subset_of_card_le h_sub (by\n      rw [hcard_image, hScard, hlines_card])\n  have h_unique_preimage (l : \u211d \u00d7 \u211d) (hl : l \u2208 lines') : \u2203! p \u2208 S, f p = l := by\n    have hl_in_image : l \u2208 Finset.image f S := by\n      rw [h_image_eq]\n      exact hl\n    rcases Finset.mem_image.mp hl_in_image with \u27e8p, hp, hfp\u27e9\n    refine \u27e8p, \u27e8hp, hfp\u27e9, ?_\u27e9\n    intro q hq\n    rcases hq with \u27e8hqS, hfq\u27e9\n    apply hinjOn q hqS p hp\n    calc\n      f q = l := hfq\n      _ = f p := hfp.symm\n  have h_fp_eq_of_cover (p : \u2115 \u00d7 \u2115) (hp : p \u2208 S) (l : \u211d \u00d7 \u211d) (hl : l \u2208 lines') (hcover_eq : l.1 * p.1 + l.2 = p.2) : f p = l := by\n    by_contra hne\n    have hpre_l := h_unique_preimage l hl\n    rcases hpre_l with \u27e8q, \u27e8hq, hfq\u27e9, huniq\u27e9\n    have hpq : p \u2260 q := by\n      intro heq\n      apply hne\n      calc\n        f p = f q := by rw [heq]\n        _ = l := hfq\n    have hq_cover : l.1 * q.1 + l.2 = q.2 := by\n      calc\n        l.1 * q.1 + l.2 = (f q).1 * q.1 + (f q).2 := by simp [hfq]\n        _ = q.2 := hf_eq q hq\n    have hp_mem : p \u2208 (S).filter (\u03bb q' => l.1 * q'.1 + l.2 = q'.2) :=\n      Finset.mem_filter.mpr \u27e8hp, hcover_eq\u27e9\n    have hq_mem : q \u2208 (S).filter (\u03bb q' => l.1 * q'.1 + l.2 = q'.2) :=\n      Finset.mem_filter.mpr \u27e8hq, hq_cover\u27e9\n    have hcard_le_one : ((S).filter (\u03bb q' => l.1 * q'.1 + l.2 = q'.2)).card \u2264 1 :=\n      huniqueness l hl\n    apply hpq\n    exact (Finset.card_le_one_iff.mp hcard_le_one) hp_mem hq_mem\n  have h_first : \u2200 l \u2208 lines', ((S).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card = 1 := by\n    intro l hl\n    rcases h_unique_preimage l hl with \u27e8p, \u27e8hp, hfp\u27e9, huniq\u27e9\n    have hp_eq : l.1 * p.1 + l.2 = p.2 := by\n      calc\n        l.1 * p.1 + l.2 = (f p).1 * p.1 + (f p).2 := by simp [hfp]\n        _ = p.2 := hf_eq p hp\n    have hfilter_sub : (S).filter (\u03bb p' => l.1 * p'.1 + l.2 = p'.2) \u2286 {p} := by\n      intro x hx\n      rcases Finset.mem_filter.mp hx with \u27e8hxS, hx_eq\u27e9\n      have hfx_eq_l : f x = l := h_fp_eq_of_cover x hxS l hl hx_eq\n      have hx_eq_p : x = p := huniq x \u27e8hxS, hfx_eq_l\u27e9\n      subst hx_eq_p\n      exact Finset.mem_singleton.mpr rfl\n    have hsing_sub : {p} \u2286 (S).filter (\u03bb p' => l.1 * p'.1 + l.2 = p'.2) := by\n      intro x hx\n      rcases Finset.mem_singleton.mp hx with rfl\n      apply Finset.mem_filter.mpr\n      exact \u27e8hp, hp_eq\u27e9\n    exact (Finset.card_eq_one.mpr \u27e8p, Finset.Subset.antisymm hfilter_sub hsing_sub\u27e9)\n  have h_second : \u2200 p \u2208 S, \u2203! l \u2208 lines', l.1 * p.1 + l.2 = p.2 := by\n    intro p hp\n    refine \u27e8f p, ?_, ?_\u27e9\n    \u00b7 exact \u27e8hf_mem p hp, hf_eq p hp\u27e9\n    \u00b7 intro l hl\n      rcases hl with \u27e8hl_mem, hl_eq\u27e9\n      exact (h_fp_eq_of_cover p hp l hl_mem hl_eq).symm\n  exact And.intro h_first h_second"

      "lean": "@[blueprint\n  (statement := /-- There exists a configuration of $k$ sunny lines covering $T_k$. -/)\n  (proof := /-- By case analysis on $k$ using $k\\le 3$ and $k\\neq 2$. -/)]\nlemma reduction_to_all_sunny (n k : \u2115) (verts : Finset \u211d) (lines : Finset (\u211d \u00d7 \u211d)) (points : Finset (\u2115 \u00d7 \u2115)) (hn : 3 \u2264 n) (hcard : lines.card + verts.card = n) (hallpoints : \u2200 p, p \u2208 points \u2194 p.1 \u2265 1 \u2227 p.2 \u2265 1 \u2227 p.1 + p.2 \u2264 n + 1) (hmain : \u2200 p \u2208 points, (\u2203 l \u2208 lines, l.1 * p.1 + l.2 = p.2) \u2228 (\u2203 x \u2208 verts, p.1 = x)) (hk : (lines.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card = k) : \n  \u2203 (lines' : Finset (\u211d \u00d7 \u211d)) (verts' : Finset \u211d), \n    (lines'.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card = k \u2227\n    lines'.card + verts'.card = k \u2227\n    (\u2200 l \u2208 lines', l.1 \u2260 0 \u2227 l.1 \u2260 -1) \u2227\n    (\u2200 p \u2208 T_set k, (\u2203 l \u2208 lines', l.1 * p.1 + l.2 = p.2) \u2228 (\u2203 x \u2208 verts', p.1 = x)) := by\n  have hk3 : k \u2264 3 := k_le_three n k verts lines points hn hcard hallpoints hmain hk\n  have hk2 : k \u2260 2 := k_ne_two n k verts lines points hn hcard hallpoints hmain hk\n  have h_cases : k = 0 \u2228 k = 1 \u2228 k = 3 := by\n    have : k \u2264 3 := hk3\n    have : k \u2260 2 := hk2\n    omega\n  rcases h_cases with (hk0|hk1|hk3')\n  \u00b7 -- k = 0\n    subst hk0\n    refine \u27e8\u2205, \u2205, ?_, ?_, ?_, ?_\u27e9\n    \u00b7 simp\n    \u00b7 simp\n    \u00b7 intro l hl; simp at hl\n    \u00b7 intro p hp\n      have : T_set 0 = \u2205 := by\n        ext \u27e8x,y\u27e9; simp [T_set]\n      simp [this] at hp\n  \u00b7 -- k = 1\n    subst hk1\n    refine \u27e8{(1,0)}, \u2205, ?_, ?_, ?_, ?_\u27e9\n    \u00b7 simp [Finset.filter_singleton]\n      norm_num\n    \u00b7 simp\n    \u00b7 intro l hl\n      simp at hl\n      rcases hl with (rfl|hl)\n      \u00             clearHighlight();
            urlHighlightNodeIds = [];
            urlHighlightLocalOnly = false;
            urlHighlightEdges = true;
            // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
