            --tooltip-text: white;
            --main-node-color: #3b82f6;
            --main-edge-color: #93c5fd;
            --external-node-color: #b8bcc4;
            --external-edge-color: #b8bcc4;
            --hover-highlight-color: #f9a8d4;
            --external-highlight-color: #deb8cc;
        }
        body.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --controls-bg: rgba(30, 30, 30, 0.9);
            --controls-border: #3e3e3e;
            --tooltip-bg: rgba(0, 0, 0, 0.9);
            --tooltip-text: white;
            --main-node-color: #4ade80;

            --external-node-color: #9ca3af;
            --external-edge-color: #555555;
            --hover-highlight-color: #fbbf24;
            --external-highlight-color: #9a8540;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
        }
        #graph {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--controls-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--controls-border);
            transition: background 0.3s, border-color 0.3s;
        }
        .controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        .controls label {
            display: block;
            margin: 8px 0;
            font-size: 12px;
        }
        .controls input[type="checkbox"] {
            margin-right: 6px;
        }
        .controls select {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--controls-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .node {
            cursor: pointer;
            stroke: none;
        }
        .node.highlighted {
            stroke: var(--hover-highlight-color);
            stroke-width: 3px;
        }
        .node.url-highlighted {
            fill: var(--hover-highlight-color) !important;
        }
        .link.highlighted {
            stroke: var(--hover-highlight-color) !important;
            stroke-opacity: 1 !important;
            stroke-width: 2px !important;
        }
        .link.highlighted-external {
            stroke: var(--external-highlight-color) !important;
            stroke-opacity: 0.8 !important;
            stroke-width: 1.5px !important;
        }
        .tooltip {
            position: absolute;
            background: var(--tooltip-bg);
            color: var(--tooltip-text);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 300px;
            word-wrap: break-word;
        }
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
        .watermark a {
            color: #141414;
        }
        body.dark-mode .watermark a {
            color: white;
        }
    </style>
</head>

      "lean": "@[blueprint\n  (statement := /-- Cardinality of $T_k$ is $k(k+1)/2$. -/)\n  (proof := /-- By counting. -/)]\nlemma card_T_set (k : \u2115) : (T_set k).card = k*(k+1)/2 := by\n  have filter_Icc_eq_Icc (x k : \u2115) (hx : 1 \u2264 x) (hx' : x \u2264 k) : Finset.filter (\u03bb y : \u2115 => x + y \u2264 k+1) (Icc 1 k) = Icc 1 (k+1-x) := by\n    ext y\n    constructor\n    \u00b7 intro hy\n      rcases Finset.mem_filter.mp hy with \u27e8hy_mem, hy_cond\u27e9\n      rcases Finset.mem_Icc.mp hy_mem with \u27e8hy1, hy2\u27e9\n      apply Finset.mem_Icc.mpr\n      have hy1' : 1 \u2264 y := hy1\n      have hy2' : y \u2264 k+1-x := by\n        omega\n      exact \u27e8hy1', hy2'\u27e9\n    \u00b7 intro hy\n      rcases Finset.mem_Icc.mp hy with \u27e8hy1, hy2\u27e9\n      apply Finset.mem_filter.mpr\n      constructor\n      \u00b7 apply Finset.mem_Icc.mpr\n        have hy2_k : y \u2264 k := by\n          omega\n        exact \u27e8hy1, hy2_k\u27e9\n      \u00b7 omega\n  have card_filter_add (x k : \u2115) (hx : x \u2208 Icc 1 k) : Finset.card (Finset.filter (\u03bb y : \u2115 => x + y \u2264 k+1) (Icc 1 k)) = k+1-x := by\n    rcases Finset.mem_Icc.mp hx with \u27e8hx1, hx2\u27e9\n    rw [filter_Icc_eq_Icc x k hx1 hx2, Nat.card_Icc]\n    omega\n  have sum_symm (k : \u2115) : Finset.sum (Icc 1 k) (\u03bb x => k+1-x) = Finset.sum (Icc 1 k) (\u03bb x => x) := by\n    apply Finset.sum_bij (\u03bb a ha => k+1-a)\n    \u00b7 intro a ha\n      rcases Finset.mem_Icc.mp ha with \u27e8ha1, ha2\u27e9\n      apply Finset.mem_Icc.mpr\n      have h1 : 1 \u2264 k+1-a := by omega\n      have h2 : k+1-a \u2264 k := by omega\n      exact \u27e8h1, h2\u27e9\n    \u00b7 intro a\u2081 ha\u2081 a\u2082 ha\u2082 h\n      rcases Finset.mem_Icc.mp ha\u2081 with \u27e8ha\u20811, ha\u20812\u27e9\n      rcases Finset.mem_Icc.mp ha\u2082 with \u27e8ha\u20821, ha\u20822\u27e9\n      omega\n    \u00b7 intro b hb\n      rcases Finset.mem_Icc.mp hb with \u27e8hb1, hb2\u27e9\n      use k+1-b\n rd = ((bottom n) \u2229 (left n) \u2229 (hypotenuse n)).card := by\n          have h_eq : ((bottom n) \u2229 (hypotenuse n)) \u2229 ((left n) \u2229 (hypotenuse n)) = (bottom n) \u2229 (left n) \u2229 (hypotenuse n) := by\n            ext x; simp [Finset.mem_inter]\n          rw [h_eq]\n        _ = 0 := hABC\n    rw [Finset.card_union, hAC, hBC, h_inter]\n  calc\n    (U n).card = (((bottom n) \u222a (left n)) \u222a (hypotenuse n)).card := rfl\n    _ = ((bottom n) \u222a (left n)).card + (hypotenuse n).card - (((bottom n) \u222a (left n)) \u2229 (hypotenuse n)).card := by\n      rw [Finset.card_union]\n    _ = (n + n - 1) + n - (((bottom n) \u222a (left n)) \u2229 (hypotenuse n)).card := by\n      rw [hcardD, hcardC]\n    _ = (n + n - 1) + n - (((bottom n) \u2229 (hypotenuse n)) \u222a ((left n) \u2229 (hypotenuse n))).card := by\n      have h_eq : ((bottom n) \u222a (left n)) \u2229 (hypotenuse n) = ((bottom n) \u2229 (hypotenuse n)) \u222a ((left n) \u2229 (hypotenuse n)) := by\n        ext x; simp [Finset.mem_inter, Finset.mem_union]; tauto\n      rw [h_eq]\n    _ = (n + n - 1) + n - 2 := by rw [hcard_inter_union]\n    _ = 3*n - 3 := by omega"

      "lean": "@[blueprint\n  (statement := /-- |bottom(n)| = n. -/)\n  (proof := /-- Count points with y=1. -/)]\nlemma card_bottom (n : \u2115) : (bottom n).card = n := by\n  have h_bottom_eq : bottom n = (Finset.Icc 1 n).image (fun x => (x,1)) := by\n    ext \u27e8x,y\u27e9; constructor\n    { intro h\n      rcases Finset.mem_filter.mp h with \u27e8hmem, hy\u27e9\n      rcases Finset.mem_filter.mp hmem with \u27e8hmem2, hsum\u27e9\n      rcases Finset.mem_product.mp hmem2 with \u27e8hx, hy'\u27e9\n      have hy1 : y = 1 := by\n        simpa using hy\n      subst hy1\n      apply Finset.mem_image.mpr\n      exact \u27e8x, hx, rfl\u27e9 }\n    { intro h\n      have hmem_image := Finset.mem_image.mp h\n      rcases hmem_image with \u27e8x, hx, hpair\u27e9\n      injection hpair with hx_eq hy_eq\n      subst hx_eq; subst hy_eq\n      -- now the point is (x,1)\n      have hx' : x \u2208 Finset.Icc 1 n := hx\n      have hy' : 1 \u2208 Finset.Icc 1 n := by\n        have h1n : 1 \u2264 n := by\n          rcases Finset.mem_Icc.mp hx with \u27e8hx1, hx2\u27e9\n          exact le_trans hx1 hx2\n        exact Finset.mem_Icc.mpr \u27e8by omega, h1n\u27e9\n      have hsum : x + 1 \u2264 n + 1 := by\n        rcases Finset.mem_Icc.mp hx with \u27e8hx1, hx2\u27e9\n        omega\n      apply Finset.mem_filter.mpr\n      refine \u27e8?_, by simp\u27e9\n      apply Finset.mem_filter.mpr\n      refine \u27e8Finset.mem_product.mpr \u27e8hx', hy'\u27e9, hsum\u27e9 }\n  rw [h_bottom_eq]\n  have hinj : Function.Injective (fun (x : \u2115) => (x, 1)) := by\n    intro a b h\n    injection h\n  rw [Finset.card_image_of_injective _ hinj]\n  rw [Nat.card_Icc]\n  omega"

) + (p.2 : \u211d) = b)) \u2192 p = q := by\n      intro p q hp hq\n      rcases Finset.mem_filter.mp hp with \u27e8hp_left, hp_eq\u27e9\n      rcases Finset.mem_filter.mp hq with \u27e8hq_left, hq_eq\u27e9\n      rcases Finset.mem_filter.mp hp_left with \u27e8hp_T, hp_x\u27e9\n      rcases Finset.mem_filter.mp hq_left with \u27e8hq_T, hq_x\u27e9\n      have hp1 : (p.1 : \u211d) = 1 := by exact_mod_cast hp_x\n      have hq1 : (q.1 : \u211d) = 1 := by exact_mod_cast hq_x\n      have hp_eq' : 1 + (p.2 : \u211d) = b := by\n        simpa [hp1] using hp_eq\n      have hq_eq' : 1 + (q.2 : \u211d) = b := by\n        simpa [hq1] using hq_eq\n      have hy_eq : (p.2 : \u211d) = (q.2 : \u211d) := by\n        linarith\n      have hy_eq_nat : p.2 = q.2 := by exact_mod_cast hy_eq\n      apply Prod.ext\n      \u00b7 calc\n          p.1 = 1 := hp_x\n          _ = q.1 := by symm; exact hq_x\n      \u00b7 exact hy_eq_nat\n    rw [Finset.card_le_one_iff]\n    intro p q hp hq\n    exact h_single p q hp hq\n  have h_union_card : (((bottom n).filter (\u03bb p => (p.1 : \u211d) + (p.2 : \u211d) = b)) \u222a ((left n).filter (\u03bb p => (p.1 : \u211d) + (p.2 : \u211d) = b))).card \u2264 2 := by\n    calc\n      _ \u2264 ((bottom n).filter (\u03bb p => (p.1 : \u211d) + (p.2 : \u211d) = b)).card + ((left n).filter (\u03bb p => (p.1 : \u211d) + (p.2 : \u211d) = b)).card :=\n        Finset.card_union_le _ _\n      _ \u2264 1 + 1 := by\n        nlinarith\n      _ = 2 := by norm_num\n  have h_S_subset_union : ((U n).filter (\u03bb p => (p.1 : \u211d) + (p.2 : \u211d) = b)) \u2286 (((bottom n).filter (\u03bb p => (p.1 : \u211d) + (p.2 : \u211d) = b)) \u222a ((left n).filter (\u03bb p => (p.1 : \u211d) + (p.2 : \u211d) = b))) := by\n    intro p hp\n    rcases Finset.mem_filter.mp hp with \u27e8hpU, hp_eq\u27e9\n    rcases (Finset.mem_union.1 hpU) with (hU1 | hpH)\n    \u00b7 rcases (Finset.mem_union.1 hU1) with (hpB | hpL)\n      \u00b7 apply Finset.mem_union_left\n        apply Finset.mem_filte       "lean": "@[blueprint\n  (statement := /-- A horizontal line y = b with b \u2260 1 contains at most 2 points of U(n). -/)\n  (proof := /-- It can intersect bottom, left, hypotenuse at at most one each. -/)]\nlemma horiz_not_one_contains_at_most_two_U (n : \u2115) (b : \u211d) (hb : b \u2260 1) : ((U n).filter (\u03bb p => (0 : \u211d) * p.1 + b = p.2)).card \u2264 2 := by\n  have h_simp : (\u03bb (p : \u2115 \u00d7 \u2115) => (0 : \u211d) * p.1 + b = p.2) = (\u03bb (p : \u2115 \u00d7 \u2115) => (b : \u211d) = (p.2 : \u211d)) := by\n    ext p; simp\n  have h_goal' : ((U n).filter (\u03bb p => b = (p.2 : \u211d))).card \u2264 2 := by\n    have mem_T_set_iff (x y n : \u2115) : (x, y) \u2208 T_set n \u2194 1 \u2264 x \u2227 x \u2264 n \u2227 1 \u2264 y \u2227 y \u2264 n \u2227 x + y \u2264 n + 1 := by\n      simp [T_set, Finset.mem_filter, Finset.mem_product, Finset.mem_Icc, and_assoc]\n    have card_filter_bottom_eq_zero (n m : \u2115) (hm : m \u2260 1) : ((bottom n).filter (\u03bb p => p.2 = m)).card = 0 := by\n      apply Finset.card_eq_zero.mpr\n      apply Finset.filter_eq_empty_iff.mpr\n      intro p hp\n      have hp2 : p.2 = 1 := by\n        rcases Finset.mem_filter.mp hp with \u27e8hpT, hp2\u27e9\n        exact hp2\n      intro hm_eq\n      apply hm\n      calc\n        m = p.2 := by symm; exact hm_eq\n        _ = 1 := hp2\n    have card_filter_left_y_eq_m_le_one (n m : \u2115) : ((left n).filter (\u03bb p => p.2 = m)).card \u2264 1 := by\n      by_cases hmem : (1, m) \u2208 T_set n\n      \u00b7 have : ((left n).filter (\u03bb p => p.2 = m)) = {(1, m)} := by\n          apply Finset.eq_singleton_iff_unique_mem.mpr\n          constructor\n          \u00b7 apply Finset.mem_filter.mpr\n            constructor\n            \u00b7 apply Finset.mem_filter.mpr\n              exact \u27e8hmem, by simp\u27e9\n            \u00b7 simp\n          \u00b7 intro p hp\n            rcases Finset.mem_filter.mp hp with \u27e8hp_left, hp_eq\u27e9\n            rcases Finset.me       "lean": "@[blueprint\n  (statement := /-- $|\\text{hypotenuse}(k)| = k$. -/)\n  (proof := /-- By counting. -/)]\nlemma hypotenuse_card (k : \u2115) : (hypotenuse k).card = k := by\n  have h_eq : hypotenuse k = (Finset.Icc 1 k).image (\u03bb x => (x, k+1-x)) := by\n    ext \u27e8x, y\u27e9\n    constructor\n    { intro h\n      rcases Finset.mem_filter.mp h with \u27e8hmem, hsum\u27e9\n      rcases Finset.mem_filter.mp hmem with \u27e8hprod, hsumle\u27e9\n      rcases Finset.mem_product.mp hprod with \u27e8hx, hy\u27e9\n      have hy_eq : y = k+1-x := by omega\n      apply Finset.mem_image.mpr\n      refine \u27e8x, hx, ?_\u27e9\n      simp [hy_eq]\n    }\n    { intro h\n      rcases Finset.mem_image.mp h with \u27e8a, ha, ha_eq\u27e9\n      have ha_eq_fst : a = x := by\n        have := congr_arg Prod.fst ha_eq\n        simpa using this\n      have ha_eq_snd : k+1-a = y := by\n        have := congr_arg Prod.snd ha_eq\n        simpa using this\n      rw [ha_eq_fst] at ha ha_eq_snd\n      have hy_eq : y = k+1-x := by\n        simpa using ha_eq_snd.symm\n      have hx1 : 1 \u2264 x := (Finset.mem_Icc.mp ha).1\n      have hxk : x \u2264 k := (Finset.mem_Icc.mp ha).2\n      have hy1 : 1 \u2264 y := by\n        have : k+1-x \u2265 1 := by omega\n        omega\n      have hyk : y \u2264 k := by omega\n      have hsum : x + y = k+1 := by\n        omega\n      have hsumle : x + y \u2264 k+1 := by omega\n      apply Finset.mem_filter.mpr\n      refine \u27e8?_, ?_\u27e9\n      \u00b7 apply Finset.mem_filter.mpr\n        refine \u27e8Finset.mem_product.mpr \u27e8ha, ?_\u27e9, hsumle\u27e9\n        apply Finset.mem_Icc.mpr\n        exact \u27e8hy1, hyk\u27e9\n      \u00b7 exact hsum\n    }\n  rw [h_eq]\n  have hinj : Function.Injective (\u03bb x : \u2115 => (x, k+1-x)) := by\n    intro a b h\n    have ha := congr_arg Prod.fst h\n    exact ha\n  rw [Finset.card_image_of_injective _ hinj]\n  simp"

      "lean": "@[blueprint\n  (statement := /-- A line with slope not 0 or -1 contains at most 2 points of U(n). -/)\n  (proof := /-- Using the algebraic lemma not_three_distinct. -/)]\nlemma line_not_horiz_diag_contains_at_most_two_U (n : \u2115) (l : \u211d \u00d7 \u211d) (h_slope_ne_0 : l.1 \u2260 0) (h_slope_ne_neg_one : l.1 \u2260 -1) : ((U n).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 2 := by\n  have mem_T_set_iff (n : \u2115) (p : \u2115 \u00d7 \u2115) : p \u2208 T_set n \u2194 p.1 \u2208 Icc 1 n \u2227 p.2 \u2208 Icc 1 n \u2227 p.1 + p.2 \u2264 n + 1 := by\n    simp [T_set, Finset.mem_product, Finset.mem_filter, Finset.mem_Icc, and_assoc]\n  have at_most_one_bottom (n : \u2115) (l : \u211d \u00d7 \u211d) (h_slope_ne_0 : l.1 \u2260 0) : ((bottom n).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 1 := by\n    rw [Finset.card_le_one_iff]\n    intro p q hp hq\n    have hp_bottom : p \u2208 bottom n := (Finset.mem_filter.mp hp).1\n    have hp_eq : l.1 * p.1 + l.2 = p.2 := (Finset.mem_filter.mp hp).2\n    have hq_bottom : q \u2208 bottom n := (Finset.mem_filter.mp hq).1\n    have hq_eq : l.1 * q.1 + l.2 = q.2 := (Finset.mem_filter.mp hq).2\n    have hp_y : p.2 = 1 := by\n      rcases Finset.mem_filter.mp hp_bottom with \u27e8hpT, hp_y\u27e9; exact hp_y\n    have hq_y : q.2 = 1 := by\n      rcases Finset.mem_filter.mp hq_bottom with \u27e8hqT, hq_y\u27e9; exact hq_y\n    have hp_eq' : l.1 * (p.1 : \u211d) + l.2 = (1 : \u211d) := by simpa [hp_y] using hp_eq\n    have hq_eq' : l.1 * (q.1 : \u211d) + l.2 = (1 : \u211d) := by simpa [hq_y] using hq_eq\n    have hx_eq : (p.1 : \u211d) = (q.1 : \u211d) := by\n      have h : l.1 * ((p.1 : \u211d) - (q.1 : \u211d)) = 0 := by linarith\n      rcases eq_zero_or_eq_zero_of_mul_eq_zero h with (hl | hsub)\n      \u00b7 exfalso; exact h_slope_ne_0 hl\n      \u00b7 linarith\n    have hx_eq_nat : p.1 = q.1 := by exact_mod_cast hx_eq\n    have hy_eq : p.2 = q.2 := by rw [hp_y, hq_y]\n    ext <;> assumption\n  have at_most_one_left (n : \u2115) (l : \u211d \u00d7 \u211d) : ((left n).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 1 := by\n    rw [Finset.card_le_one_iff]\n    intro p q hp hq\n    have hp_left : p \u2208 left n := (Finset.mem_filter.mp hp).1\n    have hp_eq : l.1 * p.1 + l.2 = p.2 := (Finset.mem_filter.mp hp).2\n    have hq_left : q \u2208 left n := (Finset.mem_filter.mp hq).1\n    have hq_eq : l.1 * q.1 + l.2 = q.2 := (Finset.mem_filter.mp hq).2\n    have hp_x : p.1 = 1 := by\n      rcases Finset.mem_filter.mp hp_left with \u27e8hpT, hp_x\u27e9; exact hp_x\n    have hq_x : q.1 = 1 := by\n      rcases Finset.mem_filter.mp hq_left with \u27e8hqT, hq_x\u27e9; exact hq_x\n    have hp_eq' : l.1 * (1 : \u211d) + l.2 = (p.2 : \u211d) := by simpa [hp_x] using hp_eq\n    have hq_eq' : l.1 * (1 : \u211d) + l.2 = (q.2 : \u211d) := by simpa [hq_x] using hq_eq\n    have hy_eq : (p.2 : \u211d) = (q.2 : \u211d) := by\n      linarith\n    have hy_eq_nat : p.2 = q.2 := by exact_mod_cast hy_eq\n    have hx_eq_nat : p.1 = q.1 := by rw [hp_x, hq_x]\n    ext <;> assumption\n  have at_most_one_hypotenuse (n : \u2115) (l : \u211d \u00d7 \u211d) (h_slope_ne_neg_one : l.1 \u2260 -1) : ((hypotenuse n).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 1 := by\n    rw [Finset.card_le_one_iff]\n    intro p q hp hq\n    have hp_hyp : p \u2208 hypotenuse n := (Finset.mem_filter.mp hp).1\n    have hp_eq : l.1 * p.1 + l.2 = p.2 := (Finset.mem_filter.mp hp).2\n    have hq_hyp : q \u2208 hypotenuse n := (Finset.mem_filter.mp hq).1\n    have hq_eq : l.1 * q.1 + l.2 = q.2 := (Finset.mem_filter.mp hq).2\n    have hp_T : p \u2208 T_set n := (Finset.mem_filter.mp hp_hyp).1\n    have hq_T : q \u2208 T_set n := (Finset.mem_filter.mp hq_hyp).1\n    have hp1_le_n : p.1 \u2264 n := by\n      rcases (mem_T_set_iff n p).mp hp_T with \u27e8h, _, _\u27e9; exact (Finset.mem_Icc.mp h).2\n    have hp1_le_n1 : p.1 \u2264 n+1 := by omega\n    have hq1_le_n : q.1 \u2264 n := by\n      rcases (mem_T_set_iff n q).mp hq_T with \u27e8h, _, _\u27e9; exact (Finset.mem_Icc.mp h).2\n    have hq1_le_n1 : q.1 \u2264 n+1 := by omega\n    have hp_sum : p.1 + p.2 = n+1 := by\n      rcases Finset.mem_filter.mp hp_hyp with \u27e8hpT, hp_sum\u27e9; exact hp_sum\n    have hq_sum : q.1 + q.2 = n+1 := by\n      rcases Finset.mem_filter.mp hq_hyp with \u27e8hqT, hq_sum\u27e9; exact hq_sum\n    have hp2_eq : p.2 = n+1 - p.1 := by omega\n    have hq2_eq : q.2 = n+1 - q.1 := by omega\n    have hp_eq' : l.1 * (p.1 : \u211d) + l.2 = (n+1 : \u211d) - (p.1 : \u211d) := by\n      simpa [Nat.cast_sub hp1_le_n1, hp2_eq] using hp_eq\n    have hq_eq' : l.1 * (q.1 : \u211d) + l.2 = (n+1 : \u211d) - (q.1 : \u211d) := by\n      simpa [Nat.cast_sub hq1_le_n1, hq2_eq] using hq_eq\n    have hx_eq : (p.1 : \u211d) = (q.1 : \u211d) := by\n      have hdiff : (l.1 + 1) * ((p.1 : \u211d) - (q.1 : \u211d)) = 0 := by\n        nlinarith\n      rcases eq_zero_or_eq_zero_of_mul_eq_zero hdiff with (hl | hsub)\n      \u00b7 exfalso; exact h_slope_ne_neg_one (by linarith)\n      \u00b7 linarith\n    have hx_eq_nat : p.1 = q.1 := by exact_mod_cast hx_eq\n    have hy_eq_nat : p.2 = q.2 := by\n      omega\n    ext <;> assumption\n  have bottom_left_hyp_collinear_implies_p1_eq_n (n : \u2115) (l : \u211d \u00d7 \u211d) (p q r : \u2115 \u00d7 \u2115) (hp : p \u2208 bottom n) (hp_eq : l.1 * p.1 + l.2 = p.2)\n    (hq : q \u2208 left n) (hq_eq : l.1 * q.1 + l.2 = q.2) (hr : r \u2208 hypotenuse n) (hr_eq : l.1 * r.1 + l.2 = r.2) (hpq : p \u2260 q) (hpr : p \u2260 r) (hqr : q \u2260 r)\n    (h_slope_ne_0 : l.1 \u2260 0) : p.1 = n := by\n    have hp_y : p.2 = 1 := by\n      rcases Finset.mem_filter.mp hp with \u27e8hpT, hp_y\u27e9; exact hp_y\n    have hq_x : q.1 = 1 := by\n      rcases Finset.mem_filter.mp hq with \u27e8hqT, hq_x\u27e9; exact hq_x\n    have hr_sum : r.1 + r.2 = n+1 := by\n      rcases Finset.mem_filter.mp hr with \u27e8hrT, hr_sum\u27e9; exact hr_sum\n    have hp_T : p \u2208 T_set n := (Finset.mem_filter.mp hp).1\n    have hq_T : q \u2208 T_set n := (Finset.mem_filter.mp hq).1\n    have hr_T : r \u2208 T_set n := (Finset.mem_filter.mp hr).1\n    have hp1_le_n : p.1 \u2264 n := by\n      rcases (mem_T_set_iff n p).mp hp_T with \u27e8h, _, _\u27e9; exact (Finset.mem_Icc.mp h).2\n    have hp1_ge_1 : 1 \u2264 p.1 := by\n      rcases (mem_T_set_iff n p).mp hp_T with \u27e8h, _, _\u27e9; exact (Finset.mem_Icc.mp h).1\n    have hq2_le_n : q.2 \u2264 n := by\n      rcases (mem_T_set_iff n q).mp hq_T with \u27e8_, h, _\u27e9; exact (Finset.mem_Icc.mp h).2\n    have hq2_ge_1 : 1 \u2264 q.2 := by\n      rcases (mem_T_set_iff n q).mp hq_T with \u27e8_, h, _\u27e9; exact (Finset.mem_Icc.mp h).1\n    have hr1_le_n : r.1 \u2264 n := by\n      rcases (mem_T_set_iff n r).mp hr_T with \u27e8h, _, _\u27e9; exact (Finset.mem_Icc.mp h).2\n    have hr1_ge_1 : 1 \u2264 r.1 := by\n      rcases (mem_T_set_iff n r).mp hr_T with \u27e8h, _, _\u27e9; exact (Finset.mem_Icc.mp h).1\n    -- convert to \u211d for algebraic manipulations\n    have hp_eq' : l.1 * (p.1 : \u211d) + l.2 = (1 : \u211d) := by\n      simpa [hp_y] using hp_eq\n    have hq_eq' : l.1 * (1 : \u211d) + l.2 = (q.2 : \u211d) := by\n      simpa [hq_x] using hq_eq\n    have hr_eq' : l.1 * (r.1 : \u211d) + l.2 = (n + 1 : \u211d) - (r.1 : \u211d) := by\n      have hr2_eq : r.2 = n+1 - r.1 := by omega\n      have hr1_le_n1 : r.1 \u2264 n+1 := by omega\n      simpa [Nat.cast_sub hr1_le_n1, hr2_eq] using hr_eq\n    -- integer equation in \u2124\n    have h_main_real : ((q.2 : \u211d) - 1) * ((p.1 : \u211d) - (r.1 : \u211d)) = ((n : \u211d) - (r.1 : \u211d)) * ((p.1 : \u211d) - 1) := by\n      nlinarith\n    have h_main_int : ((q.2 : \u2124) - 1) * ((p.1 : \u2124) - (r.1 : \u2124)) = ((n : \u2124) - (r.1 : \u2124)) * ((p.1 : \u2124) - 1) := by\n      exact_mod_cast h_main_real\n    -- prove that (p.1 : \u2124) \u2265 (r.1 : \u2124)\n    have hA_ge_B : (p.1 : \u2124) \u2265 (r.1 : \u2124) := by\n      by_contra! hlt\n      -- hlt: (p.1         Finset.mem_filter.mpr \u27e8hr_bottom, by simpa using hr_eq\u27e9\n        have hcard : ((bottom n).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 1 :=\n          at_most_one_bottom n l h_slope_ne_0\n        rw [Finset.card_le_one_iff] at hcard\n        have h_eq := hcard hp_filter hr_filter\n        exact hpr h_eq\n      \u00b7 -- p.1 = 1\n        have hp1_eq_1 : p.1 = 1 := by omega\n        -- then from hp_eq' we get l.1 + l.2 = 1, and from hq_eq' we get q.2 = 1, so q = (1,1) = p, contradiction\n        have hq2_eq_1 : (q.2 : \u211d) = (1 : \u211d) := by\n          calc\n            (q.2 : \u211d) = l.1 * (1 : \u211d) + l.2 := by simpa [hq_x] using hq_eq'.symm\n            _ = l.1 * (p.1 : \u211d) + l.2 := by rw [show (p.1 : \u211d) = (1 : \u211d) from by exact_mod_cast hp1_eq_1]\n            _ = (1 : \u211d) := hp_eq'\n        have hq2_eq_1_nat : q.2 = 1 := by exact_mod_cast hq2_eq_1\n        have hq_eq_p : q = p := by\n          apply Prod.ext\n          \u00b7 rw [hq_x, hp1_eq_1]\n          \u00b7 rw [hq2_eq_1_nat, hp_y]\n        exact hpq hq_eq_p.symm\n    -- Now we have A \u2265 B. Use the identity to deduce A = n.\n    have h_identity : ((n : \u2124) - 1) * ((p.1 : \u2124) - (r.1 : \u2124)) - ((n : \u2124) - (r.1 : \u2124)) * ((p.1 : \u2124) - 1) = ((p.1 : \u2124) - (n : \u2124)) * ((r.1 : \u2124) - 1) := by\n      ring\n    -- Since A \u2265 B, we have (p.1 - r.1) \u2265 0. Also C-1 \u2264 N-1 because q.2 \u2264 n.\n    have h_nonneg_AB : 0 \u2264 (p.1 : \u2124) - (r.1 : \u2124) := by omega\n    have h_le_C : (q.2 : \u2124) - 1 \u2264 (n : \u2124) - 1 := by\n      have : (q.2 : \u2124) \u2264 (n : \u2124) := by exact_mod_cast hq2_le_n\n      omega\n    -- From h_main_int, we have (C-1)*(A-B) = (N-B)*(A-1).\n    -- Since (A-B) \u2265 0, we have (C-1)*(A-B) \u2264 (N-1)*(A-B).\n    -- Thus (N-B)*(A-1) \u2264 (N-1)*(A-B).\n    have h_ineq : ((n : \u2124) - (r.1 : \u2124)) * ((p.1 : \u2124) - 1) \u2264 ((n : \u2124) - 1) * ((p.1 : \u2124) - (r. ga\n      \u00b7 have hmem_erase : l \u2208 lines.erase (0,1) := by\n          rw [Finset.mem_erase]\n          exact \u27e8hlspecial, hlmem\u27e9\n        have hmem_image : f l \u2208 lines' := by\n          rw [hlines'_def]\n          apply Finset.mem_image.mpr\n          exact \u27e8l, hmem_erase, rfl\u27e9\n        refine Or.inl \u27e8f l, hmem_image, ?_\u27e9\n        dsimp [f]\n        calc\n          l.1 * (p.1 : \u211d) + (l.2 - 1) = (l.1 * (p.1 : \u211d) + l.2) - 1 := by ring\n          _ = ((p.2 : \u211d) + 1) - 1 := by rw [hleq]\n          _ = (p.2 : \u211d) := by ring\n    \u00b7 rcases hvert with \u27e8x, hxmem, hxeq\u27e9\n      refine Or.inr \u27e8x, by simpa [hverts'_def] using hxmem, hxeq\u27e9\n  have hfilter_eq : (lines'.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)) = ((lines.erase (0,1)).filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).image f := by\n    calc\n      (lines'.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)) = ((lines.erase (0,1)).image f).filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1) := by rfl\n      _ = ((lines.erase (0,1)).filter (fun l \u21a6 (fun (l' : \u211d \u00d7 \u211d) => l'.1 \u2260 0 \u2227 l'.1 \u2260 -1) (f l))).image f := by\n        rw [Finset.filter_image]\n      _ = ((lines.erase (0,1)).filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).image f := by\n        simp [f]\n  have hcard_filter_lines' : (lines'.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card = ((lines.erase (0,1)).filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card := by\n    rw [hfilter_eq, Finset.card_image_of_injective _ hf_inj]\n  have hfilter_erase : (lines.erase (0,1)).filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1) = lines.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1) := by\n    ext l\n    constructor\n    \u00b7 intro h\n      rcases Finset.mem_filter.mp h with \u27e8hlmem, hlprop\u27e9\n      apply Finset.mem_filter.mpr\n      exact \u27e8Finset.mem_of_mem_erase       "lean": "@[blueprint\n  (statement := /-- Given a vertical line x=1 in verts, we can reduce to n-1 case. -/)\n  (proof := /-- Remove left column and the vertex, shift points left by 1. -/)]\nlemma reduce_vert (n : \u2115) (hn : 4 \u2264 n) (verts : Finset \u211d) (lines : Finset (\u211d \u00d7 \u211d)) (points : Finset (\u2115 \u00d7 \u2115))\n  (hallpoints : \u2200 p, p \u2208 points \u2194 p.1 \u2265 1 \u2227 p.2 \u2265 1 \u2227 p.1 + p.2 \u2264 n + 1) (hcard : lines.card + verts.card = n)\n  (hmain : \u2200 p \u2208 points, (\u2203 l \u2208 lines, l.1 * p.1 + l.2 = p.2) \u2228 (\u2203 x \u2208 verts, p.1 = x))\n  (h_special : \u2203 x \u2208 verts, x = 1) : \n  \u2203 (n' : \u2115) (verts' : Finset \u211d) (lines' : Finset (\u211d \u00d7 \u211d)) (points' : Finset (\u2115 \u00d7 \u2115)), \n    n' = n-1 \u2227 3 \u2264 n' \u2227 \n    (\u2200 p, p \u2208 points' \u2194 p.1 \u2265 1 \u2227 p.2 \u2265 1 \u2227 p.1 + p.2 \u2264 n' + 1) \u2227\n    lines'.card + verts'.card = n' \u2227\n    (\u2200 p \u2208 points', (\u2203 l \u2208 lines', l.1 * p.1 + l.2 = p.2) \u2228 (\u2203 x \u2208 verts', p.1 = x)) \u2227\n    (lines'.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card = (lines.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card := by\n  set n' := n - 1 with hn'_def\n  have hn'_pos : 3 \u2264 n' := by\n    omega\n  have hn'_card : lines.card + verts.card = n' + 1 := by\n    omega\n  have h1verts : (1 : \u211d) \u2208 verts := by\n    rcases h_special with \u27e8x, hx, hx1\u27e9\n    simpa [hx1] using hx\n  have hverts_nonempty : verts.Nonempty := \u27e8(1 : \u211d), h1verts\u27e9\n  have hverts_card_pos : 0 < verts.card := (Finset.card_pos.mpr hverts_nonempty)\n  -- define verts' and lines'\n  set verts' := (verts.erase (1 : \u211d)).image (\u03bb v : \u211d => v - 1) with hverts'_def\n  set lines' := lines.image (\u03bb (l : \u211d \u00d7 \u211d) => (l.1, l.2 + l.1)) with hlines'_def\n  have hinj_lines : Function.Injective (\u03bb (l : \u211d \u00d7 \u211d) => (l.1, l.2 + l.1)) := by\n    intro l1 l2 h\n    have h1 : l1.1 = l2.1 := by\n      simpa using congr_arg Prod.fst h\n    have h2 : l1.2 = l2.2 := by\n      have : l1.2 + l1.1 = l2.2 + l2.1 := by\n        simpa using congr_arg Prod.snd h\n      linarith\n    ext <;> assumption\n  have hverts_card : verts'.card = verts.card - 1 := by\n    have hcard_erase : (verts.erase (1 : \u211d)).card = verts.card - 1 := by\n      rw [Finset.card_erase_of_mem h1verts]\n    have hinj : Function.Injective (\u03bb (v : \u211d) => v - 1) := by\n      intro a b h\n      linarith\n    have hcard_image : (Finset.image (\u03bb v : \u211d => v - 1) (verts.erase (1 : \u211d))).card = (verts.erase (1 : \u211d)).card :=\n      Finset.card_image_of_injective _ hinj\n    calc\n      verts'.card = (Finset.image (\u03bb v : \u211d => v - 1) (verts.erase (1 : \u211d))).card := rfl\n      _ = (verts.erase (1 : \u211d)).card := hcard_image\n      _ = verts.card - 1 := hcard_erase\n  have hlines_card : lines'.card = lines.card :=\n    Finset.card_image_of_injective _ hinj_lines\n  have hcard' : lines'.card + verts'.card = n' := by\n    rw [hlines_card, hverts_card]\n    omega\n  -- define points'\n  let points' : Finset (\u2115 \u00d7 \u2115) := T_set (n-1)\n  have mem_T_set_iff (n : \u2115) (p : \u2115 \u00d7 \u2115) : p \u2208 T_set n \u2194 p.1 \u2265 1 \u2227 p.2 \u2265 1 \u2227 p.1 + p.2 \u2264 n + 1 := by\n    dsimp [T_set]\n    simp only [Finset.mem_product, Finset.mem_Icc, Finset.mem_filter]\n    omega\n  have hpoints'_prop : \u2200 p, p \u2208 points' \u2194 p.1 \u2265 1 \u2227 p.2 \u2265 1 \u2227 p.1 + p.2 \u2264 (n-1) + 1 := by\n    intro p\n    have hmem := mem_T_set_iff (n-1) p\n    -- (n-1)+1 = n\n    have h_eq : (n-1)+1 = n := by omega\n    simpa [points', h_eq] using hmem\n  have hmain' : \u2200 p \u2208 points', (\u2203 l' \u2208 lines', l'.1 * p.1 + l'.2 = p.2) \u2228 (\u2203 x' \u2208 verts', p.1 = x') := by\n    intro p hp\n    have hp_cond := (hpoints'_prop p).mp hp\n    rcases hp_cond with \u27e8hx1, hy1, hsum\u27e9\n    -- hsum: p.1 + p.2 \u2264 n\n    set q := (p.1 + 1, p.2) with hq_def\n    have hq_mem : q \u2208 points := by\n      apply (hallpoints q).mpr\n      refine \u27e8?_, ?_, ?_\u27e9\n      \u00b7 -- q.1 \u2265 1\n        simp [hq_def]\n      \u00b7 -- q.2 \u2265 1\n        exact hy1\n      \u00b7 -- q.1 + q.2 \u2264 n+1\n        have : q.1 + q.2 = (p.1 + p.2) + 1 := by\n          dsimp [q]\n          omega\n        rw [this]\n        omega\n    rcases hmain q hq_mem with (hline | hvert)\n    \u00b7 -- case line\n      rcases hline with \u27e8l, hl_lines, hl_eq\u27e9\n      -- hl_eq: l.1 * q.1 + l.2 = q.2\n      have hl_eq' : l.1 * (p.1 + 1) + l.2 = p.2 := by\n        simpa [hq_def] using hl_eq\n      set l' := (l.1, l.2 + l.1) with hl'_def\n      have hl'_mem : l' \u2208 lines' := by\n        apply Finset.mem_image.mpr\n        refine \u27e8l, hl_lines, ?_\u27e9\n        rfl\n      have hl'_eq : l'.1 * p.1 + l'.2 = p.2 := by\n        dsimp [l']\n        push_cast\n        nlinarith\n      exact Or.inl \u27e8l', hl'_mem, hl'_eq\u27e9\n    \u00b7 -- case vertical\n      rcases hvert with \u27e8x, hx_verts, hx_eq\u27e9\n      -- hx_eq: q.1 = x, i.e., (p.1+1 : \u211d) = x\n      have hx_ne_one : x \u2260 (1 : \u211d) := by\n        intro hx_eq_one\n        have : (p.1 : \u211d) + 1 = 1 := by\n          calc\n            (p.1 : \u211d) + 1 = (q.1 : \u211d) := by simp [hq_def]\n            _ = x := hx_eq\n            _ = 1 := hx_eq_one\n        have : (p.1 : \u211d) = 0 := by linarith\n        have : (p.1 : \u2115) = 0 := by exact_mod_cast this\n        omega\n      have hx_mem_erase : x \u2208 verts.erase (1 : \u211d) := by\n        apply Finset.mem_erase.mpr\n        exact \u27e8hx_ne_one, hx_verts\u27e9\n      set x' := x - 1 with hx'_def\n      have hx'_mem : x' \u2208 verts' := by\n        apply Finset.mem_image.mpr\n        refine \u27e8x, hx_mem_erase, ?_\u27e9\n        rfl\n      have hx'_eq : p.1       "lean": "@[blueprint\n  (statement := /-- There exists a configuration of $k$ sunny lines covering $T_k$. -/)\n  (proof := /-- By case analysis on $k$ using $k\\le 3$ and $k\\neq 2$. -/)]\nlemma reduction_to_all_sunny (n k : \u2115) (verts : Finset \u211d) (lines : Finset (\u211d \u00d7 \u211d)) (points : Finset (\u2115 \u00d7 \u2115)) (hn : 3 \u2264 n) (hcard : lines.card + verts.card = n) (hallpoints : \u2200 p, p \u2208 points \u2194 p.1 \u2265 1 \u2227 p.2 \u2265 1 \u2227 p.1 + p.2 \u2264 n + 1) (hmain : \u2200 p \u2208 points, (\u2203 l \u2208 lines, l.1 * p.1 + l.2 = p.2) \u2228 (\u2203 x \u2208 verts, p.1 = x)) (hk : (lines.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card = k) : \n  \u2203 (lines' : Finset (\u211d \u00d7 \u211d)) (verts' : Finset \u211d), \n    (lines'.filter (fun l \u21a6 l.1 \u2260 0 \u2227 l.1 \u2260 -1)).card = k \u2227\n    lines'.card + verts'.card = k \u2227\n    (\u2200 l \u2208 lines', l.1 \u2260 0 \u2227 l.1 \u2260 -1) \u2227\n    (\u2200 p \u2208 T_set k, (\u2203 l \u2208 lines', l.1 * p.1 + l.2 = p.2) \u2228 (\u2203 x \u2208 verts', p.1 = x)) := by\n  have hk3 : k \u2264 3 := k_le_three n k verts lines points hn hcard hallpoints hmain hk\n  have hk2 : k \u2260 2 := k_ne_two n k verts lines points hn hcard hallpoints hmain hk\n  have h_cases : k = 0 \u2228 k = 1 \u2228 k = 3 := by\n    have : k \u2264 3 := hk3\n    have : k \u2260 2 := hk2\n    omega\n  rcases h_cases with (hk0|hk1|hk3')\n  \u00b7 -- k = 0\n    subst hk0\n    refine \u27e8\u2205, \u2205, ?_, ?_, ?_, ?_\u27e9\n    \u00b7 simp\n    \u00b7 simp\n    \u00b7 intro l hl; simp at hl\n    \u00b7 intro p hp\n      have : T_set 0 = \u2205 := by\n        ext \u27e8x,y\u27e9; simp [T_set]\n      simp [this] at hp\n  \u00b7 -- k = 1\n    subst hk1\n    refine \u27e8{(1,0)}, \u2205, ?_, ?_, ?_, ?_\u27e9\n    \u00b7 simp [Finset.filter_singleton]\n      norm_num\n    \u00b7 simp\n    \u00b7 intro l hl\n      simp at hl\n      rcases hl with (rfl|hl)\n      \u00       \u00b7 intro h\n              rcases Finset.mem_filter.mp h with \u27e8hp, h_eq\u27e9\n              apply Finset.mem_filter.mpr\n              refine \u27e8hp, ?_\u27e9\n              nlinarith\n          simpa [h_eq_filter] using htemp\n      \u00b7 exact line_not_horiz_diag_contains_at_most_two_U n l h0 hneg1\n  have h_vert_bound (v : \u211d) (hv : v \u2208 verts) : ((U n).filter (\u03bb p => (p.1 : \u211d) = v)).card \u2264 2 := by\n    by_cases h : v = 1\n    \u00b7 exfalso\n      exact h_no_vert v hv h\n    \u00b7 exact vert_not_one_contains_at_most_two_U n v h\n  set cover_by_lines := Finset.biUnion lines (\u03bb l => (U n).filter (\u03bb p => l.1 * (p.1 : \u211d) + l.2 = (p.2 : \u211d))) with hcovlines\n  set cover_by_verts := Finset.biUnion verts (\u03bb v => (U n).filter (\u03bb p => (p.1 : \u211d) = v)) with hcovverts\n  have h_cover_subset : U n \u2286 cover_by_lines \u222a cover_by_verts := by\n    intro p hp\n    have hp_points : p \u2208 points := (hallpoints p).mpr (hU_cond p hp)\n    rcases hmain p hp_points with (h | h)\n    \u00b7 rcases h with \u27e8l, hl, h_eq\u27e9\n      have hp_filter : p \u2208 (U n).filter (\u03bb p' => l.1 * (p'.1 : \u211d) + l.2 = (p'.2 : \u211d)) := by\n        apply Finset.mem_filter.mpr\n        exact \u27e8hp, by simpa using h_eq\u27e9\n      have h_mem : p \u2208 cover_by_lines := Finset.mem_biUnion.mpr \u27e8l, hl, hp_filter\u27e9\n      exact Finset.mem_union_left _ h_mem\n    \u00b7 rcases h with \u27e8v, hv, h_eq\u27e9\n      have hp_filter : p \u2208 (U n).filter (\u03bb p' => (p'.1 : \u211d) = v) := by\n        apply Finset.mem_filter.mpr\n        exact \u27e8hp, by simpa using h_eq\u27e9\n      have h_mem : p \u2208 cover_by_verts := Finset.mem_biUnion.mpr \u27e8v, hv, hp_filter\u27e9\n      exact Finset.mem_union_right _ h_mem\n  have h_card_cover_union_le : (cover_by_lines \u222a cover_by_verts).card \u2264 (cover_by_lines).card + (cover_by_verts).card :=\n    Finset.card_union_le _ _\n  have h_card_cover_lines_le : (cover_by_lines).card \u2264 2 * lines.card := by\n    have htemp := Finset.card_biUnion_le_card_mul lines (\u03bb l => (U n).filter (\u03bb p => l.1 * (p.1 : \u211d) + l.2 = (p.2 : \u211d))) 2 (\u03bb l hl => h_line_bound l hl)\n    simpa [mul_comm] using htemp\n  have h_card_cover_verts_le : (cover_by_verts).card \u2264 2 * verts.card := by\n    have htemp := Finset.card_biUnion_le_card_mul verts (\u03bb v => (U n).filter (\u03bb p => (p.1 : \u211d) = v)) 2 (\u03bb v hv => h_vert_bound v hv)\n    simpa [mul_comm] using htemp\n  have h_total : (U n).card \u2264 2 * n := by\n    calc\n      (U n).card \u2264 (cover_by_lines \u222a cover_by_verts).card := Finset.card_le_card h_cover_subset\n      _ \u2264 (cover_by_lines).card + (cover_by_verts).card := h_card_cover_union_le\n      _ \u2264 2 * lines.card + 2 * verts.card := by\n        nlinarith\n      _ = 2 * (lines.card + verts.card) := by ring\n      _ = 2 * n := by rw [hcard]\n  have h_contra : 2*n < 2*n := Nat.lt_of_lt_of_le hcard_U_gt h_total\n  exact Nat.lt_irrefl _ h_contra"

      "lean": "@[blueprint\n  (statement := /-- A sunny line (slope not 0 or -1) covers at most $(k+1)/2$ points of $T_k$. -/)\n  (proof := /-- By parity argument. -/)]\nlemma sunny_line_points_bound (k : \u2115) (l : \u211d \u00d7 \u211d) (h1 : l.1 \u2260 0) (h2 : l.1 \u2260 -1) : ((T_set k).filter (\u03bb p => l.1 * p.1 + l.2 = p.2)).card \u2264 (k+1)/2 := by\n  set a := l.1 with ha\n  set c := l.2 with hc\n  have ha_ne_zero : a \u2260 0 := h1\n  have ha_ne_neg_one : a \u2260 -1 := h2\n  -- helper lemma about impossibility of half-integer difference\n  have not_diff_eq_neg_half_real (p q : \u2115) : ((q : \u211d) - (p : \u211d)) \u2260 -(1/2 : \u211d) := by\n    intro h\n    have h_mul : (2 : \u211d) * ((q : \u211d) - (p : \u211d)) = -1 := by linarith\n    have h_int : (2 : \u2124) * ((q : \u2124) - (p : \u2124)) = (-1 : \u2124) := by\n      exact_mod_cast h_mul\n    omega\n  let S := ((T_set k).filter (\u03bb p => a * p.1 + c = p.2))\n  by_cases h_int : a \u2208 Set.range (fun (n : \u2124) => (n : \u211d))\n  \u00b7 -- a is integer\n    rcases h_int with \u27e8n, hn\u27e9\n    have hn_symm : a = (n : \u211d) := hn.symm\n    have hn_ne_zero : n \u2260 0 := by\n      intro hzero\n      apply ha_ne_zero\n      calc\n        a = (n : \u211d) := hn_symm\n        _ = (0 : \u211d) := by simpa [hzero]\n    have hn_ne_neg_one : n \u2260 -1 := by\n      intro hneg\n      apply ha_ne_neg_one\n      calc\n        a = (n : \u211d) := hn_symm\n        _ = (-1 : \u211d) := by simpa [hneg]\n    -- now decide which spacing to use\n    by_cases h_abs : (|(n + 1 : \u2124)| \u2265 2)\n    \u00b7 -- use x+y spacing\n      have h_div_two_eq_imp_abs_diff_le_one (a b : \u2115) (h : a/2 = b/2) : |(a : \u2124) - (b : \u2124)| \u2264 1 := by\n        have h1 : a \u2264 b + 1 := by omega\n        have h2 : b \u2264 a + 1 := by omega\n        have h1' : (a : \u2124) \u2264 (b : \u2124) + 1 := by exact_mod_cast h1\n        have h2' : (b : \u2124) \u2264 (a : \u2124) + 1 := by exact_mod_cast h         // Color helpers for legacy data without explicit colors
        const defaultColors = ["#3b82f6", "#60a5fa", "#fb923c", "#a78bfa", "#f472b6", "#fbbf24", "#34d399"];

        function getCssVar(name) {
            return getComputedStyle(document.body).getPropertyValue(name).trim();
        }

        function getMainNodeColor() {
            return getCssVar('--main-node-color');
        }

        function getMainEdgeColor() {
            return getCssVar('--main-edge-color');
        }

        function getExternalNodeColor() {
            return getCssVar('--external-node-color');
        }

        function getExternalEdgeColor() {
            return getCssVar('--external-edge-color');
        }

        function getNodeColor(d) {
            if (d.group === "external") return getExternalNodeColor();
            if (d.color) return d.color;   // explicit per-node colour (all green; main theorem distinct)
            if (d.group === "local") return getMainNodeColor();
            // Extract file index from group like "file0", "file1"
            const match = d.group && d.group.match(/^file(\d+)$/);
            if (match) {
                const idx = parseInt(match[1]);
                return idx === 0 ? getMainNodeColor() : defaultColors[idx % defaultColors.length];
            }
            return getMainNodeColor();
        }

        function getEdgeColor(d) {
            if (d.type === "external_type" || d.type === "external_value") return getExternalEdgeColor();
            return getMainEdgeColor();
        }

        function updateColors() {
            node.attr("fill", d => getNodeColor(d));
            externalLinks.attr("stroke", d => getEdgeColor(d));
            fileLinks.attr("stroke", d => getEdgeColor(d));
        }

        const width = window.innerWidth;
        const height = window.innerHeight;

        const svg = d3.select("#graph")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Arrowhead marker for directed (file) edges. fill=context-stroke makes
        // the arrow inherit the edge's stroke colour, so it tracks the theme.
        svg.append("defs").append("marker")
            .attr("id", "arrow-file")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 9).attr("refY", 0)
            .attr("markerWidth", 8).attr("markerHeight", 8)
            .attr("markerUnits", "userSpaceOnUse")
            .attr("orient", "auto")
            .append("path").attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "context-stroke");

        // Add zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.1, 10])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Set initial zoom to fit the graph better
        let currentZoomScale = 0.45;

        function applyZoom(scale) {
            currentZoomScale = scale;
            const transform = d3.zoomIdentity
                .translate(width / 2 * (1 - scale), height / 2 * (1 - scale))
                .scale(scale);
            svg.call(zoom.transform, transform);
        }

        applyZoom(currentZoomScale);

        // Create force simulation with radial layout
        // Push external nodes to outer ring, keep local nodes in center
        let localSpacing = 175;  // Spacing for local nodes (adjustable)
        const externalSpacing = 50;  // Fixed spacing for external nodes
        let externalRadius = localSpacing + 300;  // Radius for external node ring (scales with spacing)

        const linkForce = d3.forceLink(data.edges)
            .id(d => d.id)
            .distance(d => {
                // Only apply spacing to local-to-local edges
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

        const chargeForce = d3.forceManyBody().strength(d => {
            // Stronger charge for file nodes, weaker for external
            return d.group === "external" ? -50 : -localSpacing * 2;
        });

        // Custom force to contain local nodes inside the external perimeter
        function forceContain(radius, centerX, centerY, strength) {
            let nodes;
            function force(alpha) {
                for (const d of nodes) {
                    if (d.group === "external") continue;
                    const dx = d.x - centerX;
                    const dy = d.y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxRadius = radius - 50; // Keep local nodes inside with margin
                    if (dist > maxRadius) {
                        const k = (dist - maxRadius) / dist * strength * alpha;
                        d.vx -= dx * k;
                        d.vy -= dy * k;
                    }
                }
            }
            force.initialize = function(_) { nodes = _; };
            force.radius = function(_) { return arguments.length ? (radius = _, force) : radius; };
            return force;
        }

        const fileCount = (data.files || []).length || 1;

        // Set up layout forces based on number of files
        let simulation;
        let containForce = forceContain(externalRadius, width / 2, height / 2, 0.5);

        if (fileCount === 1) {
            // Single file: use centered radial layout (original behavior)
            simulation = d3.forceSimulation(data.nodes)
                .force("link", linkForce)
                .force("charge", chargeForce)
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(d => d.radius + 5))
                .force("contain", containForce)
                .force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));
        } else {
            // Multiple files: use clustering layout with separate positions
            const filePositions = [];
            for (let i = 0; i < fileCount; i++) {
                const angle = (i * 2 * Math.PI / fileCount) - Math.PI / 2; // Start at top
                const radius = 150; // Distance from center
                filePositions.push({
                    x: width / 2 + radius * Math.cos(angle),
                    y: height / 2 + radius * Math.sin(angle)
                });
            }

            const forceX = d3.forceX(d => {
                if (d.group === "external") return width / 2;
                return filePositions[d.file_index].x;
            }).strength(d => d.group === "external" ? 0 : 0.1);

            const forceY = d3.forceY(d => {
                if (d.group === "external") return height / 2;
                return filePositions[d.file_index].y;
            }).strength(d => d.group === "external" ? 0 : 0.1);

            simulation = d3.forceSimulation(data.nodes)
                .force("link", linkForce)
                .force("charge", chargeForce)
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(d => d.radius + 5))
                .force("contain", containForce)
                .force("x", forceX)
                .force("y", forceY)
                .force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : null,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0));
        }

        // --- Radial layout: each main theorem sits at the centre of its own concentric
        // rings; a node's ring = its depth from that theorem. P1 has two theorems
        // (left/right), so we lay out two ring systems side by side. ---
        const localNodes = data.nodes.filter(n => n.group !== "external");
        const numClusters = Math.max(1, ...localNodes.filter(n => n.col >= 0).map(n => n.col + 1));
        const clusterMax = {};                       // deepest ring per cluster
        localNodes.forEach(n => { if (n.col >= 0) clusterMax[n.col] = Math.max(clusterMax[n.col] || 0, n.level || 0); });
        const maxRings = Math.max(0, ...Object.values(clusterMax));

        // Even starting angle per (cluster, ring) so the rings open already filled.
        const ringGroups = {};
        localNodes.forEach(d => { const k = d.col + "|" + d.level; (ringGroups[k] = ringGroups[k] || []).push(d); });
        Object.values(ringGroups).forEach(arr => arr.forEach((d, i) => { d._ang = 2 * Math.PI * (i + 0.5) / arr.length; }));

        const ringSpacing = () => localSpacing * 0.6;
        function clusterCentersX() {                 // pack ring systems left-to-right without overlap
            const RING = ringSpacing();
            const xs = [];
            let x = 0;
            for (let i = 0; i < numClusters; i++) {
                if (i > 0) x += ((clusterMax[i - 1] || 0) + (clusterMax[i] || 0) + 2) * RING;
                xs.push(x);
            }
            const mid = (xs[0] + xs[numClusters - 1]) / 2;
            return xs.map(v => v - mid + width / 2);
        }
        function clusterTarget(d, centers, RING) {
            if (d.col < 0) return { cx: width / 2, cy: height / 2 + (maxRings + 2) * RING, r: 0 };  // orphan, below
            return { cx: centers[d.col], cy: height / 2, r: (d.level || 0) * RING };
        }

        function applyHierarchy() {                  // (re)install the radial forces at current spacing
            const RING = ringSpacing();
            const centers = clusterCentersX();
            simulation.force("center", null);        // centres are absolute; skip global recentre
            simulation.force("contain", null);       // perimeter clamp would crush the outer rings
            simulation.force("rings", function (alpha) {
                for (const d of localNodes) {
                    const t = clusterTarget(d, centers, RING);
                    const dx = d.x - t.cx, dy = d.y - t.cy;
                    const dist = Math.hypot(dx, dy) || 1e-6;
                    const k = (t.r - dist) / dist * 0.8 * alpha;
                    d.vx += dx * k; d.vy += dy * k;
                }
            });
            simulation.force("radial", d3.forceRadial(   // keep any external nodes on their outer ring
                d => d.group === "external" ? externalRadius : 0, width / 2, height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0));
        }

        // Seed positions on the rings so the first frame is already arranged.
        (function seedRings() {
            const RING = ringSpacing();
            const centers = clusterCentersX();
            localNodes.forEach(d => {
                const t = clusterTarget(d, centers, RING);
                d.x = t.cx + t.r * Math.cos(d._ang);
                d.y = t.cy + t.r * Math.sin(d._ang);
            });
        })();

        applyHierarchy();

        // Pre-heat the simulation so it starts partially settled (smoother but still animated)
        simulation.stop();
        for (let i = 0; i < 100; i++) {
            simulation.tick();
        }

        // Create links - render external (grey) edges first, then file edges (for proper layering)
        const externalEdges = data.edges.filter(d => d.type === "external_type" || d.type === "external_value");
        const fileEdges = data.edges.filter(d => d.type === "local_type" || d.type === "local_value");

        const linkGroup = g.append("g");

        // External links first (behind)
        const externalLinks = linkGroup.append("g")
            .selectAll("line")
            .data(externalEdges)
            .join("line")
            .attr("class", "link")
            .attr("stroke", d => getEdgeColor(d))
            .attr("stroke-opacity", 0.4)
            .attr("stroke-width", 0.5);

        // File links second (on top)
        const fileLinks = linkGroup.append("g")
            .selectAll("line")
            .data(fileEdges)
            .join("line")
            .attr("class", "link")
            .attr("stroke", d => getEdgeColor(d))
            .attr("stroke-opacity", 0.8)
            .attr("stroke-width", 1.2)
            .attr("marker-end", "url(#arrow-file)");

        // Combine for easier manipulation
        const link = linkGroup.selectAll("line");

        // Create nodes
        const node = g.append("g")
            .selectAll("circle")
            .data(data.nodes)
            .join("circle")
            .attr("class", "node")
            .attr("r", d => d.radius)
            .attr("fill", d => getNodeColor(d))
            .style("cursor", "pointer")
            .call(drag(simulation));

        // Tooltip
        const tooltip = d3.select("#tooltip");

        node.on("mouseover", function(event, d) {
            const head = d.type ? `${d.type} ${d.id}` : d.id;
            const stmt = d.statement ? `<div style="margin-top:5px; font-weight:400">${d.statement}</div>` : "";
            tooltip.style("display", "block")
                .html(`<strong>${head}</strong>${stmt}`)
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 10) + "px");

            // Start with URL highlight if present
            clearHighlight();
            applyUrlHighlight();

            // Add hover highlight on top
            const connectedNodes = new Set();
            connectedNodes.add(d.id);

            link.each(function(l) {
                if (l.source.id === d.id || l.target.id === d.id) {
                    connectedNodes.add(l.source.id);
                    connectedNodes.add(l.target.id);
                    // Use muted highlight for external edges
                    const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                    if (isExternalEdge) {
                        d3.select(this).classed("highlighted-external", true);
                    } else {
                        d3.select(this).classed("highlighted", true);
                    }
                }
            });

            node.classed("highlighted", n => connectedNodes.has(n.id));
        })
        .on("mouseout", function() {
            tooltip.style("display", "none");
            clearHighlight();
            applyUrlHighlight();
        });

        // Update positions on simulation tick
        const isFileEdge = d => d.type === "local_type" || d.type === "local_value";
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                // Stop file edges short of the target node so the arrowhead shows.
                .attr("x2", d => {
                    if (!isFileEdge(d)) return d.target.x;
                    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    const dist = Math.hypot(dx, dy) || 1;
                    return d.target.x - dx / dist * (d.target.radius + 6);
                })
                .attr("y2", d => {
                    if (!isFileEdge(d)) return d.target.y;
                    const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
                    const dist = Math.hypot(dx, dy) || 1;
                    return d.target.y - dy / dist * (d.target.radius + 6);
                });

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
        });

        // Restart simulation with moderate alpha for visible but smooth settling
        simulation.alpha(0.3).restart();

        // URL hash management
        function updateHash() {
            const params = new URLSearchParams();
            params.set('spacing', d3.select("#spacingSlider").property('value'));
            params.set('external', d3.select("#showExternal").property('checked') ? '1' : '0');
            params.set('theme', d3.select("#themeSelect").property('value'));
            // Preserve highlight params (comma-separated)
            if (urlHighlightNodeIds.length > 0) {
                params.set('highlight', urlHighlightNodeIds.join(','));
                if (urlHighlightLocalOnly) {
                    params.set('local', 'true');
                }
                if (!urlHighlightEdges) {
                    params.set('edges', 'false');
                }
            }
            // Preserve embed param
            if (isEmbedMode) {
                params.set('embed', 'true');
            }
            // Preserve anchor
            if (anchorNodeId) {
                params.set('anchor', anchorNodeId);
            }
            // Preserve zoom
            if (currentZoomScale !== 0.45) {
                params.set('zoom', currentZoomScale.toFixed(2));
            }
            window.location.hash = params.toString();
        }

        // Track persistent URL-based highlight (can be multiple nodes)
        let urlHighlightNodeIds = [];
        let urlHighlightLocalOnly = false;
        let urlHighlightEdges = true;
        let isEmbedMode = false;
        let anchorNodeId = null;

        function applyAnchorTop(anchorId) {
            const anchorNode = data.nodes.find(n => n.id === anchorId);
            if (!anchorNode) {
                console.warn('Anchor node not found:', anchorId);
                return;
            }

            // Fix anchor at top center
            anchorNode.fx = width / 2;
            anchorNode.fy = 80;

            // Stronger repulsion from anchor node to push others away
            simulation.force("charge", d3.forceManyBody().strength(d => {
                if (d.id === anchorId) return -2000;
                if (d.group === "external") return -50;
                return -localSpacing * 2;
            }));

            simulation.alpha(0.5).restart();
        }

        function highlightNodes(nodeIds, { localOnly = false, edges = true } = {}) {
            const targetNodeIds = new Set(nodeIds.filter(id => data.nodes.find(n => n.id === id)));
            if (targetNodeIds.size === 0) return;

            if (edges) {
                link.each(function(l) {
                    if (targetNodeIds.has(l.source.id) || targetNodeIds.has(l.target.id)) {
                        // If localOnly, skip edges to external nodes
                        if (localOnly) {
                            const sourceExternal = l.source.group === "external";
                            const targetExternal = l.target.group === "external";
                            if (sourceExternal || targetExternal) return;
                        }
                        // Use muted highlight for external edges
                        const isExternalEdge = l.type === "external_type" || l.type === "external_value";
                        if (isExternalEdge) {
                            d3.select(this).classed("highlighted-external", true);
                        } else {
                            d3.select(this).classed("highlighted", true);
                        }
                    }
                });
            }

            // Highlight all target nodes (with filled style)
            node.classed("url-highlighted", n => targetNodeIds.has(n.id));
        }

        function applyUrlHighlight() {
            if (urlHighlightNodeIds.length > 0) {
                highlightNodes(urlHighlightNodeIds, {
                    localOnly: urlHighlightLocalOnly,
                    edges: urlHighlightEdges
                });
            }
        }

        function clearHighlight() {
            link.classed("highlighted", false);
            link.classed("highlighted-external", false);
            node.classed("highlighted", false);
            node.classed("url-highlighted", false);
        }

        function restoreFromHash() {
            const hash = window.location.hash.slice(1);
            if (!hash) return;

            const params = new URLSearchParams(hash);

            // Restore spacing
            if (params.has('spacing')) {
                const spacing = +params.get('spacing');
                d3.select("#spacingSlider").property('value', spacing);
                localSpacing = spacing;
                externalRadius = spacing + 300;

                linkForce.distance(d => {
                    const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                    return isLocalEdge ? localSpacing : externalSpacing;
                });

                chargeForce.strength(d => {
                    return d.group === "external" ? -50 : -spacing * 2;
                });

                simulation.force("radial", d3.forceRadial(
                    d => d.group === "external" ? externalRadius : 0,
                    width / 2,
                    height / 2
                ).strength(d => d.group === "external" ? 0.8 : 0.05));

                applyHierarchy();
                simulation.alpha(0.3).restart();
            }

            // Restore external nodes visibility
            if (params.has('external')) {
                const showExternal = params.get('external') === '1';
                d3.select("#showExternal").property('checked', showExternal);

                node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
                link.style("display", l => {
                    if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                        return "none";
                    }
                    return "block";
                });
            }

            // Restore theme
            if (params.has('theme')) {
                const theme = params.get('theme');
                d3.select("#themeSelect").property('value', theme);
                document.body.classList.toggle('dark-mode', theme === 'dark');
                // Need to update colors after mode change
                setTimeout(updateColors, 50);
            }

            // Restore highlight (comma-separated list)
            if (params.has('highlight')) {
                urlHighlightNodeIds = params.get('highlight').split(',').map(s => s.trim()).filter(Boolean);
                urlHighlightLocalOnly = params.get('local') === 'true';
                urlHighlightEdges = params.get('edges') !== 'false';
                applyUrlHighlight();
            }

            // Restore embed mode
            if (params.get('embed') === 'true') {
                isEmbedMode = true;
                // Hide controls, nav overlay, and navigation panel
                d3.select(".controls").style("display", "none");
                d3.select(".nav-overlay").style("display", "none");
                d3.select(".navigation-panel").style("display", "none");
            }

            // Restore zoom
            if (params.has('zoom')) {
                const zoomScale = parseFloat(params.get('zoom'));
                if (!isNaN(zoomScale) && zoomScale >= 0.1 && zoomScale <= 10) {
                    applyZoom(zoomScale);
                }
            }

            // Restore anchor (pins node at top)
            if (params.has('anchor')) {
                anchorNodeId = params.get('anchor');
                applyAnchorTop(anchorNodeId);
            }
        }

        // Restore state from URL on load
        restoreFromHash();

        // Listen for manual URL hash changes
        window.addEventListener('hashchange', function() {
            // Reset state before restoring
            clearHighlight();
            urlHighlightNodeIds = [];
            urlHighlightLocalOnly = false;
            urlHighlightEdges = true;
            // Reset anchor state
            anchorNodeId = null;
            // Unfix any fixed nodes
            data.nodes.forEach(n => { n.fx = null; n.fy = null; });
            // Restore embed mode elements if switching out of embed
            if (isEmbedMode) {
                d3.select(".controls").style("display", null);
                d3.select(".nav-overlay").style("display", null);
                d3.select(".navigation-panel").style("display", null);
                isEmbedMode = false;
            }
            restoreFromHash();
        });

        // Controls
        d3.select("#themeSelect").on("change", function() {
            const isDark = this.value === 'dark';
            document.body.classList.toggle('dark-mode', isDark);
            updateColors();
            updateHash();
        });

        d3.select("#showExternal").on("change", function() {
            const showExternal = this.checked;
            node.style("display", d => d.group === "external" && !showExternal ? "none" : "block");
            link.style("display", l => {
                if (!showExternal && (l.source.group === "external" || l.target.group === "external")) {
                    return "none";
                }
                return "block";
            });
            updateHash();
        });

        d3.select("#spacingSlider").on("input", function() {
            const spacing = +this.value;
            localSpacing = spacing;
            externalRadius = spacing + 300;

            // Update link distance (only for local edges)
            linkForce.distance(d => {
                const isLocalEdge = d.type === "local_type" || d.type === "local_value";
                return isLocalEdge ? localSpacing : externalSpacing;
            });

            // Update charge strength for file nodes
            chargeForce.strength(d => {
                return d.group === "external" ? -50 : -spacing * 2;
            });

            // Update radial force for external nodes
            simulation.force("radial", d3.forceRadial(
                d => d.group === "external" ? externalRadius : 0,
                width / 2,
                height / 2
            ).strength(d => d.group === "external" ? 0.8 : 0.05));

            // Update containment force radius
            containForce.radius(externalRadius);

            // Re-apply the hierarchy bands/columns at the new spacing
            applyHierarchy();

            // Restart simulation with new parameters
            simulation.alpha(0.3).restart();

            // Update URL hash
            updateHash();
        });

        // Drag behavior with click-to-open-link support
        function drag(simulation) {
            let dragStartX, dragStartY;
            const clickThreshold = 5; // pixels - if moved less than this, treat as click

            function dragstarted(event) {
                dragStartX = event.x;
                dragStartY = event.y;
                if (!event.active) simulation.alphaTarget(0.1).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0.02);

                // Check if this was a click (minimal movement)
                const dx = event.x - dragStartX;
                const dy = event.y - dragStartY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < clickThreshold) {
                    sendNodeCode(event.subject);
                }

                // Gradually release the node for smoother settling
                setTimeout(() => {
                    event.subject.fx = null;
                    event.subject.fy = null;
                }, 100);
            }

            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }

        // --- Clicking a node posts its exact Lean source to the parent page,
        // which shows it in the persistent code box beneath the embedded graph. ---
        function sendNodeCode(d) {
            if (!d) return;
            try {
                window.parent.postMessage({
                    type: 'gx-node',
                    name: d.id || '',
                    kind: d.type || '',
                    status: d.status || '',
                    lean: d.lean || '',
                    statement: d.statement || ''
                }, '*');
            } catch (e) { /* not embedded */ }
        }

        // Preserve theme and settings when clicking navigation links
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a.nav-item');
            if (link && window.location.hash) {
                e.preventDefault();
                window.location.href = link.href + window.location.hash;
            }
        });
    </script>
</body>

</html>
